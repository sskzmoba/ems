<script>
// ============================================================
// SharedJS.html — Login flow + shared UI utilities
// Screens: S08 (voter login step 1), S09 (OTP entry),
//          S10 (admin login step 1), S11 (admin OTP entry),
//          S12 (role selection — not needed, handled by App.showPanel)
// ============================================================

var SharedUI = {

  // ── S08 — Voter Login Step 1 (Roll No + Email) ───────────
  showLogin: function(opts) {
    opts = opts || {};
    setMain(
      '<div style="max-width:420px;margin:40px auto;">'

      // Card
      + '<div class="panel-card">'
      + '<div class="panel-card-header" style="background:#1a3a5c;color:#fff;'
      +   'border-bottom:none;padding:20px;">'
      + '<div style="font-size:1.1rem;font-weight:600">SSKZM Old Boys Association</div>'
      + '<div style="font-size:.82rem;color:rgba(255,255,255,.65);margin-top:3px">'
      +   'Election Management System</div>'
      + '</div>'
      + '<div class="panel-card-body">'

      // Error/info message area
      + (opts.message
          ? '<div id="login-msg" style="padding:10px 14px;border-radius:4px;'
            + 'margin-bottom:16px;font-size:.88rem;background:'
            + (opts.isError ? '#fee2e2;color:#991b1b' : '#dbeafe;color:#1e40af')
            + '">' + escHtml(opts.message) + '</div>'
          : '<div id="login-msg" style="display:none"></div>')

      + '<label style="display:block;font-weight:600;margin-bottom:4px;'
      +   'color:#444;font-size:.88rem">Roll Number</label>'
      + '<input id="inp-roll" type="text" placeholder="e.g. SSK1234" '
      +   'autocomplete="off" autocapitalize="characters" spellcheck="false"'
      +   'style="width:100%;padding:10px 12px;border:1px solid #ccc;'
      +   'border-radius:4px;font-size:1rem;margin-bottom:14px"'
      +   'value="' + escHtml(opts.roll || '') + '">'

      + '<label style="display:block;font-weight:600;margin-bottom:4px;'
      +   'color:#444;font-size:.88rem">Registered Email Address</label>'
      + '<input id="inp-email" type="email" placeholder="your@email.com" '
      +   'autocomplete="email"'
      +   'style="width:100%;padding:10px 12px;border:1px solid #ccc;'
      +   'border-radius:4px;font-size:1rem;margin-bottom:20px">'

      + '<button id="btn-send-otp" onclick="SharedUI.sendOTP()" '
      +   'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;'
      +   'border:none;border-radius:4px;font-size:1rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;">'
      +   'Send OTP</button>'

      + '<div style="text-align:center;margin-top:20px;padding-top:16px;'
      +   'border-top:1px solid #eee;">'
      + '<a href="#" onclick="SharedUI.showAdminLogin();return false;" '
      +   'style="font-size:.82rem;color:#1a3a5c;text-decoration:none;">'
      +   'Admin / RO Panel Login →</a>'
      + '</div>'

      + '</div></div>'  // card-body + panel-card

      // Footer
      + '<p style="text-align:center;font-size:.78rem;color:#aaa;margin-top:16px">'
      + 'SSKZM OBA Election Management System</p>'
      + '</div>'
    );

    // Auto-focus roll number field
    var rollInp = document.getElementById('inp-roll');
    if (rollInp) rollInp.focus();

    // Allow Enter key on both fields
    ['inp-roll', 'inp-email'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') SharedUI.sendOTP();
      });
    });
  },

  // ── sendOTP — validates input then calls server ───────────
  sendOTP: function() {
    var roll  = (document.getElementById('inp-roll').value  || '').trim().toUpperCase();
    var email = (document.getElementById('inp-email').value || '').trim().toLowerCase();

    if (!roll) {
      SharedUI._loginMsg('Please enter your Roll Number.', true);
      document.getElementById('inp-roll').focus();
      return;
    }
    if (!email || email.indexOf('@') < 1) {
      SharedUI._loginMsg('Please enter a valid email address.', true);
      document.getElementById('inp-email').focus();
      return;
    }

    SharedUI._loginMsg('Sending OTP…', false);
    SharedUI._setBtnState('btn-send-otp', true, 'Sending…');

    google.script.run
      .withSuccessHandler(function(res) {
        SharedUI._setBtnState('btn-send-otp', false, 'Send OTP');
        if (res.success) {
          SharedUI.showOTPEntry(roll, res.maskedEmail);
        } else {
          SharedUI._loginMsg(res.message || 'Could not send OTP. Please try again.', true);
        }
      })
      .withFailureHandler(function(err) {
        SharedUI._setBtnState('btn-send-otp', false, 'Send OTP');
        SharedUI._loginMsg('Connection error. Please try again.', true);
      })
      .sendOTP(roll, email, 'login');
  },

  // ── S09 — OTP Entry ───────────────────────────────────────
  showOTPEntry: function(roll, maskedEmail) {
    setMain(
      '<div style="max-width:420px;margin:40px auto;">'
      + '<div class="panel-card">'
      + '<div class="panel-card-header" style="background:#1a3a5c;color:#fff;'
      +   'border-bottom:none;padding:20px;">'
      + '<div style="font-size:1.1rem;font-weight:600">Enter OTP</div>'
      + '<div style="font-size:.82rem;color:rgba(255,255,255,.65);margin-top:3px">'
      +   'Code sent to ' + escHtml(maskedEmail) + '</div>'
      + '</div>'
      + '<div class="panel-card-body">'

      + '<div id="otp-msg" style="display:none;padding:10px 14px;border-radius:4px;'
      +   'margin-bottom:16px;font-size:.88rem;"></div>'

      + '<p style="color:#555;font-size:.9rem;margin-bottom:16px">'
      + 'A 6-digit OTP has been sent to your registered email address. '
      + 'It is valid for <strong>10 minutes</strong>.</p>'

      + '<label style="display:block;font-weight:600;margin-bottom:4px;'
      +   'color:#444;font-size:.88rem">One-Time Password</label>'
      + '<input id="inp-otp" type="text" inputmode="numeric" pattern="[0-9]*" '
      +   'placeholder="6-digit code" maxlength="6" autocomplete="one-time-code"'
      +   'style="width:100%;padding:12px;border:1px solid #ccc;border-radius:4px;'
      +   'font-size:1.6rem;letter-spacing:8px;text-align:center;margin-bottom:20px">'

      + '<button id="btn-verify-otp" onclick="SharedUI.verifyOTP(\'' + escHtml(roll) + '\')" '
      +   'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;'
      +   'border:none;border-radius:4px;font-size:1rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;margin-bottom:12px;">'
      +   'Verify OTP</button>'

      + '<button onclick="SharedUI.showLogin({roll:\'' + escHtml(roll) + '\'})" '
      +   'style="width:100%;padding:10px;background:#f0f2f5;color:#444;'
      +   'border:1px solid #ccc;border-radius:4px;font-size:.9rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;">'
      +   '← Back / Resend OTP</button>'

      + '</div></div>'
      + '<p style="text-align:center;font-size:.78rem;color:#aaa;margin-top:16px">'
      + 'SSKZM OBA Election Management System</p>'
      + '</div>'
    );

    var otpInp = document.getElementById('inp-otp');
    if (otpInp) {
      otpInp.focus();
      otpInp.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') SharedUI.verifyOTP(roll);
      });
      // Auto-submit when 6 digits entered
      otpInp.addEventListener('input', function() {
        if (this.value.replace(/\D/g,'').length === 6) {
          this.value = this.value.replace(/\D/g,'');
          SharedUI.verifyOTP(roll);
        }
      });
    }
  },

  // ── verifyOTP — submits OTP to server ────────────────────
  verifyOTP: function(roll) {
    var otp = (document.getElementById('inp-otp').value || '').trim().replace(/\D/g,'');
    if (otp.length !== 6) {
      SharedUI._otpMsg('Please enter the 6-digit OTP from your email.', true);
      return;
    }

    SharedUI._otpMsg('Verifying…', false);
    SharedUI._setBtnState('btn-verify-otp', true, 'Verifying…');

    google.script.run
      .withSuccessHandler(function(res) {
        SharedUI._setBtnState('btn-verify-otp', false, 'Verify OTP');
        if (res.success) {
  App.token    = res.token;
  App.role     = res.role;
  App.identity = res.adminId;
  App.name     = res.name;
  sessionStorage.setItem('ems_token', res.token);
  sessionStorage.setItem('ems_name',  res.name);
  setTimeout(function() {
    var defined = typeof AdminPanel !== 'undefined';
    App.showPanel();
  }, 500);
} else {
          SharedUI._otpMsg(res.message || 'Verification failed. Please try again.', true);
        }
      })
      .withFailureHandler(function(err) {
        SharedUI._setBtnState('btn-verify-otp', false, 'Verify OTP');
        SharedUI._otpMsg('Connection error. Please try again.', true);
      })
      .verifyOTP(roll, otp);
  },

  // ── S10 — Admin Login Step 1 (Admin ID + Email) ──────────
  showAdminLogin: function(opts) {
    opts = opts || {};
    setMain(
      '<div style="max-width:420px;margin:40px auto;">'
      + '<div class="panel-card">'
      + '<div class="panel-card-header" style="background:#2c1a5c;color:#fff;'
      +   'border-bottom:none;padding:20px;border-top:3px solid #b8960c;">'
      + '<div style="font-size:1.1rem;font-weight:600">Admin Panel Login</div>'
      + '<div style="font-size:.82rem;color:rgba(255,255,255,.65);margin-top:3px">'
      +   'For Returning Officer, TEM, Scrutineer, Observer and EC Officer</div>'
      + '</div>'
      + '<div class="panel-card-body">'

      + '<div id="admin-login-msg" style="'
      + (opts.message ? '' : 'display:none;')
      + 'padding:10px 14px;border-radius:4px;margin-bottom:16px;font-size:.88rem;background:'
      + (opts.isError ? '#fee2e2;color:#991b1b' : '#dbeafe;color:#1e40af')
      + '">' + escHtml(opts.message || '') + '</div>'

      + '<label style="display:block;font-weight:600;margin-bottom:4px;'
      +   'color:#444;font-size:.88rem">Admin ID</label>'
      + '<input id="inp-admin-id" type="text" placeholder="Your Admin ID" '
      +   'autocomplete="off" autocapitalize="characters" spellcheck="false"'
      +   'style="width:100%;padding:10px 12px;border:1px solid #ccc;'
      +   'border-radius:4px;font-size:1rem;margin-bottom:14px"'
      +   'value="' + escHtml(opts.adminId || '') + '">'

      + '<label style="display:block;font-weight:600;margin-bottom:4px;'
      +   'color:#444;font-size:.88rem">Registered Email Address</label>'
      + '<input id="inp-admin-email" type="email" placeholder="your@email.com" '
      +   'autocomplete="email"'
      +   'style="width:100%;padding:10px 12px;border:1px solid #ccc;'
      +   'border-radius:4px;font-size:1rem;margin-bottom:20px">'

      + '<button id="btn-send-admin-otp" onclick="SharedUI.sendAdminOTP()" '
      +   'style="width:100%;padding:12px;background:#2c1a5c;color:#fff;'
      +   'border:none;border-radius:4px;font-size:1rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;margin-bottom:12px;">'
      +   'Send OTP</button>'

      + '<button onclick="SharedUI.showLogin()" '
      +   'style="width:100%;padding:10px;background:#f0f2f5;color:#444;'
      +   'border:1px solid #ccc;border-radius:4px;font-size:.9rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;">'
      +   '← Voter Login</button>'

      + '</div></div>'
      + '<p style="text-align:center;font-size:.78rem;color:#aaa;margin-top:16px">'
      + 'SSKZM OBA Election Management System</p>'
      + '</div>'
    );

    var adminInp = document.getElementById('inp-admin-id');
    if (adminInp) adminInp.focus();

    ['inp-admin-id', 'inp-admin-email'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') SharedUI.sendAdminOTP();
      });
    });
  },

  // ── sendAdminOTP ──────────────────────────────────────────
  sendAdminOTP: function() {
    var adminId = (document.getElementById('inp-admin-id').value    || '').trim().toUpperCase();
    var email   = (document.getElementById('inp-admin-email').value || '').trim().toLowerCase();

    if (!adminId) {
      SharedUI._adminLoginMsg('Please enter your Admin ID.', true);
      document.getElementById('inp-admin-id').focus();
      return;
    }
    if (!email || email.indexOf('@') < 1) {
      SharedUI._adminLoginMsg('Please enter your registered email address.', true);
      document.getElementById('inp-admin-email').focus();
      return;
    }

    SharedUI._adminLoginMsg('Sending OTP…', false);
    SharedUI._setBtnState('btn-send-admin-otp', true, 'Sending…');

    google.script.run
      .withSuccessHandler(function(res) {
        SharedUI._setBtnState('btn-send-admin-otp', false, 'Send OTP');
        if (res.success) {
          SharedUI.showAdminOTPEntry(adminId, res.maskedEmail);
        } else {
          SharedUI._adminLoginMsg(res.message || 'Could not send OTP. Please try again.', true);
        }
      })
      .withFailureHandler(function(err) {
        SharedUI._setBtnState('btn-send-admin-otp', false, 'Send OTP');
        SharedUI._adminLoginMsg('Connection error. Please try again.', true);
      })
      .sendAdminOTP(adminId, email);
  },

  // ── S11 — Admin OTP Entry ─────────────────────────────────
  showAdminOTPEntry: function(adminId, maskedEmail) {
    setMain(
      '<div style="max-width:420px;margin:40px auto;">'
      + '<div class="panel-card">'
      + '<div class="panel-card-header" style="background:#2c1a5c;color:#fff;'
      +   'border-bottom:none;padding:20px;border-top:3px solid #b8960c;">'
      + '<div style="font-size:1.1rem;font-weight:600">Enter Admin OTP</div>'
      + '<div style="font-size:.82rem;color:rgba(255,255,255,.65);margin-top:3px">'
      +   'Code sent to ' + escHtml(maskedEmail) + '</div>'
      + '</div>'
      + '<div class="panel-card-body">'

      + '<div id="admin-otp-msg" style="display:none;padding:10px 14px;border-radius:4px;'
      +   'margin-bottom:16px;font-size:.88rem;"></div>'

      + '<p style="color:#555;font-size:.9rem;margin-bottom:16px">'
      + 'A 6-digit OTP has been sent to your registered email. '
      + 'It is valid for <strong>10 minutes</strong>.</p>'

      + '<label style="display:block;font-weight:600;margin-bottom:4px;'
      +   'color:#444;font-size:.88rem">One-Time Password</label>'
      + '<input id="inp-admin-otp" type="text" inputmode="numeric" pattern="[0-9]*" '
      +   'placeholder="6-digit code" maxlength="6" autocomplete="one-time-code"'
      +   'style="width:100%;padding:12px;border:1px solid #ccc;border-radius:4px;'
      +   'font-size:1.6rem;letter-spacing:8px;text-align:center;margin-bottom:20px">'

      + '<button id="btn-verify-admin-otp" '
      +   'onclick="SharedUI.verifyAdminOTP(\'' + escHtml(adminId) + '\')" '
      +   'style="width:100%;padding:12px;background:#2c1a5c;color:#fff;'
      +   'border:none;border-radius:4px;font-size:1rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;margin-bottom:12px;">'
      +   'Verify OTP</button>'

      + '<button onclick="SharedUI.showAdminLogin({adminId:\'' + escHtml(adminId) + '\'})" '
      +   'style="width:100%;padding:10px;background:#f0f2f5;color:#444;'
      +   'border:1px solid #ccc;border-radius:4px;font-size:.9rem;cursor:pointer;'
      +   'font-family:Arial,sans-serif;">'
      +   '← Back / Resend OTP</button>'

      + '</div></div>'
      + '<p style="text-align:center;font-size:.78rem;color:#aaa;margin-top:16px">'
      + 'SSKZM OBA Election Management System</p>'
      + '</div>'
    );

    var otpInp = document.getElementById('inp-admin-otp');
    if (otpInp) {
      otpInp.focus();
      otpInp.addEventListener('keydown', function(ev) {
        if (ev.key === 'Enter') SharedUI.verifyAdminOTP(adminId);
      });
      otpInp.addEventListener('input', function() {
        if (this.value.replace(/\D/g,'').length === 6) {
          this.value = this.value.replace(/\D/g,'');
          SharedUI.verifyAdminOTP(adminId);
        }
      });
    }
  },

  // ── verifyAdminOTP ────────────────────────────────────────
  verifyAdminOTP: function(adminId) {
    var otp = (document.getElementById('inp-admin-otp').value || '').trim().replace(/\D/g,'');
    if (otp.length !== 6) {
      SharedUI._adminOTPMsg('Please enter the 6-digit OTP from your email.', true);
      return;
    }

    SharedUI._adminOTPMsg('Verifying…', false);
    SharedUI._setBtnState('btn-verify-admin-otp', true, 'Verifying…');

    google.script.run
      .withSuccessHandler(function(res) {
  SharedUI._setBtnState('btn-verify-otp', false, 'Verify OTP');
  if (res.success) {
    App.token    = res.token;
    App.role     = res.role;
    App.identity = res.rollNo;
    App.name     = res.name;
    sessionStorage.setItem('ems_token', res.token);
    sessionStorage.setItem('ems_name',  res.name);
    App.showPanel();
  } else {
    SharedUI._otpMsg(res.message || 'Verification failed. Please try again.', true);
  }
})
      .withFailureHandler(function(err) {
        SharedUI._setBtnState('btn-verify-admin-otp', false, 'Verify OTP');
        SharedUI._adminOTPMsg('Connection error. Please try again.', true);
      })
      .verifyAdminOTP(adminId, otp);
  },

  // ── Private message helpers ───────────────────────────────
  _loginMsg: function(msg, isError) {
    var el = document.getElementById('login-msg');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = isError ? '#fee2e2' : '#dbeafe';
    el.style.color      = isError ? '#991b1b' : '#1e40af';
  },
  _otpMsg: function(msg, isError) {
    var el = document.getElementById('otp-msg');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = isError ? '#fee2e2' : '#dbeafe';
    el.style.color      = isError ? '#991b1b' : '#1e40af';
  },
  _adminLoginMsg: function(msg, isError) {
    var el = document.getElementById('admin-login-msg');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = isError ? '#fee2e2' : '#dbeafe';
    el.style.color      = isError ? '#991b1b' : '#1e40af';
  },
  _adminOTPMsg: function(msg, isError) {
    var el = document.getElementById('admin-otp-msg');
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
    el.style.background = isError ? '#fee2e2' : '#dbeafe';
    el.style.color      = isError ? '#991b1b' : '#1e40af';
  },
  _setBtnState: function(id, disabled, label) {
    var btn = document.getElementById(id);
    if (!btn) return;
    btn.disabled   = disabled;
    btn.textContent = label;
    btn.style.opacity = disabled ? '.6' : '1';
  }

}; // end SharedUI
</script>
