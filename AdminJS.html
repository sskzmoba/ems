<script>
// ============================================================
// ADMIN PANEL — Pass 2B (Task 1 fix: topbar ownership)
// Roles: RO_ADMIN | DEPUTY_RO | TEM | SCRUTINEER | OBSERVER
// ============================================================
var AdminPanel = (function() {

  var _currentTab = '';

  // Tab definitions per role
  var TAB_SETS = {
    RO_ADMIN: [
      { id:'elections',   label:'Elections' },
      { id:'nominations', label:'Nominations' },
      { id:'scrutiny',    label:'Scrutiny' },
      { id:'candidates',  label:'Candidates' },
      { id:'voters',      label:'Voters' },
      { id:'tally',       label:'Tally' },
      { id:'handover',    label:'Handover' },
      { id:'admins',      label:'Admins' },
      { id:'adminlog',    label:'Log' },
      { id:'settings',    label:'Settings' }
    ],
    DEPUTY_RO: [
      { id:'elections',   label:'Elections' },
      { id:'nominations', label:'Nominations' },
      { id:'scrutiny',    label:'Scrutiny' },
      { id:'candidates',  label:'Candidates' },
      { id:'voters',      label:'Voters' },
      { id:'tally',       label:'Tally' },
      { id:'handover',    label:'Handover' },
      { id:'adminlog',    label:'Log' }
    ],
    TEM: [
      { id:'elections',   label:'Elections' },
      { id:'nominations', label:'Nominations' },
      { id:'scrutiny',    label:'Scrutiny' },
      { id:'candidates',  label:'Candidates' },
      { id:'voters',      label:'Voters' },
      { id:'tally',       label:'Tally' },
      { id:'adminlog',    label:'Log' }
    ],
    SCRUTINEER: [
      { id:'tally',     label:'Tally' },
      { id:'handover',  label:'Handover' },
      { id:'scrutiny',  label:'Scrutiny' },
      { id:'votedlog',  label:'Voted Log' },
      { id:'adminlog',  label:'Log' }
    ],
    OBSERVER: [
      { id:'dashboard', label:'Dashboard' },
      { id:'results',   label:'Results' }
    ]
  };

  function roleLabel(role) {
    var map = {
      RO_ADMIN:   'Returning Officer',
      DEPUTY_RO:  'Deputy RO',
      TEM:        'Technical Election Manager',
      SCRUTINEER: 'Scrutineer',
      OBSERVER:   'Observer'
    };
    return map[role] || role;
  }

  function init() {
    var role = (App.role || '').toUpperCase();
    var tabs = TAB_SETS[role] || TAB_SETS['OBSERVER'];

    // TEM AuthID bar
    var temBar = document.getElementById('tem-authbar');
    if (role === 'TEM') {
      if (!temBar) {
        var bar = document.createElement('div');
        bar.id = 'tem-authbar';
        bar.style.cssText = 'background:#fefce8;border-bottom:1px solid #fde047;' +
          'padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
        bar.innerHTML =
          '<span style="font-size:.9rem;color:#854d0e;font-weight:600;">' +
            'TEM Authorisation ID required for write actions:</span>' +
          '<input id="tem-authid" type="text" placeholder="Enter AuthID" ' +
            'style="font-size:.9rem;padding:8px 10px;border:1px solid #fde047;' +
            'border-radius:4px;width:200px;" />' +
          '<span id="tem-authstatus" style="font-size:.85rem;color:#6b7280;">' +
            'Not validated</span>';
        var navBar = document.getElementById('nav-bar');
        navBar.parentNode.insertBefore(bar, navBar.nextSibling);
      }
    } else {
      if (temBar) temBar.parentNode.removeChild(temBar);
    }

    // Build nav via NavMenu
    NavMenu.build(tabs, tabs[0].id, function(tabId) {
      _currentTab = tabId;
      var role = (App.role || '').toUpperCase();
      var content = document.getElementById('admin-content');
      if (content) content.innerHTML = _renderTab(tabId, role);
    });

    // Content area
    setMain('<div id="admin-content"></div>');

    // Render first tab
    _currentTab = tabs[0].id;
    document.getElementById('admin-content').innerHTML = _renderTab(tabs[0].id, role);
  }

  function switchTab(tabId) {
    _currentTab = tabId;
    var role = (App.role || '').toUpperCase();
    var content = document.getElementById('admin-content');
    if (content) content.innerHTML = _renderTab(tabId, role);
  }

  function _renderTab(tabId, role) {
    if (tabId === 'elections') {
      _loadElections(role);
      return '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading elections…</div>' +
        '</div>';
    }

    if (tabId === 'admins') {
      setTimeout(function() { AdminPanel._loadAdmins(); }, 0);
      return '<div id="admins-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading admins…</div>' +
        '</div></div>';
    }

    if (tabId === 'voters') {
      setTimeout(function() { AdminPanel._loadVoters(1, ''); }, 0);
      return '<div id="voters-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading voter roll…</div>' +
        '</div></div>';
    }

    // Coming soon — all other tabs
    var labels = {
      nominations: 'Nominations',
      scrutiny:    'Scrutiny',
      candidates:  'Candidates',
      voters:      'Voters',
      tally:       'Live Tally',
      handover:    'Handover',
      admins:      'Admin Accounts',
      adminlog:    'Admin Log',
      settings:    'Settings',
      dashboard:   'Observer Dashboard',
      results:     'Results',
      votedlog:    'Voted Log'
    };
    var label = labels[tabId] || tabId;
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2rem;margin-bottom:12px;">🏗️</div>' +
      '<div style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
        escHtml(label) + '</div>' +
      '<div style="font-size:0.85rem;">This tab is being built. Check back soon.</div>' +
      '</div>';
  }

function _loadElections(role) {
    google.script.run
      .withSuccessHandler(function(res) {
        var content = document.getElementById('admin-content');
        if (!content) return;

        if (!res || !res.success) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load elections.') + '</div>';
          return;
        }

        var elections = res.elections || [];
        var isRO = role === 'RO_ADMIN';

        // Status → badge class map
        var badgeMap = {
          draft:               'badge-draft',
          nominations_open:    'badge-noms-open',
          nominations_open_phase2: 'badge-noms-open',
          scrutiny:            'badge-scrutiny',
          candidates_published:'badge-scrutiny',
          active:              'badge-active',
          closed:              'badge-closed',
          declared:            'badge-declared'
        };

        var html = '';

        // Create button — RO_ADMIN only
        if (isRO) {
          html += '<div style="margin-bottom:16px;">' +
            '<button class="btn btn-primary" ' +
              'onclick="AdminPanel.showCreateElection()" ' +
              'style="width:100%;padding:14px;font-size:1rem;">' +
              '+ New Election' +
            '</button>' +
          '</div>';
        }

        if (elections.length === 0) {
          html += '<div class="panel-card">' +
            '<div class="panel-card-body" style="text-align:center;padding:40px 16px;color:#6b7280;">' +
            '<div style="font-size:1.5rem;margin-bottom:8px;">🗳️</div>' +
            '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No elections yet</div>' +
            (isRO ? '<div style="font-size:.85rem;">Use the button above to create one.</div>' : '') +
            '</div></div>';
        } else {
          elections.forEach(function(el) {
            var badge = badgeMap[el.status] || 'badge-draft';
            var statusLabel = el.status.replace(/_/g, ' ');
            var trialTag = el.isTrial
              ? '<span class="status-badge badge-trial" style="margin-left:6px;">Trial</span>'
              : '';

            html += '<div class="panel-card" style="margin-bottom:12px;">' +
              '<div class="panel-card-body" style="padding:14px 16px;">' +

              // Title row
              '<div style="font-weight:600;color:#1a3a5c;font-size:.95rem;margin-bottom:6px;">' +
                escHtml(el.title) + trialTag +
              '</div>' +

              // Status + mode row
              '<div style="margin-bottom:8px;">' +
                '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
                '<span style="font-size:.78rem;color:#888;margin-left:8px;">' +
                  escHtml(el.mode) +
                '</span>' +
              '</div>' +

              // Dates row
              '<div style="font-size:.82rem;color:#666;margin-bottom:10px;">' +
                (el.startDate ? '📅 ' + escHtml(el.startDate) : 'No start date') +
                (el.endDate   ? ' → ' + escHtml(el.endDate)   : '') +
              '</div>' +

              // Action button — RO only for now
              (isRO ?
                '<button class="btn btn-outline btn-sm" ' +
                  'onclick="AdminPanel.manageElection(\'' + escHtml(el.id) + '\')" ' +
                  'style="width:100%;padding:10px;font-size:.85rem;">' +
                  'Manage' +
                '</button>'
              : '') +

              '</div></div>';
          });
        }

        content.innerHTML = html;
      })
      .withFailureHandler(function(err) {
        var content = document.getElementById('admin-content');
        if (content) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            'Error loading elections. Please try again.</div>';
        }
      })
      .getAllElections(App.token);
  }

  function logout() {
    App.logout();
  }

  return {
    init: init,
    switchTab: switchTab,
    showCreateElection: function() {
      var role = (App.role || '').toUpperCase();
      var content = document.getElementById('admin-content');
      if (!content) return;
      content.innerHTML =
        '<div style="margin-bottom:12px;">' +
          '<button class="btn btn-outline" onclick="AdminPanel.switchTab(\'elections\')" ' +
            'style="width:100%;padding:12px;font-size:1rem;">← Back to Elections</button>' +
        '</div>' +
        '<div class="panel-card">' +
          '<div class="panel-card-header">Create New Election</div>' +
          '<div class="panel-card-body">' +

            '<label for="new-elec-title">Election Title</label>' +
            '<input type="text" id="new-elec-title" placeholder="e.g. SSKZM OBA Elections 2026-27" ' +
              'style="margin-bottom:20px;" />' +

            '<label>Mode</label>' +
            '<div style="display:flex;gap:12px;margin-bottom:20px;">' +
              '<button id="mode-btn-electronic" ' +
                'onclick="AdminPanel._setMode(\'electronic\')" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #1a3a5c;background:#1a3a5c;color:#fff;cursor:pointer;">' +
                'Electronic' +
              '</button>' +
              '<button id="mode-btn-physical" ' +
                'onclick="AdminPanel._setMode(\'physical\')" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #ccc;background:#fff;color:#333;cursor:pointer;">' +
                'Physical' +
              '</button>' +
            '</div>' +

            '<label>Trial Election?</label>' +
            '<div style="display:flex;gap:12px;margin-bottom:24px;">' +
              '<button id="trial-btn-no" ' +
                'onclick="AdminPanel._setTrial(false)" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #1a3a5c;background:#1a3a5c;color:#fff;cursor:pointer;">' +
                'No' +
              '</button>' +
              '<button id="trial-btn-yes" ' +
                'onclick="AdminPanel._setTrial(true)" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #ccc;background:#fff;color:#333;cursor:pointer;">' +
                'Yes' +
              '</button>' +
            '</div>' +

            '<button class="btn btn-primary" ' +
              'onclick="AdminPanel._submitCreateElection()" ' +
              'style="width:100%;padding:14px;font-size:1rem;">' +
              'Create Election' +
            '</button>' +

            '<div id="create-elec-error" ' +
              'style="margin-top:12px;color:#c0392b;font-size:.9rem;display:none;">' +
            '</div>' +

          '</div>' +
        '</div>';
    },

    _mode: 'electronic',
    _trial: false,

    _setMode: function(val) {
      AdminPanel._mode = val;
      var el = document.getElementById('mode-btn-electronic');
      var ph = document.getElementById('mode-btn-physical');
      if (val === 'electronic') {
        el.style.background = '#1a3a5c'; el.style.color = '#fff'; el.style.borderColor = '#1a3a5c';
        ph.style.background = '#fff';    ph.style.color = '#333'; ph.style.borderColor = '#ccc';
      } else {
        ph.style.background = '#1a3a5c'; ph.style.color = '#fff'; ph.style.borderColor = '#1a3a5c';
        el.style.background = '#fff';    el.style.color = '#333'; el.style.borderColor = '#ccc';
      }
    },

    _setTrial: function(val) {
      AdminPanel._trial = val;
      var yes = document.getElementById('trial-btn-yes');
      var no  = document.getElementById('trial-btn-no');
      if (val) {
        yes.style.background = '#1a3a5c'; yes.style.color = '#fff'; yes.style.borderColor = '#1a3a5c';
        no.style.background  = '#fff';    no.style.color  = '#333'; no.style.borderColor  = '#ccc';
      } else {
        no.style.background  = '#1a3a5c'; no.style.color  = '#fff'; no.style.borderColor  = '#1a3a5c';
        yes.style.background = '#fff';    yes.style.color = '#333'; yes.style.borderColor = '#ccc';
      }
    },

    _submitCreateElection: function() {
      var title = document.getElementById('new-elec-title').value.trim();
      var errEl = document.getElementById('create-elec-error');
      if (!title) {
        errEl.textContent = 'Please enter an election title.';
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';
      var btn = document.querySelector('[onclick="AdminPanel._submitCreateElection()"]');
      if (btn) { btn.textContent = 'Creating…'; btn.disabled = true; }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            showToast('Election created successfully.');
            AdminPanel.switchTab('elections');
          } else {
            errEl.textContent = (res && res.message) || 'Failed to create election.';
            errEl.style.display = 'block';
            if (btn) { btn.textContent = 'Create Election'; btn.disabled = false; }
          }
        })
        .withFailureHandler(function() {
          errEl.textContent = 'Error — please try again.';
          errEl.style.display = 'block';
          if (btn) { btn.textContent = 'Create Election'; btn.disabled = false; }
        })
        .createElection(App.token, {
          title:   title,
          mode:    AdminPanel._mode,
          isTrial: AdminPanel._trial
        });
    },

    manageElection: function(id) {
  var content = document.getElementById('admin-content');
  if (!content) return;

  // Loading state
  content.innerHTML =
    '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
      '<div class="spinner"></div>' +
      '<div style="font-size:.85rem;margin-top:12px;">Loading election…</div>' +
    '</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        content.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load election.') +
          '</div>';
        return;
      }
      AdminPanel._renderManageScreen(res.election);
    })
    .withFailureHandler(function() {
      content.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          'Error loading election. Please try again.' +
        '</div>';
    })
    .getElection(App.token, id);
},

_renderManageScreen: function(el) {
  var content = document.getElementById('admin-content');
  if (!content) return;

  var isDraft = el.status === 'draft' || (el.isTrial && el.status !== 'active');

  var statusBadgeMap = {
    draft:                   'badge-draft',
    nominations_open:        'badge-noms-open',
    nominations_open_phase2: 'badge-noms-open',
    scrutiny:                'badge-scrutiny',
    candidates_published:    'badge-scrutiny',
    active:                  'badge-active',
    closed:                  'badge-closed',
    declared:                'badge-declared'
  };
  var badge = statusBadgeMap[el.status] || 'badge-draft';
  var statusLabel = el.status.replace(/_/g, ' ');
  var trialTag = el.isTrial
    ? '<span class="status-badge badge-trial" style="margin-left:6px;">Trial</span>'
    : '';

  // Next status label for advance button
  var nextStatusMap = {
    draft:            { next: 'nominations_open', label: 'Open Nominations' }
  };
  var advance = nextStatusMap[el.status] || null;

  var html =
    // Back button
    '<div style="margin-bottom:12px;">' +
      '<button class="btn btn-outline" ' +
        'onclick="AdminPanel.switchTab(\'elections\')" ' +
        'style="width:100%;padding:12px;font-size:1rem;">← Back to Elections</button>' +
    '</div>' +

    // Header card — title + status (read-only)
    '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-body" style="padding:14px 16px;">' +
        '<div style="font-weight:700;color:#1a3a5c;font-size:1rem;margin-bottom:8px;">' +
          escHtml(el.title) + trialTag +
        '</div>' +
        '<div>' +
          '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
          '<span style="font-size:.78rem;color:#888;margin-left:8px;">' +
            escHtml(el.mode || '') +
          '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // Advance status — draft only
    (advance ?
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Election Status</div>' +
        '<div class="panel-card-body">' +
          '<p style="font-size:.85rem;color:#374151;margin-bottom:14px;">' +
            'Current status is <strong>Draft</strong>. ' +
            'Advancing will open nominations and notify no one automatically — ' +
            'you must communicate separately.' +
          '</p>' +
          '<button class="btn btn-primary" id="btn-advance-status" ' +
            'onclick="AdminPanel._advanceStatus(\'' + escHtml(el.id) + '\',\'' + advance.next + '\')" ' +
            'style="width:100%;padding:14px;font-size:1rem;">' +
            '▶ ' + advance.label +
          '</button>' +
          '<div id="advance-status-error" ' +
            'style="margin-top:10px;color:#c0392b;font-size:.85rem;display:none;"></div>' +
        '</div>' +
      '</div>'
    : '') +

    // Edit fields card
    '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-header">Election Details</div>' +
      '<div class="panel-card-body">' +

        '<label for="manage-desc">Description</label>' +
        '<textarea id="manage-desc" rows="3" ' +
          'style="width:100%;box-sizing:border-box;padding:10px;' +
          'border:1px solid #d1d5db;border-radius:4px;font-size:.9rem;' +
          'margin-bottom:16px;resize:vertical;">' +
          escHtml(el.description || '') +
        '</textarea>' +

        '<label for="manage-eccontact">EC Contact Email</label>' +
        '<input type="email" id="manage-eccontact" ' +
          'value="' + escHtml(el.ecContact || '') + '" ' +
          'placeholder="e.g. secretary@sskzmoba.org" ' +
          'style="margin-bottom:16px;" />' +

        '<label for="manage-vday">AGM Day (V-Day)</label>' +
        '<input type="date" id="manage-vday" ' +
          'value="' + escHtml(el.vDay || '') + '" ' +
          'style="margin-bottom:16px;" />' +

        '<label for="manage-vclose">Voting Close Date</label>' +
        '<input type="date" id="manage-vclose" ' +
          'value="' + escHtml(el.votingCloseDay || '') + '" ' +
          'style="margin-bottom:16px;" />' +

        '<label for="manage-declare">Declaration Day</label>' +
        '<input type="date" id="manage-declare" ' +
          'value="' + escHtml(el.declarationDay || '') + '" ' +
          'style="margin-bottom:24px;" />' +

        '<button class="btn btn-primary" id="btn-save-election" ' +
          'onclick="AdminPanel._saveElection(\'' + escHtml(el.id) + '\')" ' +
          'style="width:100%;padding:14px;font-size:1rem;">' +
          'Save Changes' +
        '</button>' +

        '<div id="save-election-error" ' +
          'style="margin-top:10px;color:#c0392b;font-size:.85rem;display:none;"></div>' +
        '<div id="save-election-ok" ' +
          'style="margin-top:10px;color:#16a34a;font-size:.85rem;display:none;"></div>' +

      '</div>' +
    '</div>' +

    // Delete — draft only
    (isDraft ?
      '<div class="panel-card" style="margin-bottom:24px;border:1px solid #fca5a5;">' +
        '<div class="panel-card-header" style="background:#fef2f2;color:#b91c1c;">Danger Zone</div>' +
        '<div class="panel-card-body">' +
          '<p style="font-size:.85rem;color:#374151;margin-bottom:14px;">' +
            'Delete this election permanently. This cannot be undone. ' +
            'Only draft elections may be deleted.' +
          '</p>' +
          '<div id="delete-confirm-box" style="display:none;margin-bottom:12px;' +
            'background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:12px;">' +
            '<p style="font-size:.85rem;color:#b91c1c;margin-bottom:12px;">' +
              '<strong>Are you sure?</strong> This will permanently delete ' +
              '"' + escHtml(el.title) + '".' +
            '</p>' +
            '<div style="display:flex;gap:10px;">' +
              '<button class="btn btn-outline" ' +
                'onclick="document.getElementById(\'delete-confirm-box\').style.display=\'none\';' +
                'document.getElementById(\'btn-delete-election\').style.display=\'block\';" ' +
                'style="flex:1;padding:12px;">Cancel</button>' +
              '<button ' +
                'onclick="AdminPanel._deleteElection(\'' + escHtml(el.id) + '\')" ' +
                'style="flex:1;padding:12px;font-size:.9rem;background:#b91c1c;color:#fff;' +
                'border:none;border-radius:4px;cursor:pointer;">' +
                'Yes, Delete' +
              '</button>' +
            '</div>' +
          '</div>' +
          '<button id="btn-delete-election" ' +
            'onclick="document.getElementById(\'delete-confirm-box\').style.display=\'block\';' +
            'this.style.display=\'none\';" ' +
            'style="width:100%;padding:14px;font-size:1rem;background:#fff;color:#b91c1c;' +
            'border:2px solid #b91c1c;border-radius:4px;cursor:pointer;">' +
            'Delete Election' +
          '</button>' +
        '</div>' +
      '</div>'
    : '') +
    '';

_renderAdminsList: function(admins) {
  var roleLabel = {
    RO_ADMIN:   'Returning Officer',
    DEPUTY_RO:  'Deputy RO',
    TEM:        'Tech Election Manager',
    SCRUTINEER: 'Scrutineer',
    OBSERVER:   'Observer'
  };

  var html =
    '<div style="margin-bottom:16px;">' +
      '<button class="btn btn-primary" onclick="AdminPanel.showAddAdmin()" ' +
        'style="width:100%;padding:14px;font-size:1rem;">+ Add Admin Account</button>' +
    '</div>' +
    '<div id="add-admin-form-area"></div>';

  if (admins.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">👤</div>' +
      '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No admin accounts yet</div>' +
      '<div style="font-size:.85rem;">Use the button above to add one.</div>' +
      '</div></div>';
    return html;
  }

  admins.forEach(function(a) {
    var isActive = (a.status !== 'DISABLED');
    var statusBadge = isActive
      ? '<span class="status-badge badge-active" style="font-size:.75rem;">ACTIVE</span>'
      : '<span class="status-badge badge-closed" style="font-size:.75rem;">DISABLED</span>';
    var deputyBadge = (a.role === 'DEPUTY_RO' && a.deputyROActive)
      ? '<span class="status-badge badge-noms-open" style="font-size:.75rem;margin-left:6px;">Activated</span>'
      : '';

    html += '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-body" style="padding:14px 16px;">' +

        // Name + badges
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;' +
          'gap:8px;flex-wrap:wrap;margin-bottom:6px;">' +
          '<div style="font-weight:700;color:#1a3a5c;font-size:.95rem;">' +
            escHtml(a.name) + '</div>' +
          '<div>' + statusBadge + deputyBadge + '</div>' +
        '</div>' +

        // Details
        '<div style="font-size:.82rem;color:#6b7280;margin-bottom:10px;">' +
          '<div>ID: <span style="color:#374151;font-weight:600;">' + escHtml(a.id) + '</span>' +
            (a.rollNo ? ' &nbsp;·&nbsp; Roll: ' + escHtml(a.rollNo) : '') + '</div>' +
          '<div>' + escHtml(roleLabel[a.role] || a.role) + ' &nbsp;·&nbsp; ' +
            escHtml(a.type || '') + '</div>' +
          '<div>' + escHtml(a.email) + '</div>' +
          (a.addedAt ? '<div style="margin-top:2px;">Added: ' +
            escHtml(a.addedAt.replace('T',' ').replace(/\.\d+Z/,'') + ' UTC') + '</div>' : '') +
        '</div>' +

        // Action buttons
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +

          // Enable / Disable
          (isActive
            ? '<button onclick="AdminPanel._confirmDisable(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                'background:#fff;color:#b91c1c;border:1.5px solid #b91c1c;border-radius:4px;cursor:pointer;">' +
                'Disable Account</button>'
            : '<button onclick="AdminPanel._confirmEnable(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                'background:#fff;color:#16a34a;border:1.5px solid #16a34a;border-radius:4px;cursor:pointer;">' +
                'Re-enable Account</button>') +

          // Deputy RO activation — only for DEPUTY_RO accounts
          (a.role === 'DEPUTY_RO'
            ? (a.deputyROActive
                ? '<button onclick="AdminPanel._confirmDeactivateDeputyRO(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                    'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                    'background:#fff;color:#92400e;border:1.5px solid #d97706;border-radius:4px;cursor:pointer;">' +
                    'Deactivate Deputy RO</button>'
                : '<button onclick="AdminPanel._confirmActivateDeputyRO(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                    'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                    'background:#fff;color:#1d4ed8;border:1.5px solid #1d4ed8;border-radius:4px;cursor:pointer;">' +
                    'Activate Deputy RO</button>')
            : '') +

        '</div>' +

        // Confirmation area for this card
        '<div id="confirm-' + escHtml(a.id) + '" style="display:none;margin-top:12px;' +
          'background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:12px;"></div>' +

        // Deputy RO confirmation area
        (a.role === 'DEPUTY_RO'
          ? '<div id="depro-' + escHtml(a.id) + '" style="display:none;margin-top:12px;' +
              'background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:12px;"></div>'
          : '') +

      '</div>' +
    '</div>';
  });

  return html;

_submitAddAdmin: function() {
  var btn    = document.getElementById('btn-submit-admin');
  var errEl  = document.getElementById('add-admin-error');
  var id     = document.getElementById('new-admin-id').value.trim();
  var name   = document.getElementById('new-admin-name').value.trim();
  var role   = document.getElementById('new-admin-role').value;
  var email  = document.getElementById('new-admin-email').value.trim();
  var type   = document.getElementById('new-admin-type').value;
  var rollNo = document.getElementById('new-admin-roll').value.trim();

  errEl.style.display = 'none';
  if (!id || !name || !role || !email) {
    errEl.textContent = 'Admin ID, Name, Role and Email are required.';
    errEl.style.display = 'block';
    return;
  }

  if (btn) { btn.textContent = 'Adding…'; btn.disabled = true; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Admin account added.');
        AdminPanel._loadAdmins();
      } else {
        errEl.textContent = (res && res.message) || 'Failed to add admin.';
        errEl.style.display = 'block';
        if (btn) { btn.textContent = 'Add Admin'; btn.disabled = false; }
      }
    })
    .withFailureHandler(function() {
      errEl.textContent = 'Error — please try again.';
      errEl.style.display = 'block';
      if (btn) { btn.textContent = 'Add Admin'; btn.disabled = false; }
    })
    .addAdmin(App.token, { id: id, name: name, role: role,
                            email: email, type: type, rollNo: rollNo });
},

_loadVoters: function(page, search) {
  var role = (App.role || '').toUpperCase();
  var c = document.getElementById('voters-content');
  if (!c) return;

  // Render search bar + spinner immediately
  c.innerHTML =
    '<div style="margin-bottom:14px;display:flex;gap:8px;">' +
      '<input type="text" id="voter-search" placeholder="Search roll, name or batch…" ' +
        'value="' + escHtml(search || '') + '" ' +
        'style="flex:1;padding:12px 10px;font-size:.9rem;border:1px solid #d1d5db;' +
        'border-radius:4px;box-sizing:border-box;" inputmode="search" />' +
      '<button onclick="AdminPanel._voterSearch()" ' +
        'style="padding:12px 16px;font-size:.9rem;background:#1a3a5c;color:#fff;' +
        'border:none;border-radius:4px;cursor:pointer;white-space:nowrap;">Search</button>' +
    '</div>' +
    '<div id="voter-list-area">' +
      '<div style="text-align:center;padding:24px;color:#6b7280;">' +
      '<div class="spinner"></div></div>' +
    '</div>';

  // Pre-fill search box with current query
  var box = document.getElementById('voter-search');
  if (box) box.value = search || '';

  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('voter-list-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load voter roll.') + '</div>';
        return;
      }
      area.innerHTML = AdminPanel._renderVoterList(res, role, search || '');
    })
    .withFailureHandler(function() {
      var area = document.getElementById('voter-list-area');
      if (area) area.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading voter roll.</div>';
    })
    .getVoterList(App.token, page, search || '');
},

_voterSearch: function() {
  var box = document.getElementById('voter-search');
  var q = box ? box.value.trim() : '';
  AdminPanel._loadVoters(1, q);
},

_renderVoterList: function(res, role, search) {
  var showEmail = (role !== 'SCRUTINEER');
  var voters    = res.voters || [];
  var total     = res.total  || 0;
  var page      = res.page   || 1;
  var pages     = res.pages  || 1;

  var html =
    // Summary bar
    '<div style="font-size:.82rem;color:#6b7280;margin-bottom:12px;padding:0 2px;">' +
      '<strong style="color:#374151;">' + total + '</strong> voter' + (total !== 1 ? 's' : '') +
      (search ? ' matching <em>' + escHtml(search) + '</em>' : ' on roll') +
      ' &nbsp;·&nbsp; Page ' + page + ' of ' + pages +
    '</div>';

  if (voters.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">🗳️</div>' +
      '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No voters found</div>' +
      (search ? '<div style="font-size:.85rem;">Try a different search term.</div>' :
                '<div style="font-size:.85rem;">The voter roll is empty.</div>') +
      '</div></div>';
    return html;
  }

  // Voter cards
  voters.forEach(function(v) {
    var lifeBadge = v.lifeMember
      ? '<span style="font-size:.72rem;background:#fef3c7;color:#92400e;' +
          'border:1px solid #fcd34d;border-radius:3px;padding:1px 5px;margin-left:6px;">Life</span>'
      : '';
    var verBadge = showEmail
      ? (v.emailVerified === 'verified'
          ? '<span style="font-size:.72rem;background:#dcfce7;color:#166534;' +
              'border:1px solid #86efac;border-radius:3px;padding:1px 5px;margin-left:4px;">✓ Verified</span>'
          : '<span style="font-size:.72rem;background:#fef2f2;color:#991b1b;' +
              'border:1px solid #fca5a5;border-radius:3px;padding:1px 5px;margin-left:4px;">Unverified</span>')
      : '';

    html +=
      '<div style="padding:10px 14px;border-bottom:1px solid #f3f4f6;' +
        'display:flex;align-items:flex-start;gap:10px;">' +

        // Roll badge
        '<div style="min-width:56px;font-size:.78rem;font-weight:700;color:#1a3a5c;' +
          'background:#eff6ff;border-radius:4px;padding:4px 6px;text-align:center;' +
          'margin-top:2px;">' + escHtml(v.roll) + '</div>' +

        // Details
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:.9rem;font-weight:600;color:#111827;">' +
            escHtml(v.name) + lifeBadge + verBadge +
          '</div>' +
          '<div style="font-size:.8rem;color:#6b7280;margin-top:2px;">' +
            'Batch ' + escHtml(v.batch) +
            (showEmail && v.email ? ' &nbsp;·&nbsp; ' + escHtml(v.email) : '') +
          '</div>' +
        '</div>' +

      '</div>';
  });

  // Wrap in card
  html = '<div class="panel-card" style="margin-bottom:12px;padding:0;overflow:hidden;">' +
    html + '</div>';

  // Pagination
  if (pages > 1) {
    html += '<div style="display:flex;gap:8px;justify-content:center;margin-top:4px;flex-wrap:wrap;">';
    if (page > 1) {
      html += '<button onclick="AdminPanel._loadVoters(' + (page - 1) + ',\'' +
        escHtml(search) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">← Prev</button>';
    }
    html += '<span style="padding:10px 8px;font-size:.85rem;color:#6b7280;">' +
      page + ' / ' + pages + '</span>';
    if (page < pages) {
      html += '<button onclick="AdminPanel._loadVoters(' + (page + 1) + ',\'' +
        escHtml(search) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">Next →</button>';
    }
    html += '</div>';
  }

  return html;
},

  };

})();
</script>
