<script>
// ============================================================
// ADMIN PANEL — Pass 2B (Task 1 fix: topbar ownership)
// Roles: RO_ADMIN | DEPUTY_RO | TEM | SCRUTINEER | OBSERVER
// ============================================================
var AdminPanel = (function() {

  var _currentTab = '';

  // Tab definitions per role
  var TAB_SETS = {
    RO_ADMIN: [
      { id:'elections',   label:'Elections' },
      { id:'nominations', label:'Nominations' },
      { id:'scrutiny',    label:'Scrutiny' },
      { id:'candidates',  label:'Candidates' },
      { id:'voters',      label:'Voters' },
      { id:'tally',       label:'Tally' },
      { id:'handover',    label:'Handover' },
      { id:'admins',      label:'Admins' },
      { id:'adminlog',    label:'Log' },
      { id:'complaints',  label:'Complaints' },
      { id:'appeals',     label:'Appeals' },
      { id:'settings',    label:'Settings' }
    ],
    DEPUTY_RO: [
      { id:'elections',   label:'Elections' },
      { id:'nominations', label:'Nominations' },
      { id:'scrutiny',    label:'Scrutiny' },
      { id:'candidates',  label:'Candidates' },
      { id:'voters',      label:'Voters' },
      { id:'tally',       label:'Tally' },
      { id:'handover',    label:'Handover' },
      { id:'adminlog',    label:'Log' },
      { id:'complaints',  label:'Complaints' },
      { id:'appeals',     label:'Appeals' }
    ],
    TEM: [
      { id:'elections',   label:'Elections' },
      { id:'nominations', label:'Nominations' },
      { id:'scrutiny',    label:'Scrutiny' },
      { id:'candidates',  label:'Candidates' },
      { id:'voters',      label:'Voters' },
      { id:'tally',       label:'Tally' },
      { id:'adminlog',    label:'Log' }
    ],
    SCRUTINEER: [
      { id:'tally',     label:'Tally' },
      { id:'handover',  label:'Handover' },
      { id:'scrutiny',  label:'Scrutiny' },
      { id:'votedlog',  label:'Voted Log' },
      { id:'adminlog',  label:'Log' }
    ],
    OBSERVER: [
      { id:'dashboard', label:'Dashboard' },
      { id:'results',   label:'Results' }
    ]
  };

  function roleLabel(role) {
    var map = {
      RO_ADMIN:   'Returning Officer',
      DEPUTY_RO:  'Deputy RO',
      TEM:        'Technical Election Manager',
      SCRUTINEER: 'Scrutineer',
      OBSERVER:   'Observer'
    };
    return map[role] || role;
  }

  function init() {
    var role = (App.role || '').toUpperCase();
    var tabs = TAB_SETS[role] || TAB_SETS['OBSERVER'];

    // TEM AuthID bar
    var temBar = document.getElementById('tem-authbar');
    if (role === 'TEM') {
      if (!temBar) {
        var bar = document.createElement('div');
        bar.id = 'tem-authbar';
        bar.style.cssText = 'background:#fefce8;border-bottom:1px solid #fde047;' +
          'padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
        bar.innerHTML =
          '<span style="font-size:.9rem;color:#854d0e;font-weight:600;">' +
            'TEM Authorisation ID required for write actions:</span>' +
          '<input id="tem-authid" type="text" placeholder="Enter AuthID" ' +
            'style="font-size:.9rem;padding:8px 10px;border:1px solid #fde047;' +
            'border-radius:4px;width:200px;" />' +
          '<span id="tem-authstatus" style="font-size:.85rem;color:#6b7280;">' +
            'Not validated</span>';
        var navBar = document.getElementById('nav-bar');
        navBar.parentNode.insertBefore(bar, navBar.nextSibling);
      }
    } else {
      if (temBar) temBar.parentNode.removeChild(temBar);
    }

    // Build nav via NavMenu
    NavMenu.build(tabs, tabs[0].id, function(tabId) {
      _currentTab = tabId;
      var role = (App.role || '').toUpperCase();
      var content = document.getElementById('admin-content');
      if (content) content.innerHTML = _renderTab(tabId, role);
    });

    // Content area
    setMain('<div id="admin-content"></div>');

    // Render first tab
    _currentTab = tabs[0].id;
    document.getElementById('admin-content').innerHTML = _renderTab(tabs[0].id, role);
  }

  function switchTab(tabId) {
    _currentTab = tabId;
    var role = (App.role || '').toUpperCase();
    var content = document.getElementById('admin-content');
    if (content) content.innerHTML = _renderTab(tabId, role);
  }

  function _renderTab(tabId, role) {
    if (tabId === 'elections') {
      _loadElections(role);
      return '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading elections…</div>' +
        '</div>';
    }

    if (tabId === 'admins') {
      setTimeout(function() { AdminPanel._loadAdmins(); }, 0);
      return '<div id="admins-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading admins…</div>' +
        '</div></div>';
    }

    if (tabId === 'voters') {
      setTimeout(function() { AdminPanel._loadVoters(1, ''); }, 0);
      return '<div id="voters-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading voter roll…</div>' +
        '</div></div>';
    }
    if (tabId === 'adminlog') {
      setTimeout(function() { AdminPanel._loadAdminLog(1, ''); }, 0);
      return '<div id="adminlog-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading log…</div>' +
        '</div></div>';
    }
    if (tabId === 'nominations') {
      setTimeout(function() { AdminPanel._loadNominations(); }, 0);
      return '<div id="nominations-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading nominations…</div>' +
        '</div></div>';
    }
    if (tabId === 'settings') {
      setTimeout(function() { AdminPanel._loadSettings(); }, 0);
      return '<div id="settings-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading system status…</div>' +
        '</div></div>';
    }
    if (tabId === 'handover') {
      setTimeout(function() { AdminPanel._loadHandover(); }, 0);
      return '<div id="handover-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading handover checklist…</div>' +
        '</div></div>';
    }
    if (tabId === 'tally') {
      setTimeout(function() { AdminPanel._loadTally(); }, 0);
      return '<div id="tally-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading tally…</div>' +
        '</div></div>';
    }
    if (tabId === 'candidates') {
      setTimeout(function() { AdminPanel._loadCandidatesTab(); }, 0);
      return '<div id="candidates-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading candidates…</div>' +
        '</div></div>';
    }
    if (tabId === 'scrutiny') {
      setTimeout(function() { AdminPanel._loadScrutiny(); }, 0);
      return '<div id="scrutiny-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading scrutiny queue…</div>' +
        '</div></div>';
    }

    if (tabId === 'complaints') {
      setTimeout(function() { AdminPanel._loadComplaints(); }, 0);
      return '<div id="complaints-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading complaints…</div>' +
        '</div></div>';
    }

    if (tabId === 'appeals') {
      setTimeout(function() { AdminPanel._loadAppeals(); }, 0);
      return '<div id="appeals-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading appeals…</div>' +
        '</div></div>';
    }

    // Coming soon — all other tabs
    var labels = {
      nominations: 'Nominations',
      scrutiny:    'Scrutiny',
      candidates:  'Candidates',
      voters:      'Voters',
      tally:       'Live Tally',
      handover:    'Handover',
      admins:      'Admin Accounts',
      adminlog:    'Admin Log',
      settings:    'Settings',
      dashboard:   'Observer Dashboard',
      results:     'Results',
      votedlog:    'Voted Log'
    };
    var label = labels[tabId] || tabId;
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2rem;margin-bottom:12px;">🏗️</div>' +
      '<div style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
        escHtml(label) + '</div>' +
      '<div style="font-size:0.85rem;">This tab is being built. Check back soon.</div>' +
      '</div>';
  }

function _loadElections(role) {
    google.script.run
      .withSuccessHandler(function(res) {
        var content = document.getElementById('admin-content');
        if (!content) return;

        if (!res || !res.success) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load elections.') + '</div>';
          return;
        }

        var elections = res.elections || [];
        var isRO = role === 'RO_ADMIN';

        // Status → badge class map
        var badgeMap = {
          draft:               'badge-draft',
          nominations_open:    'badge-noms-open',
          nominations_open_phase2: 'badge-noms-open',
          scrutiny:            'badge-scrutiny',
          candidates_published:'badge-scrutiny',
          active:              'badge-active',
          closed:              'badge-closed',
          declared:            'badge-declared'
        };

        var html = '';

        // Create button — RO_ADMIN only
        if (isRO) {
          html += '<div style="margin-bottom:16px;">' +
            '<button class="btn btn-primary" ' +
              'onclick="AdminPanel.showCreateElection()" ' +
              'style="width:100%;padding:14px;font-size:1rem;">' +
              '+ New Election' +
            '</button>' +
          '</div>';
        }

        if (elections.length === 0) {
          html += '<div class="panel-card">' +
            '<div class="panel-card-body" style="text-align:center;padding:40px 16px;color:#6b7280;">' +
            '<div style="font-size:1.5rem;margin-bottom:8px;">🗳️</div>' +
            '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No elections yet</div>' +
            (isRO ? '<div style="font-size:.85rem;">Use the button above to create one.</div>' : '') +
            '</div></div>';
        } else {
          elections.forEach(function(el) {
            var badge = badgeMap[el.status] || 'badge-draft';
            var statusLabel = el.status.replace(/_/g, ' ');
            var trialTag = el.isTrial
              ? '<span class="status-badge badge-trial" style="margin-left:6px;">Trial</span>'
              : '';

            html += '<div class="panel-card" style="margin-bottom:12px;">' +
              '<div class="panel-card-body" style="padding:14px 16px;">' +

              // Title row
              '<div style="font-weight:600;color:#1a3a5c;font-size:.95rem;margin-bottom:6px;">' +
                escHtml(el.title) + trialTag +
              '</div>' +

              // Status + mode row
              '<div style="margin-bottom:8px;">' +
                '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
                '<span style="font-size:.78rem;color:#888;margin-left:8px;">' +
                  escHtml(el.mode) +
                '</span>' +
              '</div>' +

              // Dates row
              '<div style="font-size:.82rem;color:#666;margin-bottom:10px;">' +
                (el.startDate ? '📅 ' + escHtml(el.startDate) : 'No start date') +
                (el.endDate   ? ' → ' + escHtml(el.endDate)   : '') +
              '</div>' +

              // Action button — RO only for now
              (isRO ?
                '<button class="btn btn-outline btn-sm" ' +
                  'onclick="AdminPanel.manageElection(\'' + escHtml(el.id) + '\')" ' +
                  'style="width:100%;padding:10px;font-size:.85rem;">' +
                  'Manage' +
                '</button>'
              : '') +

              '</div></div>';
          });
        }

        content.innerHTML = html;
      })
      .withFailureHandler(function(err) {
        var content = document.getElementById('admin-content');
        if (content) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            'Error loading elections. Please try again.</div>';
        }
      })
      .getAllElections(App.token);
  }

  function logout() {
    App.logout();
  }

  return {
    init: init,
    switchTab: switchTab,
    showCreateElection: function() {
      var role = (App.role || '').toUpperCase();
      var content = document.getElementById('admin-content');
      if (!content) return;
      content.innerHTML =
        '<div style="margin-bottom:12px;">' +
          '<button class="btn btn-outline" onclick="AdminPanel.switchTab(\'elections\')" ' +
            'style="width:100%;padding:12px;font-size:1rem;">← Back to Elections</button>' +
        '</div>' +
        '<div class="panel-card">' +
          '<div class="panel-card-header">Create New Election</div>' +
          '<div class="panel-card-body">' +

            '<label for="new-elec-title">Election Title</label>' +
            '<input type="text" id="new-elec-title" placeholder="e.g. SSKZM OBA Elections 2026-27" ' +
              'style="margin-bottom:20px;" />' +

            '<label>Mode</label>' +
            '<div style="display:flex;gap:12px;margin-bottom:20px;">' +
              '<button id="mode-btn-electronic" ' +
                'onclick="AdminPanel._setMode(\'electronic\')" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #1a3a5c;background:#1a3a5c;color:#fff;cursor:pointer;">' +
                'Electronic' +
              '</button>' +
              '<button id="mode-btn-physical" ' +
                'onclick="AdminPanel._setMode(\'physical\')" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #ccc;background:#fff;color:#333;cursor:pointer;">' +
                'Physical' +
              '</button>' +
            '</div>' +

            '<label>Trial Election?</label>' +
            '<div style="display:flex;gap:12px;margin-bottom:24px;">' +
              '<button id="trial-btn-no" ' +
                'onclick="AdminPanel._setTrial(false)" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #1a3a5c;background:#1a3a5c;color:#fff;cursor:pointer;">' +
                'No' +
              '</button>' +
              '<button id="trial-btn-yes" ' +
                'onclick="AdminPanel._setTrial(true)" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #ccc;background:#fff;color:#333;cursor:pointer;">' +
                'Yes' +
              '</button>' +
            '</div>' +

            '<button class="btn btn-primary" ' +
              'onclick="AdminPanel._submitCreateElection()" ' +
              'style="width:100%;padding:14px;font-size:1rem;">' +
              'Create Election' +
            '</button>' +

            '<div id="create-elec-error" ' +
              'style="margin-top:12px;color:#c0392b;font-size:.9rem;display:none;">' +
            '</div>' +

          '</div>' +
        '</div>';
    },

    _mode: 'electronic',
    _trial: false,

    _setMode: function(val) {
      AdminPanel._mode = val;
      var el = document.getElementById('mode-btn-electronic');
      var ph = document.getElementById('mode-btn-physical');
      if (val === 'electronic') {
        el.style.background = '#1a3a5c'; el.style.color = '#fff'; el.style.borderColor = '#1a3a5c';
        ph.style.background = '#fff';    ph.style.color = '#333'; ph.style.borderColor = '#ccc';
      } else {
        ph.style.background = '#1a3a5c'; ph.style.color = '#fff'; ph.style.borderColor = '#1a3a5c';
        el.style.background = '#fff';    el.style.color = '#333'; el.style.borderColor = '#ccc';
      }
    },

    _setTrial: function(val) {
      AdminPanel._trial = val;
      var yes = document.getElementById('trial-btn-yes');
      var no  = document.getElementById('trial-btn-no');
      if (val) {
        yes.style.background = '#1a3a5c'; yes.style.color = '#fff'; yes.style.borderColor = '#1a3a5c';
        no.style.background  = '#fff';    no.style.color  = '#333'; no.style.borderColor  = '#ccc';
      } else {
        no.style.background  = '#1a3a5c'; no.style.color  = '#fff'; no.style.borderColor  = '#1a3a5c';
        yes.style.background = '#fff';    yes.style.color = '#333'; yes.style.borderColor = '#ccc';
      }
    },

    _submitCreateElection: function() {
      var title = document.getElementById('new-elec-title').value.trim();
      var errEl = document.getElementById('create-elec-error');
      if (!title) {
        errEl.textContent = 'Please enter an election title.';
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';
      var btn = document.querySelector('[onclick="AdminPanel._submitCreateElection()"]');
      if (btn) { btn.textContent = 'Creating…'; btn.disabled = true; }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            showToast('Election created successfully.');
            AdminPanel.switchTab('elections');
          } else {
            errEl.textContent = (res && res.message) || 'Failed to create election.';
            errEl.style.display = 'block';
            if (btn) { btn.textContent = 'Create Election'; btn.disabled = false; }
          }
        })
        .withFailureHandler(function() {
          errEl.textContent = 'Error — please try again.';
          errEl.style.display = 'block';
          if (btn) { btn.textContent = 'Create Election'; btn.disabled = false; }
        })
        .createElection(App.token, {
          title:   title,
          mode:    AdminPanel._mode,
          isTrial: AdminPanel._trial
        });
    },

    manageElection: function(id) {
  var content = document.getElementById('admin-content');
  if (!content) return;

  // Loading state
  content.innerHTML =
    '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
      '<div class="spinner"></div>' +
      '<div style="font-size:.85rem;margin-top:12px;">Loading election…</div>' +
    '</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        content.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load election.') +
          '</div>';
        return;
      }
      AdminPanel._renderManageScreen(res.election);
    })
    .withFailureHandler(function() {
      content.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          'Error loading election. Please try again.' +
        '</div>';
    })
    .getElection(App.token, id);
},

_renderManageScreen: function(el) {
  var content = document.getElementById('admin-content');
  if (!content) return;

  var isDraft = el.status === 'draft' || (el.isTrial && el.status !== 'active');

  var statusBadgeMap = {
    draft:                   'badge-draft',
    nominations_open:        'badge-noms-open',
    nominations_open_phase2: 'badge-noms-open',
    scrutiny:                'badge-scrutiny',
    candidates_published:    'badge-scrutiny',
    active:                  'badge-active',
    closed:                  'badge-closed',
    declared:                'badge-declared'
  };
  var badge = statusBadgeMap[el.status] || 'badge-draft';
  var statusLabel = el.status.replace(/_/g, ' ');
  var trialTag = el.isTrial
    ? '<span class="status-badge badge-trial" style="margin-left:6px;">Trial</span>'
    : '';

  // Next status label for advance button
  var nextStatusMap = {
    draft:            { next: 'nominations_open', label: 'Open Nominations' }
  };
  var advance = nextStatusMap[el.status] || null;

  var html =
    // Back button
    '<div style="margin-bottom:12px;">' +
      '<button class="btn btn-outline" ' +
        'onclick="AdminPanel.switchTab(\'elections\')" ' +
        'style="width:100%;padding:12px;font-size:1rem;">← Back to Elections</button>' +
    '</div>' +

    // Header card — title + status (read-only)
    '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-body" style="padding:14px 16px;">' +
        '<div style="font-weight:700;color:#1a3a5c;font-size:1rem;margin-bottom:8px;">' +
          escHtml(el.title) + trialTag +
        '</div>' +
        '<div>' +
          '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
          '<span style="font-size:.78rem;color:#888;margin-left:8px;">' +
            escHtml(el.mode || '') +
          '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // Advance status — draft only
    (advance ?
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Election Status</div>' +
        '<div class="panel-card-body">' +
          '<p style="font-size:.85rem;color:#374151;margin-bottom:14px;">' +
            'Current status is <strong>Draft</strong>. ' +
            'Advancing will open nominations and notify no one automatically — ' +
            'you must communicate separately.' +
          '</p>' +
          '<button class="btn btn-primary" id="btn-advance-status" ' +
            'onclick="AdminPanel._advanceStatus(\'' + escHtml(el.id) + '\',\'' + advance.next + '\')" ' +
            'style="width:100%;padding:14px;font-size:1rem;">' +
            '▶ ' + advance.label +
          '</button>' +
          '<div id="advance-status-error" ' +
            'style="margin-top:10px;color:#c0392b;font-size:.85rem;display:none;"></div>' +
        '</div>' +
      '</div>'
    : '') +

    // Edit fields card
    '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-header">Election Details</div>' +
      '<div class="panel-card-body">' +

        '<label for="manage-desc">Description</label>' +
        '<textarea id="manage-desc" rows="3" ' +
          'style="width:100%;box-sizing:border-box;padding:10px;' +
          'border:1px solid #d1d5db;border-radius:4px;font-size:.9rem;' +
          'margin-bottom:16px;resize:vertical;">' +

_advanceStatus: function(id, nextStatus) {
  var btn = document.getElementById('btn-advance-status');
  var errEl = document.getElementById('advance-status-error');
  if (btn) { btn.textContent = 'Advancing…'; btn.disabled = true; }
  if (errEl) errEl.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Status updated.');
        AdminPanel.switchTab('elections');
      } else {
        if (errEl) {
          errEl.textContent = (res && res.message) || 'Failed to update status.';
          errEl.style.display = 'block';
        }
        if (btn) { btn.textContent = '▶ Open Nominations'; btn.disabled = false; }
      }
    })
    .withFailureHandler(function() {
      if (errEl) {
        errEl.textContent = 'Error — please try again.';
        errEl.style.display = 'block';
      }
      if (btn) { btn.textContent = '▶ Open Nominations'; btn.disabled = false; }
    })
    .updateElectionStatus(App.token, id, nextStatus);
},

_saveElection: function(id) {
  var btn = document.getElementById('btn-save-election');
  var errEl = document.getElementById('save-election-error');
  var okEl  = document.getElementById('save-election-ok');
  errEl.style.display = 'none';
  okEl.style.display  = 'none';
  if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

  var data = {
    description:   document.getElementById('manage-desc').value.trim(),
    ecContact:     document.getElementById('manage-eccontact').value.trim(),
    vDay:          document.getElementById('manage-vday').value,
    votingCloseDay:document.getElementById('manage-vclose').value,
    declarationDay:document.getElementById('manage-declare').value
  };

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
  showToast('Saved.');
  AdminPanel.manageElection(id);
} else {
        errEl.textContent = (res && res.message) || 'Failed to save.';
        errEl.style.display = 'block';
        if (btn) { btn.textContent = 'Save Changes'; btn.disabled = false; }
      }
    })
    .withFailureHandler(function() {
      errEl.textContent = 'Error — please try again.';
      errEl.style.display = 'block';
      if (btn) { btn.textContent = 'Save Changes'; btn.disabled = false; }
    })

},

_deleteElection: function(id) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Election deleted.');
        AdminPanel.switchTab('elections');
      } else {
        showToast((res && res.message) || 'Delete failed.');

// ── ADMINS TAB ───────────────────────────────────────────────

_loadAdmins: function() {
  google.script.run
    .withSuccessHandler(function(res) {
      var c = document.getElementById('admins-content');
      if (!c) return;
      if (!res || !res.success) {
        c.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load admins.') + '</div>';
        return;
      }
      c.innerHTML = AdminPanel._renderAdminsList(res.admins || []);
    })
    .withFailureHandler(function() {
      var c = document.getElementById('admins-content');
      if (c) c.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading admins.</div>';
    })
    .getAdminList(App.token);
},

_renderAdminsList: function(admins) {
  var roleLabel = {
    RO_ADMIN:   'Returning Officer',
    DEPUTY_RO:  'Deputy RO',
    TEM:        'Tech Election Manager',
    SCRUTINEER: 'Scrutineer',
    OBSERVER:   'Observer'
  };

  var html =
    '<div style="margin-bottom:16px;">' +
      '<button class="btn btn-primary" onclick="AdminPanel.showAddAdmin()" ' +
        'style="width:100%;padding:14px;font-size:1rem;">+ Add Admin Account</button>' +
    '</div>' +
    '<div id="add-admin-form-area"></div>';

  if (admins.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">👤</div>' +
      '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No admin accounts yet</div>' +
      '<div style="font-size:.85rem;">Use the button above to add one.</div>' +
      '</div></div>';
    return html;
  }

  admins.forEach(function(a) {
    var isActive = (a.status !== 'DISABLED');
    var statusBadge = isActive
      ? '<span class="status-badge badge-active" style="font-size:.75rem;">ACTIVE</span>'
      : '<span class="status-badge badge-closed" style="font-size:.75rem;">DISABLED</span>';
    var deputyBadge = (a.role === 'DEPUTY_RO' && a.deputyROActive)
      ? '<span class="status-badge badge-noms-open" style="font-size:.75rem;margin-left:6px;">Activated</span>'
      : '';

    html += '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-body" style="padding:14px 16px;">' +

        // Name + badges
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;' +
          'gap:8px;flex-wrap:wrap;margin-bottom:6px;">' +
          '<div style="font-weight:700;color:#1a3a5c;font-size:.95rem;">' +
            escHtml(a.name) + '</div>' +
          '<div>' + statusBadge + deputyBadge + '</div>' +
        '</div>' +

        // Details
        '<div style="font-size:.82rem;color:#6b7280;margin-bottom:10px;">' +
          '<div>ID: <span style="color:#374151;font-weight:600;">' + escHtml(a.id) + '</span>' +
            (a.rollNo ? ' &nbsp;·&nbsp; Roll: ' + escHtml(a.rollNo) : '') + '</div>' +
          '<div>' + escHtml(roleLabel[a.role] || a.role) + ' &nbsp;·&nbsp; ' +
            escHtml(a.type || '') + '</div>' +
          '<div>' + escHtml(a.email) + '</div>' +
          (a.addedAt ? '<div style="margin-top:2px;">Added: ' +
            escHtml(a.addedAt.replace('T',' ').replace(/\.\d+Z/,'') + ' UTC') + '</div>' : '') +
        '</div>' +

        // Action buttons
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +

          // Enable / Disable
          (isActive
            ? '<button onclick="AdminPanel._confirmDisable(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                'background:#fff;color:#b91c1c;border:1.5px solid #b91c1c;border-radius:4px;cursor:pointer;">' +
                'Disable Account</button>'
            : '<button onclick="AdminPanel._confirmEnable(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                'background:#fff;color:#16a34a;border:1.5px solid #16a34a;border-radius:4px;cursor:pointer;">' +
                'Re-enable Account</button>') +

          // Deputy RO activation — only for DEPUTY_RO accounts
          (a.role === 'DEPUTY_RO'
            ? (a.deputyROActive
                ? '<button onclick="AdminPanel._confirmDeactivateDeputyRO(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                    'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                    'background:#fff;color:#92400e;border:1.5px solid #d97706;border-radius:4px;cursor:pointer;">' +
                    'Deactivate Deputy RO</button>'
                : '<button onclick="AdminPanel._confirmActivateDeputyRO(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                    'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                    'background:#fff;color:#1d4ed8;border:1.5px solid #1d4ed8;border-radius:4px;cursor:pointer;">' +
                    'Activate Deputy RO</button>')
            : '') +

        '</div>' +

        // Confirmation area for this card
        '<div id="confirm-' + escHtml(a.id) + '" style="display:none;margin-top:12px;' +
          'background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:12px;"></div>' +

        // Deputy RO confirmation area
        (a.role === 'DEPUTY_RO'
          ? '<div id="depro-' + escHtml(a.id) + '" style="display:none;margin-top:12px;' +
              'background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:12px;"></div>'
          : '') +

      '</div>' +
    '</div>';
  });

  return html;
},

_submitAddAdmin: function() {
  var btn    = document.getElementById('btn-submit-admin');
  var errEl  = document.getElementById('add-admin-error');
  var id     = document.getElementById('new-admin-id').value.trim();
  var name   = document.getElementById('new-admin-name').value.trim();
  var role   = document.getElementById('new-admin-role').value;
  var email  = document.getElementById('new-admin-email').value.trim();
  var type   = document.getElementById('new-admin-type').value;
  var rollNo = document.getElementById('new-admin-roll').value.trim();

  errEl.style.display = 'none';
  if (!id || !name || !role || !email) {
    errEl.textContent = 'Admin ID, Name, Role and Email are required.';
    errEl.style.display = 'block';
    return;
  }

  if (btn) { btn.textContent = 'Adding…'; btn.disabled = true; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Admin account added.');
        AdminPanel._loadAdmins();
      } else {
        errEl.textContent = (res && res.message) || 'Failed to add admin.';
        errEl.style.display = 'block';
        if (btn) { btn.textContent = 'Add Admin'; btn.disabled = false; }
      }
    })
    .withFailureHandler(function() {
      errEl.textContent = 'Error — please try again.';
      errEl.style.display = 'block';
      if (btn) { btn.textContent = 'Add Admin'; btn.disabled = false; }
    })
    .addAdmin(App.token, { id: id, name: name, role: role,
                            email: email, type: type, rollNo: rollNo });
},

// ── VOTERS TAB ───────────────────────────────────────────────

_loadVoters: function(page, search) {
  var role = (App.role || '').toUpperCase();
  var c = document.getElementById('voters-content');
  if (!c) return;

  // Render search bar + spinner immediately
  c.innerHTML =
    '<div style="margin-bottom:14px;display:flex;gap:8px;">' +
      '<input type="text" id="voter-search" placeholder="Search roll, name or batch…" ' +
        'value="' + escHtml(search || '') + '" ' +
        'style="flex:1;padding:12px 10px;font-size:.9rem;border:1px solid #d1d5db;' +
        'border-radius:4px;box-sizing:border-box;" inputmode="search" />' +
      '<button onclick="AdminPanel._voterSearch()" ' +
        'style="padding:12px 16px;font-size:.9rem;background:#1a3a5c;color:#fff;' +
        'border:none;border-radius:4px;cursor:pointer;white-space:nowrap;">Search</button>' +
    '</div>' +
    '<div id="voter-list-area">' +
      '<div style="text-align:center;padding:24px;color:#6b7280;">' +
      '<div class="spinner"></div></div>' +
    '</div>';

  // Pre-fill search box with current query
  var box = document.getElementById('voter-search');
  if (box) box.value = search || '';

  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('voter-list-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load voter roll.') + '</div>';
        return;
      }
      area.innerHTML = AdminPanel._renderVoterList(res, role, search || '');
    })
    .withFailureHandler(function() {
      var area = document.getElementById('voter-list-area');
      if (area) area.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading voter roll.</div>';
    })
    .getVoterList(App.token, page, search || '');
},

_voterSearch: function() {
  var box = document.getElementById('voter-search');
  var q = box ? box.value.trim() : '';
  AdminPanel._loadVoters(1, q);
},

_renderVoterList: function(res, role, search) {
  var showEmail = (role !== 'SCRUTINEER');
  var voters    = res.voters || [];
  var total     = res.total  || 0;
  var page      = res.page   || 1;
  var pages     = res.pages  || 1;

  var html =
    // Summary bar
    '<div style="font-size:.82rem;color:#6b7280;margin-bottom:12px;padding:0 2px;">' +
      '<strong style="color:#374151;">' + total + '</strong> voter' + (total !== 1 ? 's' : '') +
      (search ? ' matching <em>' + escHtml(search) + '</em>' : ' on roll') +
      ' &nbsp;·&nbsp; Page ' + page + ' of ' + pages +
    '</div>';

  if (voters.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">🗳️</div>' +
      '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No voters found</div>' +
      (search ? '<div style="font-size:.85rem;">Try a different search term.</div>' :
                '<div style="font-size:.85rem;">The voter roll is empty.</div>') +
      '</div></div>';
    return html;
  }

  // Voter cards
  voters.forEach(function(v) {
    var lifeBadge = v.lifeMember
      ? '<span style="font-size:.72rem;background:#fef3c7;color:#92400e;' +
          'border:1px solid #fcd34d;border-radius:3px;padding:1px 5px;margin-left:6px;">Life</span>'
      : '';
    var verBadge = showEmail
      ? (v.emailVerified === 'verified'
          ? '<span style="font-size:.72rem;background:#dcfce7;color:#166534;' +
              'border:1px solid #86efac;border-radius:3px;padding:1px 5px;margin-left:4px;">✓ Verified</span>'
          : '<span style="font-size:.72rem;background:#fef2f2;color:#991b1b;' +
              'border:1px solid #fca5a5;border-radius:3px;padding:1px 5px;margin-left:4px;">Unverified</span>')
      : '';

    html +=
      '<div style="padding:10px 14px;border-bottom:1px solid #f3f4f6;' +
        'display:flex;align-items:flex-start;gap:10px;">' +

        // Roll badge
        '<div style="min-width:56px;font-size:.78rem;font-weight:700;color:#1a3a5c;' +
          'background:#eff6ff;border-radius:4px;padding:4px 6px;text-align:center;' +
          'margin-top:2px;">' + escHtml(v.roll) + '</div>' +

        // Details
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:.9rem;font-weight:600;color:#111827;">' +
            escHtml(v.name) + lifeBadge + verBadge +
          '</div>' +
          '<div style="font-size:.8rem;color:#6b7280;margin-top:2px;">' +
            'Batch ' + escHtml(v.batch) +
            (showEmail && v.email ? ' &nbsp;·&nbsp; ' + escHtml(v.email) : '') +
          '</div>' +
        '</div>' +

      '</div>';
  });

  // Wrap in card
  html = '<div class="panel-card" style="margin-bottom:12px;padding:0;overflow:hidden;">' +
    html + '</div>';

  // Pagination
  if (pages > 1) {
    html += '<div style="display:flex;gap:8px;justify-content:center;margin-top:4px;flex-wrap:wrap;">';
    if (page > 1) {
      html += '<button onclick="AdminPanel._loadVoters(' + (page - 1) + ',\'' +
        escHtml(search) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">← Prev</button>';
    }
    html += '<span style="padding:10px 8px;font-size:.85rem;color:#6b7280;">' +
      page + ' / ' + pages + '</span>';
    if (page < pages) {
      html += '<button onclick="AdminPanel._loadVoters(' + (page + 1) + ',\'' +
        escHtml(search) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">Next →</button>';
    }
    html += '</div>';
  }

  return html;
},

// ── NOMINATIONS TAB ──────────────────────────────────────────

_loadNominations: function() {
  var c = document.getElementById('nominations-content');
  if (!c) return;

  // First load elections list for selector
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success || !res.elections || res.elections.length === 0) {
        c.innerHTML = '<div class="panel-card"><div class="panel-card-body" ' +
          'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
          '<div style="font-size:1.5rem;margin-bottom:8px;">🗳️</div>' +
          '<div style="font-weight:600;color:#374151;">No elections found</div>' +
          '<div style="font-size:.85rem;margin-top:4px;">Create an election first.</div>' +
          '</div></div>';
        return;
      }
      var elections = res.elections;
      // Default to first election
      AdminPanel._nominationsSelectedElec = elections[0].id;
      AdminPanel._renderNominationsShell(elections);
      AdminPanel._loadNominationsList(elections[0].id);
    })
    .withFailureHandler(function() {
      var c = document.getElementById('nominations-content');
      if (c) c.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading elections.</div>';
    })
    .getAllElections(App.token);
},

_nominationsSelectedElec: '',

_renderNominationsShell: function(elections) {
  var c = document.getElementById('nominations-content');
  if (!c) return;

  // Election selector
  var selHtml = '<select id="nom-elec-select" ' +
    'style="width:100%;box-sizing:border-box;padding:12px 10px;' +
    'border:1px solid #d1d5db;border-radius:4px;font-size:.9rem;margin-bottom:14px;" ' +
    'onchange="AdminPanel._onNomElecChange(this.value)">';
  elections.forEach(function(el) {
    selHtml += '<option value="' + escHtml(el.id) + '">' +
      escHtml(el.title) + ' — ' + escHtml(el.status.replace(/_/g,' ')) +
      '</option>';
  });
  selHtml += '</select>';

  c.innerHTML = selHtml + '<div id="nom-list-area">' +
    '<div style="text-align:center;padding:24px;color:#6b7280;">' +
    '<div class="spinner"></div></div></div>';
},

_onNomElecChange: function(elecId) {
  AdminPanel._nominationsSelectedElec = elecId;
  AdminPanel._loadNominationsList(elecId);
},

_loadNominationsList: function(elecId) {
  var area = document.getElementById('nom-list-area');
  if (!area) return;
  area.innerHTML = '<div style="text-align:center;padding:24px;color:#6b7280;">' +
    '<div class="spinner"></div></div>';

  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('nom-list-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load nominations.') + '</div>';
        return;
      }
      area.innerHTML = AdminPanel._renderNominationsList(res.nominations || []);
    })
    .withFailureHandler(function() {
      var area = document.getElementById('nom-list-area');
      if (area) area.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading nominations.</div>';
    })
    .getNominations(App.token, elecId);
},

_renderNominationsList: function(noms) {
  var role = (App.role || '').toUpperCase();

  if (noms.length === 0) {
    return '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">📋</div>' +
      '<div style="font-weight:600;color:#374151;">No nominations yet</div>' +
      '</div></div>';
  }

  var statusBadge = {
    pending:    'badge-draft',
    confirmed:  'badge-noms-open',
    accepted:   'badge-scrutiny',
    rejected:   'badge-closed',
    withdrawn:  'badge-closed',
    declared:   'badge-declared'
  };

  // Group by post
  var byPost = {};
  var postOrder = [];
  noms.forEach(function(n) {
    if (!byPost[n.post]) { byPost[n.post] = []; postOrder.push(n.post); }
    byPost[n.post].push(n);
  });

  var html = '<div style="font-size:.82rem;color:#6b7280;margin-bottom:12px;">' +
    '<strong style="color:#374151;">' + noms.length + '</strong> nomination' +
    (noms.length !== 1 ? 's' : '') + ' across ' +
    '<strong style="color:#374151;">' + postOrder.length + '</strong> post' +
    (postOrder.length !== 1 ? 's' : '') +
  '</div>';

  postOrder.forEach(function(post) {
    html += '<div style="font-size:.8rem;font-weight:700;color:#6b7280;' +
      'text-transform:uppercase;letter-spacing:.04em;' +
      'padding:10px 14px 4px;margin-top:8px;">' + escHtml(post) + '</div>';

    byPost[post].forEach(function(n) {
      var badge    = statusBadge[n.status] || 'badge-draft';
      var propTick = n.propConfirmed ? '✓' : '⏳';
      var propCol  = n.propConfirmed ? '#16a34a' : '#d97706';
      var secTick  = n.secRoll
        ? (n.secConfirmed ? '✓' : '⏳')
        : '—';
      var secCol   = n.secConfirmed ? '#16a34a' : '#d97706';
      var phase2Tag = n.phase2
        ? '<span style="font-size:.72rem;background:#ede9fe;color:#5b21b6;' +
            'border-radius:3px;padding:1px 5px;margin-left:5px;">Ph.2</span>'
        : '';
      var dupTag = n.dupDeclined
        ? '<span style="font-size:.72rem;background:#fef2f2;color:#b91c1c;' +
            'border-radius:3px;padding:1px 5px;margin-left:4px;">Dup↓</span>'
        : '';

      html +=
        '<div class="panel-card" style="margin-bottom:8px;">' +
        '<div class="panel-card-body" style="padding:12px 14px;">' +

          // Name + badges
          '<div style="display:flex;justify-content:space-between;' +
            'align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:6px;">' +
            '<div style="font-weight:700;color:#111827;font-size:.92rem;">' +
              escHtml(n.candName) + phase2Tag + dupTag +
            '</div>' +
            '<span class="status-badge ' + badge + '" style="font-size:.75rem;">' +
              escHtml(n.status) + '</span>' +
          '</div>' +

          // Roll + batch
          '<div style="font-size:.8rem;color:#6b7280;margin-bottom:8px;">' +
            'Roll: <strong>' + escHtml(n.candRoll) + '</strong>' +
            ' &nbsp;·&nbsp; Batch ' + escHtml(n.candBatch) +
            (n.submittedAt
              ? ' &nbsp;·&nbsp; ' +
                escHtml(n.submittedAt.replace('T',' ').replace(/\.\d+Z/,'') + ' UTC')
              : '') +
          '</div>' +

          // Proposer / seconder
          '<div style="font-size:.8rem;margin-bottom:10px;">' +
            '<span style="color:' + propCol + ';font-weight:600;">' +
              propTick + ' Proposer</span>' +
            ' <span style="color:#6b7280;">' + escHtml(n.propRoll) + '</span>' +
            ' &nbsp;&nbsp; ' +
            '<span style="color:' + secCol + ';font-weight:600;">' +
              secTick + ' Seconder</span>' +
            (n.secRoll
              ? ' <span style="color:#6b7280;">' + escHtml(n.secRoll) + '</span>'
              : '') +
          '</div>' +

          // Rejection reason
          (n.status === 'rejected' && n.rejectionReason
            ? '<div style="font-size:.8rem;color:#b91c1c;margin-bottom:10px;">' +
                'Reason: ' + escHtml(n.rejectionReason) + '</div>'
            : '') +

          // Action buttons — RO_ADMIN only
          (role === 'RO_ADMIN' && n.status !== 'withdrawn' && n.status !== 'rejected'
            ? '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +

                // Resend proposer (only if not confirmed)
                (!n.propConfirmed
                  ? '<button onclick="AdminPanel._resendConfirm(\'' +
                      escHtml(n.id) + '\',\'proposer\')" ' +
                      'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                      'background:#fff;color:#1d4ed8;border:1px solid #93c5fd;' +
                      'border-radius:4px;cursor:pointer;">↺ Proposer</button>'
                  : '') +

                // Resend seconder (only if seconder exists and not confirmed)
                (n.secRoll && !n.secConfirmed
                  ? '<button onclick="AdminPanel._resendConfirm(\'' +
                      escHtml(n.id) + '\',\'seconder\')" ' +
                      'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                      'background:#fff;color:#1d4ed8;border:1px solid #93c5fd;' +
                      'border-radius:4px;cursor:pointer;">↺ Seconder</button>'
                  : '') +

                // Withdraw
                '<button onclick="AdminPanel._confirmWithdraw(\'' +
                  escHtml(n.id) + '\',\'' + escHtml(n.candName) + '\')" ' +
                  'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                  'background:#fff;color:#b91c1c;border:1px solid #fca5a5;' +
                  'border-radius:4px;cursor:pointer;">Withdraw</button>' +

              '</div>'
            : '') +

          // Confirm area
          '<div id="nom-confirm-' + escHtml(n.id) + '" ' +
            'style="display:none;margin-top:10px;background:#fef2f2;' +
            'border:1px solid #fca5a5;border-radius:4px;padding:10px;"></div>' +

        '</div></div>';
    });
  });

  return html;
},

_resendConfirm: function(nomId, role) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Email resent to ' + role + '.');
      } else {
        showToast((res && res.message) || 'Resend failed.');
      }
    })
    .withFailureHandler(function() { showToast('Error — resend failed.'); })
    .resendConfirmationEmail(App.token, nomId, role);
},

_confirmWithdraw: function(nomId, candName) {
  var box = document.getElementById('nom-confirm-' + nomId);
  if (!box) return;
  box.style.display = 'block';
  box.innerHTML =
    '<p style="font-size:.85rem;color:#b91c1c;margin-bottom:10px;">' +
      '<strong>Withdraw nomination for ' + escHtml(candName) + '?</strong><br>' +
      'This cannot be undone.' +
    '</p>' +
    '<div style="display:flex;gap:8px;">' +
      '<button class="btn btn-outline" ' +
        'onclick="document.getElementById(\'nom-confirm-' + escHtml(nomId) +
        '\').style.display=\'none\';" ' +
        'style="flex:1;padding:10px;font-size:.85rem;">Cancel</button>' +
      '<button onclick="AdminPanel._doWithdraw(\'' + escHtml(nomId) + '\')" ' +
        'style="flex:1;padding:10px;font-size:.85rem;background:#b91c1c;' +
        'color:#fff;border:none;border-radius:4px;cursor:pointer;">Yes, Withdraw</button>' +
    '</div>';
},

_doWithdraw: function(nomId) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Nomination withdrawn.');
        AdminPanel._loadNominationsList(AdminPanel._nominationsSelectedElec);
      } else {
        showToast((res && res.message) || 'Withdraw failed.');
      }
    })
    .withFailureHandler(function() { showToast('Error — withdraw failed.'); })
    .withdrawNomination(App.token, nomId);
},

// ── SETTINGS TAB ─────────────────────────────────────────────

  _loadSettings: function() {
    var c = document.getElementById('settings-content');
    if (!c) return;

    google.script.run
      .withSuccessHandler(function(res) {
        var c2 = document.getElementById('settings-content');
        if (!c2) return;
        if (!res || !res.success) {
          c2.innerHTML =
            '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load system status.') + '</div>';
          return;
        }
        c2.innerHTML = AdminPanel._renderSettings(res);
      })
      .withFailureHandler(function() {
        var c2 = document.getElementById('settings-content');
        if (c2) c2.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading settings.</div>';
      })
      .getSystemStatus(App.token);
  },

  _renderSettings: function(res) {
    var html = '';

    // Deploy URL
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Deployment</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.83rem;color:#6b7280;margin-bottom:4px;">Deploy URL</div>' +
          '<div style="font-size:.82rem;word-break:break-all;background:#f9fafb;' +
            'padding:8px 10px;border-radius:4px;border:1px solid #e5e7eb;margin-bottom:12px;">' +
            escHtml(res.deployUrl || '—') +
          '</div>' +
          '<div style="font-size:.83rem;color:#6b7280;margin-bottom:4px;">GitHub Repository</div>' +
          '<div style="font-size:.88rem;margin-bottom:12px;">' +
            '<a href="' + escHtml(res.githubUrl) + '" target="_blank" ' +
              'style="color:#1a3a5c;word-break:break-all;">' +
              escHtml(res.githubUrl) +
            '</a>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Version verification
    var verDone = !!res.versionVerifiedAt;
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Version Verification</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.85rem;color:#555;margin-bottom:12px;">' +
            'Confirm that the deployed Apps Script version matches the GitHub repository. ' +
            'Open the GitHub link above, verify the code matches, then click Confirm below.' +
          '</div>' +
          (verDone ?
            '<div style="padding:10px;background:#dcfce7;border-radius:4px;' +
              'font-size:.85rem;color:#166534;margin-bottom:12px;">' +
              '✓ Last verified ' +
              escHtml(new Date(res.versionVerifiedAt).toLocaleString('en-IN')) +
              ' by ' + escHtml(res.versionVerifiedBy) +
            '</div>'
          : '') +
          '<div id="version-verify-err" ' +
            'style="color:#c0392b;font-size:.83rem;margin-bottom:8px;display:none;"></div>' +
          '<button onclick="AdminPanel._confirmVersionVerified()" ' +
            'id="btn-version-verify" ' +
            'style="width:100%;padding:12px;font-size:.9rem;' +
            'background:' + (verDone ? '#fff' : '#1a3a5c') + ';' +
            'color:' + (verDone ? '#1a3a5c' : '#fff') + ';' +
            'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;font-weight:600;">' +
            (verDone ? 'Re-verify Version' : 'Confirm Version Verified') +
          '</button>' +
        '</div>' +
      '</div>';

    // Sheet protection status
    var prots = res.protectionStatus || {};
    var protKeys = Object.keys(prots);
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Sheet Protection Status</div>' +
        '<div class="panel-card-body" style="padding:0;">';

    protKeys.forEach(function(name, idx) {
      var status    = prots[name];
      var isOk      = (status === 'protected');
      var statusCol = isOk ? '#166534' : '#b91c1c';
      var statusBg  = isOk ? '#dcfce7'  : '#fef2f2';
      html +=
        '<div style="padding:10px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') +
          'display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-size:.87rem;color:#374151;">' + escHtml(name) + '</span>' +
          '<span style="font-size:.75rem;padding:2px 8px;border-radius:10px;font-weight:600;' +
            'background:' + statusBg + ';color:' + statusCol + ';">' +
            escHtml(status) +
          '</span>' +
        '</div>';
    });

    html += '</div></div>';

    // Last AdminLog entry
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Audit Log</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.83rem;color:#6b7280;margin-bottom:4px;">Last entry</div>' +
          '<div style="font-size:.87rem;color:#374151;">' +
            escHtml(res.lastLogAction || '—') +
          '</div>' +
          (res.lastLogAt ?
            '<div style="font-size:.78rem;color:#9ca3af;margin-top:3px;">' +
              escHtml(new Date(res.lastLogAt).toLocaleString('en-IN')) +
            '</div>'
          : '') +
        '</div>' +
      '</div>';

    return html;
  },

  _confirmVersionVerified: function() {
    if (!confirm('Confirm that you have checked the GitHub repository and the deployed code matches?\n\nThis will be recorded in the audit log.')) return;

    var btn   = document.getElementById('btn-version-verify');

  _renderHandoverChecklist: function(res, elecId) {
    var items   = res.items;
    var role    = res.role;
    var isRO    = (role === 'RO_ADMIN');
    var isScrut = (role === 'SCRUTINEER');

    var ITEMS = [
      {
        key:     'ec_locked',
        label:   'EC Officer accounts locked',
        desc:    'All EC_OFFICER accounts must be disabled before handover is complete.',
        roBtn:   true,
        btnLabel:'Lock EC Accounts',
        btnFn:   'AdminPanel._lockECOfficers()'
      },
      {
        key:     'voter_roll_certified',
        label:   'Voter roll certified',
        desc:    'The voter roll has been certified and uploaded by the RO.',
        roBtn:   false
      },
      {
        key:     'sheet_protections',
        label:   'Sheet protections applied',
        desc:    'Critical sheets are protected against manual editing.',
        roBtn:   true,
        btnLabel:'Apply Sheet Protections',
        btnFn:   'AdminPanel._applySheetProtections()'
      },
      {
        key:     'scrutineer_part_a',
        label:   'Scrutineer confirmation — Part A',
        desc:    'Scrutineer has confirmed code/data verification (Part A).',
        roBtn:   false,
        scrutBtn: true
      },
      {
        key:     'version_verified',
        label:   'Version verified',
        desc:    'Deployed script version matches GitHub commit.',
        roBtn:   false
      },
      {
        key:     'github_transferred',
        label:   'GitHub organisation ownership transferred to RO',
        desc:    'RO has been added as owner of sskzmoba organisation and outgoing custodian removed. No further code pushes possible by EC or developer.',
        roBtn:   true,
        btnLabel:'Confirm GitHub Transfer',
        btnFn:   'AdminPanel._confirmGithubTransferred()'
      }
    ];

    var doneCount = 0;
    ITEMS.forEach(function(item) {
      if (items[item.key] && items[item.key].done) doneCount++;
    });

    var allDone = (doneCount === ITEMS.length);

    var html =
      '<div class="panel-card" style="margin-bottom:14px;">' +
        '<div class="panel-card-body" style="padding:14px 16px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div style="font-weight:700;color:#1a3a5c;font-size:.95rem;">Handover Checklist</div>' +
            '<div style="font-size:.85rem;font-weight:600;color:' +
              (allDone ? '#166534' : '#92400e') + ';">' +
              doneCount + ' / ' + ITEMS.length + ' complete' +
            '</div>' +
          '</div>' +
          (allDone ?
            '<div style="margin-top:10px;padding:10px;background:#dcfce7;border-radius:4px;' +
            'font-size:.85rem;color:#166534;font-weight:600;">✓ All handover items complete.</div>'
          : '') +
        '</div>' +
      '</div>';

    ITEMS.forEach(function(item) {
      var state = items[item.key] || { done: false, at: '', by: '' };
      var isDone = state.done;

      html +=
        '<div class="panel-card" style="margin-bottom:10px;' +
          (isDone ? 'border-left:4px solid #166534;' : 'border-left:4px solid #e5e7eb;') + '">' +
          '<div class="panel-card-body" style="padding:14px 16px;">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
              'gap:8px;margin-bottom:4px;">' +
              '<div style="font-weight:600;color:#1a3a5c;font-size:.9rem;">' +
                (isDone ? '✓ ' : '○ ') + escHtml(item.label) +
              '</div>' +
              '<span style="font-size:.75rem;padding:2px 8px;border-radius:10px;white-space:nowrap;' +
                'font-weight:600;background:' + (isDone ? '#dcfce7' : '#fef9c3') + ';' +
                'color:' + (isDone ? '#166534' : '#92400e') + ';">' +
                (isDone ? 'Done' : 'Pending') +
              '</span>' +
            '</div>' +
            '<div style="font-size:.82rem;color:#6b7280;margin-bottom:8px;">' +
              escHtml(item.desc) +
            '</div>' +
            (isDone ?
              '<div style="font-size:.78rem;color:#6b7280;">' +
                'Completed ' + escHtml(state.at ? new Date(state.at).toLocaleString('en-IN') : '') +
                (state.by ? ' by ' + escHtml(state.by) : '') +
              '</div>'
            :
              // Action buttons
              (item.roBtn && isRO ?
                '<button onclick="' + item.btnFn + '" ' +
                  'style="width:100%;padding:11px;font-size:.88rem;background:#1a3a5c;color:#fff;' +
                  'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
                  escHtml(item.btnLabel) +
                '</button>'
              : '') +
              (item.scrutBtn && (isScrut || isRO) ?
                '<div>' +
                  '<textarea id="scrut-part-a-text" rows="2" ' +
                    'placeholder="Enter your confirmation statement…" ' +
                    'style="width:100%;padding:9px;font-size:.85rem;border:1px solid #d1d5db;' +
                    'border-radius:4px;box-sizing:border-box;margin-bottom:8px;resize:vertical;"></textarea>' +
                  '<div id="scrut-part-a-err" ' +
                    'style="color:#c0392b;font-size:.82rem;margin-bottom:6px;display:none;"></div>' +
                  '<button onclick="AdminPanel._recordScrutPartA(\'' + escHtml(elecId) + '\')" ' +
                    'id="btn-scrut-part-a" ' +
                    'style="width:100%;padding:11px;font-size:.88rem;background:#1a3a5c;color:#fff;' +
                    'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
                    'Record Part A Confirmation' +
                  '</button>' +
                '</div>'
              : '') +
              (!item.roBtn && !item.scrutBtn ?
                '<div style="font-size:.82rem;color:#9ca3af;font-style:italic;">' +
                  'This item is confirmed automatically from system records.' +
                '</div>'
              : '')
            ) +
          '</div>' +
        '</div>';
    });

    return html;
  },

  _renderTally: function(res) {
    var html = '';

    // Blackout banner
    if (res.blackout) {
      html +=
        '<div style="background:#fef9c3;border:1.5px solid #fbbf24;border-radius:6px;' +
          'padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;">' +
          '<div style="font-size:1.2rem;">🔒</div>' +
          '<div>' +
            '<div style="font-weight:700;color:#92400e;font-size:.9rem;">Tally Blackout Active</div>' +
            '<div style="font-size:.83rem;color:#92400e;margin-top:3px;">' +
              'Vote counts and candidate names are hidden while voting is open. ' +
              'Participation figures only are shown below.' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    // Participation summary card
    html +=
      '<div class="panel-card" style="margin-bottom:14px;">' +
        '<div class="panel-card-header">Participation Summary</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:1.6rem;font-weight:700;color:#1a3a5c;text-align:center;' +
            'padding:8px 0 4px;">' +
            res.totalParticipants +
          '</div>' +
          '<div style="text-align:center;font-size:.83rem;color:#6b7280;margin-bottom:0;">unique voters participated</div>' +
        '</div>' +
      '</div>';

    // Per-post results
    if (!res.posts || res.posts.length === 0) {
      html +=
        '<div class="panel-card">' +
          '<div class="panel-card-body" style="text-align:center;padding:32px 16px;color:#6b7280;">' +
            '<div style="font-size:.88rem;">No candidates on record for this election.</div>' +
          '</div>' +
        '</div>';
      return html;
    }

    res.posts.forEach(function(post) {
      var participated = post.participated || 0;

      html += '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header" style="display:flex;justify-content:space-between;' +
          'align-items:center;flex-wrap:wrap;gap:6px;">' +
          '<span style="font-weight:700;color:#1a3a5c;">' + escHtml(post.post) + '</span>' +
          '<span style="font-size:.8rem;color:#6b7280;">' + participated + ' voted</span>' +
        '</div>' +
        '<div class="panel-card-body" style="padding:0;">';

      if (res.blackout) {
        // Blackout mode — show candidate count and participation only
        html +=
          '<div style="padding:14px 16px;font-size:.87rem;color:#6b7280;">' +
            post.candCount + ' candidate' + (post.candCount !== 1 ? 's' : '') +
            ' — results hidden until voting closes.' +
          '</div>';
      } else {
        // Full tally mode
        var postTotal = 0;
        post.candidates.forEach(function(c) { postTotal += (c.votes || 0); });
        postTotal += (post.nota || 0);

        post.candidates.forEach(function(cand, idx) {
          var votes   = cand.votes || 0;
          var pct     = postTotal > 0 ? Math.round((votes / postTotal) * 1000) / 10 : 0;
          var isWinner = (idx === 0 && votes > 0);
          var barWidth = postTotal > 0 ? Math.round((votes / postTotal) * 100) : 0;

          html +=
            '<div style="padding:12px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') + '">' +
              '<div style="display:flex;justify-content:space-between;align-items:center;' +
                'margin-bottom:6px;">' +
                '<div>' +
                  '<span style="font-weight:600;color:#1a3a5c;font-size:.88rem;">' +
                    escHtml(cand.name) +
                  '</span>' +
                  (isWinner && (res.elecStatus === 'closed' || res.elecStatus === 'declared') ?
                    ' <span style="font-size:.72rem;background:#dcfce7;color:#166534;' +
                    'padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px;">✓ Winner</span>'
                  : '') +
                  '<div style="font-size:.75rem;color:#9ca3af;margin-top:1px;">Roll: ' +
                    escHtml(cand.roll) + '</div>' +
                '</div>' +
                '<div style="text-align:right;">' +
                  '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;">' + votes + '</div>' +
                  '<div style="font-size:.75rem;color:#6b7280;">' + pct + '%</div>' +
                '</div>' +
              '</div>' +
              '<div style="background:#f3f4f6;border-radius:4px;height:6px;overflow:hidden;">' +
                '<div style="background:#1a3a5c;height:100%;width:' + barWidth + '%;' +
                  'border-radius:4px;transition:width .3s;"></div>' +
              '</div>' +
            '</div>';
        });

        // NOTA row
        if (post.nota > 0) {
          var notaPct = postTotal > 0 ? Math.round((post.nota / postTotal) * 1000) / 10 : 0;
          var notaBar = postTotal > 0 ? Math.round((post.nota / postTotal) * 100) : 0;
          html +=
            '<div style="padding:12px 16px;border-top:1px solid #f3f4f6;">' +
              '<div style="display:flex;justify-content:space-between;align-items:center;' +
                'margin-bottom:6px;">' +
                '<span style="font-size:.88rem;color:#6b7280;font-style:italic;">NOTA</span>' +
                '<div style="text-align:right;">' +
                  '<div style="font-size:1.1rem;font-weight:700;color:#6b7280;">' + post.nota + '</div>' +
                  '<div style="font-size:.75rem;color:#9ca3af;">' + notaPct + '%</div>' +
                '</div>' +
              '</div>' +
              '<div style="background:#f3f4f6;border-radius:4px;height:6px;overflow:hidden;">' +
                '<div style="background:#9ca3af;height:100%;width:' + notaBar + '%;' +
                  'border-radius:4px;"></div>' +
              '</div>' +
            '</div>';
        }
      }

      html += '</div></div>';
    });

    // Co-sign panel — only for closed/declared
    var st = res.elecStatus;
    if (st === 'closed' || st === 'declared') {
      html +=
        '<div class="panel-card" style="margin-bottom:16px;border:1.5px solid #1a3a5c;">' +
          '<div class="panel-card-header">Tally Co-Sign</div>' +
          '<div class="panel-card-body">' +
            '<div style="font-size:.85rem;color:#555;margin-bottom:12px;">' +
              'Enter your confirmation statement and co-sign the tally. ' +
              'This is recorded permanently in the audit log.' +
            '</div>' +
            '<textarea id="tally-cosign-text" rows="2" ' +
              'placeholder="e.g. I have verified the tally and confirm it is correct." ' +
              'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
              'border-radius:4px;box-sizing:border-box;resize:vertical;margin-bottom:10px;"></textarea>' +
            '<div id="tally-cosign-err" ' +
              'style="color:#c0392b;font-size:.83rem;margin-bottom:8px;display:none;"></div>' +
            '<button onclick="AdminPanel._submitTallyCoSign(\'' +
              escHtml(res.electionId) + '\')" id="btn-tally-cosign" ' +
              'style="width:100%;padding:13px;font-size:.9rem;background:#1a3a5c;color:#fff;' +
              'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
              'Co-sign Tally' +
            '</button>' +
          '</div>' +
        '</div>';
    }

    return html;
  },

  _submitTallyCoSign: function(elecId) {
    var textEl = document.getElementById('tally-cosign-text');
    var errEl  = document.getElementById('tally-cosign-err');
    var btn    = document.getElementById('btn-tally-cosign');
    var text   = textEl ? textEl.value.trim() : '';

    if (!text || text.length < 5) {
      if (errEl) { errEl.textContent = 'Please enter a confirmation statement.'; errEl.style.display = 'block'; }
      return;
    }
    if (errEl) errEl.style.display = 'none';
    if (btn) { btn.textContent = 'Submitting…'; btn.disabled = true; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          showToast('Tally co-signature recorded.');
          if (btn) { btn.textContent = '✓ Co-signed'; btn.disabled = true;
            btn.style.background = '#166534'; }
        } else {
          if (btn) { btn.textContent = 'Co-sign Tally'; btn.disabled = false; }
          if (errEl) { errEl.textContent = (res && res.message) || 'Co-sign failed.'; errEl.style.display = 'block'; }
        }
      })
      .withFailureHandler(function() {
        if (btn) { btn.textContent = 'Co-sign Tally'; btn.disabled = false; }
        if (errEl) { errEl.textContent = 'Error — please try again.'; errEl.style.display = 'block'; }
      })
      .recordTallyCoSign(App.token, elecId, text);
  },

  _renderCandList: function(candidates, elecStatus) {
    if (candidates.length === 0) {
      return '<div class="panel-card">' +
        '<div class="panel-card-body" style="text-align:center;padding:40px 16px;color:#6b7280;">' +
        '<div style="font-size:1.5rem;margin-bottom:8px;">📋</div>' +
        '<div style="font-weight:600;color:#374151;">No candidates yet</div>' +
        '<div style="font-size:.85rem;margin-top:6px;">Candidates appear here when nominations are accepted in Scrutiny.</div>' +
        '</div></div>';
    }

    var locked = ['candidates_published','active','paused','closed','declared']
                   .indexOf(elecStatus) !== -1;

    // Group by post
    var postMap = {};
    candidates.forEach(function(c) {
      var post = c.post || 'Unknown';
      if (!postMap[post]) postMap[post] = { order: c.postOrder || 999, candidates: [] };
      postMap[post].candidates.push(c);
    });

    // Sort posts by order
    var posts = Object.keys(postMap).sort(function(a, b) {
      return postMap[a].order - postMap[b].order;
    });

    var html = '';

    // Summary line
    html += '<div style="font-size:.85rem;color:#6b7280;margin-bottom:14px;">' +
      candidates.length + ' candidate' + (candidates.length !== 1 ? 's' : '') +
      ' across ' + posts.length + ' post' + (posts.length !== 1 ? 's' : '') +
      (locked ? ' &nbsp;·&nbsp; <span style="color:#b91c1c;">Deletions locked</span>' : '') +
      '</div>';

    posts.forEach(function(postName) {
      var group = postMap[postName];
      var count = group.candidates.length;

      // Post status badge
      var postBadge, postBadgeStyle;
      if (count === 0) {
        postBadge = 'Vacant'; postBadgeStyle = 'background:#fef2f2;color:#b91c1c;';
      } else if (count === 1) {
        postBadge = 'Uncontested'; postBadgeStyle = 'background:#fef9c3;color:#92400e;';
      } else {
        postBadge = 'Contested (' + count + ')'; postBadgeStyle = 'background:#dcfce7;color:#166534;';
      }

      html += '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header" style="display:flex;justify-content:space-between;' +
          'align-items:center;flex-wrap:wrap;gap:6px;">' +
          '<span style="font-weight:700;color:#1a3a5c;">' + escHtml(postName) + '</span>' +
          '<span style="font-size:.78rem;padding:3px 10px;border-radius:12px;font-weight:600;' +
            postBadgeStyle + '">' + postBadge + '</span>' +
        '</div>' +
        '<div class="panel-card-body" style="padding:0;">';

      group.candidates.forEach(function(cand, idx) {
        html +=
          '<div style="padding:12px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') +
            'display:flex;justify-content:space-between;align-items:center;gap:8px;">' +
            '<div>' +
              '<div style="font-weight:600;color:#1a3a5c;font-size:.9rem;">' +
                escHtml(cand.name) +
              '</div>' +
              '<div style="font-size:.8rem;color:#6b7280;margin-top:2px;">' +
                'Roll: ' + escHtml(cand.roll) +
                (cand.batch ? ' &nbsp;·&nbsp; Batch: ' + escHtml(cand.batch) : '') +
              '</div>' +
            '</div>' +
            (!locked ?
              '<button onclick="AdminPanel._confirmDeleteCandidate(\'' +
                escHtml(cand.id) + '\',\'' + escHtml(cand.name) + '\')" ' +
                'style="padding:7px 14px;font-size:.8rem;background:#fff;color:#b91c1c;' +
                'border:1.5px solid #b91c1c;border-radius:4px;cursor:pointer;white-space:nowrap;">' +
                'Delete' +
              '</button>'
            :
              '<span style="font-size:.75rem;color:#9ca3af;">Locked</span>'
            ) +
          '</div>';
      });

      html += '</div></div>';
    });

    return html;
  },

  _confirmDeleteCandidate: function(candId, candName) {
    if (!confirm('Delete candidate "' + candName + '"?\n\nThis will also return the nomination to Pending Scrutiny. This cannot be undone after the candidate list is published.')) return;
    AdminPanel._deleteCandidate(candId);
  },

  _deleteCandidate: function(candId) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          showToast('Candidate deleted. Nomination returned to scrutiny.');
          AdminPanel._loadCandList(AdminPanel._candSelectedElec);
        } else {
          showToast((res && res.message) || 'Delete failed.');
        }
      })
      .withFailureHandler(function() { showToast('Error — please try again.'); })
      .deleteCandidate(App.token, candId);
  },

_renderScrutinyList: function(noms) {
  var pending = [], completed = [];
  noms.forEach(function(n) {
    var s = (n.status || '').toLowerCase();
    if (s === 'accepted' || s === 'rejected' || s === 'withdrawn') {
      completed.push(n);
    } else if (s === 'confirmed') {
      pending.push(n);
    }
  });

  var html = '';

  html += '<div style="font-size:.9rem;font-weight:700;color:#1a3a5c;' +
    'margin-bottom:10px;margin-top:4px;">Pending Scrutiny (' + pending.length + ')</div>';

  if (pending.length === 0) {
    html += '<div class="panel-card" style="margin-bottom:16px;">' +
      '<div class="panel-card-body" style="text-align:center;padding:24px 16px;' +
      'color:#6b7280;font-size:.88rem;">No nominations awaiting scrutiny.</div></div>';
  } else {
    pending.forEach(function(n) {
      html += AdminPanel._scrutinyNomCard(n, false);
    });
  }

  html += '<div style="font-size:.9rem;font-weight:700;color:#1a3a5c;' +
    'margin-bottom:10px;margin-top:20px;">Completed (' + completed.length + ')</div>';

  if (completed.length === 0) {
    html += '<div class="panel-card">' +
      '<div class="panel-card-body" style="text-align:center;padding:24px 16px;' +
      'color:#6b7280;font-size:.88rem;">No completed scrutiny records.</div></div>';
  } else {
    completed.forEach(function(n) {
      html += AdminPanel._scrutinyNomCard(n, true);
    });
  }

  return html;
},

_scrutinyNomCard: function(n, isCompleted) {
  var statusBadge = {
    confirmed: 'badge-scrutiny',
    accepted:  'badge-active',
    rejected:  'badge-closed',
    withdrawn: 'badge-draft'
  };
  var badge = statusBadge[(n.status||'').toLowerCase()] || 'badge-draft';
  var statusLabel = (n.status || '').replace(/_/g,' ');

  return '<div class="panel-card" style="margin-bottom:10px;">' +
    '<div class="panel-card-body" style="padding:14px 16px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
        'gap:8px;margin-bottom:6px;flex-wrap:wrap;">' +
        '<div style="font-weight:600;color:#1a3a5c;font-size:.93rem;">' +
          escHtml(n.candName || '—') +
        '</div>' +
        '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
      '</div>' +
      '<div style="font-size:.83rem;color:#555;margin-bottom:10px;">' +
        'Post: <strong>' + escHtml(n.post || '—') + '</strong>' +
        (n.candRoll ? ' &nbsp;·&nbsp; Roll: ' + escHtml(n.candRoll) : '') +
        (n.candBatch ? ' &nbsp;·&nbsp; Batch: ' + escHtml(n.candBatch) : '') +
      '</div>' +
      (!isCompleted ?
        '<button onclick="AdminPanel._openScrutinyDetail(\'' + escHtml(n.id) + '\')" ' +
          'style="width:100%;padding:11px;font-size:.88rem;background:#1a3a5c;color:#fff;' +
          'border:none;border-radius:4px;cursor:pointer;">Scrutinise</button>'
      :
        '<button onclick="AdminPanel._openScrutinyDetail(\'' + escHtml(n.id) + '\')" ' +
          'style="width:100%;padding:11px;font-size:.88rem;background:#fff;color:#1a3a5c;' +
          'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">View Record</button>'
