  if (res.noActiveElec) {
    return '<div class="panel-card" style="margin:16px;">' +
      '<div class="panel-card-body" style="text-align:center;padding:40px 20px;">' +
        '<div style="font-size:1rem;font-weight:600;color:#374151;margin-bottom:8px;">No Active Voting Window</div>' +
        '<div style="font-size:.88rem;color:#6b7280;line-height:1.5;">' +
          escHtml(res.message || 'Observer access is available during the voting window only.') +
        '</div>' +
      '</div>' +
    '</div>';
  }

  var statusLabel = res.status === 'paused'
    ? '<span style="font-size:.78rem;padding:2px 8px;border-radius:8px;background:#fef3c7;color:#92400e;font-weight:600;">PAUSED</span>'
    : '<span style="font-size:.78rem;padding:2px 8px;border-radius:8px;background:#dcfce7;color:#166534;font-weight:600;">VOTING OPEN</span>';

  var pct = res.turnoutPct || 0;
  var barColor = pct >= 75 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#3b82f6';

  var html =
    '<div style="padding:16px;">' +

    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">' +
      '<div>' +
        '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;">' + escHtml(res.electionTitle) + '</div>' +
        '<div style="margin-top:4px;">' + statusLabel + '</div>' +
      '</div>' +
      '<div style="text-align:right;">' +
        '<div style="font-size:.72rem;color:#9ca3af;">Last updated</div>' +
        '<div style="font-size:.78rem;color:#6b7280;font-weight:600;">' + now + '</div>' +
        '<button onclick="AdminPanel._refreshObserverDashboard()" ' +
          'style="margin-top:4px;font-size:.78rem;padding:4px 10px;background:#f3f4f6;' +
          'color:#374151;border:1px solid #d1d5db;border-radius:4px;cursor:pointer;">' +
          'Refresh</button>' +
      '</div>' +
    '</div>' +

    '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-header">Overall Participation</div>' +
      '<div class="panel-card-body">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">' +
          '<div>' +
            '<span style="font-size:2rem;font-weight:700;color:#1a3a5c;">' + pct + '%</span>' +
            '<span style="font-size:.85rem;color:#6b7280;margin-left:6px;">turnout</span>' +
          '</div>' +
          '<div style="text-align:right;font-size:.83rem;color:#6b7280;">' +
            '<strong style="color:#374151;">' + res.totalVoted + '</strong> of ' +
            '<strong style="color:#374151;">' + res.totalEligible + '</strong> voters' +
          '</div>' +
        '</div>' +
        '<div style="height:12px;background:#f3f4f6;border-radius:6px;overflow:hidden;">' +
          '<div style="height:100%;width:' + Math.min(pct, 100) + '%;background:' + barColor + ';border-radius:6px;"></div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    '<div class="panel-card">' +
      '<div class="panel-card-header">Votes Cast by Post</div>' +
      '<div class="panel-card-body" style="padding:0;">';

  if (!res.postSummary || res.postSummary.length === 0) {
    html += '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:.88rem;">No votes cast yet.</div>';
  } else {
    for (var pi = 0; pi < res.postSummary.length; pi++) {
      var p = res.postSummary[pi];
      var postPct = res.totalEligible > 0 ? Math.round((p.votesCast / res.totalEligible) * 1000) / 10 : 0;
      html +=
        '<div style="padding:12px 16px;' + (pi > 0 ? 'border-top:1px solid #f3f4f6;' : '') + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">' +
            '<div style="font-size:.88rem;font-weight:600;color:#374151;">' + escHtml(p.post) + '</div>' +
            '<div style="font-size:.88rem;color:#1a3a5c;font-weight:600;">' +
              p.votesCast + ' <span style="font-size:.75rem;color:#6b7280;font-weight:400;">votes</span>' +
            '</div>' +
          '</div>' +
          '<div style="height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;">' +
            '<div style="height:100%;width:' + Math.min(postPct, 100) + '%;background:#3b82f6;border-radius:3px;"></div>' +
          '</div>' +
        '</div>';
    }
  }

  html +=
      '</div>' +
    '</div>' +

    '<div style="margin-top:12px;padding:10px 14px;background:#f9fafb;border-radius:6px;' +
      'border:1px solid #e5e7eb;font-size:.76rem;color:#9ca3af;line-height:1.4;">' +
      'Participation counts only. Voter identities and vote distribution between candidates are not visible to Observers.' +
    '</div>' +

    '<div style="text-align:center;margin-top:10px;font-size:.75rem;color:#d1d5db;">Auto-refreshes every 60 seconds</div>' +

    '</div>';

  return html;
},


// ── OBSERVATIONS TAB ──────────────────────────────────────

_loadObservations: function() {
  var c = document.getElementById('observations-content');
  if (!c) return;
  var isAdmin = (App.role === 'RO_ADMIN' || App.role === 'DEPUTY_RO' || App.role === 'TEM');

  google.script.run
    .withSuccessHandler(function(res) {
      var c2 = document.getElementById('observations-content');
      if (!c2) return;
      if (!res || !res.success) {
        c2.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load observations.') + '</div>';
        return;
      }
      c2.innerHTML = AdminPanel._renderObservations(res.items || [], isAdmin);
    })
    .withFailureHandler(function() {
      var c2 = document.getElementById('observations-content');
      if (c2) c2.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading observations.</div>';
    })
    .getObservations(App.token, AdminPanel._currentElectionId || '');
},

_renderObservations: function(items, isAdmin) {
  var sevBadge = function(s) {
    var map = {
      info:    ['#dbeafe','#1e40af','Info'],
      concern: ['#fef3c7','#92400e','Concern'],
      urgent:  ['#fee2e2','#991b1b','Urgent']
    };
    var v = map[s] || map['info'];
    return '<span style="font-size:.72rem;padding:1px 7px;border-radius:8px;font-weight:600;' +
      'background:' + v[0] + ';color:' + v[1] + ';">' + v[2] + '</span>';
  };
  var statusBadge = function(s) {
    if (s === 'responded') return '<span style="font-size:.72rem;padding:1px 7px;border-radius:8px;background:#dcfce7;color:#166534;font-weight:600;">Responded</span>';
    if (s === 'noted')     return '<span style="font-size:.72rem;padding:1px 7px;border-radius:8px;background:#f3f4f6;color:#6b7280;font-weight:600;">Noted</span>';
    return '<span style="font-size:.72rem;padding:1px 7px;border-radius:8px;background:#fef3c7;color:#92400e;font-weight:600;">Pending</span>';
  };

  var html = '';

  // Submit form — for Scrutineers and Observers
  if (App.role === 'SCRUTINEER' || App.role === 'OBSERVER') {
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Submit Observation</div>' +
        '<div class="panel-card-body">' +
          (App.role === 'OBSERVER' ?
            '<div style="font-size:.82rem;color:#6b7280;margin-bottom:10px;">Observer observations can only be submitted during the active voting window.</div>' : '') +
          '<div style="margin-bottom:8px;">' +
            '<label style="font-size:.78rem;color:#6b7280;display:block;margin-bottom:3px;">Severity</label>' +
            '<select id="obs-severity" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:4px;font-size:.88rem;background:#fff;">' +
              '<option value="info">Info \u2014 general note</option>' +
              '<option value="concern">Concern \u2014 requires RO attention</option>' +
              '<option value="urgent">Urgent \u2014 immediate attention needed</option>' +
            '</select>' +
          '</div>' +
          '<div style="margin-bottom:8px;">' +
            '<label style="font-size:.78rem;color:#6b7280;display:block;margin-bottom:3px;">Observation</label>' +
            '<textarea id="obs-text" rows="4" placeholder="Describe your observation in detail\u2026" ' +
              'style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:4px;' +
              'font-size:.88rem;resize:vertical;box-sizing:border-box;"></textarea>' +
          '</div>' +
          '<div id="obs-submit-err" style="color:#c0392b;font-size:.83rem;margin-bottom:6px;display:none;"></div>' +
          '<button onclick="AdminPanel._submitObservation()" id="btn-obs-submit" ' +
            'style="width:100%;padding:12px;font-size:.9rem;font-weight:600;' +
            'background:#1a3a5c;color:#fff;border:none;border-radius:4px;cursor:pointer;">Submit Observation</button>' +
        '</div>' +
      '</div>';
  }

  // Pending count banner — for admins
  if (isAdmin) {
    var pending = items.filter(function(x) { return x.resolutionStatus === 'pending'; }).length;
    if (pending > 0) {
      html +=
        '<div style="padding:10px 14px;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;' +
          'font-size:.85rem;color:#92400e;font-weight:600;margin-bottom:12px;">' +
          '\u26a0 ' + pending + ' observation' + (pending > 1 ? 's' : '') + ' pending response' +
        '</div>';
    }
  }

  if (items.length === 0) {
    html += '<div style="padding:24px;text-align:center;color:#9ca3af;font-size:.88rem;">No observations yet.</div>';
    return html;
  }

  items.forEach(function(obs, idx) {
    var dt = obs.observedAt ? fmtIST(obs.observedAt) : '';
    var typeLbl = obs.obsType === 'scrutineer' ? 'Scrutineer' : 'Observer';
    var replySection = '';

    if (isAdmin && obs.resolutionStatus === 'pending') {
      replySection =
        '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e5e7eb;">' +
          '<textarea id="obs-reply-' + escHtml(obs.obsId) + '" rows="2" ' +
            'placeholder="Your response\u2026" ' +
            'style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:4px;' +
            'font-size:.85rem;resize:vertical;box-sizing:border-box;margin-bottom:6px;"></textarea>' +
          '<button onclick="AdminPanel._replyObservationBtn(this)" data-obsid="' + escHtml(obs.obsId) + '" ' +
            'style="width:100%;padding:10px;font-size:.85rem;font-weight:600;' +
            'background:#1a3a5c;color:#fff;border:none;border-radius:4px;cursor:pointer;">Send Response</button>' +
        '</div>';
    } else if (obs.responseText) {
      replySection =
        '<div style="margin-top:8px;padding:8px 10px;background:#f0fdf4;border-radius:4px;' +
          'border-left:3px solid #22c55e;">' +
          '<div style="font-size:.75rem;color:#166534;font-weight:600;margin-bottom:3px;">RO Response \u2014 ' +
            escHtml(obs.acknowledgedBy) + ' \u00b7 ' +
            (obs.acknowledgedAt ? fmtIST(obs.acknowledgedAt) : '') +
          '</div>' +
          '<div style="font-size:.85rem;color:#374151;">' + escHtml(obs.responseText) + '</div>' +
        '</div>';
    }

    html +=
      '<div class="panel-card" style="margin-bottom:10px;">' +
        '<div class="panel-card-body">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">' +
            '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">' +
              '<span style="font-size:.78rem;font-weight:600;color:#1a3a5c;">' + escHtml(typeLbl) + '</span>' +
              sevBadge(obs.severity) +
              statusBadge(obs.resolutionStatus) +
            '</div>' +
            '<span style="font-size:.75rem;color:#9ca3af;white-space:nowrap;">' + escHtml(dt) + '</span>' +
          '</div>' +
          (isAdmin ? '<div style="font-size:.75rem;color:#6b7280;margin-bottom:4px;">From: ' + escHtml(obs.observerId) + '</div>' : '') +
          '<div style="font-size:.88rem;color:#374151;line-height:1.5;">' + escHtml(obs.obsText) + '</div>' +
          replySection +
        '</div>' +
      '</div>';
  });

  return html;
},

_submitObservation: function() {
  var textEl = document.getElementById('obs-text');
  var sevEl  = document.getElementById('obs-severity');
  var btn    = document.getElementById('btn-obs-submit');
  var errEl  = document.getElementById('obs-submit-err');
  if (!textEl) return;

  var text = textEl.value.trim();
  var sev  = sevEl ? sevEl.value : 'info';
  if (!text) { if (errEl) { errEl.textContent = 'Please enter your observation.'; errEl.style.display = 'block'; } return; }
  if (errEl) errEl.style.display = 'none';
  if (btn) { btn.textContent = 'Submitting\u2026'; btn.disabled = true; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.textContent = 'Submit Observation'; btn.disabled = false; }
      if (res && res.success) {
        showToast('Observation submitted.');
        if (textEl) textEl.value = '';
        AdminPanel._loadObservations();
      } else {
        if (errEl) { errEl.textContent = (res && res.message) || 'Failed to submit.'; errEl.style.display = 'block'; }
      }
    })
    .withFailureHandler(function() {
      if (btn) { btn.textContent = 'Submit Observation'; btn.disabled = false; }
      if (errEl) { errEl.textContent = 'Connection error. Please try again.'; errEl.style.display = 'block'; }
    })
    .submitObservation(App.token, AdminPanel._currentElectionId || '', text, sev);
},

_replyObservationBtn: function(btn) {
  var obsId = btn.getAttribute('data-obsid');
  AdminPanel._replyObservation(obsId);
},

_replyObservation: function(obsId) {
  var replyEl = document.getElementById('obs-reply-' + obsId);
  if (!replyEl) return;
  var text = replyEl.value.trim();
  if (!text) { showToast('Please enter a response.', true); return; }

  replyEl.disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      if (replyEl) replyEl.disabled = false;
      if (res && res.success) {
        showToast('Response sent.');
        AdminPanel._loadObservations();
      } else {
        showToast((res && res.message) || 'Failed to save response.', true);
      }
    })
    .withFailureHandler(function() {
      if (replyEl) replyEl.disabled = false;
      showToast('Connection error.', true);
    })
    .replyObservation(App.token, obsId, text, getTEMAuthId());
},

// ── APPEALS TAB ───────────────────────────────────────────

_loadAppeals: function() {
  var c = document.getElementById('appeals-content');
  if (!c) return;

  google.script.run
    .withSuccessHandler(function(res) {
      var c = document.getElementById('appeals-content');
      if (!c) return;
      if (!res || !res.success) {
        c.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load appeals.') + '</div>';
        return;
      }
      c.innerHTML = AdminPanel._renderAppeals(res.appeals || []);
    })
    .withFailureHandler(function() {
      var c = document.getElementById('appeals-content');
      if (c) c.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Connection error.</div>';
    })
    .getAppeals(App.token, null);
},

_renderAppeals: function(appeals) {
  var statusLabels = {
    filed:             'Filed',
    under_review:      'Under Review',
    upheld:            'Upheld',
    dismissed:         'Dismissed',
    panel_no_response: 'Panel No Response'
  };
  var statusColors = {
    filed:             '#fef3c7',
    under_review:      '#eff6ff',
    upheld:            '#d1fae5',
    dismissed:         '#f3f4f6',
    panel_no_response: '#fce7f3'
  };

  var pendingCount = appeals.filter(function(a) {
    return a.status === 'filed' || a.status === 'under_review';
  }).length;
  var objectionCount = appeals.filter(function(a) {
    return a.appealType === 'nomination_objection' && a.status === 'filed';
  }).length;

  // ── Summary bar ──────────────────────────────────────────────
  var html =
    '<div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;">' +
      '<div style="font-size:.9rem;color:#6b7280;">' +
        '<strong style="color:#374151;">' + appeals.length + '</strong> record(s) — ' +
        appeals.filter(function(a){ return a.appealType !== 'nomination_objection'; }).length + ' appeal(s), ' +
        appeals.filter(function(a){ return a.appealType === 'nomination_objection'; }).length + ' objection(s)' +
      '</div>' +
      (pendingCount > 0
        ? '<span style="font-size:.78rem;background:#fef3c7;color:#92400e;padding:3px 10px;' +
          'border-radius:10px;font-weight:600;">⚠ ' + pendingCount + ' pending</span>'
        : '<span style="font-size:.78rem;background:#d1fae5;color:#065f46;padding:3px 10px;' +
          'border-radius:10px;font-weight:600;">✓ None pending</span>') +
    '</div>';

  if (pendingCount > 0) {
    html +=
      '<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:6px;' +
      'padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:#92400e;">' +
      '⚠ <strong>Voting cannot be activated while appeals or objections are pending.</strong> ' +
      'The Appeals Panel has 48 hours from the close of the filing window to decide (96 hours total from candidate list publication). ' +
      'After this, undecided items are automatically marked <em>Panel No Response</em> and voting can proceed.' +
      '</div>';
  }

  // ── Consolidated objection summary button ────────────────────
  if (objectionCount > 0) {
    html +=
      '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;' +
      'padding:12px 16px;margin-bottom:14px;">' +
      '<div style="font-size:.88rem;font-weight:600;color:#1e40af;margin-bottom:6px;">' +
        '📋 Objection Window Actions' +
      '</div>' +
      '<div style="font-size:.82rem;color:#374151;margin-bottom:10px;">' +
        objectionCount + ' open objection(s) are waiting. When the 48-hour filing window closes, ' +
        'use the button below to send the consolidated summary to the Appeals Panel.' +
      '</div>' +
      '<button onclick="AdminPanel._sendObjSummary()" ' +
        'style="width:100%;padding:11px;background:#1e40af;color:#fff;border:none;' +
        'border-radius:4px;font-size:.88rem;cursor:pointer;min-height:44px;">' +
        'Send Consolidated Objection Summary to Appeals Panel' +
      '</button>' +
      '</div>';
  }

  if (appeals.length === 0) {
    html +=
      '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
        '<div style="font-size:2rem;margin-bottom:12px;">[EMPTY]</div>' +
        '<div style="font-size:.95rem;font-weight:600;color:#374151;margin-bottom:6px;">No Appeals or Objections</div>' +
        '<div style="font-size:.85rem;">None have been filed for this election.</div>' +
      '</div>';
    return html;
  }

  for (var i = 0; i < appeals.length; i++) {
    var apl = appeals[i];
    var bgColor     = statusColors[apl.status] || '#f9fafb';
    var statusLabel = statusLabels[apl.status] || apl.status;
    var isObjection = apl.appealType === 'nomination_objection';
    var typeBadge =
      '<span style="font-size:.72rem;padding:2px 8px;border-radius:8px;font-weight:600;' +
      'background:' + (isObjection ? '#eff6ff' : '#f3f4f6') + ';' +
      'color:' + (isObjection ? '#1e40af' : '#374151') + ';margin-left:6px;">' +
      (isObjection ? 'Nomination Objection' : 'Rejection Appeal') +
      '</span>';

    html +=
      '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;' +
      'padding:16px;margin-bottom:14px;">' +

        '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
        'gap:8px;margin-bottom:10px;">' +
          '<div>' +
            '<div style="font-size:.78rem;color:#9ca3af;margin-bottom:2px;">' +
              escHtml(apl.id) + typeBadge + '</div>' +
            '<div style="font-size:.9rem;font-weight:600;color:#1a3a5c;">' +
              escHtml(apl.candName) + '</div>' +
            '<div style="font-size:.82rem;color:#6b7280;">' +
              'Post: ' + escHtml(apl.post) + '</div>' +
            (isObjection && apl.objectorRoll
              ? '<div style="font-size:.78rem;color:#1e40af;margin-top:2px;">' +
                'Objector Roll: ' + escHtml(apl.objectorRoll) + '</div>'
              : '') +
            '<div style="font-size:.78rem;color:#9ca3af;margin-top:2px;">' +
              'Filed: ' + escHtml(apl.filedAt.toString().split('T')[0] || apl.filedAt.toString()) +
            '</div>' +
          '</div>' +
          '<span style="font-size:.75rem;padding:3px 10px;border-radius:10px;font-weight:600;' +
            'background:' + bgColor + ';white-space:nowrap;">' +
            escHtml(statusLabel) +
          '</span>' +
        '</div>' +

        '<div style="font-size:.88rem;color:#1f2937;background:#f9fafb;border-radius:6px;' +
        'padding:10px 12px;margin-bottom:12px;line-height:1.5;white-space:pre-wrap;">' +
          escHtml(apl.appealText) +
        '</div>' +

        (apl.roNotes ? '<div style="font-size:.82rem;color:#374151;margin-bottom:6px;">' +
          '<strong>RO Notes:</strong> ' + escHtml(apl.roNotes) + '</div>' : '') +
        (apl.decision ? '<div style="font-size:.82rem;color:#374151;margin-bottom:10px;">' +
          '<strong>Decision:</strong> ' + escHtml(apl.decision) + '</div>' : '') +

        '<div style="border-top:1px solid #f3f4f6;padding-top:12px;">' +
          '<div style="font-size:.82rem;font-weight:600;color:#374151;margin-bottom:8px;">Record Decision</div>' +
          '<div style="font-size:.82rem;font-weight:600;color:#374151;margin-bottom:6px;">Upload Panel Ruling Document</div>' +
          '<input type="file" id="apl-ruling-' + i + '" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" ' +
            'style="width:100%;font-size:.82rem;margin-bottom:4px;">' +
          '<div style="font-size:.75rem;color:#9ca3af;margin-bottom:10px;">PDF, image or Word. Max 5MB. Stored in DocStore against this record.</div>' +
          '<button onclick="AdminPanel._uploadRuling(\'' + escHtml(apl.id) + '\',\'' + escHtml(apl.electionId) + '\',' + i + ')" ' +
            'style="width:100%;padding:10px;background:#fff;color:#1a3a5c;border:1.5px solid #1a3a5c;' +
            'border-radius:4px;font-size:.85rem;cursor:pointer;min-height:40px;margin-bottom:12px;">' +
            '📎 Upload Ruling Document' +
          '</button>' +
          '<select id="apl-status-' + i + '" ' +
            'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
            'border-radius:4px;margin-bottom:8px;box-sizing:border-box;">' +
            '<option value="filed"' +             (apl.status==='filed'?             ' selected':'') + '>Filed</option>' +
            '<option value="under_review"' +      (apl.status==='under_review'?      ' selected':'') + '>Under Review</option>' +
            '<option value="upheld"' +            (apl.status==='upheld'?            ' selected':'') + '>' + (isObjection ? 'Upheld — Revoke Acceptance' : 'Upheld — Reinstate Nomination') + '</option>' +
            '<option value="dismissed"' +         (apl.status==='dismissed'?         ' selected':'') + '>Dismissed</option>' +
            '<option value="panel_no_response"' + (apl.status==='panel_no_response'? ' selected':'') + '>Panel No Response</option>' +
          '</select>' +
          '<textarea id="apl-notes-' + i + '" placeholder="RO notes (optional)…" ' +
            'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
            'border-radius:4px;margin-bottom:8px;box-sizing:border-box;min-height:60px;' +
            'font-family:Arial,sans-serif;resize:vertical;">' +
            escHtml(apl.roNotes) +
          '</textarea>' +
          '<textarea id="apl-dec-' + i + '" placeholder="Decision text / reasons (required for upheld or dismissed)…" ' +
            'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
            'border-radius:4px;margin-bottom:8px;box-sizing:border-box;min-height:60px;' +
            'font-family:Arial,sans-serif;resize:vertical;">' +
            escHtml(apl.decision) +
          '</textarea>' +
          '<button onclick="AdminPanel._saveAppeal(\'' + escHtml(apl.id) + '\',' + i + ')" ' +
            'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
            'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">' +
            'Save Decision' +
          '</button>' +
        '</div>' +

      '</div>';
  }
  return html;
},

_sendObjSummary: function() {
  var electionId = AdminPanel._currentElectionId;
  if (!electionId) { showToast('No election selected.', true); return; }
  if (!confirm('Send consolidated objection summary to the Appeals Panel now?\n\nOnly do this after the 48-hour filing window has closed.')) return;
  showToast('Sending…');
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) { showToast((res && res.message) || 'Failed.', true); return; }
      showToast('Sent. Candidates with objections: ' + res.candidatesWithObjections +
        ' | Total objections: ' + res.totalObjections +
        ' | Panel recipients: ' + res.panelRecipients);
      AdminPanel._loadAppeals();
    })
    .withFailureHandler(function(e) { showToast('Error: ' + e.message, true); })
    .sendConsolidatedObjectionSummary(SharedState.token, electionId);
},

_doPurgeTrial: function(electionId) {
  var phraseEl = document.getElementById('purge-phrase');
  var phrase   = phraseEl ? phraseEl.value.trim() : '';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        showToast((res && res.message) || 'Purge failed.', true);
        return;
      }
      var msg = 'Trial data purged. ';
      if (res.counts) {
        var parts = [];
        for (var k in res.counts) parts.push(k + ': ' + res.counts[k]);
        msg += parts.join(', ');
      }
      showToast(msg);
      AdminPanel.switchTab('elections');
    })
    .withFailureHandler(function() { showToast('Connection error.', true); })
    .purgeTrialData(App.token, electionId, phrase, getTEMAuthId());
},

_uploadRuling: function(appealId, electionId, idx) {
  var fileEl = document.getElementById('apl-ruling-' + idx);
  if (!fileEl || !fileEl.files || !fileEl.files[0]) {
    showToast('Please select a document to upload.', true); return;
  }
  var file = fileEl.files[0];
  if (file.size > 5242880) { showToast('File too large. Maximum 5MB.', true); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result.substring(e.target.result.indexOf(',') + 1);
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Upload failed.', true); return;
        }
        showToast('Ruling document uploaded successfully.');
        fileEl.value = '';
      })
      .withFailureHandler(function() { showToast('Connection error.', true); })
      .storeAppealRuling(App.token, electionId, appealId,
        file.name, b64, file.type, getTEMAuthId());
  };
  reader.readAsDataURL(file);
},

_saveAppeal: function(appealId, idx) {
  var statusEl = document.getElementById('apl-status-' + idx);
  var notesEl  = document.getElementById('apl-notes-'  + idx);
  var decEl    = document.getElementById('apl-dec-'    + idx);
  if (!statusEl) return;

  var decision   = statusEl.value;
  var notes      = notesEl ? notesEl.value.trim() : '';
  var decText    = decEl   ? decEl.value.trim()   : '';

  if ((decision === 'upheld' || decision === 'dismissed') && !decText) {
    showToast('Please enter decision text before saving.', true);
    return;
  }

  if (decision === 'upheld') {
    if (!confirm('Record this appeal as UPHELD?\n\nThis will:\n' +
        '• Reinstate the nomination to pending scrutiny\n' +
        '• Roll the election back from candidates_published to scrutiny\n' +
        '• Clear the candidate list publication timestamp\n' +
        '• Notify the candidate by email\n\nThis cannot be undone.')) return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        showToast((res && res.message) || 'Update failed.', true);
        return;
      }
      if (res.rolledBack) {
        showToast('Appeal upheld. Nomination reinstated. Election rolled back to scrutiny.');
      } else {
        showToast('Appeal decision saved.');
      }
      AdminPanel._loadAppeals();
    })
    .withFailureHandler(function() { showToast('Connection error.', true); })
    .updateAppealDecision(App.token, appealId, decision, notes, decText, getTEMAuthId());
},

  // ============================================================
// VOTER ROLL DRAFT TAB (S41)
// ============================================================

_loadVoterRollDraft: function(filter, search) {
  var c = document.getElementById('vrd-content');
  if (!c) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        c.innerHTML = '<div style="padding:24px;color:#b91c1c;">' +
          (res && res.message ? res.message : 'Failed to load draft.') + '</div>';
        return;
      }
      c.innerHTML = AdminPanel._renderVoterRollDraft(res.rows || [], filter, search || '');
    })
    .withFailureHandler(function() {
      c.innerHTML = '<div style="padding:24px;color:#b91c1c;">Connection error.</div>';
    })
    .getVoterRollDraft(App.token, 1, search || '');
},

_renderVoterRollDraft: function(rows, filter, search) {
  // Apply client-side filter
  var filtered = rows.filter(function(r) {
    var status = (r[10] || '').toString();
    if (filter === 'objected')  return status === 'objected';
    if (filter === 'unresolved') return status === 'objected';
    if (filter === 'resolved')  return status === 'resolved_retained' || status === 'resolved_removed' || status === 'resolved_added';
    return true; // 'all'
  });

  var total     = rows.length;
  var objected  = rows.filter(function(r){ return (r[10]||'').toString() === 'objected'; }).length;
  var retained  = rows.filter(function(r){ return (r[10]||'').toString() === 'resolved_retained'; }).length;
  var removed   = rows.filter(function(r){ return (r[10]||'').toString() === 'resolved_removed'; }).length;
  var clean     = total - objected - retained - removed;

  // Status badge helper
  function badge(status) {
    var map = {
      'none':               ['#e5e7eb','#374151','No objection'],
      'objected':           ['#fef3c7','#92400e','⚠ Objected'],
      'resolved_retained':  ['#d1fae5','#065f46','✓ Retained'],
      'resolved_removed':   ['#fee2e2','#991b1b','✗ Removed'],
      'resolved_added':     ['#ede9fe','#5b21b6','✚ Added']
    };
    var v = map[status] || map['none'];
    return '<span style="background:' + v[0] + ';color:' + v[1] +
      ';padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;">' +
      v[2] + '</span>';
  }

  var html = '';

  // Summary bar
  html += '<div style="display:flex;flex-wrap:wrap;gap:10px;padding:16px;' +
    'background:#f8fafc;border-bottom:1px solid #e5e7eb;">';
  html += '<div style="flex:1;min-width:120px;background:#fff;border:1px solid #e5e7eb;' +
    'border-radius:6px;padding:10px 14px;">' +
    '<div style="font-size:.75rem;color:#6b7280;">Total in draft</div>' +
    '<div style="font-size:1.4rem;font-weight:700;color:#1a3a5c;">' + total + '</div></div>';
  html += '<div style="flex:1;min-width:120px;background:#fff;border:1px solid #e5e7eb;' +
    'border-radius:6px;padding:10px 14px;">' +
    '<div style="font-size:.75rem;color:#6b7280;">No objection</div>' +
    '<div style="font-size:1.4rem;font-weight:700;color:#374151;">' + clean + '</div></div>';
  html += '<div style="flex:1;min-width:120px;background:#fef3c7;border:1px solid #fcd34d;' +
    'border-radius:6px;padding:10px 14px;">' +
    '<div style="font-size:.75rem;color:#92400e;">Unresolved</div>' +
    '<div style="font-size:1.4rem;font-weight:700;color:#92400e;">' + objected + '</div></div>';
  html += '<div style="flex:1;min-width:120px;background:#d1fae5;border:1px solid #6ee7b7;' +
    'border-radius:6px;padding:10px 14px;">' +
    '<div style="font-size:.75rem;color:#065f46;">Retained</div>' +
    '<div style="font-size:1.4rem;font-weight:700;color:#065f46;">' + retained + '</div></div>';
  html += '<div style="flex:1;min-width:120px;background:#fee2e2;border:1px solid #fca5a5;' +
    'border-radius:6px;padding:10px 14px;">' +
    '<div style="font-size:.75rem;color:#991b1b;">Removed</div>' +
    '<div style="font-size:1.4rem;font-weight:700;color:#991b1b;">' + removed + '</div></div>';
  html += '</div>';

  // Search + filter bar
  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;' +
    'border-bottom:1px solid #e5e7eb;align-items:center;">';
  html += '<input id="vrd-search" type="text" placeholder="Search roll / name…" ' +
    'value="' + escHtml(search) + '" ' +
    'style="flex:1;min-width:180px;padding:9px 12px;border:1px solid #d1d5db;' +
    'border-radius:6px;font-size:.9rem;" ' +
    'oninput="AdminPanel._loadVoterRollDraft(document.getElementById(\'vrd-filter\').value, this.value)">';
  html += '<select id="vrd-filter" ' +
    'style="padding:9px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:.9rem;" ' +
    'onchange="AdminPanel._loadVoterRollDraft(this.value, document.getElementById(\'vrd-search\').value)">';
  var filterOpts = [
    ['all','All rows'],
    ['objected','Unresolved only'],
    ['resolved','Resolved only']
  ];
  filterOpts.forEach(function(o) {
    html += '<option value="' + o[0] + '"' + (filter === o[0] ? ' selected' : '') +
      '>' + o[1] + '</option>';
  });
  html += '</select>';
  html += '</div>';

  // Certify button
  html += '<div style="padding:12px 16px;border-bottom:1px solid #e5e7eb;">';
  if (objected > 0) {
    html += '<div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;' +
      'padding:10px 14px;font-size:.85rem;color:#92400e;">' +
      '⚠ ' + objected + ' unresolved objection(s) must be resolved before certification.' +
      '</div>';
  } else if (total === 0) {
    html += '<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;' +
      'padding:10px 14px;font-size:.85rem;color:#991b1b;">' +
      'No rows in draft. Upload a voter roll CSV in the Voters tab first.' +
      '</div>';
  } else {
    html += '<button onclick="AdminPanel._sendVoterRollNotice()" ' +
      'style="width:100%;padding:12px;background:#fff;color:#1a3a5c;border:1.5px solid #1a3a5c;' +
      'border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;min-height:44px;margin-bottom:8px;">' +
      '✉ Notify All Members — Draft Roll Published' +
      '</button>' +
      '<button onclick="AdminPanel._certifyRoll()" ' +
      'style="width:100%;padding:13px;background:#065f46;color:#fff;border:none;' +
      'border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer;min-height:44px;">' +
      '✓ Certify Voter Roll (' + (total - removed) + ' voters)' +
      '</button>' +
      '<div id="vr-notice-result" style="display:none;margin-top:8px;font-size:.85rem;color:#16a34a;"></div>';
  }
  html += '</div>';

  // Add Member form (collapsible)
  html += '<div style="padding:12px 16px;border-bottom:1px solid #e5e7eb;">' +
    '<div style="font-size:.85rem;font-weight:700;color:#1a3a5c;margin-bottom:8px;">' +
      '➕ Add Missing Member to Draft' +
    '</div>' +
    '<div style="font-size:.82rem;color:#6b7280;margin-bottom:10px;">' +
      'Use during the objection period when a valid Life Member is found to be missing from the draft roll.' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;gap:8px;">' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<div style="flex:1;min-width:120px;">' +
          '<label style="font-size:.78rem;color:#374151;font-weight:600;">Roll No *</label>' +
          '<input id="vrd-add-roll" type="text" placeholder="e.g. 2001A" ' +
            'style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;' +
            'font-size:.9rem;box-sizing:border-box;margin-top:3px;">' +
        '</div>' +
        '<div style="flex:2;min-width:160px;">' +
          '<label style="font-size:.78rem;color:#374151;font-weight:600;">First Name *</label>' +
          '<input id="vrd-add-name" type="text" placeholder="First name" ' +
            'style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;' +
            'font-size:.9rem;box-sizing:border-box;margin-top:3px;">' +
        '</div>' +
        '<div style="flex:2;min-width:160px;">' +
          '<label style="font-size:.78rem;color:#374151;font-weight:600;">Surname</label>' +
          '<input id="vrd-add-surname" type="text" placeholder="Surname" ' +
            'style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;' +
            'font-size:.9rem;box-sizing:border-box;margin-top:3px;">' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<div style="flex:1;min-width:100px;">' +
          '<label style="font-size:.78rem;color:#374151;font-weight:600;">Batch</label>' +
          '<input id="vrd-add-batch" type="text" placeholder="e.g. 2001" ' +
            'style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;' +
            'font-size:.9rem;box-sizing:border-box;margin-top:3px;">' +
        '</div>' +
        '<div style="flex:3;min-width:180px;">' +
          '<label style="font-size:.78rem;color:#374151;font-weight:600;">Email</label>' +
          '<input id="vrd-add-email" type="email" placeholder="member@email.com" ' +
            'style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;' +
            'font-size:.9rem;box-sizing:border-box;margin-top:3px;">' +
        '</div>' +
      '</div>' +
      '<div>' +
        '<label style="font-size:.78rem;color:#374151;font-weight:600;">Reason for addition</label>' +
        '<input id="vrd-add-notes" type="text" ' +
          'placeholder="e.g. Life Member — omitted from source CSV due to data entry error." ' +
          'style="width:100%;padding:9px 10px;border:1px solid #d1d5db;border-radius:6px;' +
          'font-size:.9rem;box-sizing:border-box;margin-top:3px;">' +
      '</div>' +
      '<div id="vrd-add-err" style="color:#b91c1c;font-size:.82rem;display:none;"></div>' +
      '<button onclick="AdminPanel._addMemberToDraft()" ' +
        'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
        'border-radius:6px;font-size:.9rem;font-weight:600;cursor:pointer;min-height:44px;">' +
        '➕ Add Member to Draft Roll' +
      '</button>' +
    '</div>' +
  '</div>';

  // Row cards
  if (filtered.length === 0) {
    html += '<div style="padding:32px;text-align:center;color:#6b7280;font-size:.9rem;">' +
      'No rows match this filter.</div>';
    return html;
  }

  html += '<div style="padding:12px 16px;">';
  filtered.forEach(function(r, idx) {
    var rollNo  = (r[0]  || '').toString();
    var name    = (r[1]  || '').toString() + ' ' + (r[2] || '').toString();
    var batch   = (r[3]  || '').toString();
    var email   = (r[4]  || '').toString();
    var status  = (r[10] || 'none').toString();
    var notes   = (r[11] || '').toString();
    var verCat  = (r[12] || '').toString();
    var cardId  = 'vrd-card-' + idx;

    html += '<div id="' + cardId + '" style="background:#fff;border:1px solid #e5e7eb;' +
      'border-radius:8px;padding:14px 16px;margin-bottom:10px;">';

    // Top row: name + badge
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
      'gap:8px;margin-bottom:6px;">';
    html += '<div style="font-weight:600;font-size:.95rem;color:#1a3a5c;">' +
      escHtml(name.trim()) + '</div>';
    html += badge(status);
    html += '</div>';

    // Meta row
    html += '<div style="font-size:.8rem;color:#6b7280;margin-bottom:10px;">' +
      'Roll: ' + escHtml(rollNo) + ' &nbsp;·&nbsp; Batch: ' + escHtml(batch) +
      (verCat ? ' &nbsp;·&nbsp; ' + escHtml(verCat) : '') +
      '<br>' + escHtml(email) +
      '</div>';

    // Existing notes
    if (notes) {
      html += '<div style="background:#f0f4f8;border-radius:4px;padding:8px 10px;' +
        'font-size:.8rem;color:#374151;margin-bottom:10px;">' +
        '<strong>Notes:</strong> ' + escHtml(notes) + '</div>';
    }

    // Action form
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">';
    html += '<select id="vrd-status-' + idx + '" ' +
      'style="flex:1;min-width:150px;padding:8px 10px;border:1px solid #d1d5db;' +
      'border-radius:5px;font-size:.85rem;">';
    var statusOpts = [
      ['none','No objection'],
      ['objected','Mark as Objected'],
      ['resolved_retained','Resolve — Retain'],
      ['resolved_removed','Resolve — Remove']
    ];
    statusOpts.forEach(function(o) {
      html += '<option value="' + o[0] + '"' + (status === o[0] ? ' selected' : '') +
        '>' + o[1] + '</option>';
    });
    html += '</select>';
    html += '<input id="vrd-notes-' + idx + '" type="text" placeholder="Notes (optional)" ' +
      'value="' + escHtml(notes) + '" ' +
      'style="flex:2;min-width:160px;padding:8px 10px;border:1px solid #d1d5db;' +
      'border-radius:5px;font-size:.85rem;">';
    html += '<button onclick="AdminPanel._saveObjectionStatus(\'' +
      escHtml(rollNo) + '\',' + idx + ')" ' +
      'style="padding:8px 14px;background:#1a3a5c;color:#fff;border:none;' +
      'border-radius:5px;font-size:.85rem;cursor:pointer;min-height:44px;">Save</button>';
    html += '</div>';

    html += '</div>'; // end card
  });
  html += '</div>';

  return html;
},

_saveObjectionStatus: function(rollNo, idx) {
  var statusEl = document.getElementById('vrd-status-' + idx);
  var notesEl  = document.getElementById('vrd-notes-'  + idx);
  if (!statusEl) return;
  var status = statusEl.value;
  var notes  = notesEl ? notesEl.value.trim() : '';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        showToast((res && res.message) || 'Update failed.', true);
        return;
      }
      showToast('Saved.');
      var filter = document.getElementById('vrd-filter');
      var search = document.getElementById('vrd-search');
      AdminPanel._loadVoterRollDraft(
        filter ? filter.value : 'all',
        search ? search.value : ''
      );
    })
    .withFailureHandler(function() { showToast('Connection error.', true); })
    .updateObjectionStatus(App.token, rollNo, status, notes, getTEMAuthId());
},

_certifyRoll: function() {
  if (!confirm('Certify the voter roll? This will copy all retained rows to the live ' +
      'Voters sheet. This action is logged and cannot be undone.')) return;

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        showToast((res && res.message) || 'Certification failed.', true);
        return;
      }
      showToast('Voter roll certified. ' + res.certified + ' voters, ' +
        res.removed + ' removed.');
      AdminPanel._loadVoterRollDraft('all', '');
    })
    .withFailureHandler(function() { showToast('Connection error.', true); })
    .certifyVoterRoll(App.token, '', getTEMAuthId());
},

_sendVoterRollNotice: function() {
  var electionId = AdminPanel._currentElectionId || '';
  if (!electionId) { showToast('Select an election first from the Elections tab.', true); return; }
  var deadline = prompt('Enter the objection window closing date/time for the notification email\n(e.g. "5 July 2026, 11:59 PM IST"):\n\nLeave blank to omit deadline from email.');
  if (deadline === null) return; // cancelled
  var btn = document.querySelector('[onclick*="_sendVoterRollNotice"]');
  if (btn) btn.disabled = true;
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) btn.disabled = false;
      var el = document.getElementById('vr-notice-result');
      if (res && res.success) {
        showToast(res.message);
        if (el) { el.textContent = res.message; el.style.display = 'block'; }
      } else {
        showToast((res && res.message) || 'Send failed.', true);
      }
    })
    .withFailureHandler(function() {
      if (btn) btn.disabled = false;
      showToast('Connection error.', true);
    })
    .sendVoterRollPublicationNotice(App.token, electionId, deadline || '', getTEMAuthId());
},

_sendNominationCall: function() {
  var electionId = AdminPanel._currentElectionId || '';
  if (!electionId) { showToast('Select an election first from the Elections tab.', true); return; }
  var note = prompt('Optional: Enter any additional note to include in the nomination call email\n(leave blank for none):');
  if (note === null) return; // cancelled
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast(res.message);
      } else {
        showToast((res && res.message) || 'Send failed.', true);
      }
    })
    .withFailureHandler(function() { showToast('Connection error.', true); })
    .sendNominationCall(App.token, electionId, note || '', getTEMAuthId());
},

_addMemberToDraft: function() {
  var rollNo  = (document.getElementById('vrd-add-roll')    || {}).value || '';
  var name    = (document.getElementById('vrd-add-name')    || {}).value || '';
  var surname = (document.getElementById('vrd-add-surname') || {}).value || '';
  var batch   = (document.getElementById('vrd-add-batch')   || {}).value || '';
  var email   = (document.getElementById('vrd-add-email')   || {}).value || '';
  var notes   = (document.getElementById('vrd-add-notes')   || {}).value || '';
  var errEl   = document.getElementById('vrd-add-err');

  if (errEl) errEl.style.display = 'none';
  if (!rollNo.trim()) {
    if (errEl) { errEl.textContent = 'Roll number is required.'; errEl.style.display = 'block'; }
    return;
  }
  if (!name.trim()) {
    if (errEl) { errEl.textContent = 'First name is required.'; errEl.style.display = 'block'; }
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Member ' + rollNo.trim().toUpperCase() + ' added to draft roll.');
        AdminPanel._loadVoterRollDraft('all', '');
      } else {
        if (errEl) { errEl.textContent = (res && res.message) || 'Could not add member.'; errEl.style.display = 'block'; }
      }
    })
    .withFailureHandler(function() {
      if (errEl) { errEl.textContent = 'Connection error — please try again.'; errEl.style.display = 'block'; }
    })
    .addVoterToDraft(App.token, rollNo.trim(), name.trim(), surname.trim(),
                     batch.trim(), email.trim(), notes.trim(), getTEMAuthId());
},

        '<input type="file" id="doc-file-' + escHtml(category) + '"' +

      '</div>' +

        '<input type="text" id="doc-notes-' + escHtml(category) + '"' +

        '<div style="font-size:.8rem;color:#9ca3af;">Loading documents…</div>' +

_loadDocuments: function(elecId, category) {
  google.script.run
    .withSuccessHandler(function(res) {
      var listEl = document.getElementById('doc-list-' + category);
      if (!listEl) return;
      if (!res || !res.success || res.docs.length === 0) {
        listEl.innerHTML = '<div style="font-size:.8rem;color:#9ca3af;">No documents uploaded yet.</div>';
        return;
      }
      var html = '<div style="font-size:.8rem;font-weight:600;color:#374151;margin-bottom:6px;">Uploaded documents</div>';
      res.docs.forEach(function(d) {
        var ts = fmtIST(d.uploadedAt);
        html +=
          '<div style="display:flex;align-items:center;gap:8px;padding:7px 0;' +
          'border-bottom:1px solid #f3f4f6;flex-wrap:wrap;">' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-size:.83rem;color:#1a3a5c;font-weight:600;">' +
                '<a href="' + escHtml(d.driveUrl) + '" target="_blank"' +
                ' style="color:#1a3a5c;text-decoration:underline;">' +
                  escHtml(d.filename) +
                '</a>' +
              '</div>' +
              '<div style="font-size:.75rem;color:#6b7280;">' +
                escHtml(d.uploadedBy) + ' · ' + escHtml(ts) +
                (d.notes ? ' · ' + escHtml(d.notes) : '') +
              '</div>' +
            '</div>' +
            '<button onclick="AdminPanel._deleteDoc(\'' + escHtml(d.docId) + '\',\'' +
              escHtml(elecId) + '\',\'' + escHtml(category) + '\')"' +
              ' style="padding:4px 10px;background:#fff;color:#c0392b;border:1px solid #c0392b;' +
              'border-radius:4px;font-size:.75rem;cursor:pointer;flex-shrink:0;">Delete</button>' +
          '</div>';
      });
      listEl.innerHTML = html;
    })
    .withFailureHandler(function() {
      var listEl = document.getElementById('doc-list-' + category);
      if (listEl) listEl.innerHTML = '<div style="font-size:.8rem;color:#c0392b;">Error loading documents.</div>';
    })
    .getDocuments(App.token, elecId, category);
},

_uploadDoc: function(elecId, category, containerId, nomRef) {
  nomRef = nomRef || '';
  var fileInput = document.getElementById('doc-file-' + category);
  var notesInput = document.getElementById('doc-notes-' + category);
  if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
    showToast('Please select a file first.', true); return;
  }
  var file  = fileInput.files[0];
  var notes = notesInput ? notesInput.value.trim() : '';

  if (file.size > 5 * 1024 * 1024) {
    showToast('File too large. Maximum size is 5MB.', true); return;
  }

  showToast('Uploading…');
  var reader = new FileReader();
  reader.onload = function(e) {
    var base64 = e.target.result.split(',')[1];
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Upload failed.', true); return;
        }
        showToast('Document uploaded successfully.');
        fileInput.value = '';
        if (notesInput) notesInput.value = '';
        AdminPanel._loadDocuments(elecId, category);
      })
      .withFailureHandler(function() { showToast('Upload failed — connection error.', true); })
      .storeDocument(App.token, elecId, category, file.name, base64, file.type, notes, getTEMAuthId(), nomRef);
  };
  reader.readAsDataURL(file);
},

_deleteDoc: function(docId, elecId, category) {
  if (!confirm('Delete this document? It will be removed from the list (the Drive file is retained).')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        showToast((res && res.message) || 'Delete failed.', true); return;
      }
      showToast('Document deleted.');
      AdminPanel._loadDocuments(elecId, category);
    })
    .withFailureHandler(function() { showToast('Delete failed — connection error.', true); })
    .deleteDocument(App.token, docId, getTEMAuthId());
},

_renderDocTabListAsync: function(elecId) {
  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('doc-tab-list-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.85rem;">Error loading documents.</div>';

      }

_renderDocTabList: function(elecId) {
  // Synchronous shell — actual docs loaded via google.script.run
  setTimeout(function() { AdminPanel._renderDocTabListAsync(elecId); }, 0);
  return '<div style="padding:16px;text-align:center;color:#6b7280;font-size:.85rem;">' +
    '<span class="spinner"></span></div>';

_buildDocList: function(elecId, docs) {

    return '<div style="text-align:center;padding:32px 16px;color:#6b7280;font-size:.88rem;">' +
      '[FOLDER] No documents uploaded for this election yet.</div>';
  }

  // Group by category
  var byCategory = {};
  docs.forEach(function(d) {
    var cat = d.category || 'uncategorised';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(d);
  });

  var catLabels = {
    'gb_resolution_mandatory_post': 'GB Resolution — Mandatory Post Waiver',
    'manual_ro_nomination':         'Manual RO Nomination Documents',
    'scrutineer_declaration':       'Scrutineer Declaration of Impartiality',
    'handover_document':            'Handover Documents',
    'other':                        'Other Documents'
  };

  var html = '';
  Object.keys(byCategory).forEach(function(cat) {
    var label = catLabels[cat] || cat;
    html +=
      '<div style="margin-bottom:18px;">' +
        '<div style="font-size:.8rem;font-weight:700;color:#6b7280;text-transform:uppercase;' +
        'letter-spacing:.04em;padding:8px 0 6px;border-bottom:1px solid #e5e7eb;' +
        'margin-bottom:8px;">' + escHtml(label) + '</div>';

    byCategory[cat].forEach(function(d) {
      var ts = d.uploadedAt
        ? fmtIST(d.uploadedAt)
        : '';
      html +=
        '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;' +
        'border-bottom:1px solid #f3f4f6;flex-wrap:wrap;">' +
          '<div style="font-size:1.2rem;flex-shrink:0;margin-top:2px;">📄</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-size:.88rem;font-weight:600;">' +
              '<a href="' + escHtml(d.driveUrl) + '" target="_blank"' +
              ' style="color:#1a3a5c;text-decoration:underline;">' +
                escHtml(d.filename) +
              '</a>' +
            '</div>' +
            '<div style="font-size:.75rem;color:#6b7280;margin-top:2px;">' +
              'Uploaded by ' + escHtml(d.uploadedBy) + ' · ' + escHtml(ts) +
              (d.notes ? ' · ' + escHtml(d.notes) : '') +
            '</div>' +
          '</div>' +
          '<button onclick="AdminPanel._deleteDocFromTab(\'' + escHtml(d.docId) + '\',' +
            '\'' + escHtml(elecId) + '\')"' +
            ' style="padding:5px 12px;background:#fff;color:#c0392b;border:1px solid #c0392b;' +
            'border-radius:4px;font-size:.78rem;cursor:pointer;flex-shrink:0;min-height:36px;">' +
            'Delete' +
          '</button>' +
        '</div>';
    });

    html += '</div>';
  });

  return html;
},

_deleteDocFromTab: function(docId, elecId) {
  if (!confirm('Delete this document? The record will be removed from the list. ' +

      AdminPanel._renderDocTabListAsync(elecId);
    })
    .withFailureHandler(function() { showToast('Delete failed — connection error.', true); })
    .deleteDocument(App.token, docId, getTEMAuthId());
},

// ── TEM AuthID bar — populates selector with active AuthIDs ──
AdminPanel._refreshTEMAuthBar = function() {
  var sel    = document.getElementById('tem-authid');
  var status = document.getElementById('tem-authstatus');
  if (!sel) return;

  sel.innerHTML = '<option value="">Loading\u2026</option>';
  if (status) status.textContent = 'Fetching\u2026';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        sel.innerHTML = '<option value="">Unable to load \u2014 contact RO</option>';
        if (status) { status.textContent = 'Error'; status.style.color = '#b91c1c'; }
        return;
      }

      var now    = new Date();
      var active = (res.authorisations || []).filter(function(a) {
        if (a.revoked) return false;
        if (a.expiresAt && new Date(a.expiresAt) < now) return false;
        if (a.scope === 'ALL_ACTIONS' && a.usedCount >= 1) return false;
        if (a.scope === 'specific_actions' && a.usedCount >= a.actionTypes.length) return false;
        return true;
      });

      if (active.length === 0) {
        sel.innerHTML = '<option value="" disabled selected>No active authorisations \u2014 contact RO</option>';
        if (status) { status.textContent = 'None active'; status.style.color = '#b91c1c'; }
        return;
      }

      var html = '<option value="">Select authorisation\u2026</option>';
      active.forEach(function(a) {
        var issuedMin = '';
        if (a.issuedAt) {
          var diff = Math.round((now - new Date(a.issuedAt)) / 60000);
          issuedMin = diff < 60 ? diff + 'm ago' : Math.round(diff/60) + 'h ago';
        }
        var scopeLabel = a.scope === 'ALL_ACTIONS'
          ? 'ALL ACTIONS (single-use)'
          : a.actionTypes.join(', ');
        var label = a.authId.slice(-8) + ' \u2014 ' + scopeLabel +
          (issuedMin ? ' \u2014 issued ' + issuedMin : '');
        html += '<option value="' + a.authId + '">' + label + '</option>';
      });
      sel.innerHTML = html;
      if (status) {
        status.textContent = active.length + ' active';
        status.style.color = '#15803d';
      }
    })
    .withFailureHandler(function() {
      sel.innerHTML = '<option value="">Load failed \u2014 try Refresh</option>';
      if (status) { status.textContent = 'Error'; status.style.color = '#b91c1c'; }
    })
    .getTEMAuthorisations(App.token, '');
};

// Loads ALL authorisations (system + election) into tem-auth-table independently
AdminPanel._loadTEMAuthTable = function() {
  var tbl = document.getElementById('tem-auth-table');
  if (!tbl) return;
  tbl.innerHTML = '<div style="font-size:.85rem;color:#6b7280;">Loading…</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      var tbl2 = document.getElementById('tem-auth-table');
      if (!tbl2) return;
      if (!res || !res.success) {
        tbl2.innerHTML = '<p style="font-size:.85rem;color:#c0392b;">Failed to load authorisations.</p>';
        return;
      }
      var auths = res.authorisations || [];
      if (auths.length === 0) {
        tbl2.innerHTML = '<p style="font-size:.85rem;color:#6b7280;">No authorisations issued yet.</p>';
        return;
      }
      var now = new Date();
      var rows = auths.map(function(a) {
        var expired = a.expiresAt && new Date(a.expiresAt) < now;
        var exhausted = (a.scope === 'ALL_ACTIONS' && a.usedCount >= 1) ||
                        (a.scope === 'specific_actions' && a.usedCount >= a.actionTypes.length);
        var statusBadge = a.revoked
          ? '<span style="background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;">Revoked</span>'
          : expired
            ? '<span style="background:#f3f4f6;color:#6b7280;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;">Expired</span>'
            : exhausted
              ? '<span style="background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;">Exhausted</span>'
              : '<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600;">Active</span>';
        var actions = a.scope === 'ALL_ACTIONS' ? 'ALL ACTIONS' : (a.actionTypes.join(', ') || '—');
        var elecLabel = a.electionId || 'System level';
        var revokeBtn = (!a.revoked && !expired && !exhausted)
          ? '<button onclick="AdminPanel._revokeTEMAuth(\'' + a.authId + '\')" ' +
              'style="background:#dc2626;color:#fff;border:none;padding:4px 10px;' +
              'border-radius:4px;font-size:.8rem;cursor:pointer;min-height:32px;">Revoke</button>'
          : '<span style="color:#9ca3af;font-size:.8rem;">—</span>';
        return '<tr style="border-bottom:1px solid #f3f4f6;">' +
          '<td style="padding:8px;font-size:.75rem;font-family:monospace;word-break:break-all;max-width:120px;">' + a.authId + '</td>' +
          '<td style="padding:8px;font-size:.78rem;">' + elecLabel + '</td>' +
          '<td style="padding:8px;font-size:.78rem;">' + (a.issuedAt ? a.issuedAt.replace('T',' ').substring(0,16) : '—') + '</td>' +
          '<td style="padding:8px;font-size:.78rem;">' + a.scope + '</td>' +
          '<td style="padding:8px;font-size:.78rem;max-width:180px;word-break:break-all;">' + actions + '</td>' +
          '<td style="padding:8px;font-size:.78rem;">' + a.usedCount + '</td>' +
          '<td style="padding:8px;">' + statusBadge + '</td>' +
          '<td style="padding:8px;">' + revokeBtn + '</td>' +
          '</tr>';
      }).join('');

      tbl2.innerHTML =
        '<div style="overflow-x:auto;">' +
          '<table style="width:100%;border-collapse:collapse;min-width:600px;">' +
            '<thead><tr style="background:#f9fafb;font-size:.78rem;color:#374151;">' +
              '<th style="padding:8px;text-align:left;">AuthID</th>' +
              '<th style="padding:8px;text-align:left;">Scope / Election</th>' +
              '<th style="padding:8px;text-align:left;">Issued At</th>' +
              '<th style="padding:8px;text-align:left;">Scope Type</th>' +
              '<th style="padding:8px;text-align:left;">Actions</th>' +
              '<th style="padding:8px;text-align:left;">Used</th>' +
              '<th style="padding:8px;text-align:left;">Status</th>' +
              '<th style="padding:8px;text-align:left;">Revoke</th>' +
            '</tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>';
    })
    .withFailureHandler(function() {
      var tbl2 = document.getElementById('tem-auth-table');
      if (tbl2) tbl2.innerHTML = '<p style="font-size:.85rem;color:#c0392b;">Error loading authorisations.</p>';
    })
    .getTEMAuthorisations(App.token, '');
};

AdminPanel._toggleActionTypes = function() {
  var scope = document.getElementById('tem-scope');
  var block = document.getElementById('tem-actions-block');
  if (scope && block) {
    block.style.display = scope.value === 'ALL_ACTIONS' ? 'none' : 'block';
  }
};

function _temActionCheckboxes() {
  var groups = {
    '— SYSTEM LEVEL —': {
      'Admin Management':    ['addAdmin','disableAdmin','enableAdmin'],
      'Elections (new)':     ['createElection'],
      'Sheet Protections':   ['applySheetProtections','removeSheetProtections'],
      'Landing Page':        ['setLandingPageContent'],
      'Handover':            ['lockECOfficers','recordVersionVerified','recordGithubTransferred']
    },
    '— ELECTION LEVEL —': {
      'Election Management': ['updateElectionStatus','updateElectionSettings','deleteElection','setElectionSchedule','publishSchedule'],
      'Nominations':         ['acceptNomination','rejectNomination','undoAcceptNomination','undoRejectNomination','submitNominationManual','publishCandidates','triggerPhase2Extension'],
      'Candidates':          ['deleteCandidate'],
      'Voter Roll':          ['uploadVoterRollDraft','updateObjectionStatus','certifyVoterRoll','addVoterToDraft'],
      'Scrutiny & Tally':    ['updateScrutinyStatus','updateScrutinyDecision','recordTallyCoSign','recordScrutineerConfirmation'],
      'Complaints & Appeals':['updateComplaintStatus','updateAppealDecision','storeAppealRuling'],
      'Documents':           ['storeDocument','deleteDocument'],
      'Purge':               ['purgeTrialData']
    }
  };
  var html = '';
  Object.keys(groups).forEach(function(groupLabel) {
    html += '<div style="font-size:.8rem;color:#1d4ed8;font-weight:700;margin:12px 0 6px;padding:4px 0;border-bottom:1px solid #e5e7eb;">' + groupLabel + '</div>';
    var cats = groups[groupLabel];
    Object.keys(cats).forEach(function(cat) {
      html += '<div style="font-size:.75rem;color:#6b7280;font-weight:600;margin:8px 0 4px;">' + cat + '</div>';
      cats[cat].forEach(function(a) {
        html += '<label style="display:flex;align-items:center;gap:6px;font-size:.85rem;margin-bottom:4px;cursor:pointer;">' +
          '<input type="checkbox" class="tem-action-cb" value="' + a + '" style="width:16px;height:16px;"> ' + a + '</label>';
      });
    });
  });
  return html;
}

AdminPanel._issueTEMAuth = function() {
  var elecId  = (document.getElementById('tem-auth-elec-sel') || {}).value || '';
  var scope   = (document.getElementById('tem-scope') || {}).value || 'specific_actions';
  var notes   = (document.getElementById('tem-notes') || {}).value.trim() || '';
  var expires = (document.getElementById('tem-expires') || {}).value || '';

  // elecId is optional — blank means system-level authorisation

  var actionTypes = [];
  if (scope === 'specific_actions') {
    document.querySelectorAll('.tem-action-cb:checked').forEach(function(cb) { actionTypes.push(cb.value); });
    if (actionTypes.length === 0) { document.getElementById('tem-issue-result').innerHTML = '<span style="color:red;">Select at least one action.</span>'; return; }
  }

  var expiresIso = expires ? new Date(expires).toISOString() : '';

  document.getElementById('tem-issue-result').innerHTML = '<span style="color:#6b7280;">Issuing…</span>';
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) {
        document.getElementById('tem-issue-result').innerHTML = '<span style="color:red;">' + res.message + '</span>';
        return;
      }
      var aid = res.authId;
      document.getElementById('tem-issue-result').innerHTML =
        '<div style="background:#dcfce7;border:1.5px solid #86efac;border-radius:6px;padding:14px;margin-top:8px;">' +
          '<div style="font-weight:700;font-size:.9rem;color:#166534;margin-bottom:6px;">✓ AuthorisationID issued</div>' +
          '<div style="font-family:monospace;font-size:1.05rem;color:#1d4ed8;background:#fff;' +
            'border:1px solid #86efac;border-radius:4px;padding:8px 10px;margin-bottom:8px;' +
            'word-break:break-all;letter-spacing:.03em;">' + aid + '</div>' +
          '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">' +
            '<button onclick="(function(){' +
              'navigator.clipboard.writeText(\'' + aid + '\').then(function(){' +
                'var b=document.getElementById(\'tem-copy-btn\');' +
                'b.textContent=\'Copied!\';b.style.background=\'#166534\';' +
                'setTimeout(function(){b.textContent=\'Copy AuthID\';b.style.background=\'#1d4ed8\';},2000);' +
              '});' +
            '})()" id="tem-copy-btn" ' +
            'style="padding:8px 16px;background:#1d4ed8;color:#fff;border:none;border-radius:4px;' +
              'font-size:.85rem;cursor:pointer;font-weight:600;">Copy AuthID</button>' +
            '<span style="font-size:.8rem;color:#374151;">Communicate this ID to the TEM securely before they act.</span>' +
          '</div>' +
          '<div style="font-size:.78rem;color:#6b7280;">Scope: ' + res.scope +
            (res.actionTypes && res.actionTypes.length ? ' — ' + res.actionTypes.join(', ') : '') +
          '</div>' +
        '</div>';
      AdminPanel._loadTEMAuthTable();
    })
    .withFailureHandler(function(e) {
      document.getElementById('tem-issue-result').innerHTML = '<span style="color:red;">Error: ' + e.message + '</span>';
    })
    .recordROAuthorisation(App.token, elecId, scope, actionTypes, notes, expiresIso);
};

AdminPanel._revokeTEMAuth = function(authId) {
  if (!confirm('Revoke AuthID ' + authId + '? This cannot be undone.')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res.success) { alert(res.message); return; }
      showToast('AuthorisationID revoked.');
      AdminPanel._loadTEMAuthTable();
    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .revokeROAuthorisation(App.token, authId);
};

</script>
