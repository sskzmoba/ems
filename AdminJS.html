<script>
// ============================================================
// ADMIN PANEL — Pass 2B (Task 1 fix: topbar ownership)
// Roles: RO_ADMIN | DEPUTY_RO | TEM | SCRUTINEER | OBSERVER
// ============================================================
var AdminPanel = (function() {

  // IST timestamp formatter — converts any ISO/Date string to IST display
  // Returns e.g. "28 Jun 2026, 11:32 PM IST"
  function fmtIST(isoStr) {
    if (!isoStr) return '';
    var ms = new Date(isoStr).getTime();
    if (isNaN(ms)) return isoStr;
    var IST_OFFSET_MS = 330 * 60 * 1000; // UTC+5:30
    var d = new Date(ms + IST_OFFSET_MS);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var h = d.getUTCHours(), m = d.getUTCMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    var mm = m < 10 ? '0' + m : '' + m;
    return d.getUTCDate() + ' ' + months[d.getUTCMonth()] + ' ' + d.getUTCFullYear() +
           ', ' + h + ':' + mm + ' ' + ampm + ' IST';
  }

  var _currentTab = '';

  // Tab definitions per role
  var TAB_SETS = {
    RO_ADMIN: [
      { id:'elections',        label:'Elections' },
      { id:'nominations',      label:'Nominations' },
      { id:'scrutiny',         label:'Scrutiny' },
      { id:'candidates',       label:'Candidates' },
      { id:'presec',           label:'PreSec' },
      { id:'voter_roll_draft', label:'Roll Draft' },
      { id:'voters',           label:'Voters' },
      { id:'tally',            label:'Tally' },
      { id:'admins',           label:'Admins' },
      { id:'adminlog',         label:'Admin Log' },
      { id:'appeals',          label:'Appeals' },
      { id:'complaints',       label:'Complaints' },
      { id:'documents',        label:'Documents' },
      { id:'handover',         label:'Handover' },
      { id:'observations',     label:'Observations' },
      { id:'settings',         label:'Settings' },
      { id:'tem_auth',         label:'TEM Auth' }
    ],
    DEPUTY_RO: [
      { id:'elections',    label:'Elections' },
      { id:'nominations',  label:'Nominations' },
      { id:'scrutiny',     label:'Scrutiny' },
      { id:'candidates',   label:'Candidates' },
      { id:'voters',       label:'Voters' },
      { id:'tally',        label:'Tally' },
      { id:'adminlog',     label:'Admin Log' },
      { id:'appeals',      label:'Appeals' },
      { id:'complaints',   label:'Complaints' },
      { id:'handover',     label:'Handover' },
      { id:'observations', label:'Observations' }
    ],
    TEM: [
      { id:'elections',        label:'Elections' },
      { id:'nominations',      label:'Nominations' },
      { id:'scrutiny',         label:'Scrutiny' },
      { id:'candidates',       label:'Candidates' },
      { id:'presec',           label:'PreSec' },
      { id:'voter_roll_draft', label:'Roll Draft' },
      { id:'voters',           label:'Voters' },
      { id:'tally',            label:'Tally' },
      { id:'admins',           label:'Admins' },
      { id:'adminlog',         label:'Admin Log' },
      { id:'appeals',          label:'Appeals' },
      { id:'complaints',       label:'Complaints' },
      { id:'documents',        label:'Documents' },
      { id:'handover',         label:'Handover' },
      { id:'observations',     label:'Observations' },
      { id:'settings',         label:'Settings' }
    ],
    SCRUTINEER: [
      { id:'scrutiny',     label:'Scrutiny' },
      { id:'presec',       label:'PreSec' },
      { id:'tally',        label:'Tally' },
      { id:'adminlog',     label:'Admin Log' },
      { id:'handover',     label:'Handover' },
      { id:'observations', label:'Observations' },
      { id:'votedlog',     label:'Voted Log' }
    ],
    OBSERVER: [
      { id:'dashboard',    label:'Dashboard' },
      { id:'observations', label:'Observations' },
      { id:'results',      label:'Results' }
    ]
  };

  function roleLabel(role) {
    var map = {
      RO_ADMIN:   'Returning Officer',
      DEPUTY_RO:  'Deputy RO',
      TEM:        'Technical Election Manager',
      SCRUTINEER: 'Scrutineer',
      OBSERVER:   'Observer'
    };
    return map[role] || role;
  }

  function init() {
    var role = (App.role || '').toUpperCase();
    var tabs = TAB_SETS[role] || TAB_SETS['OBSERVER'];

    // TEM AuthID bar
    var temBar = document.getElementById('tem-authbar');
    if (role === 'TEM') {
      if (!temBar) {
        var bar = document.createElement('div');
        bar.id = 'tem-authbar';
        bar.style.cssText = 'background:#fefce8;border-bottom:1px solid #fde047;' +
          'padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;';
        bar.innerHTML =
          '<span style="font-size:.9rem;color:#854d0e;font-weight:600;">Active Authorisation:</span>' +
          '<select id="tem-authid" ' +
            'style="font-size:.9rem;padding:8px 10px;border:1px solid #fde047;' +
            'border-radius:4px;min-width:260px;max-width:100%;background:#fff;">' +
            '<option value="">Loading…</option>' +
          '</select>' +
          '<button onclick="AdminPanel._refreshTEMAuthBar()" ' +
            'style="font-size:.82rem;padding:6px 10px;background:#fff;color:#854d0e;' +
            'border:1px solid #fde047;border-radius:4px;cursor:pointer;min-height:36px;">' +
            '↻ Refresh</button>' +
          '<span id="tem-authstatus" style="font-size:.82rem;color:#6b7280;">Loading…</span>';
        var navBar = document.getElementById('nav-bar');
        navBar.parentNode.insertBefore(bar, navBar.nextSibling);
      }
      AdminPanel._refreshTEMAuthBar();
    } else {
      if (temBar) temBar.parentNode.removeChild(temBar);
    }

    // Build nav via NavMenu
    NavMenu.build(tabs, tabs[0].id, function(tabId) {
      _currentTab = tabId;
      var role = (App.role || '').toUpperCase();
      var content = document.getElementById('admin-content');
      if (content) content.innerHTML = _renderTab(tabId, role);
    });

    // Content area
    setMain('<div id="admin-content"></div>');

    // Render first tab
    _currentTab = tabs[0].id;
    document.getElementById('admin-content').innerHTML = _renderTab(tabs[0].id, role);
  }

  function switchTab(tabId) {
    _currentTab = tabId;
    var role = (App.role || '').toUpperCase();
    var content = document.getElementById('admin-content');
    if (content) content.innerHTML = _renderTab(tabId, role);
  }

  function _renderTab(tabId, role) {
    if (tabId === 'elections') {
      _loadElections(role);
      return '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading elections…</div>' +
        '</div>';
    }

    if (tabId === 'admins') {
      setTimeout(function() { AdminPanel._loadAdmins(); }, 0);
      return '<div id="admins-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading admins…</div>' +
        '</div></div>';
    }

    if (tabId === 'voters') {
      setTimeout(function() { AdminPanel._loadVoters(1, ''); }, 0);
      return '<div id="voters-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading voter roll…</div>' +
        '</div></div>';
    }
    if (tabId === 'adminlog') {
      setTimeout(function() { AdminPanel._loadAdminLog(1, ''); }, 0);
      return '<div id="adminlog-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading log…</div>' +
        '</div></div>';
    }
    if (tabId === 'nominations') {
      setTimeout(function() { AdminPanel._loadNominations(); }, 0);
      return '<div id="nominations-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading nominations…</div>' +
        '</div></div>';
    }
    if (tabId === 'documents') {
      setTimeout(function() { AdminPanel._loadDocumentsTab(); }, 0);
      return '<div id="documents-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading documents…</div>' +
        '</div></div>';
    }
    if (tabId === 'settings') {
      setTimeout(function() { AdminPanel._loadSettings(); }, 0);
      return '<div id="settings-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading system status…</div>' +
        '</div></div>';
    }
    if (tabId === 'handover') {
      setTimeout(function() { AdminPanel._loadHandover(); }, 0);
      return '<div id="handover-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading handover checklist…</div>' +
        '</div></div>';
    }
    if (tabId === 'tem_auth') {
      setTimeout(function() { AdminPanel._loadTEMAuth(); }, 0);
      return '<div id="tem-auth-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading TEM authorisations…</div>' +
        '</div></div>';
    }
    if (tabId === 'votedlog') {
      setTimeout(function() { AdminPanel._loadVotedLog(); }, 0);
      return '<div id="votedlog-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading voted log…</div>' +
        '</div></div>';
    }
    if (tabId === 'tally') {
      setTimeout(function() { AdminPanel._loadTally(); }, 0);
      return '<div id="tally-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading tally…</div>' +
        '</div></div>';
    }
    if (tabId === 'candidates') {
      setTimeout(function() { AdminPanel._loadCandidatesTab(); }, 0);
      return '<div id="candidates-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading candidates…</div>' +
        '</div></div>';
    }
    if (tabId === 'scrutiny') {
      setTimeout(function() { AdminPanel._loadScrutiny(); }, 0);
      return '<div id="scrutiny-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading scrutiny queue…</div>' +
        '</div></div>';
    }

    if (tabId === 'complaints') {
      setTimeout(function() { AdminPanel._loadComplaints(); }, 0);
      return '<div id="complaints-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading complaints…</div>' +
        '</div></div>';
    }

    if (tabId === 'appeals') {
      setTimeout(function() { AdminPanel._loadAppeals(); }, 0);
      return '<div id="appeals-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading appeals…</div>' +
        '</div></div>';
    }

    if (tabId === 'dashboard') {
      setTimeout(function() { AdminPanel._loadObserverDashboard(); }, 0);
      return '<div id="observer-dashboard-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading dashboard...</div>' +
        '</div></div>';
    }

    if (tabId === 'observations') {
      setTimeout(function() { AdminPanel._loadObservations(); }, 0);
      return '<div id="observations-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading observations…</div>' +
        '</div></div>';
    }
    
    if (tabId === 'presec') {
      var presecElecId = AdminPanel._currentElectionId || AdminPanel._scrutinySelectedElec || '';
      if (!presecElecId) {
        return '<div style="padding:16px;color:#b91c1c;font-size:.9rem;">No election selected. Go to Elections tab first.</div>';
      }
      setTimeout(function() { AdminPanel._openPresecChecklist(presecElecId); }, 0);
      return '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading checklist\u2026</div></div>';
    }

    if (tabId === 'voter_roll_draft') {
      setTimeout(function() { AdminPanel._loadVoterRollDraft('all', ''); }, 0);
      return '<div id="vrd-content">' +
        '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
        '<div class="spinner"></div>' +
        '<div style="font-size:.85rem;margin-top:12px;">Loading voter roll draft…</div>' +
        '</div></div>';
    }

    // Coming soon — all other tabs
    var labels = {
      nominations: 'Nominations',
      scrutiny:    'Scrutiny',
      candidates:  'Candidates',
      voters:      'Voters',
      tally:       'Live Tally',
      handover:    'Handover',
      admins:      'Admin Accounts',
      adminlog:    'Admin Log',
      settings:    'Settings',
      dashboard:   'Observer Dashboard',
      results:     'Results',
      votedlog:    'Voted Log'
    };
    var label = labels[tabId] || tabId;
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2rem;margin-bottom:12px;">🏗</div>' +
      '<div style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
        escHtml(label) + '</div>' +
      '<div style="font-size:0.85rem;">This tab is being built. Check back soon.</div>' +
      '</div>';
  }

function _loadElections(role) {
    google.script.run
      .withSuccessHandler(function(res) {
        var content = document.getElementById('admin-content');
        if (!content) return;

        if (!res || !res.success) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load elections.') + '</div>';
          return;
        }

        var elections = res.elections || [];
        var isRO = (role === 'RO_ADMIN' || role === 'TEM');

        // Status → badge class map
        var badgeMap = {
          draft:               'badge-draft',
          nominations_open:    'badge-noms-open',
          nominations_open_phase2: 'badge-noms-open',
          scrutiny:            'badge-scrutiny',
          candidates_published:'badge-scrutiny',
          active:              'badge-active',
          closed:              'badge-closed',
          declared:            'badge-declared'
        };

        var html = '';

        // Create button — RO_ADMIN only
        if (isRO) {
          html += '<div style="margin-bottom:16px;">' +
            '<button class="btn btn-primary" ' +
              'onclick="AdminPanel.showCreateElection()" ' +
              'style="width:100%;padding:14px;font-size:1rem;">' +
              '+ New Election' +
            '</button>' +
          '</div>';
        }

        if (elections.length === 0) {
          html += '<div class="panel-card">' +
            '<div class="panel-card-body" style="text-align:center;padding:40px 16px;color:#6b7280;">' +
            '<div style="font-size:1.5rem;margin-bottom:8px;">[VOTE]</div>' +
            '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No elections yet</div>' +
            (isRO ? '<div style="font-size:.85rem;">Use the button above to create one.</div>' : '') +
            '</div></div>';
        } else {
          elections.forEach(function(el) {
            var badge = badgeMap[el.status] || 'badge-draft';
            var statusLabel = el.status.replace(/_/g, ' ');
            var trialTag = el.isTrial
              ? '<span class="status-badge badge-trial" style="margin-left:6px;">Trial</span>'
              : '';

            html += '<div class="panel-card" style="margin-bottom:12px;">' +
              '<div class="panel-card-body" style="padding:14px 16px;">' +

              // Title row
              '<div style="font-weight:600;color:#1a3a5c;font-size:.95rem;margin-bottom:6px;">' +
                escHtml(el.title) + trialTag +
              '</div>' +

              // Status + mode row
              '<div style="margin-bottom:8px;">' +
                '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
                '<span style="font-size:.78rem;color:#888;margin-left:8px;">' +
                  escHtml(el.mode) +
                '</span>' +
              '</div>' +

              // Dates row
              '<div style="font-size:.82rem;color:#666;margin-bottom:10px;">' +
                (el.startDate ? '[DATE] ' + escHtml(el.startDate) : 'No start date') +
                (el.endDate   ? ' → ' + escHtml(el.endDate)   : '') +
              '</div>' +

              // Action button — RO only for now
              (isRO ?
                '<button class="btn btn-outline btn-sm" ' +
                  'onclick="AdminPanel.manageElection(\'' + escHtml(el.id) + '\')" ' +
                  'style="width:100%;padding:10px;font-size:.85rem;">' +
                  'Manage' +
                '</button>'
              : '') +

              '</div></div>';
          });
        }
        if (elections.length === 1) AdminPanel._currentElectionId = elections[0].id;
        content.innerHTML = html;
      })
      .withFailureHandler(function(err) {
        var content = document.getElementById('admin-content');
        if (content) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            'Error loading elections. Please try again.</div>';
        }
      })
      .getAllElections(App.token);
  }

  function logout() {
    App.logout();
  }

  return {
    init: init,
    switchTab: switchTab,
    showCreateElection: function() {
      var role = (App.role || '').toUpperCase();
      var content = document.getElementById('admin-content');
      if (!content) return;
      content.innerHTML =
        '<div style="margin-bottom:12px;">' +
          '<button class="btn btn-outline" onclick="AdminPanel.switchTab(\'elections\')" ' +
            'style="width:100%;padding:12px;font-size:1rem;">← Back to Elections</button>' +
        '</div>' +
        '<div class="panel-card">' +
          '<div class="panel-card-header">Create New Election</div>' +
          '<div class="panel-card-body">' +

            '<label for="new-elec-title">Election Title</label>' +
            '<input type="text" id="new-elec-title" placeholder="e.g. SSKZM OBA Elections 2026-27" ' +
              'style="margin-bottom:20px;" />' +

            '<label>Mode</label>' +
            '<div style="display:flex;gap:12px;margin-bottom:20px;">' +
              '<button id="mode-btn-electronic" ' +
                'onclick="AdminPanel._setMode(\'electronic\')" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #1a3a5c;background:#1a3a5c;color:#fff;cursor:pointer;">' +
                'Electronic' +
              '</button>' +
              '<button id="mode-btn-physical" ' +
                'onclick="AdminPanel._setMode(\'physical\')" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #ccc;background:#fff;color:#333;cursor:pointer;">' +
                'Physical' +
              '</button>' +
            '</div>' +

            '<label>Trial Election?</label>' +
            '<div style="display:flex;gap:12px;margin-bottom:24px;">' +
              '<button id="trial-btn-no" ' +
                'onclick="AdminPanel._setTrial(false)" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #1a3a5c;background:#1a3a5c;color:#fff;cursor:pointer;">' +
                'No' +
              '</button>' +
              '<button id="trial-btn-yes" ' +
                'onclick="AdminPanel._setTrial(true)" ' +
                'style="flex:1;padding:12px;font-size:1rem;border-radius:4px;' +
                'border:2px solid #ccc;background:#fff;color:#333;cursor:pointer;">' +
                'Yes' +
              '</button>' +
            '</div>' +

            '<button class="btn btn-primary" ' +
              'onclick="AdminPanel._submitCreateElection()" ' +
              'style="width:100%;padding:14px;font-size:1rem;">' +
              'Create Election' +
            '</button>' +

            '<div id="create-elec-error" ' +
              'style="margin-top:12px;color:#c0392b;font-size:.9rem;display:none;">' +
            '</div>' +

          '</div>' +
        '</div>';
    },

    _mode: 'electronic',
    _trial: false,

    _setMode: function(val) {
      AdminPanel._mode = val;
      var el = document.getElementById('mode-btn-electronic');
      var ph = document.getElementById('mode-btn-physical');
      if (val === 'electronic') {
        el.style.background = '#1a3a5c'; el.style.color = '#fff'; el.style.borderColor = '#1a3a5c';
        ph.style.background = '#fff';    ph.style.color = '#333'; ph.style.borderColor = '#ccc';
      } else {
        ph.style.background = '#1a3a5c'; ph.style.color = '#fff'; ph.style.borderColor = '#1a3a5c';
        el.style.background = '#fff';    el.style.color = '#333'; el.style.borderColor = '#ccc';
      }
    },

    _setTrial: function(val) {
      AdminPanel._trial = val;
      var yes = document.getElementById('trial-btn-yes');
      var no  = document.getElementById('trial-btn-no');
      if (val) {
        yes.style.background = '#1a3a5c'; yes.style.color = '#fff'; yes.style.borderColor = '#1a3a5c';
        no.style.background  = '#fff';    no.style.color  = '#333'; no.style.borderColor  = '#ccc';
      } else {
        no.style.background  = '#1a3a5c'; no.style.color  = '#fff'; no.style.borderColor  = '#1a3a5c';
        yes.style.background = '#fff';    yes.style.color = '#333'; yes.style.borderColor = '#ccc';
      }
    },

    _submitCreateElection: function() {
      var title = document.getElementById('new-elec-title').value.trim();
      var errEl = document.getElementById('create-elec-error');
      if (!title) {
        errEl.textContent = 'Please enter an election title.';
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';
      var btn = document.querySelector('[onclick="AdminPanel._submitCreateElection()"]');
      if (btn) { btn.textContent = 'Creating…'; btn.disabled = true; }

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            showToast('Election created successfully.');
            AdminPanel.switchTab('elections');
          } else {
            errEl.textContent = (res && res.message) || 'Failed to create election.';
            errEl.style.display = 'block';
            if (btn) { btn.textContent = 'Create Election'; btn.disabled = false; }
          }
        })
        .withFailureHandler(function() {
          errEl.textContent = 'Error — please try again.';
          errEl.style.display = 'block';
          if (btn) { btn.textContent = 'Create Election'; btn.disabled = false; }
        })
        .createElection(App.token, {
          title:   title,
          mode:    AdminPanel._mode,
         isTrial: AdminPanel._trial
        }, getTEMAuthId()); 
    },

    manageElection: function(id) {
  var content = document.getElementById('admin-content');
  if (!content) return;
  AdminPanel._currentElectionId = id;

  // Loading state
  content.innerHTML =
    '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
      '<div class="spinner"></div>' +
      '<div style="font-size:.85rem;margin-top:12px;">Loading election…</div>' +
    '</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        content.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load election.') +

    .withFailureHandler(function() {

_advanceStatusMsg: function(status) {
  var msgs = {
    draft:
      'Current status is <strong>Draft</strong>. Advancing will open nominations. ' +
      'Communicate separately to members.',
    nominations_open:
      'Current status is <strong>Nominations Open (Phase 1)</strong>. ' +
      'Advancing will open Phase 2 nominations.',
    nominations_open_phase2:
      'Current status is <strong>Nominations Open (Phase 2)</strong>. ' +
      'Advancing will close nominations and begin scrutiny.',
    scrutiny:
      'Current status is <strong>Scrutiny</strong>. ' +
      'Advancing will publish the final candidate list to all voters.',
    candidates_published:
      'Current status is <strong>Candidates Published</strong>. ' +
      'Advancing will activate voting. <strong>All pending appeals must be resolved and all mandatory posts must have a candidate.</strong>',
    active:
      'Current status is <strong>Active</strong>. ' +
      'Advancing will pause voting temporarily.',
    paused:
      'Current status is <strong>Paused</strong>. ' +
      'Advancing will resume voting.',
    closed:
      'Current status is <strong>Closed</strong>. ' +
      'Advancing will declare the results.'
  };
  return msgs[status] || 'Advance election to next stage.';
},

_advanceStatus: function(id, nextStatus, overrideNote) {
  var btn = document.getElementById('btn-advance-status');
  var errEl = document.getElementById('advance-status-error');
  if (btn) { btn.textContent = 'Advancing…'; btn.disabled = true; }
  if (errEl) errEl.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        if (nextStatus === 'candidates_published') {
          // Fire publishCandidates to send notification emails to all accepted candidates
          var pubAuthId = AdminPanel.getTEMAuthId ? AdminPanel.getTEMAuthId() : '';
          google.script.run
            .withSuccessHandler(function(pubRes) {
              if (pubRes && pubRes.success) {
                showToast('Candidate list published. ' + (pubRes.sent || 0) + ' notification email(s) sent.');
              } else {
                showToast('Status updated. Email notifications could not be sent: ' +
                  ((pubRes && pubRes.message) || 'Unknown error'));
              }
              AdminPanel.switchTab('elections');
            })
            .withFailureHandler(function() {
              showToast('Status updated. Email notification call failed — check AdminLog.');
              AdminPanel.switchTab('elections');
            })
            .publishCandidates(App.token, id, pubAuthId);
        } else {
          showToast('Status updated.');
          AdminPanel.switchTab('elections');
        }
      } else if (res && res.requiresOrgSecyComms) {
        // Show mandatory communication confirmation
        if (btn) { btn.textContent = '▶ ' + (nextStatus === 'nominations_open_phase2' ? 'Open Phase 2 Nominations' : 'Advance'); btn.disabled = false; }
        var msg = res.message;
        var lifted = res.orgSecyLifted;
        var batch  = res.orgBatch;
        var panel = document.getElementById('orgsecy-comms-panel');
        if (!panel) {
          panel = document.createElement('div');
          panel.id = 'orgsecy-comms-panel';
          var errParent = errEl ? errEl.parentNode : null;
          if (errParent) errParent.insertBefore(panel, errEl);
        }
        panel.innerHTML =
          '<div style="background:' + (lifted ? '#fef3c7' : '#eff6ff') + ';border:1.5px solid ' +
          (lifted ? '#f59e0b' : '#93c5fd') + ';border-radius:6px;padding:14px;margin-top:10px;">' +
            '<div style="font-weight:700;color:' + (lifted ? '#92400e' : '#1e40af') +
              ';font-size:.9rem;margin-bottom:8px;">' +
              (lifted ? '⚠ Org Secy Restriction Lifted' : '(i) Org Secy Restriction Maintained') +
            '</div>' +
            '<div style="font-size:.85rem;color:#374151;margin-bottom:12px;">' + escHtml(msg) + '</div>' +
            '<div style="font-size:.85rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
              'Confirm you have communicated this to all members:' +
            '</div>' +
            '<textarea id="orgsecy-comms-text" rows="2" ' +
              'placeholder="e.g. Email/WhatsApp sent to all members on 14 June 2026 at 3pm..." ' +
              'style="width:100%;padding:9px;font-size:.85rem;border:1px solid #d1d5db;' +
              'border-radius:4px;box-sizing:border-box;margin-bottom:10px;resize:vertical;"></textarea>' +
            '<div id="orgsecy-comms-err" style="color:#b91c1c;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
            '<button onclick="AdminPanel._confirmOrgSecyComms(\'' + escHtml(id) + '\',\'' +
              escHtml(nextStatus) + '\')" ' +
              'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
              'border-radius:4px;font-size:.9rem;font-weight:600;cursor:pointer;">' +
              'I have communicated this — Advance to Phase 2' +
            '</button>' +
          '</div>';
      } else if (res && res.requiresGBResolution) {
        if (btn) { btn.textContent = '▶ Activate Voting'; btn.disabled = false; }
        var gbPanel = document.getElementById('gb-resolution-panel');
        if (!gbPanel) {
          gbPanel = document.createElement('div');

            '</button>' +
            '<button onclick="AdminPanel._advanceStatus(\'' + escHtml(id) + '\',\'active\')" ' +

_openPresecChecklist: function(electionId) {
  var body = document.getElementById('admin-content');
  if (!body) return;
  body.innerHTML = '<div style=\"text-align:center;padding:32px 16px;color:#6b7280;\">' +
    '<div class=\"spinner\"></div>' +
    '<div style=\"font-size:.85rem;margin-top:12px;\">Loading checklist\u2026</div></div>';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        body.innerHTML = '<div style="padding:16px;color:#b91c1c;">Failed to load checklist.</div>';
        return;
      }
      var items = res.items;
      var parts = { A:'Sheet Protection', B:'Script and Deployment',
                    C:'Google Account Security', D:'Voter Roll and Candidate List',
                    E:'System Functionality Testing', F:'Backup', G:'Communications' };
      var html =
        '<div style="padding:4px 0 16px;">' +
          '<div style="font-size:1.05rem;font-weight:700;color:#1a3a5c;margin-bottom:4px;">' +
            '☰ Pre-Election Security Verification Checklist' +
          '</div>' +
          '<div style="font-size:.82rem;color:#6b7280;margin-bottom:16px;">' +
            'Items marked ★ require confirmation by two Scrutineers after RO/TEM marks them done.' +
          '</div>';

      var currentPart = '';
      items.forEach(function(item) {
        if (item.part !== currentPart) {
          currentPart = item.part;
          html +=
            '<div style="font-size:.78rem;font-weight:700;color:#fff;background:#1a3a5c;' +
            'padding:5px 10px;border-radius:4px;margin:14px 0 8px;">Part ' +
            escHtml(item.part) + ' — ' + escHtml(parts[item.part] || '') + '</div>';
        }

        var done      = !!item.completedAt;
        var sc1done   = !!item.sc1At;
        var sc2done   = !!item.sc2At;
        var fullyDone = done && (!item.star || (sc1done && sc2done));

        html +=
          '<div style="border:1px solid ' + (fullyDone ? '#bbf7d0' : '#e5e7eb') + ';' +
          'border-radius:6px;padding:10px 12px;margin-bottom:8px;' +
          'background:' + (fullyDone ? '#f0fdf4' : '#fff') + ';">' +
            '<div style="display:flex;align-items:flex-start;gap:10px;">' +
              '<div style="font-size:.82rem;font-weight:700;color:#1a3a5c;min-width:28px;">' +
                escHtml(item.code) + (item.star ? ' ★' : '') +
              '</div>' +
              '<div style="flex:1;">' +
                '<div style="font-size:.85rem;color:#111;margin-bottom:6px;">' +
                  escHtml(item.label) +
                '</div>' +
                (!done ?
                  (App.role === 'SCRUTINEER'
                    ? '<div style="font-size:.78rem;color:#6b7280;">Awaiting RO/TEM action</div>'
                    : '<button onclick="AdminPanel._recordPresecItem(\'' + escHtml(electionId) + '\',\'' + escHtml(item.code) + '\')" style="padding:6px 14px;background:#1a3a5c;color:#fff;border:none;border-radius:4px;font-size:.8rem;cursor:pointer;">Mark Done</button>')
                :
                  '<div style="font-size:.78rem;color:#059669;margin-bottom:4px;">' +
                    '✓ Done — ' + escHtml(item.completedBy) + ' (' + escHtml(item.completedRole) + ')' +
                  '</div>' +
                  (item.star ?
                    '<div style="font-size:.78rem;color:' + (sc1done ? '#059669' : '#6b7280') + ';">' +
                      (sc1done ? '★ Scrutineer 1: ' + escHtml(item.sc1By) : '★ Awaiting Scrutineer 1 confirmation') +
                    '</div>' +
                    '<div style="font-size:.78rem;color:' + (sc2done ? '#059669' : '#6b7280') + ';">' +
                      (sc2done ? '★ Scrutineer 2: ' + escHtml(item.sc2By) : '★ Awaiting Scrutineer 2 confirmation') +
                    '</div>' +
                    (App.role === 'SCRUTINEER' && (!sc1done || !sc2done) ?
                      '<button onclick="AdminPanel._confirmPresecItemSC(\'' + escHtml(electionId) +
                      '\',\'' + escHtml(item.code) + '\')" ' +
                      'style="padding:6px 14px;background:#059669;color:#fff;border:none;' +
                      'border-radius:4px;font-size:.8rem;cursor:pointer;margin-top:4px;">★ Confirm</button>'
                    : '')
                  : '')
                ) +
              '</div>' +
            '</div>' +
          '</div>';
      });

      var allDone = res.allComplete;
      html +=
        '<div style="margin-top:16px;padding:12px;border-radius:6px;text-align:center;' +
        'background:' + (allDone ? '#f0fdf4' : '#fef3c7') + ';' +
        'border:1.5px solid ' + (allDone ? '#86efac' : '#f59e0b') + ';' +
        'font-weight:700;font-size:.9rem;color:' + (allDone ? '#166534' : '#92400e') + ';">' +
          (allDone ? '✅ Checklist complete — voting may be activated.' :
                     '⚠ Checklist incomplete — complete all items before activating voting.') +
        '</div>' +
        '</div>';

      body.innerHTML = html;
    })
    .withFailureHandler(function() {
      body.innerHTML = '<div style="padding:16px;color:#b91c1c;">Error loading checklist.</div>';
    })
    .getChecklistStatus(App.token, electionId);
},

_recordPresecItem: function(electionId, itemCode) {

        showToast((res && res.message) || 'Failed to record item.');

    .recordChecklistItem(App.token, electionId, itemCode, '');
},
_confirmPresecItemSC: function(electionId, itemCode) {

      if (res && res.success) {
        AdminPanel._openPresecChecklist(electionId);
      } else {
        showToast((res && res.message) || 'Failed to confirm item.', true);

},

} else {

_renderAdminsList: function(admins) {
  var roleLabel = {
    RO_ADMIN:   'Returning Officer',
    DEPUTY_RO:  'Deputy RO',
    TEM:        'Tech Election Manager',
    SCRUTINEER: 'Scrutineer',
    OBSERVER:   'Observer'
  };

  var html =
    '<div style="margin-bottom:16px;">' +
      '<button class="btn btn-primary" onclick="AdminPanel.showAddAdmin()" ' +
        'style="width:100%;padding:14px;font-size:1rem;">+ Add Admin Account</button>' +
    '</div>' +
    '<div id="add-admin-form-area"></div>' +
    // No-TEM declaration button — RO only
    (App.role === 'RO_ADMIN' ?
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">TEM Declaration</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.85rem;color:#374151;margin-bottom:12px;line-height:1.5;">' +
            'If no Technical Election Manager is being appointed for this election, the SOP (2A.3) ' +
            'requires the RO to record this decision in the AdminLog before the nomination window opens.' +
          '</div>' +
          '<button onclick="AdminPanel._recordNoTEM()" ' +
            'style="width:100%;padding:12px;background:#fff;color:#1a3a5c;border:1.5px solid #1a3a5c;' +
            'border-radius:4px;font-size:.88rem;font-weight:600;cursor:pointer;">' +
            'Record: No TEM Appointed for This Election' +
          '</button>' +
          '<div id="no-tem-result" style="display:none;margin-top:10px;font-size:.85rem;color:#16a34a;"></div>' +
        '</div>' +
      '</div>'
    : '');

  if (admins.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">👤</div>' +
      '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No admin accounts yet</div>' +
      '<div style="font-size:.85rem;">Use the button above to add one.</div>' +
      '</div></div>';
    return html;
  }

  admins.forEach(function(a) {
    var isActive = (a.status === 'ACTIVE');
    var isPending = (a.status === 'PENDING_ACCEPTANCE');
    var statusBadge = isActive
      ? '<span class="status-badge badge-active" style="font-size:.75rem;">ACTIVE</span>'
      : isPending
        ? '<span class="status-badge badge-draft" style="font-size:.75rem;">PENDING ACCEPTANCE</span>'
        : '<span class="status-badge badge-closed" style="font-size:.75rem;">DISABLED</span>';
    var deputyBadge = (a.role === 'DEPUTY_RO' && a.deputyROActive)
      ? '<span class="status-badge badge-noms-open" style="font-size:.75rem;margin-left:6px;">Activated</span>'
      : '';

    html += '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-body" style="padding:14px 16px;">' +

        // Name + badges
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;' +
          'gap:8px;flex-wrap:wrap;margin-bottom:6px;">' +
          '<div style="font-weight:700;color:#1a3a5c;font-size:.95rem;">' +
            escHtml(a.name) + '</div>' +
          '<div>' + statusBadge + deputyBadge + '</div>' +
        '</div>' +

        // Details
        '<div style="font-size:.82rem;color:#6b7280;margin-bottom:10px;">' +
          '<div>ID: <span style="color:#374151;font-weight:600;">' + escHtml(a.id) + '</span>' +
            (a.rollNo ? ' &nbsp;·&nbsp; Roll: ' + escHtml(a.rollNo) : '') + '</div>' +
          '<div>' + escHtml(roleLabel[a.role] || a.role) + ' &nbsp;·&nbsp; ' +
            escHtml(a.type || '') + '</div>' +
          '<div>' + escHtml(a.email) + '</div>' +
          (a.addedAt ? '<div style="margin-top:2px;">Added: ' +
            escHtml(fmtIST(a.addedAt)) + '</div>' : '') +
        '</div>' +

        // Action buttons
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +

          // Enable / Disable / Resend
          (isPending
            ? '<button onclick="AdminPanel._resendScrutineerLink(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                'background:#fff;color:#92400e;border:1.5px solid #92400e;border-radius:4px;cursor:pointer;">' +
                'Resend Acceptance Link</button>'
            : isActive
              ? '<button onclick="AdminPanel._confirmDisable(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                  'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                  'background:#fff;color:#b91c1c;border:1.5px solid #b91c1c;border-radius:4px;cursor:pointer;">' +
                  'Disable Account</button>'
              : '<button onclick="AdminPanel._confirmEnable(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                  'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                  'background:#fff;color:#16a34a;border:1.5px solid #16a34a;border-radius:4px;cursor:pointer;">' +
                  'Re-enable Account</button>') +

          // Deputy RO activation — only for DEPUTY_RO accounts, not available to TEM
          (a.role === 'DEPUTY_RO' && App.role !== 'TEM'
            ? (a.deputyROActive
                ? '<button onclick="AdminPanel._confirmDeactivateDeputyRO(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                    'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                    'background:#fff;color:#92400e;border:1.5px solid #d97706;border-radius:4px;cursor:pointer;">' +
                    'Deactivate Deputy RO</button>'
                : '<button onclick="AdminPanel._confirmActivateDeputyRO(\'' + escHtml(a.id) + '\',\'' + escHtml(a.name) + '\')" ' +
                    'style="flex:1;min-width:120px;padding:11px 8px;font-size:.85rem;' +
                    'background:#fff;color:#1d4ed8;border:1.5px solid #1d4ed8;border-radius:4px;cursor:pointer;">' +
                    'Activate Deputy RO</button>')
            : '') +

        '</div>' +

        // Confirmation area for this card
        '<div id="confirm-' + escHtml(a.id) + '" style="display:none;margin-top:12px;' +
          'background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;padding:12px;"></div>' +

        // Deputy RO confirmation area
        (a.role === 'DEPUTY_RO'
          ? '<div id="depro-' + escHtml(a.id) + '" style="display:none;margin-top:12px;' +
              'background:#eff6ff;border:1px solid #bfdbfe;border-radius:4px;padding:12px;"></div>'
          : '') +

      '</div>' +
    '</div>';
  });

  return html;
},

_submitAddAdmin: function() {
  var btn    = document.getElementById('btn-submit-admin');
  var errEl  = document.getElementById('add-admin-error');
  var id     = document.getElementById('new-admin-id').value.trim();
  var name   = document.getElementById('new-admin-name').value.trim();
  var role   = document.getElementById('new-admin-role').value;
  var email  = document.getElementById('new-admin-email').value.trim();

_loadVoters: function(page, search) {
  var role = (App.role || '').toUpperCase();
  var c = document.getElementById('voters-content');
  if (!c) return;

  // Render search bar + spinner immediately
  c.innerHTML =
    '<div style="margin-bottom:14px;display:flex;gap:8px;">' +
      '<input type="text" id="voter-search" placeholder="Search roll, name or batch…" ' +
        'value="' + escHtml(search || '') + '" ' +
        'style="flex:1;padding:12px 10px;font-size:.9rem;border:1px solid #d1d5db;' +
        'border-radius:4px;box-sizing:border-box;" inputmode="search" />' +
      '<button onclick="AdminPanel._voterSearch()" ' +
        'style="padding:12px 16px;font-size:.9rem;background:#1a3a5c;color:#fff;' +
        'border:none;border-radius:4px;cursor:pointer;white-space:nowrap;">Search</button>' +
    '</div>' +
    '<div id="voter-list-area">' +
      '<div style="text-align:center;padding:24px;color:#6b7280;">' +
      '<div class="spinner"></div></div>' +
    '</div>';

  // Pre-fill search box with current query
  var box = document.getElementById('voter-search');
  if (box) box.value = search || '';

  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('voter-list-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load voter roll.') + '</div>';
        return;
      }
      area.innerHTML = AdminPanel._renderVoterList(res, role, search || '');
    })
    .withFailureHandler(function() {
      var area = document.getElementById('voter-list-area');
      if (area) area.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading voter roll.</div>';
    })
    .getVoterList(App.token, page, search || '');
},

_voterSearch: function() {
  var box = document.getElementById('voter-search');
  var q = box ? box.value.trim() : '';
  AdminPanel._loadVoters(1, q);
},

_renderVoterList: function(res, role, search) {
  var showEmail = (role !== 'SCRUTINEER');
  var voters    = res.voters || [];
  var total     = res.total  || 0;
  var page      = res.page   || 1;
  var pages     = res.pages  || 1;

  var html =
    // Summary bar
    '<div style="font-size:.82rem;color:#6b7280;margin-bottom:12px;padding:0 2px;">' +
      '<strong style="color:#374151;">' + total + '</strong> voter' + (total !== 1 ? 's' : '') +
      (search ? ' matching <em>' + escHtml(search) + '</em>' : ' on roll') +
      ' &nbsp;·&nbsp; Page ' + page + ' of ' + pages +
    '</div>';

  if (voters.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">[VOTE]</div>' +
      '<div style="font-weight:600;color:#374151;margin-bottom:4px;">No voters found</div>' +
      (search ? '<div style="font-size:.85rem;">Try a different search term.</div>' :
                '<div style="font-size:.85rem;">The voter roll is empty.</div>') +
      '</div></div>';
    return html;
  }

  // Voter cards
  voters.forEach(function(v) {
    var lifeBadge = v.lifeMember
      ? '<span style="font-size:.72rem;background:#fef3c7;color:#92400e;' +
          'border:1px solid #fcd34d;border-radius:3px;padding:1px 5px;margin-left:6px;">Life</span>'
      : '';
    var verBadge = showEmail
      ? (v.emailVerified === 'verified'
          ? '<span style="font-size:.72rem;background:#dcfce7;color:#166534;' +
              'border:1px solid #86efac;border-radius:3px;padding:1px 5px;margin-left:4px;">✓ Verified</span>'
          : '<span style="font-size:.72rem;background:#fef2f2;color:#991b1b;' +
              'border:1px solid #fca5a5;border-radius:3px;padding:1px 5px;margin-left:4px;">Unverified</span>')
      : '';

    html +=
      '<div style="padding:10px 14px;border-bottom:1px solid #f3f4f6;' +
        'display:flex;align-items:flex-start;gap:10px;">' +

        // Roll badge
        '<div style="min-width:56px;font-size:.78rem;font-weight:700;color:#1a3a5c;' +
          'background:#eff6ff;border-radius:4px;padding:4px 6px;text-align:center;' +
          'margin-top:2px;">' + escHtml(v.roll) + '</div>' +

        // Details
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:.9rem;font-weight:600;color:#111827;">' +
            escHtml(v.name) + lifeBadge + verBadge +
          '</div>' +
          '<div style="font-size:.8rem;color:#6b7280;margin-top:2px;">' +
            'Batch ' + escHtml(v.batch) +
            (showEmail && v.email ? ' &nbsp;·&nbsp; ' + escHtml(v.email) : '') +
          '</div>' +
        '</div>' +

      '</div>';
  });

  // Wrap in card
  html = '<div class="panel-card" style="margin-bottom:12px;padding:0;overflow:hidden;">' +
    html + '</div>';

  // Pagination
  if (pages > 1) {
    html += '<div style="display:flex;gap:8px;justify-content:center;margin-top:4px;flex-wrap:wrap;">';
    if (page > 1) {
      html += '<button onclick="AdminPanel._loadVoters(' + (page - 1) + ',\'' +
        escHtml(search) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">← Prev</button>';
    }
    html += '<span style="padding:10px 8px;font-size:.85rem;color:#6b7280;">' +
      page + ' / ' + pages + '</span>';
    if (page < pages) {
      html += '<button onclick="AdminPanel._loadVoters(' + (page + 1) + ',\'' +
        escHtml(search) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">Next →</button>';
    }
    html += '</div>';
  }

  return html;
},

// Auto-calculate all dates from V-Day
_schedAutoCalc: function() {
  var vDay = document.getElementById('sched-vday').value;
  if (!vDay) {
    alert('Please enter V-Day (AGM date) first.');
    return;
  }
  var anchor = new Date(vDay);
  function vMinus(days) {
    var d = new Date(anchor.getTime());
    d.setDate(d.getDate() - days);
    return d.toISOString().substring(0, 10);
  }
  document.getElementById('sched-voter-cutoff').value  = vMinus(47);
  document.getElementById('sched-nom-open').value      = vMinus(38);
  document.getElementById('sched-vr-pub').value        = vMinus(33);
  document.getElementById('sched-p1-close').value      = vMinus(31);
  document.getElementById('sched-vr-obj').value        = vMinus(26);
  document.getElementById('sched-nom-close').value     = vMinus(24);
  document.getElementById('sched-vr-cert').value       = vMinus(24);
  document.getElementById('sched-cand-pub').value      = vMinus(19);
  document.getElementById('sched-withdrawal').value    = vMinus(18);
  document.getElementById('sched-voting-open').value   = vMinus(16);
  document.getElementById('sched-voting-close').value  = vMinus(9);
  document.getElementById('sched-declaration').value   = vMinus(7);
},

// Load existing schedule into the form
_loadScheduleIntoForm: function(elecId) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) return; // no schedule yet — form stays blank
      var f = function(id, val) {
        var el = document.getElementById(id);
        if (el && val) el.value = val.substring(0, 10);
      };
      f('sched-vday',         res.vDay);
      f('sched-voter-cutoff', res.voterRollCutoff);
      f('sched-nom-open',     res.nomOpenDate);
      f('sched-vr-pub',       res.voterRollPubDate);
      f('sched-p1-close',     res.phase1CloseDate);
      f('sched-vr-obj',       res.voterRollObjDeadline);
      f('sched-nom-close',    res.nomCloseDate);
      f('sched-vr-cert',      res.voterRollCertDate);
      f('sched-cand-pub',     res.candidatesPubDate);
      f('sched-withdrawal',   res.withdrawalDeadline);
      f('sched-voting-open',  res.votingOpenDate);
      f('sched-voting-close', res.votingCloseDate);
      f('sched-declaration',  res.declarationDate);
      var modeEl = document.getElementById('sched-mode');
      if (modeEl && res.scheduleMode) modeEl.value = res.scheduleMode;
      // Show published status
      if (res.published) {
        var okEl = document.getElementById('sched-ok');
        if (okEl) {
          okEl.innerHTML = '🌐 Published to Landing Page on ' + res.publishedAt.substring(0, 10);
          okEl.style.display = 'block';
        }
      }
    })
    .withFailureHandler(function() {})
    .getElectionSchedule(App.token, elecId);
},

// Collect form values and save schedule
_saveSchedule: function(elecId) {
  var errEl = document.getElementById('sched-error');
  var okEl  = document.getElementById('sched-ok');
  var warnEl = document.getElementById('sched-warnings');
  if (errEl)  { errEl.style.display  = 'none'; errEl.innerHTML  = ''; }
  if (okEl)   { okEl.style.display   = 'none'; okEl.innerHTML   = ''; }
  if (warnEl) { warnEl.style.display = 'none'; warnEl.innerHTML = ''; }

  function val(id) {
    var el = document.getElementById(id);
    return el ? el.value : '';
  }

  var schedData = {
    scheduleMode:         val('sched-mode'),
    vDay:                 val('sched-vday'),
    voterRollCutoff:      val('sched-voter-cutoff'),
    nomOpenDate:          val('sched-nom-open'),
    voterRollPubDate:     val('sched-vr-pub'),
    phase1CloseDate:      val('sched-p1-close'),
    voterRollObjDeadline: val('sched-vr-obj'),
    nomCloseDate:         val('sched-nom-close'),
    voterRollCertDate:    val('sched-vr-cert'),
    candidatesPubDate:    val('sched-cand-pub'),
    withdrawalDeadline:   val('sched-withdrawal'),
    votingOpenDate:       val('sched-voting-open'),
    votingCloseDate:      val('sched-voting-close'),
    declarationDate:      val('sched-declaration')
  };

  if (!schedData.vDay) {
    if (errEl) { errEl.innerHTML = 'V-Day (AGM date) is required.'; errEl.style.display = 'block'; }
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        if (errEl) { errEl.innerHTML = escHtml(res && res.message ? res.message : 'Save failed.'); errEl.style.display = 'block'; }
        return;
      }
      if (okEl) { okEl.innerHTML = '✓ Schedule saved.'; okEl.style.display = 'block'; }
      // Show any soft warnings
      if (res.warnings && res.warnings.length > 0) {
        var html = '';
        res.warnings.forEach(function(w) {
          var color = w.severity === 'block' ? '#fef2f2' : '#fffbeb';
          var border = w.severity === 'block' ? '#fca5a5' : '#fbbf24';
          var icon = w.severity === 'block' ? '[RED]' : '[YEL]';
          html += '<div style="background:' + color + ';border:1px solid ' + border + ';' +
            'border-radius:4px;padding:8px 12px;margin-bottom:6px;font-size:.8rem;">' +
            icon + ' ' + escHtml(w.message) + '</div>';
        });
        if (warnEl) { warnEl.innerHTML = html; warnEl.style.display = 'block'; }
      }
      // Sync vday and dates back to the main manage form fields
      var vdayEl = document.getElementById('manage-vday');
      if (vdayEl && schedData.vDay) vdayEl.value = schedData.vDay;
      var vcEl = document.getElementById('manage-vclose');
      if (vcEl && schedData.votingCloseDate) vcEl.value = schedData.votingCloseDate;
      var declEl = document.getElementById('manage-declare');
      if (declEl && schedData.declarationDate) declEl.value = schedData.declarationDate;
    })
    .withFailureHandler(function() {
      if (errEl) { errEl.innerHTML = 'Connection error. Please try again.'; errEl.style.display = 'block'; }
    })
    .setElectionSchedule(App.token, elecId, schedData, getTEMAuthId());
},

// Publish schedule to Landing Page
_publishSchedule: function(elecId) {
  if (!confirm('Publish this schedule to the Landing Page? It will be visible to all members.')) return;
  var errEl = document.getElementById('sched-error');
  var okEl  = document.getElementById('sched-ok');
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        if (errEl) { errEl.innerHTML = escHtml(res && res.message ? res.message : 'Publish failed.'); errEl.style.display = 'block'; }
        return;
      }
      if (okEl) { okEl.innerHTML = '🌐 Schedule published to Landing Page.'; okEl.style.display = 'block'; }
      var btn = document.getElementById('btn-publish-sched');
      if (btn) { btn.textContent = '✓ Published'; btn.disabled = true; }
    })
    .withFailureHandler(function() {
      if (errEl) { errEl.innerHTML = 'Connection error.'; errEl.style.display = 'block'; }
    })
    .publishSchedule(App.token, elecId, getTEMAuthId());
},

_toggleManualNomForm: function() {
  var f = document.getElementById('manual-nom-form');
  if (!f) return;
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  // Clear form on open
  if (f.style.display === 'block') {
    ['mn-cand-roll','mn-prop-roll','mn-sec-roll','mn-bio'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = '';
    });
    ['mn-cand-name','mn-prop-name','mn-sec-name','mn-error','mn-ok'].forEach(function(id) {
      var el = document.getElementById(id); if (el) { el.innerHTML = ''; el.style.display = 'none'; }
    });
    var sel = document.getElementById('mn-post'); if (sel) sel.value = '';
    // Inject doc uploader for manual_ro_nomination category
    var uploaderEl = document.getElementById('mn-doc-uploader');
    if (uploaderEl) {
      uploaderEl.innerHTML = AdminPanel._renderDocUploader({
        electionId:    AdminPanel._nominationsSelectedElec,
        category:      'manual_ro_nomination',
        categoryLabel: 'Supporting Documents (Nomination Paper + Confirmations)',
        containerId:   'mn-doc-uploader'
      });
    }
  }
  },

_mnLookup: function(role) {
  var rollEl  = document.getElementById('mn-' + role + '-roll');
  var nameEl  = document.getElementById('mn-' + role + '-name');
  if (!rollEl || !nameEl) return;
  var roll = rollEl.value.trim();
  if (!roll) { nameEl.innerHTML = ''; nameEl.style.display = 'none'; return; }
  nameEl.style.color = '#9ca3af';
  nameEl.innerHTML = 'Looking up…';
  nameEl.style.display = 'block';
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        nameEl.style.color = '#059669';
        nameEl.innerHTML = '✓ ' + escHtml(res.name) + (res.batch ? ' (Batch ' + escHtml(res.batch.toString()) + ')' : '');
      } else {
        nameEl.style.color = '#c0392b';
        nameEl.innerHTML = '✗ ' + escHtml((res && res.message) || 'Not found on voter roll');
      }
    })
    .withFailureHandler(function() {
      nameEl.style.color = '#c0392b';
      nameEl.innerHTML = '✗ Connection error';
    })
    .lookupVoterName(App.token, roll);
},

_submitManualNom: function() {
  var errEl = document.getElementById('mn-error');
  var okEl  = document.getElementById('mn-ok');
  if (errEl) { errEl.style.display = 'none'; errEl.innerHTML = ''; }
  if (okEl)  { okEl.style.display  = 'none'; okEl.innerHTML  = ''; }

  var candRoll = (document.getElementById('mn-cand-roll') || {}).value || '';
  var post     = (document.getElementById('mn-post')      || {}).value || '';
  var propRoll = (document.getElementById('mn-prop-roll') || {}).value || '';
  var secRoll  = (document.getElementById('mn-sec-roll')  || {}).value || '';
  var bio      = (document.getElementById('mn-bio')       || {}).value || '';
  var elecId   = AdminPanel._nominationsSelectedElec;

  if (!candRoll.trim()) { _mnErr('Candidate roll number is required.'); return; }
  if (!post)            { _mnErr('Please select a post.'); return; }
  if (!propRoll.trim()) { _mnErr('Proposer roll number is required.'); return; }

  function _mnErr(msg) {
    if (errEl) { errEl.innerHTML = msg; errEl.style.display = 'block'; }
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        if (errEl) { errEl.innerHTML = escHtml((res && res.message) || 'Submission failed.'); errEl.style.display = 'block'; }
        return;
      }
      if (okEl) {
        okEl.innerHTML = '✓ Nomination entered: ' + escHtml(res.candName) + ' for ' + escHtml(res.post);
        okEl.style.display = 'block';
      }
      // Refresh list and collapse form after 1.5s
      setTimeout(function() {
        AdminPanel._toggleManualNomForm();
        AdminPanel._loadNominationsList(elecId);
      }, 1500);
    })
    .withFailureHandler(function() {
      if (errEl) { errEl.innerHTML = 'Connection error. Please try again.'; errEl.style.display = 'block'; }
    })
    .submitNominationManual(App.token, elecId, candRoll, post, propRoll, secRoll, bio, getTEMAuthId());
},

_loadNominationsList: function(elecId) {
  var area = document.getElementById('nom-list-area');
  if (!area) return;
  area.innerHTML = '<div style="text-align:center;padding:24px;color:#6b7280;">' +
    '<div class="spinner"></div></div>';

  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('nom-list-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load nominations.') + '</div>';
        return;
      }
      area.innerHTML = AdminPanel._renderNominationsList(res.nominations || []);
    })
    .withFailureHandler(function() {
      var area = document.getElementById('nom-list-area');
      if (area) area.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading nominations.</div>';
    })
    .getNominations(App.token, elecId);
},

_renderNominationsList: function(noms) {
  var role = (App.role || '').toUpperCase();

  if (noms.length === 0) {
    return '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">☰</div>' +
      '<div style="font-weight:600;color:#374151;">No nominations yet</div>' +
      '</div></div>';
  }

  var statusBadge = {
    pending:    'badge-draft',
    confirmed:  'badge-noms-open',
    accepted:   'badge-scrutiny',
    rejected:   'badge-closed',
    withdrawn:  'badge-closed',
    declared:   'badge-declared'
  };

  // Group by post
  var byPost = {};
  var postOrder = [];
  noms.forEach(function(n) {
    if (!byPost[n.post]) { byPost[n.post] = []; postOrder.push(n.post); }
    byPost[n.post].push(n);
  });

  var html = '<div style="font-size:.82rem;color:#6b7280;margin-bottom:12px;">' +
    '<strong style="color:#374151;">' + noms.length + '</strong> nomination' +
    (noms.length !== 1 ? 's' : '') + ' across ' +
    '<strong style="color:#374151;">' + postOrder.length + '</strong> post' +
    (postOrder.length !== 1 ? 's' : '') +
  '</div>';

  postOrder.forEach(function(post) {
    html += '<div style="font-size:.8rem;font-weight:700;color:#6b7280;' +
      'text-transform:uppercase;letter-spacing:.04em;' +
      'padding:10px 14px 4px;margin-top:8px;">' + escHtml(post) + '</div>';

    byPost[post].forEach(function(n) {
      var badge    = statusBadge[n.status] || 'badge-draft';
      var propTick = n.propConfirmed ? '✓' : '⏳';
      var propCol  = n.propConfirmed ? '#16a34a' : '#d97706';
      var secTick  = n.secRoll
        ? (n.secConfirmed ? '✓' : '⏳')
        : '—';
      var secCol   = n.secConfirmed ? '#16a34a' : '#d97706';
      var phase2Tag = n.phase2
        ? '<span style="font-size:.72rem;background:#ede9fe;color:#5b21b6;' +
            'border-radius:3px;padding:1px 5px;margin-left:5px;">Ph.2</span>'
        : '';
      var dupTag = n.dupDeclined
        ? '<span style="font-size:.72rem;background:#fef2f2;color:#b91c1c;' +
            'border-radius:3px;padding:1px 5px;margin-left:4px;">Dup↓</span>'
        : '';

      html +=
        '<div class="panel-card" style="margin-bottom:8px;">' +
        '<div class="panel-card-body" style="padding:12px 14px;">' +

          // Name + badges
          '<div style="display:flex;justify-content:space-between;' +
            'align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:6px;">' +
            '<div style="font-weight:700;color:#111827;font-size:.92rem;">' +
              escHtml(n.candName) + phase2Tag + dupTag +
            '</div>' +
            '<span class="status-badge ' + badge + '" style="font-size:.75rem;">' +
              escHtml(n.status) + '</span>' +
          '</div>' +
          
          // Photo thumbnail
          (n.photo
            ? '<div style=\"margin-bottom:8px;\">' +
                '<img src=\"' + escHtml(n.photo) + '\" ' +
                'style=\"width:52px;height:52px;object-fit:cover;border-radius:50%;' +
                'border:2px solid #d1d5db;\">' +
              '</div>'
            : '') +
            
          // Roll + batch
          '<div style="font-size:.8rem;color:#6b7280;margin-bottom:8px;">' +
            'Roll: <strong>' + escHtml(n.candRoll) + '</strong>' +
            ' &nbsp;·&nbsp; Batch ' + escHtml(n.candBatch) +
            (n.submittedAt
              ? ' &nbsp;·&nbsp; ' +
                escHtml(fmtIST(n.submittedAt))
              : '') +
          '</div>' +

          // Proposer / seconder
          '<div style="font-size:.8rem;margin-bottom:10px;">' +
            '<span style="color:' + propCol + ';font-weight:600;">' +
              propTick + ' Proposer</span>' +
            ' <span style="color:#6b7280;">' + escHtml(n.propRoll) + '</span>' +
            ' &nbsp;&nbsp; ' +
            '<span style="color:' + secCol + ';font-weight:600;">' +
              secTick + ' Seconder</span>' +
            (n.secRoll
              ? ' <span style="color:#6b7280;">' + escHtml(n.secRoll) + '</span>'
              : '') +
          '</div>' +

          // Rejection reason
          (n.status === 'rejected' && n.rejectionReason
            ? '<div style="font-size:.8rem;color:#b91c1c;margin-bottom:10px;">' +
                'Reason: ' + escHtml(n.rejectionReason) + '</div>'
            : '') +

          // Action buttons — RO_ADMIN only
          (role === 'RO_ADMIN' && n.status !== 'withdrawn' && n.status !== 'rejected'
            ? '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +

                // Resend consent (Phase 2 only, consent not yet given)
                (n.phase2 && n.consentStatus !== 'accepted'
                  ? '<button onclick="AdminPanel._resendConfirm(\'' +
                      escHtml(n.id) + '\',\'consent\')" ' +
                      'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                      'background:#fff;color:#7c3aed;border:1px solid #c4b5fd;' +
                      'border-radius:4px;cursor:pointer;">↺ Consent</button>'
                  : '') +

                // Resend proposer (only if not confirmed)
                (!n.propConfirmed
                  ? '<button onclick="AdminPanel._resendConfirm(\'' +
                      escHtml(n.id) + '\',\'proposer\')" ' +
                      'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                      'background:#fff;color:#1d4ed8;border:1px solid #93c5fd;' +
                      'border-radius:4px;cursor:pointer;">↺ Proposer</button>'
                  : '') +

                // Resend seconder (only if seconder exists and not confirmed)
                (n.secRoll && !n.secConfirmed
                  ? '<button onclick="AdminPanel._resendConfirm(\'' +
                      escHtml(n.id) + '\',\'seconder\')" ' +
                      'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                      'background:#fff;color:#1d4ed8;border:1px solid #93c5fd;' +
                      'border-radius:4px;cursor:pointer;">↺ Seconder</button>'
                  : '') +

                // Withdraw
                '<button onclick="AdminPanel._confirmWithdraw(\'' +
                  escHtml(n.id) + '\',\'' + escHtml(n.candName) + '\')" ' +
                  'style="flex:1;min-width:110px;padding:9px 6px;font-size:.78rem;' +
                  'background:#fff;color:#b91c1c;border:1px solid #fca5a5;' +
                  'border-radius:4px;cursor:pointer;">Withdraw</button>' +

              '</div>'
            : '') +

          // Confirm area
          '<div id="nom-confirm-' + escHtml(n.id) + '" ' +
            'style="display:none;margin-top:10px;background:#fef2f2;' +
            'border:1px solid #fca5a5;border-radius:4px;padding:10px;"></div>' +

        '</div></div>';
    });
  });

  return html;
},

_resendConfirm: function(nomId, role) {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Email resent to ' + role + '.');
      } else {
        showToast((res && res.message) || 'Resend failed.');
      }
    })
    .withFailureHandler(function() { showToast('Error — resend failed.'); })
    .resendConfirmationEmail(App.token, nomId, role);
},

_confirmWithdraw: function(nomId, candName) {
  var box = document.getElementById('nom-confirm-' + nomId);

  box.style.display = 'block';
  box.innerHTML =
    '<p style="font-size:.85rem;color:#b91c1c;margin-bottom:10px;">' +
      '<strong>Withdraw nomination for ' + escHtml(candName) + '?</strong><br>' +
      'This cannot be undone.' +
    '</p>' +
    '<div style="display:flex;gap:8px;">' +

_doWithdraw: function(nomId) {

    .withSuccessHandler(function(res) {

        showToast('Nomination withdrawn.');
        AdminPanel._loadNominationsList(AdminPanel._nominationsSelectedElec);
      } else {
        showToast((res && res.message) || 'Withdraw failed.');
      }
    })
    .withFailureHandler(function() { showToast('Error — withdraw failed.'); })
    .withdrawNomination(App.token, nomId);
},

// ── SETTINGS TAB ─────────────────────────────────────────────

  _loadSettings: function() {
    var c = document.getElementById('settings-content');
    if (!c) return;

    google.script.run
      .withSuccessHandler(function(res) {
        var c2 = document.getElementById('settings-content');
        if (!c2) return;
        if (!res || !res.success) {
          c2.innerHTML =
            '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load system status.') + '</div>';

        }
        c2.innerHTML = AdminPanel._renderSettings(res);

      .withFailureHandler(function() {

          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading settings.</div>';
      })
      .getSystemStatus(App.token);
