  _renderSettings: function(res) {
    var html = '';

    // Deploy URL
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Deployment</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.83rem;color:#6b7280;margin-bottom:4px;">Deploy URL</div>' +
          '<div style="font-size:.82rem;word-break:break-all;background:#f9fafb;' +
            'padding:8px 10px;border-radius:4px;border:1px solid #e5e7eb;margin-bottom:12px;">' +
            escHtml(res.deployUrl || '—') +
          '</div>' +
          '<div style="font-size:.83rem;color:#6b7280;margin-bottom:4px;">GitHub Repository</div>' +
          '<div style="font-size:.88rem;margin-bottom:12px;">' +
            '<a href="' + escHtml(res.githubUrl) + '" target="_blank" ' +
              'style="color:#1a3a5c;word-break:break-all;">' +
              escHtml(res.githubUrl) +
            '</a>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Version verification
    var verDone = !!res.versionVerifiedAt;
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Version Verification</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.85rem;color:#555;margin-bottom:12px;">' +
            'Confirm that the deployed Apps Script version matches the GitHub repository. ' +
            'Open the GitHub link above, verify the code matches, then click Confirm below.' +
          '</div>' +
          (verDone ?
            '<div style="padding:10px;background:#dcfce7;border-radius:4px;' +
              'font-size:.85rem;color:#166534;margin-bottom:12px;">' +
              '✓ Last verified ' +
              escHtml(fmtIST(res.versionVerifiedAt)) +
              ' by ' + escHtml(res.versionVerifiedBy) +
            '</div>'
          : '') +
          '<div id="version-verify-err" ' +
            'style="color:#c0392b;font-size:.83rem;margin-bottom:8px;display:none;"></div>' +
          '<button onclick="AdminPanel._confirmVersionVerified()" ' +
            'id="btn-version-verify" ' +
            'style="width:100%;padding:12px;font-size:.9rem;' +
            'background:' + (verDone ? '#fff' : '#1a3a5c') + ';' +
            'color:' + (verDone ? '#1a3a5c' : '#fff') + ';' +
            'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;font-weight:600;">' +
            (verDone ? 'Re-verify Version' : 'Confirm Version Verified') +
          '</button>' +
        '</div>' +
      '</div>';

    // Sheet protection status
    var prots = res.protectionStatus || {};
    var protKeys = Object.keys(prots);
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Sheet Protection Status</div>' +
        '<div class="panel-card-body" style="padding:0;">';

    protKeys.forEach(function(name, idx) {
      var status    = prots[name];
      var isOk      = (status === 'protected');
      var statusCol = isOk ? '#166534' : '#b91c1c';
      var statusBg  = isOk ? '#dcfce7'  : '#fef2f2';
      html +=
        '<div style="padding:10px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') +
          'display:flex;justify-content:space-between;align-items:center;">' +
          '<span style="font-size:.87rem;color:#374151;">' + escHtml(name) + '</span>' +
          '<span style="font-size:.75rem;padding:2px 8px;border-radius:10px;font-weight:600;' +
            'background:' + statusBg + ';color:' + statusCol + ';">' +
            escHtml(status) +
          '</span>' +
        '</div>';
    });

    html += '</div></div>';

    // Last AdminLog entry
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Audit Log</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.83rem;color:#6b7280;margin-bottom:4px;">Last entry</div>' +
          '<div style="font-size:.87rem;color:#374151;">' +
            escHtml(res.lastLogAction || '—') +
          '</div>' +
          (res.lastLogAt ?
            '<div style="font-size:.78rem;color:#9ca3af;margin-top:3px;">' +
              escHtml(fmtIST(res.lastLogAt)) +
            '</div>'
          : '') +
        '</div>' +
      '</div>';

    // Landing Page Content
    html +=
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">Landing Page Content</div>' +
        '<div class="panel-card-body">' +
          '<div id="lpc-load-err" style="color:#c0392b;font-size:.83rem;margin-bottom:8px;display:none;"></div>' +
          '<div id="lpc-list"><div style="text-align:center;padding:16px;color:#6b7280;font-size:.85rem;">Loading…</div></div>' +
          '<div style="margin-top:14px;border-top:1px solid #e5e7eb;padding-top:14px;">' +
            '<div style="font-size:.83rem;font-weight:600;color:#374151;margin-bottom:8px;">Update a value</div>' +
            '<div style="margin-bottom:8px;">' +
              '<label style="font-size:.78rem;color:#6b7280;display:block;margin-bottom:3px;">Key</label>' +
              '<select id="lpc-key" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:4px;font-size:.88rem;background:#fff;">' +
                '<option value="">— select key —</option>' +
                '<option value="sgm_date">sgm_date — SGM date</option>' +
                '<option value="sgm_venue">sgm_venue — SGM venue</option>' +
                '<option value="sgm_notice">sgm_notice — SGM notice text</option>' +
                '<option value="agm_date">agm_date — AGM date</option>' +
                '<option value="agm_notice">agm_notice — AGM notice text</option>' +
                '<option value="announcement">announcement — Public announcement</option>' +
                '<option value="vva_url">vva_url — Voter Verification App URL</option>' +
                '<option value="sop_url">sop_url — Election SOP Document URL</option>' +
                '<option value="techspec_url">techspec_url — Technical Specification Document URL</option>' +
                '<option value="sop_url">sop_url — Election SOP Document URL</option>' +
                '<option value="techspec_url">techspec_url — Tech Specification Document URL</option>' +
              '</select>' +
            '</div>' +
            '<div style="margin-bottom:8px;">' +
              '<label style="font-size:.78rem;color:#6b7280;display:block;margin-bottom:3px;">Value</label>' +
              '<textarea id="lpc-value" rows="3" ' +
                'style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:4px;' +
                'font-size:.88rem;resize:vertical;box-sizing:border-box;"></textarea>' +
            '</div>' +
            '<div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;">' +
              '<label style="font-size:.83rem;color:#374151;display:flex;align-items:center;gap:6px;cursor:pointer;">' +
                '<input type="checkbox" id="lpc-public" style="width:16px;height:16px;"> ' +
                'Visible on public landing page' +
              '</label>' +
            '</div>' +
            '<div id="lpc-save-err" style="color:#c0392b;font-size:.83rem;margin-bottom:6px;display:none;"></div>' +
            '<button onclick="AdminPanel._saveLPCItem()" id="btn-lpc-save" ' +
              'style="width:100%;padding:12px;font-size:.9rem;font-weight:600;' +
              'background:#1a3a5c;color:#fff;border:none;border-radius:4px;cursor:pointer;">Save</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    setTimeout(function() { AdminPanel._loadLPCList(); }, 0);

    return html;
  },

  _loadLPCList: function() {
    google.script.run
      .withSuccessHandler(function(res) {
        var listEl = document.getElementById('lpc-list');
        var errEl  = document.getElementById('lpc-load-err');
        if (!listEl) return;
        if (!res || !res.success) {
          if (errEl) { errEl.textContent = (res && res.message) || 'Failed to load content.'; errEl.style.display = 'block'; }
          listEl.innerHTML = '';
          return;
        }
        if (!res.items || res.items.length === 0) {
          listEl.innerHTML = '<div style="font-size:.83rem;color:#6b7280;">No content keys set yet.</div>';
          return;
        }
        var rows = res.items.map(function(item) {
          var pub = item.public
            ? '<span style="font-size:.72rem;padding:1px 6px;border-radius:8px;background:#dcfce7;color:#166534;font-weight:600;">public</span>'
            : '<span style="font-size:.72rem;padding:1px 6px;border-radius:8px;background:#f3f4f6;color:#6b7280;">internal</span>';
          var upd = item.updatedAt
            ? '<div style="font-size:.73rem;color:#9ca3af;margin-top:2px;">Updated ' +
                escHtml(fmtIST(item.updatedAt)) +
                ' by ' + escHtml(item.updatedBy) + '</div>'
            : '';
          return '<div style="padding:10px 0;border-bottom:1px solid #f3f4f6;">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">' +
              '<span style="font-size:.82rem;font-weight:600;color:#1a3a5c;font-family:monospace;">' + escHtml(item.key) + '</span>' +
              pub +
            '</div>' +
            '<div style="font-size:.83rem;color:#374151;word-break:break-word;">' + escHtml(item.label) + '</div>' +
            '<div style="font-size:.84rem;color:#555;margin-top:3px;word-break:break-all;background:#f9fafb;' +
              'padding:5px 8px;border-radius:3px;border:1px solid #e5e7eb;">' +
              escHtml(item.value || '—') +
            '</div>' +
            upd +
          '</div>';
        }).join('');
        listEl.innerHTML = '<div style="margin-bottom:6px;">' + rows + '</div>';
      })
      .withFailureHandler(function() {
        var errEl = document.getElementById('lpc-load-err');
        if (errEl) { errEl.textContent = 'Error loading content list.'; errEl.style.display = 'block'; }
      })
      .getLandingPageContent();
  },

  _saveLPCItem: function() {
    var keyEl   = document.getElementById('lpc-key');
    var valEl   = document.getElementById('lpc-value');
    var pubEl   = document.getElementById('lpc-public');
    var btn     = document.getElementById('btn-lpc-save');
    var errEl   = document.getElementById('lpc-save-err');
    if (!keyEl || !valEl) return;

    var key   = keyEl.value.trim();
    var value = valEl.value.trim();
    if (!key)   { if (errEl) { errEl.textContent = 'Select a key.';  errEl.style.display = 'block'; } return; }
    if (!value) { if (errEl) { errEl.textContent = 'Enter a value.'; errEl.style.display = 'block'; } return; }
    if (errEl) errEl.style.display = 'none';

    var isPublic = pubEl ? pubEl.checked : false;
    var labels = {
      sgm_date: 'SGM date', sgm_venue: 'SGM venue', sgm_notice: 'SGM notice text',
      agm_date: 'AGM date', agm_notice: 'AGM notice text',
      announcement: 'Public announcement', vva_url: 'Voter Verification App URL', sop_url: 'Election SOP URL', techspec_url: 'Tech Spec URL'
    };
    var label = labels[key] || key;

    if (btn) { btn.textContent = 'Saving…'; btn.disabled = true; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
        if (res && res.success) {
          showToast('Landing page content updated.');
          if (valEl) valEl.value = '';
          if (keyEl) keyEl.value = '';
          if (pubEl) pubEl.checked = false;
          AdminPanel._loadLPCList();
        } else {
          if (errEl) { errEl.textContent = (res && res.message) || 'Save failed.'; errEl.style.display = 'block'; }
        }
      })
      .withFailureHandler(function() {
        if (btn) { btn.textContent = 'Save'; btn.disabled = false; }
        if (errEl) { errEl.textContent = 'Error — please try again.'; errEl.style.display = 'block'; }
      })
      .setLandingPageContent(App.token, key, value, 'text', label, isPublic, getTEMAuthId());
  },

  _confirmVersionVerified: function() {
    if (!confirm('Confirm that you have checked the GitHub repository and the deployed code matches?\n\nThis will be recorded in the audit log.')) return;

    var btn   = document.getElementById('btn-version-verify');
    var errEl = document.getElementById('version-verify-err');
    if (btn) { btn.textContent = 'Recording…'; btn.disabled = true; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          showToast('Version verification recorded.');
          AdminPanel._loadSettings();
        } else {
          if (btn) { btn.textContent = 'Confirm Version Verified'; btn.disabled = false; }
          if (errEl) { errEl.textContent = (res && res.message) || 'Failed.'; errEl.style.display = 'block'; }
        }
      })
      .withFailureHandler(function() {
        if (btn) { btn.textContent = 'Confirm Version Verified'; btn.disabled = false; }
        if (errEl) { errEl.textContent = 'Error — please try again.'; errEl.style.display = 'block'; }
      })
      .recordVersionVerified(App.token, getTEMAuthId());
  },

// ── HANDOVER TAB ─────────────────────────────────────────────

  _loadHandover: function() {
    var c = document.getElementById('handover-content');
    if (!c) return;

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success || !res.elections || res.elections.length === 0) {
          var c2 = document.getElementById('handover-content');
          if (!c2) return;
          c2.innerHTML =
            '<div class="panel-card"><div class="panel-card-body" ' +
            'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
            '<div style="font-size:1.5rem;margin-bottom:8px;">[VOTE]</div>' +
            '<div style="font-weight:600;color:#374151;">No elections found</div>' +
            '</div></div>';
          return;
        }
        AdminPanel._handoverSelectedElec = res.elections[0].id;
        AdminPanel._renderHandoverShell(res.elections);
        AdminPanel._loadHandoverChecklist(res.elections[0].id);
      })
      .withFailureHandler(function() {
        var c2 = document.getElementById('handover-content');
        if (c2) c2.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading elections.</div>';
      })
      .getAllElections(App.token);
  },

  _handoverSelectedElec: '',

  _renderHandoverShell: function(elections) {
    var c = document.getElementById('handover-content');
    if (!c) return;

    var selHtml = '<select id="handover-elec-sel" ' +
      'onchange="AdminPanel._onHandoverElecChange()" ' +
      'style="width:100%;padding:12px 10px;font-size:.9rem;border:1px solid #d1d5db;' +
      'border-radius:4px;box-sizing:border-box;margin-bottom:16px;">';
    elections.forEach(function(e) {
      selHtml += '<option value="' + escHtml(e.id) + '"' +
        (e.id === AdminPanel._handoverSelectedElec ? ' selected' : '') + '>' +
        escHtml(e.title) + ' [' + escHtml(e.status.replace(/_/g,' ')) + ']' +
        '</option>';
    });
    selHtml += '</select>';

    c.innerHTML =
      selHtml +
      '<div id="handover-checklist-area">' +
        '<div style="text-align:center;padding:24px;color:#6b7280;">' +
        '<div class="spinner"></div></div>' +
      '</div>';
  },

  _onHandoverElecChange: function() {
    var sel = document.getElementById('handover-elec-sel');
    if (!sel) return;
    AdminPanel._handoverSelectedElec = sel.value;
    AdminPanel._loadHandoverChecklist(sel.value);
  },

  _loadHandoverChecklist: function(elecId) {
    var area = document.getElementById('handover-checklist-area');
    if (!area) return;
    area.innerHTML =
      '<div style="text-align:center;padding:24px;color:#6b7280;">' +
      '<div class="spinner"></div></div>';

    google.script.run
      .withSuccessHandler(function(res) {
        var area2 = document.getElementById('handover-checklist-area');
        if (!area2) return;
        if (!res || !res.success) {
          area2.innerHTML =
            '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load checklist.') + '</div>';
          return;
        }
        area2.innerHTML = AdminPanel._renderHandoverChecklist(res, elecId);
      })
      .withFailureHandler(function() {
        var area2 = document.getElementById('handover-checklist-area');
        if (area2) area2.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading checklist.</div>';
      })
      .getHandoverChecklist(App.token, elecId);
  },

  _renderHandoverChecklist: function(res, elecId) {
    var items   = res.items;
    var role    = res.role;
    var isRO    = (role === 'RO_ADMIN' || role === 'TEM');
    var isScrut = (role === 'SCRUTINEER');

    var ITEMS = [
      {
        key:     'ec_locked',
        label:   'EC Officer accounts locked',
        desc:    'All EC_OFFICER accounts must be disabled before handover is complete.',
        roBtn:   true,
        btnLabel:'Lock EC Accounts',
        btnFn:   'AdminPanel._lockECOfficers()'
      },
      {
        key:     'voter_roll_certified',
        label:   'Voter roll certified',
        desc:    'The voter roll has been certified and uploaded by the RO.',
        roBtn:   false
      },
      {
        key:     'sheet_protections',
        label:   'Sheet protections applied',
        desc:    'Critical sheets are protected against manual editing.',
        roBtn:   true,
        btnLabel:'Apply Sheet Protections',
        btnFn:   'AdminPanel._applySheetProtections()'
      },
      {
        key:     'scrutineer_part_a',
        label:   'Scrutineer confirmation — Part A',
        desc:    'Scrutineer has confirmed code/data verification (Part A).',
        roBtn:   false,
        scrutBtn: true
      },
      {
        key:     'version_verified',
        label:   'Version verified',
        desc:    'Deployed script version matches GitHub commit.',
        roBtn:   false
      },
      {
        key:     'github_transferred',
        label:   'GitHub organisation ownership transferred to RO',
        desc:    'RO has been added as owner of sskzmoba organisation and outgoing custodian removed. No further code pushes possible by EC or developer.',
        roBtn:   true,
        btnLabel:'Confirm GitHub Transfer',
        btnFn:   'AdminPanel._confirmGithubTransferred()'
      }
    ];

    var doneCount = 0;
    ITEMS.forEach(function(item) {
      if (items[item.key] && items[item.key].done) doneCount++;
    });

    var allDone = (doneCount === ITEMS.length);

    var html =
      '<div class="panel-card" style="margin-bottom:14px;">' +
        '<div class="panel-card-body" style="padding:14px 16px;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
            '<div style="font-weight:700;color:#1a3a5c;font-size:.95rem;">Handover Checklist</div>' +
            '<div style="font-size:.85rem;font-weight:600;color:' +
              (allDone ? '#166534' : '#92400e') + ';">' +
              doneCount + ' / ' + ITEMS.length + ' complete' +
            '</div>' +
          '</div>' +
          (allDone ?
            '<div style="margin-top:10px;padding:10px;background:#dcfce7;border-radius:4px;' +
            'font-size:.85rem;color:#166534;font-weight:600;">✓ All handover items complete.</div>'
          : '') +
        '</div>' +
      '</div>';

    ITEMS.forEach(function(item) {
      var state = items[item.key] || { done: false, at: '', by: '' };
      var isDone = state.done;

      html +=
        '<div class="panel-card" style="margin-bottom:10px;' +
          (isDone ? 'border-left:4px solid #166534;' : 'border-left:4px solid #e5e7eb;') + '">' +
          '<div class="panel-card-body" style="padding:14px 16px;">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
              'gap:8px;margin-bottom:4px;">' +
              '<div style="font-weight:600;color:#1a3a5c;font-size:.9rem;">' +
                (isDone ? '✓ ' : '○ ') + escHtml(item.label) +
              '</div>' +
              '<span style="font-size:.75rem;padding:2px 8px;border-radius:10px;white-space:nowrap;' +
                'font-weight:600;background:' + (isDone ? '#dcfce7' : '#fef9c3') + ';' +
                'color:' + (isDone ? '#166534' : '#92400e') + ';">' +
                (isDone ? 'Done' : 'Pending') +
              '</span>' +
            '</div>' +
            '<div style="font-size:.82rem;color:#6b7280;margin-bottom:8px;">' +
              escHtml(item.desc) +
            '</div>' +
            (isDone ?
              '<div style="font-size:.78rem;color:#6b7280;">' +
                'Completed ' + escHtml(fmtIST(state.at)) +
                (state.by ? ' by ' + escHtml(state.by) : '') +
              '</div>'
            :
              // Action buttons
              (item.roBtn && isRO ?
                '<button onclick="' + item.btnFn + '" ' +
                  'style="width:100%;padding:11px;font-size:.88rem;background:#1a3a5c;color:#fff;' +
                  'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
                  escHtml(item.btnLabel) +
                '</button>'
              : '') +
              (item.scrutBtn && (isScrut || isRO) ?
                '<div>' +
                  '<textarea id="scrut-part-a-text" rows="2" ' +
                    'placeholder="Enter your confirmation statement…" ' +
                    'style="width:100%;padding:9px;font-size:.85rem;border:1px solid #d1d5db;' +
                    'border-radius:4px;box-sizing:border-box;margin-bottom:8px;resize:vertical;"></textarea>' +
                  '<div id="scrut-part-a-err" ' +
                    'style="color:#c0392b;font-size:.82rem;margin-bottom:6px;display:none;"></div>' +
                  '<button onclick="AdminPanel._recordScrutPartA(\'' + escHtml(elecId) + '\')" ' +
                    'id="btn-scrut-part-a" ' +
                    'style="width:100%;padding:11px;font-size:.88rem;background:#1a3a5c;color:#fff;' +
                    'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
                    'Record Part A Confirmation' +
                  '</button>' +
                '</div>'
              : '') +
              (!item.roBtn && !item.scrutBtn ?
                '<div style="font-size:.82rem;color:#9ca3af;font-style:italic;">' +
                  'This item is confirmed automatically from system records.' +
                '</div>'
              : '')
            ) +
          '</div>' +
        '</div>';
    });

    return html;
  },

  _lockECOfficers: function() {
    if (!confirm('Lock all EC Officer accounts now?\n\nThis will disable all EC_OFFICER logins immediately. This action is logged to the audit record.')) return;

    google.script.run
      .withSuccessHandler(function(res) {

  _renderTally: function(res) {
    var html = '';

    // Blackout banner
    if (res.blackout) {
      html +=
        '<div style="background:#fef9c3;border:1.5px solid #fbbf24;border-radius:6px;' +
          'padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;">' +
          '<div style="font-size:1.2rem;">🔒</div>' +
          '<div>' +
            '<div style="font-weight:700;color:#92400e;font-size:.9rem;">Tally Blackout Active</div>' +
            '<div style="font-size:.83rem;color:#92400e;margin-top:3px;">' +
              'Vote counts and candidate names are hidden while voting is open. ' +
              'Participation figures only are shown below.' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    // Participation summary card
    html +=
      '<div class="panel-card" style="margin-bottom:14px;">' +
        '<div class="panel-card-header">Participation Summary</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:1.6rem;font-weight:700;color:#1a3a5c;text-align:center;' +
            'padding:8px 0 4px;">' +
            res.totalParticipants +
          '</div>' +
          '<div style="text-align:center;font-size:.83rem;color:#6b7280;margin-bottom:0;">unique voters participated</div>' +
        '</div>' +
      '</div>';

    // Per-post results
    if (!res.posts || res.posts.length === 0) {
      html +=
        '<div class="panel-card">' +
          '<div class="panel-card-body" style="text-align:center;padding:32px 16px;color:#6b7280;">' +
            '<div style="font-size:.88rem;">No candidates on record for this election.</div>' +
          '</div>' +
        '</div>';
      return html;
    }

    res.posts.forEach(function(post) {
      var participated = post.participated || 0;

      html += '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header" style="display:flex;justify-content:space-between;' +
          'align-items:center;flex-wrap:wrap;gap:6px;">' +
          '<span style="font-weight:700;color:#1a3a5c;">' + escHtml(post.post) + '</span>' +
          '<span style="font-size:.8rem;color:#6b7280;">' + participated + ' voted</span>' +
        '</div>' +
        '<div class="panel-card-body" style="padding:0;">';

      if (res.blackout) {
        // Blackout mode — show candidate count and participation only
        html +=
          '<div style="padding:14px 16px;font-size:.87rem;color:#6b7280;">' +
            post.candCount + ' candidate' + (post.candCount !== 1 ? 's' : '') +
            ' — results hidden until voting closes.' +
          '</div>';
      } else {
        // Full tally mode
        var postTotal = 0;
        post.candidates.forEach(function(c) { postTotal += (c.votes || 0); });
        postTotal += (post.nota || 0);

        post.candidates.forEach(function(cand, idx) {
          var votes   = cand.votes || 0;
          var pct     = postTotal > 0 ? Math.round((votes / postTotal) * 1000) / 10 : 0;
          var isWinner = (idx === 0 && votes > 0);
          var barWidth = postTotal > 0 ? Math.round((votes / postTotal) * 100) : 0;

          html +=
            '<div style="padding:12px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') + '">' +
              '<div style="display:flex;justify-content:space-between;align-items:center;' +
                'margin-bottom:6px;">' +
                '<div>' +
                  '<span style="font-weight:600;color:#1a3a5c;font-size:.88rem;">' +
                    escHtml(cand.name) +
                  '</span>' +
                  (isWinner && (res.elecStatus === 'closed' || res.elecStatus === 'declared') ?
                    ' <span style="font-size:.72rem;background:#dcfce7;color:#166534;' +
                    'padding:2px 7px;border-radius:10px;font-weight:700;margin-left:4px;">✓ Winner</span>'
                  : '') +
                  '<div style="font-size:.75rem;color:#9ca3af;margin-top:1px;">Roll: ' +
                    escHtml(cand.roll) + '</div>' +
                '</div>' +
                '<div style="text-align:right;">' +
                  '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;">' + votes + '</div>' +
                  '<div style="font-size:.75rem;color:#6b7280;">' + pct + '%</div>' +
                '</div>' +
              '</div>' +
              '<div style="background:#f3f4f6;border-radius:4px;height:6px;overflow:hidden;">' +
                '<div style="background:#1a3a5c;height:100%;width:' + barWidth + '%;' +
                  'border-radius:4px;transition:width .3s;"></div>' +
              '</div>' +
            '</div>';
        });

        // NOTA row
        if (post.nota > 0) {
          var notaPct = postTotal > 0 ? Math.round((post.nota / postTotal) * 1000) / 10 : 0;
          var notaBar = postTotal > 0 ? Math.round((post.nota / postTotal) * 100) : 0;
          html +=
            '<div style="padding:12px 16px;border-top:1px solid #f3f4f6;">' +
              '<div style="display:flex;justify-content:space-between;align-items:center;' +
                'margin-bottom:6px;">' +
                '<span style="font-size:.88rem;color:#6b7280;font-style:italic;">NOTA</span>' +
                '<div style="text-align:right;">' +
                  '<div style="font-size:1.1rem;font-weight:700;color:#6b7280;">' + post.nota + '</div>' +
                  '<div style="font-size:.75rem;color:#9ca3af;">' + notaPct + '%</div>' +
                '</div>' +
              '</div>' +
              '<div style="background:#f3f4f6;border-radius:4px;height:6px;overflow:hidden;">' +
                '<div style="background:#9ca3af;height:100%;width:' + notaBar + '%;' +
                  'border-radius:4px;"></div>' +
              '</div>' +
            '</div>';
        }
      }

      html += '</div></div>';
    });

    // Co-sign panel — only for closed/declared
    var st = res.elecStatus;
    if (st === 'closed' || st === 'declared') {
      html +=
        '<div class="panel-card" style="margin-bottom:16px;border:1.5px solid #1a3a5c;">' +
          '<div class="panel-card-header">Tally Co-Sign</div>' +
          '<div class="panel-card-body">' +
            '<div style="font-size:.85rem;color:#555;margin-bottom:12px;">' +
              'Enter your confirmation statement and co-sign the tally. ' +
              'This is recorded permanently in the audit log.' +
            '</div>' +
            '<textarea id="tally-cosign-text" rows="2" ' +
              'placeholder="e.g. I have verified the tally and confirm it is correct." ' +
              'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
              'border-radius:4px;box-sizing:border-box;resize:vertical;margin-bottom:10px;"></textarea>' +
            '<div id="tally-cosign-err" ' +
              'style="color:#c0392b;font-size:.83rem;margin-bottom:8px;display:none;"></div>' +
            '<button onclick="AdminPanel._submitTallyCoSign(\'' +
              escHtml(res.electionId) + '\')" id="btn-tally-cosign" ' +
              'style="width:100%;padding:13px;font-size:.9rem;background:#1a3a5c;color:#fff;' +
              'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
              'Co-sign Tally' +
            '</button>' +
          '</div>' +
        '</div>';
    }

    return html;
  },

    if (candidates.length === 0) {
      return '<div class="panel-card">' +
        '<div class="panel-card-body" style="text-align:center;padding:40px 16px;color:#6b7280;">' +
        '<div style="font-size:1.5rem;margin-bottom:8px;">☰</div>' +
        '<div style="font-weight:600;color:#374151;">No candidates yet</div>' +
        '<div style="font-size:.85rem;margin-top:6px;">Candidates appear here when nominations are accepted in Scrutiny.</div>' +
        '</div></div>';
    }

    var locked = ['candidates_published','active','paused','closed','declared']
                   .indexOf(elecStatus) !== -1;

    // Group by post
    var postMap = {};
    candidates.forEach(function(c) {
      var post = c.post || 'Unknown';
      if (!postMap[post]) postMap[post] = { order: c.postOrder || 999, candidates: [] };
      postMap[post].candidates.push(c);
    });

    // Sort posts by order
    var posts = Object.keys(postMap).sort(function(a, b) {
      return postMap[a].order - postMap[b].order;
    });

    var html = '';

    // Summary line
    html += '<div style="font-size:.85rem;color:#6b7280;margin-bottom:14px;">' +
      candidates.length + ' candidate' + (candidates.length !== 1 ? 's' : '') +
      ' across ' + posts.length + ' post' + (posts.length !== 1 ? 's' : '') +
      (locked ? ' &nbsp;·&nbsp; <span style="color:#b91c1c;">Deletions locked</span>' : '') +
      '</div>';

    posts.forEach(function(postName) {
      var group = postMap[postName];
      var count = group.candidates.length;

      // Post status badge
      var postBadge, postBadgeStyle;
      if (count === 0) {
        postBadge = 'Vacant'; postBadgeStyle = 'background:#fef2f2;color:#b91c1c;';
      } else if (count === 1) {
        postBadge = 'Uncontested'; postBadgeStyle = 'background:#fef9c3;color:#92400e;';
      } else {
        postBadge = 'Contested (' + count + ')'; postBadgeStyle = 'background:#dcfce7;color:#166534;';
      }

      html += '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header" style="display:flex;justify-content:space-between;' +
          'align-items:center;flex-wrap:wrap;gap:6px;">' +
          '<span style="font-weight:700;color:#1a3a5c;">' + escHtml(postName) + '</span>' +
          '<span style="font-size:.78rem;padding:3px 10px;border-radius:12px;font-weight:600;' +
            postBadgeStyle + '">' + postBadge + '</span>' +
        '</div>' +
        '<div class="panel-card-body" style="padding:0;">';

      group.candidates.forEach(function(cand, idx) {
        html +=
          '<div style="padding:12px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') +
            'display:flex;justify-content:space-between;align-items:center;gap:8px;">' +
            '<div>' +
              '<div style="font-weight:600;color:#1a3a5c;font-size:.9rem;">' +
                escHtml(cand.name) +
              '</div>' +
              '<div style="font-size:.8rem;color:#6b7280;margin-top:2px;">' +
                'Roll: ' + escHtml(cand.roll) +
                (cand.batch ? ' &nbsp;·&nbsp; Batch: ' + escHtml(cand.batch) : '') +
              '</div>' +
            '</div>' +
            (!locked ?
              '<button onclick="AdminPanel._confirmDeleteCandidate(\'' +
                escHtml(cand.id) + '\',\'' + escHtml(cand.name) + '\')" ' +
                'style="padding:7px 14px;font-size:.8rem;background:#fff;color:#b91c1c;' +
                'border:1.5px solid #b91c1c;border-radius:4px;cursor:pointer;white-space:nowrap;">' +
                'Delete' +
              '</button>'
            :
              '<span style="font-size:.75rem;color:#9ca3af;">Locked</span>'
            ) +
          '</div>';
      });

      html += '</div></div>';
    });

    return html;
  },

  _confirmDeleteCandidate: function(candId, candName) {
    if (!confirm('Delete candidate "' + candName + '"?\n\nThis will also return the nomination to Pending Scrutiny. This cannot be undone after the candidate list is published.')) return;
    AdminPanel._deleteCandidate(candId);
  },

  _deleteCandidate: function(candId) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          showToast('Candidate deleted. Nomination returned to scrutiny.');
          AdminPanel._loadCandList(AdminPanel._candSelectedElec);
        } else {
          showToast((res && res.message) || 'Delete failed.');
        }
      })
      .withFailureHandler(function() { showToast('Error — please try again.'); })
      .deleteCandidate(App.token, candId, getTEMAuthId());
  },

// ── SCRUTINY TAB ─────────────────────────────────────────────

_loadScrutiny: function() {
  var c = document.getElementById('scrutiny-content');
  if (!c) return;

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success || !res.elections || res.elections.length === 0) {
        var c2 = document.getElementById('scrutiny-content');
        if (!c2) return;
        c2.innerHTML =
          '<div class="panel-card"><div class="panel-card-body" ' +
          'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
          '<div style="font-size:1.5rem;margin-bottom:8px;">[VOTE]</div>' +
          '<div style="font-weight:600;color:#374151;">No elections found</div>' +
          '</div></div>';
        return;
      }
      AdminPanel._scrutinySelectedElec = res.elections[0].id;
      AdminPanel._renderScrutinyShell(res.elections);
      AdminPanel._loadScrutinyList(res.elections[0].id);
    })
    .withFailureHandler(function() {
      var c2 = document.getElementById('scrutiny-content');
      if (c2) c2.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading elections.</div>';
    })
    .getAllElections(App.token);
},

_scrutinySelectedElec: '',

_renderScrutinyShell: function(elections) {
  var c = document.getElementById('scrutiny-content');
  if (!c) return;

  var selHtml = '<select id="scrutiny-elec-sel" ' +
    'onchange="AdminPanel._onScrutinyElecChange()" ' +
    'style="width:100%;padding:12px 10px;font-size:.9rem;border:1px solid #d1d5db;' +
    'border-radius:4px;box-sizing:border-box;margin-bottom:16px;">';
  elections.forEach(function(e) {
    selHtml += '<option value="' + escHtml(e.id) + '"' +
      (e.id === AdminPanel._scrutinySelectedElec ? ' selected' : '') + '>' +
      escHtml(e.title) + ' [' + escHtml(e.status.replace(/_/g,' ')) + ']' +
      '</option>';
  });
  selHtml += '</select>';

  c.innerHTML =
    selHtml +
    '<div id="scrutiny-list-area">' +
      '<div style="text-align:center;padding:24px;color:#6b7280;">' +
      '<div class="spinner"></div></div>' +
    '</div>';
},

_onScrutinyElecChange: function() {
  var sel = document.getElementById('scrutiny-elec-sel');
  if (!sel) return;
  AdminPanel._scrutinySelectedElec = sel.value;
  AdminPanel._loadScrutinyList(sel.value);
},

_loadScrutinyList: function(elecId) {
  var area = document.getElementById('scrutiny-list-area');
  if (!area) return;
  area.innerHTML =
    '<div style="text-align:center;padding:24px;color:#6b7280;">' +
    '<div class="spinner"></div></div>';

  google.script.run
    .withSuccessHandler(function(res) {
      var area2 = document.getElementById('scrutiny-list-area');
      if (!area2) return;
      if (!res || !res.success) {
        area2.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load nominations.') + '</div>';
        return;
      }
      area2.innerHTML = AdminPanel._renderScrutinyList(res.nominations || []);
    })
    .withFailureHandler(function() {
      var area2 = document.getElementById('scrutiny-list-area');
      if (area2) area2.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading nominations.</div>';
    })
    .getNominations(App.token, elecId);
},

_renderScrutinyList: function(noms) {
  var pending = [], completed = [];
  noms.forEach(function(n) {
    var s = (n.status || '').toLowerCase();
    if (s === 'accepted' || s === 'rejected' || s === 'withdrawn') {
      completed.push(n);
    } else if (s === 'confirmed' || s === 'pending_scrutiny') {
      pending.push(n);
    }
  });

  var html = '';

  html += '<div style="font-size:.9rem;font-weight:700;color:#1a3a5c;' +
    'margin-bottom:10px;margin-top:4px;">Pending Scrutiny (' + pending.length + ')</div>';

  if (pending.length === 0) {
    html += '<div class="panel-card" style="margin-bottom:16px;">' +
      '<div class="panel-card-body" style="text-align:center;padding:24px 16px;' +
      'color:#6b7280;font-size:.88rem;">No nominations awaiting scrutiny.</div></div>';
  } else {
    pending.forEach(function(n) {
      html += AdminPanel._scrutinyNomCard(n, false);
    });
  }

  html += '<div style="font-size:.9rem;font-weight:700;color:#1a3a5c;' +
    'margin-bottom:10px;margin-top:20px;">Completed (' + completed.length + ')</div>';

  if (completed.length === 0) {
    html += '<div class="panel-card">' +
      '<div class="panel-card-body" style="text-align:center;padding:24px 16px;' +
      'color:#6b7280;font-size:.88rem;">No completed scrutiny records.</div></div>';
  } else {
    completed.forEach(function(n) {
      html += AdminPanel._scrutinyNomCard(n, true);
    });
  }

  return html;
},

_scrutinyNomCard: function(n, isCompleted) {
  var statusBadge = {
    confirmed:        'badge-scrutiny',
    pending_scrutiny: 'badge-scrutiny',
    accepted:         'badge-active',
    rejected:         'badge-closed',
    withdrawn:        'badge-draft'
  };
  var badge = statusBadge[(n.status||'').toLowerCase()] || 'badge-draft';
  var statusLabel = (n.status || '').replace(/_/g,' ');

  return '<div class="panel-card" style="margin-bottom:10px;">' +
    '<div class="panel-card-body" style="padding:14px 16px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
        'gap:8px;margin-bottom:6px;flex-wrap:wrap;">' +
        '<div style="font-weight:600;color:#1a3a5c;font-size:.93rem;">' +
          escHtml(n.candName || '—') +
        '</div>' +
        '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span>' +
      '</div>' +
      '<div style="font-size:.83rem;color:#555;margin-bottom:10px;">' +
        'Post: <strong>' + escHtml(n.post || '—') + '</strong>' +
        (n.candRoll ? ' &nbsp;·&nbsp; Roll: ' + escHtml(n.candRoll) : '') +
        (n.candBatch ? ' &nbsp;·&nbsp; Batch: ' + escHtml(n.candBatch) : '') +
      '</div>' +
      (!isCompleted && App.role !== 'SCRUTINEER' ?
        '<button onclick="AdminPanel._openScrutinyDetail(\'' + escHtml(n.id) + '\')" ' +
          'style="width:100%;padding:11px;font-size:.88rem;background:#1a3a5c;color:#fff;' +
          'border:none;border-radius:4px;cursor:pointer;">Scrutinise</button>'
      :
        '<button onclick="AdminPanel._openScrutinyDetail(\'' + escHtml(n.id) + '\')" ' +
          'style="width:100%;padding:11px;font-size:.88rem;background:#fff;color:#1a3a5c;' +
          'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">View Record</button>'
      ) +
    '</div></div>';
},

_openScrutinyDetail: function(nomId) {
  var c = document.getElementById('scrutiny-content');
  if (!c) return;

  c.innerHTML =
    '<div style="margin-bottom:12px;">' +
      '<button onclick="AdminPanel._loadScrutiny()" ' +
        'style="width:100%;padding:12px;font-size:1rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">← Back to Scrutiny List</button>' +
    '</div>' +
    '<div id="scrutiny-detail-area">' +
      '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
      '<div class="spinner"></div>' +
      '<div style="font-size:.85rem;margin-top:12px;">Loading nomination data…</div>' +
      '</div>' +
    '</div>';

  google.script.run
    .withSuccessHandler(function(res) {
      var area = document.getElementById('scrutiny-detail-area');
      if (!area) return;
      if (!res || !res.success) {
        area.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          escHtml((res && res.message) || 'Failed to load scrutiny data.') + '</div>';
        return;
      }
      AdminPanel._renderScrutinyDetail(res.nomination, res.checklist);
    })
    .withFailureHandler(function() {
      var area = document.getElementById('scrutiny-detail-area');
      if (area) area.innerHTML =
        '<div style="padding:16px;color:#c0392b;font-size:.9rem;">Error loading data.</div>';
    })
    .getScrutinyData(App.token, nomId);
},

_renderScrutinyDetail: function(nom, checklist) {
  var area = document.getElementById('scrutiny-detail-area');
  if (!area) return;

  var statusBadge = {
    confirmed: 'badge-scrutiny',
    accepted:  'badge-active',
    rejected:  'badge-closed',
    withdrawn: 'badge-draft'
  };
  var badge = statusBadge[(nom.status||'').toLowerCase()] || 'badge-draft';
  var statusLabel = (nom.status || '').replace(/_/g,' ');
  var isEditable = ((nom.status||'').toLowerCase() === 'confirmed' ||
                   (nom.status||'').toLowerCase() === 'pending_scrutiny') &&
                   App.role !== 'SCRUTINEER';

  var CHECKLIST_ITEMS = [
    { key: 'post_eligibility',  label: 'Post eligibility satisfied (EC service, batch, or other post-specific criteria)' },
    { key: 'tenure_bar',        label: 'Consecutive tenure bar clear (6-year rule; N/A for Batch Representative nominations)' },
    { key: 'one_post',          label: 'One-post rule — no other nomination by this candidate currently accepted' },
    { key: 'proposer',          label: 'Proposer confirmation received' },
    { key: 'seconder',          label: 'Seconder confirmation received' },
    { key: 'consent',           label: 'Candidate consent obtained' }
  ];

  var CHECK_RESULTS = ['Pending', 'Yes', 'No', 'N/A'];

  var checkMap = {};
  (checklist || []).forEach(function(item) {
    checkMap[item.checkItem] = { result: item.checkResult, notes: item.notes || '' };
  });

  var html =
    '<div class="panel-card" style="margin-bottom:12px;">' +
      '<div class="panel-card-header">Candidate Information</div>' +
      '<div class="panel-card-body">' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:.87rem;">' +
          '<div><span style="color:#888;">Name</span><br>' +
            '<strong>' + escHtml(nom.candName || '—') + '</strong></div>' +
          '<div><span style="color:#888;">Roll No</span><br>' +
            '<strong>' + escHtml(nom.candRoll || '—') + '</strong></div>' +
          '<div><span style="color:#888;">Batch</span><br>' +
            '<strong>' + escHtml(nom.candBatch || '—') + '</strong></div>' +
          '<div><span style="color:#888;">Post</span><br>' +
            '<strong>' + escHtml(nom.post || '—') + '</strong></div>' +
            '<div><span style="color:#888;">Entry Method</span><br>' +
            '<strong>' + escHtml(
              nom.entryMethod === 'online'        ? 'Phase 1 (self-nomination)' :
              nom.entryMethod === 'phase2_online' ? 'Phase 2 (proposed by member)' :
              nom.entryMethod === 'manual_ro'     ? 'Manual (RO entry)' :
              nom.entryMethod || '—'
            ) + '</strong></div>' +
          '<div style="grid-column:1/-1;"><span style="color:#888;">Status</span><br>' +
            '<span class="status-badge ' + badge + '">' + escHtml(statusLabel) + '</span></div>' +
        '</div>' +
        (nom.rejectionReason ?
          '<div style="margin-top:12px;padding:10px;background:#fef2f2;' +
          'border-radius:4px;font-size:.85rem;color:#b91c1c;">' +
          '<strong>Rejection reason:</strong> ' + escHtml(nom.rejectionReason) + '</div>'
        : '') +
        (nom.reinstated ?
          '<div style="margin-top:12px;padding:10px;background:#f0fdf4;' +
          'border-radius:4px;font-size:.85rem;color:#166534;">' +
          '⚖ <strong>Reinstated by appeal decision.</strong></div>'
        : '') +
      '</div>' +
    '</div>';
    // Undo button — only for accepted/rejected, only if RO_ADMIN or DEPUTY_RO
  var nomStatus = (nom.status || '').toLowerCase();
  if ((nomStatus === 'accepted' || nomStatus === 'rejected') && !nom.reinstated) {
    var undoLabel  = nomStatus === 'accepted' ? 'Undo Acceptance' : 'Undo Rejection';
    var undoFn     = nomStatus === 'accepted'
      ? 'AdminPanel._undoAccept(\'' + escHtml(nom.id) + '\')'
      : 'AdminPanel._undoReject(\'' + escHtml(nom.id) + '\')';

    html +=
      '<div id="undo-nom-panel" style="margin-bottom:16px;">' +
        '<div class="panel-card" style="border:1.5px solid #f59e0b;">' +
          '<div class="panel-card-body">' +
            '<div style="font-weight:600;color:#92400e;margin-bottom:8px;font-size:.9rem;">' +
              '⚠ Reverse Decision' +
            '</div>' +
            '<div style="font-size:.85rem;color:#555;margin-bottom:12px;">' +
              'This will return the nomination to Pending Scrutiny. ' +
              'This action is locked once the candidate list is published.' +
            '</div>' +
            '<div id="undo-nom-err" style="color:#c0392b;font-size:.83rem;margin-bottom:8px;display:none;"></div>' +
            '<button onclick="' + undoFn + '" id="btn-undo-nom" ' +
              'style="width:100%;padding:12px;font-size:.9rem;background:#92400e;color:#fff;' +
              'border:none;border-radius:4px;cursor:pointer;font-weight:600;">' +
              undoLabel +
            '</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  html += '<div class="panel-card" style="margin-bottom:12px;">' +
    '<div class="panel-card-header">Scrutiny Checklist</div>' +
    '<div class="panel-card-body" style="padding:0;">';

  CHECKLIST_ITEMS.forEach(function(item, idx) {
    var current = checkMap[item.key] || { result: 'Pending', notes: '' };
    var resultKey = (current.result || 'Pending');

    var btnHtml = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 6px;">';
    CHECK_RESULTS.forEach(function(r) {
      var isActive = (r === resultKey);
      var col = isActive
        ? (r === 'Yes' ? '#166534' : r === 'No' ? '#b91c1c' : r === 'N/A' ? '#374151' : '#92400e')
        : '#6b7280';
      var bg  = isActive
        ? (r === 'Yes' ? '#dcfce7' : r === 'No' ? '#fef2f2' : r === 'N/A' ? '#f3f4f6' : '#fef9c3')
        : '#fff';
      var border = isActive ? col : '#d1d5db';
      var onclickArgs = '\'' + escHtml(nom.id) + '\',\'' + escHtml(item.key) + '\',\'' + r + '\'';
      btnHtml +=
        '<button onclick="AdminPanel._setCheckResult(' + onclickArgs + ')" ' +
          'id="chkbtn-' + escHtml(nom.id) + '-' + item.key + '-' + r + '" ' +
          (isEditable ? '' : 'disabled ') +
          'style="padding:7px 12px;font-size:.78rem;border-radius:4px;' +
          'border:1.5px solid ' + border + ';background:' + bg + ';color:' + col + ';' +
          'cursor:' + (isEditable ? 'pointer' : 'default') + ';white-space:nowrap;">' +
          r +
        '</button>';
    });
    btnHtml += '</div>';

    var notesHtml = isEditable
      ? '<input type="text" id="chknotes-' + escHtml(nom.id) + '-' + item.key + '" ' +
          'value="' + escHtml(current.notes) + '" ' +
          'placeholder="Notes (optional)" ' +
          'onblur="AdminPanel._saveCheckItemNotes(\'' + escHtml(nom.id) + '\',\'' +
            escHtml(item.key) + '\')" ' +
          'style="width:100%;padding:8px 10px;font-size:.82rem;border:1px solid #e5e7eb;' +
          'border-radius:4px;box-sizing:border-box;margin-bottom:2px;" />'
      : (current.notes
          ? '<div style="font-size:.8rem;color:#6b7280;padding:2px 0 4px;">' +
              escHtml(current.notes) + '</div>'
          : '');

    html +=
      '<div style="padding:12px 16px;' + (idx > 0 ? 'border-top:1px solid #f3f4f6;' : '') + '">' +
        '<div style="font-size:.87rem;font-weight:600;color:#374151;margin-bottom:2px;">' +
          (idx + 1) + '. ' + escHtml(item.label) +
        '</div>' +
        btnHtml +
        notesHtml +
      '</div>';
  });

  html += '</div></div>';

  // Manual RO nominations: show doc uploader on scrutiny page
  // Needed when docs couldn't be uploaded at nomination stage (e.g. election already advanced)
  if (nom.entryMethod === 'manual_ro') {
    html +=
      '<div class="panel-card" style="margin-bottom:12px;" id="sc-doc-uploader-card">' +
        '<div class="panel-card-header">Supporting Documents (Required — 3 minimum)</div>' +
        '<div class="panel-card-body">' +
          '<div style="font-size:.82rem;color:#6b7280;margin-bottom:10px;">' +
            'Upload nomination paper, proposer confirmation, and seconder confirmation. ' +
            'Acceptance is blocked until 3 documents are present for this nomination.' +
          '</div>' +
          '<div id="sc-doc-uploader-' + escHtml(nom.id) + '"></div>' +
        '</div>' +
      '</div>';
    setTimeout(function() {
      var el = document.getElementById('sc-doc-uploader-' + nom.id);
      if (el) {
        el.innerHTML = AdminPanel._renderDocUploader({
          electionId:    nom.elecId,
          category:      'manual_ro_nomination',
          categoryLabel: 'Nomination Documents',
          containerId:   'sc-doc-uploader-' + nom.id,
          nomRef:        nom.id
        });
      }
    }, 0);
  }

  if (isEditable) {
    html +=
      '<div id="scrutiny-action-err" ' +
        'style="color:#c0392b;font-size:.87rem;margin-bottom:6px;display:none;"></div>' +

      '<div style="display:flex;gap:10px;margin-bottom:16px;">' +
        '<button onclick="AdminPanel._acceptNom(\'' + escHtml(nom.id) + '\')" ' +
          'id="btn-accept-nom" ' +
          'style="flex:1;padding:14px;font-size:.95rem;background:#166534;color:#fff;' +
          'border:none;border-radius:4px;cursor:pointer;font-weight:600;">✓ Accept</button>' +
        '<button onclick="AdminPanel._rejectNomPrompt(\'' + escHtml(nom.id) + '\')" ' +
          'id="btn-reject-nom" ' +
          'style="flex:1;padding:14px;font-size:.95rem;background:#b91c1c;color:#fff;' +
          'border:none;border-radius:4px;cursor:pointer;font-weight:600;">✗ Reject</button>' +
      '</div>' +

      '<div id="reject-nom-panel" style="display:none;margin-bottom:16px;">' +
        '<div class="panel-card">' +
          '<div class="panel-card-body">' +
            '<div style="font-weight:600;color:#b91c1c;margin-bottom:10px;font-size:.9rem;">' +
              'Rejection Reason (required)' +
            '</div>' +
            '<textarea id="reject-reason-text" rows="3" ' +
              'placeholder="State the specific ground(s) for rejection…" ' +

_setCheckResult: function(nomId, checkItem, result) {
  var results = ['Pending','Yes','No','N/A'];
  results.forEach(function(r) {
    var btn = document.getElementById('chkbtn-' + nomId + '-' + checkItem + '-' + r);
    if (!btn) return;
    var isActive = (r === result);
    var col = isActive
      ? (r === 'Yes' ? '#166534' : r === 'No' ? '#b91c1c' : r === 'N/A' ? '#374151' : '#92400e')
      : '#6b7280';
    var bg  = isActive
      ? (r === 'Yes' ? '#dcfce7' : r === 'No' ? '#fef2f2' : r === 'N/A' ? '#f3f4f6' : '#fef9c3')
      : '#fff';
    btn.style.borderColor = isActive ? col : '#d1d5db';
    btn.style.background  = bg;
    btn.style.color       = col;
  });

  var notesEl = document.getElementById('chknotes-' + nomId + '-' + checkItem);
  if (notesEl) notesEl.setAttribute('data-result', result);
  var notes   = notesEl ? notesEl.value.trim() : '';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) showToast((res && res.message) || 'Save failed.');
    })
    .withFailureHandler(function() { showToast('Error saving checklist item.'); })
    .saveScrutinyItem(App.token, nomId, checkItem, result, notes);
},

_saveCheckItemNotes: function(nomId, checkItem) {
  var notesEl = document.getElementById('chknotes-' + nomId + '-' + checkItem);
  if (!notesEl) return;
  var currentResult = notesEl.getAttribute('data-result') || 'Pending';
  google.script.run
    .withSuccessHandler(function() {})
    .withFailureHandler(function() {})
    .saveScrutinyItem(App.token, nomId, checkItem, currentResult, notesEl.value.trim());
},

_acceptNom: function(nomId) {
  var btn  = document.getElementById('btn-accept-nom');
  var errEl = document.getElementById('scrutiny-action-err');
  if (btn) { btn.textContent = 'Accepting…'; btn.disabled = true; }
  if (errEl) errEl.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Nomination accepted.');
        AdminPanel._loadScrutiny();
      } else if (res && res.requiresDocs) {
        if (btn) { btn.textContent = '✓ Accept'; btn.disabled = false; }
        var docsMsg = 'Manual RO nomination requires 3 supporting documents. ' +
          (res.docsPresent || 0) + ' of 3 uploaded. ' +
          'Please upload all documents in the Documents tab before accepting.';
        if (errEl) { errEl.textContent = docsMsg; errEl.style.display = 'block'; }
      } else {
        if (btn) { btn.textContent = '✓ Accept'; btn.disabled = false; }
        if (errEl) { errEl.textContent = (res && res.message) || 'Accept failed.'; errEl.style.display = 'block'; }
      }
    })
    .withFailureHandler(function() {
      if (btn) { btn.textContent = '✓ Accept'; btn.disabled = false; }
      if (errEl) { errEl.textContent = 'Error — please try again.'; errEl.style.display = 'block'; }
    })
    .acceptNomination(App.token, nomId, getTEMAuthId());
},

_undoAccept: function(nomId) {

_confirmRejectNom: function(nomId) {
  var reasonEl = document.getElementById('reject-reason-text');
  var errEl    = document.getElementById('reject-reason-err');
  var reason   = reasonEl ? reasonEl.value.trim() : '';

  if (!reason) {
    if (errEl) { errEl.textContent = 'Rejection reason is required.'; errEl.style.display = 'block'; }
    return;
  }
  if (errEl) errEl.style.display = 'none';

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('Nomination rejected.');
        AdminPanel._loadScrutiny();
      } else {
        var e2 = document.getElementById('reject-reason-err');
        if (e2) { e2.textContent = (res && res.message) || 'Reject failed.'; e2.style.display = 'block'; }
        var btn = document.getElementById('btn-reject-nom');
        if (btn) btn.disabled = false;
      }
    })
    .withFailureHandler(function() {
      var e2 = document.getElementById('reject-reason-err');
      if (e2) { e2.textContent = 'Error — please try again.'; e2.style.display = 'block'; }
      var btn = document.getElementById('btn-reject-nom');
      if (btn) btn.disabled = false;
    })
    .rejectNomination(App.token, nomId, reason, getTEMAuthId());
},

_renderAdminLog: function(res, filter) {
  var entries = res.entries || [];
  var total   = res.total   || 0;
  var page    = res.page    || 1;
  var pages   = res.pages   || 1;

  var html =
    '<div style="font-size:.82rem;color:#6b7280;margin-bottom:12px;padding:0 2px;">' +
      '<strong style="color:#374151;">' + total + '</strong> entr' +
      (total !== 1 ? 'ies' : 'y') +
      (filter ? ' matching <em>' + escHtml(filter) + '</em>' : '') +
      ' &nbsp;·&nbsp; Page ' + page + ' of ' + pages +
    '</div>';

  if (entries.length === 0) {
    html += '<div class="panel-card"><div class="panel-card-body" ' +
      'style="text-align:center;padding:40px 16px;color:#6b7280;">' +
      '<div style="font-size:1.5rem;margin-bottom:8px;">☰</div>' +
      '<div style="font-weight:600;color:#374151;">No log entries found</div>' +
      '</div></div>';
    return html;
  }

  entries.forEach(function(e) {
    var ts = fmtIST(e.timestamp);
    html +=
      '<div style="padding:11px 14px;border-bottom:1px solid #f3f4f6;">' +
        '<div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:4px;">' +
          '<span style="font-size:.8rem;font-weight:700;color:#1a3a5c;' +
            'background:#eff6ff;border-radius:3px;padding:2px 7px;">' +
            escHtml(e.actionType) + '</span>' +
          '<span style="font-size:.75rem;color:#9ca3af;">' + escHtml(ts) + '</span>' +
        '</div>' +
        '<div style="font-size:.85rem;color:#111827;margin-bottom:3px;">' +
          escHtml(e.description) + '</div>' +
        '<div style="font-size:.75rem;color:#6b7280;">' +
          'By: <strong>' + escHtml(e.adminId) + '</strong>' +
          (e.oldValue || e.newValue
            ? ' &nbsp;·&nbsp; ' + escHtml(e.oldValue) + ' → ' + escHtml(e.newValue)
            : '') +
        '</div>' +
      '</div>';
  });

  html = '<div class="panel-card" style="margin-bottom:12px;padding:0;overflow:hidden;">' +
    html + '</div>';

  if (pages > 1) {
    html += '<div style="display:flex;gap:8px;justify-content:center;margin-top:4px;flex-wrap:wrap;">';
    if (page > 1) {
      html += '<button onclick="AdminPanel._loadAdminLog(' + (page-1) + ',\'' +
        escHtml(filter) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">← Prev</button>';
    }
    html += '<span style="padding:10px 8px;font-size:.85rem;color:#6b7280;">' +
      page + ' / ' + pages + '</span>';
    if (page < pages) {
      html += '<button onclick="AdminPanel._loadAdminLog(' + (page+1) + ',\'' +
        escHtml(filter) + '\')" ' +
        'style="padding:10px 18px;font-size:.85rem;background:#fff;color:#1a3a5c;' +
        'border:1.5px solid #1a3a5c;border-radius:4px;cursor:pointer;">Next →</button>';
    }
    html += '</div>';
  }

  return html;
},

    })

_renderComplaints: function(complaints) {
  var statusLabels = {
    filed:               'Filed',
    under_review:        'Under Review',
    resolved_upheld:     'Resolved — Upheld',
    resolved_dismissed:  'Resolved — Dismissed',
    referred_to_ec:      'Referred to EC'
  };
  var statusColors = {
    filed:               '#fef3c7',
    under_review:        '#eff6ff',
    resolved_upheld:     '#d1fae5',
    resolved_dismissed:  '#f3f4f6',
    referred_to_ec:      '#fce7f3'
  };

  var html =
    '<div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">' +
      '<div style="font-size:.9rem;color:#6b7280;">' +
        '<strong style="color:#374151;">' + complaints.length + '</strong> complaint' +
        (complaints.length !== 1 ? 's' : '') + ' on record' +
      '</div>' +
    '</div>';

  if (complaints.length === 0) {
    html +=
      '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
        '<div style="font-size:2rem;margin-bottom:12px;">[EMPTY]</div>' +
        '<div style="font-size:.95rem;font-weight:600;color:#374151;margin-bottom:6px;">No Complaints</div>' +
        '<div style="font-size:.85rem;">No complaints have been filed for this election.</div>' +
      '</div>';
    return html;
  }

  for (var i = 0; i < complaints.length; i++) {
    var cmp = complaints[i];
    var bgColor = statusColors[cmp.status] || '#f9fafb';
    var statusLabel = statusLabels[cmp.status] || cmp.status;
    html +=
      '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;' +
      'padding:16px;margin-bottom:14px;">' +

        '<div style="display:flex;justify-content:space-between;align-items:flex-start;' +
        'gap:8px;margin-bottom:10px;">' +
          '<div>' +
            '<div style="font-size:.78rem;color:#9ca3af;margin-bottom:2px;">' +
              escHtml(cmp.id) + '</div>' +
            '<div style="font-size:.82rem;color:#6b7280;">' +
              'Filed by: <strong>' + escHtml(cmp.filedByRoll) + '</strong>' +
              ' · ' + escHtml(cmp.filedAt.toString().split('T')[0] || cmp.filedAt.toString()) +
            '</div>' +
          '</div>' +
          '<span style="font-size:.75rem;padding:3px 10px;border-radius:10px;font-weight:600;' +
            'background:' + bgColor + ';white-space:nowrap;">' +
            escHtml(statusLabel) +
          '</span>' +
        '</div>' +

        (cmp.againstRoll || cmp.againstName ?
          '<div style="font-size:.85rem;color:#374151;margin-bottom:6px;">Against: <strong>' +
          (cmp.againstRoll ? escHtml(cmp.againstRoll) + ' ' : '') +
          (cmp.againstName ? escHtml(cmp.againstName) : '') +
          '</strong></div>' : '') +
        (cmp.channel ? '<div style="font-size:.85rem;color:#374151;margin-bottom:6px;">Channel: ' + escHtml(cmp.channel) + '</div>' : '') +

        '<div style="font-size:.88rem;color:#1f2937;background:#f9fafb;border-radius:6px;' +
        'padding:10px 12px;margin-bottom:12px;line-height:1.5;">' +
          escHtml(cmp.complaintText) +
        '</div>' +

        (cmp.roNotes ? '<div style="font-size:.82rem;color:#374151;margin-bottom:6px;">' +
          '<strong>RO Notes:</strong> ' + escHtml(cmp.roNotes) + '</div>' : '') +
        (cmp.resolution ? '<div style="font-size:.82rem;color:#374151;margin-bottom:10px;">' +
          '<strong>Resolution:</strong> ' + escHtml(cmp.resolution) + '</div>' : '') +

        '<div style="border-top:1px solid #f3f4f6;padding-top:12px;">' +
          '<div style="font-size:.82rem;font-weight:600;color:#374151;margin-bottom:8px;">Update Status</div>' +
          '<select id="cmp-status-' + i + '" ' +
            'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
            'border-radius:4px;margin-bottom:8px;box-sizing:border-box;">' +
            '<option value="filed"' +              (cmp.status==='filed'?              ' selected':'') + '>Filed</option>' +
            '<option value="under_review"' +       (cmp.status==='under_review'?       ' selected':'') + '>Under Review</option>' +
            '<option value="resolved_upheld"' +    (cmp.status==='resolved_upheld'?    ' selected':'') + '>Resolved — Upheld</option>' +
            '<option value="resolved_dismissed"' + (cmp.status==='resolved_dismissed'? ' selected':'') + '>Resolved — Dismissed</option>' +
            '<option value="referred_to_ec"' +     (cmp.status==='referred_to_ec'?     ' selected':'') + '>Referred to EC</option>' +
          '</select>' +
          '<textarea id="cmp-notes-' + i + '" placeholder="RO notes (optional)…" ' +
            'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
            'border-radius:4px;margin-bottom:8px;box-sizing:border-box;min-height:60px;' +
            'font-family:Arial,sans-serif;resize:vertical;">' +
            escHtml(cmp.roNotes) +
          '</textarea>' +
          '<textarea id="cmp-res-' + i + '" placeholder="Resolution text (optional)…" ' +
            'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
            'border-radius:4px;margin-bottom:8px;box-sizing:border-box;min-height:60px;' +
            'font-family:Arial,sans-serif;resize:vertical;">' +
            escHtml(cmp.resolution) +
          '</textarea>' +
          '<button onclick="AdminPanel._saveComplaint(\'' + escHtml(cmp.id) + '\',' + i + ')" ' +
            'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
            'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">' +
            'Save Update' +
          '</button>' +
        '</div>' +

      '</div>';
  }
  return html;
},

_saveComplaint: function(complaintId, idx) {
  var statusEl = document.getElementById('cmp-status-' + idx);
  var notesEl  = document.getElementById('cmp-notes-'  + idx);
  var resEl    = document.getElementById('cmp-res-'    + idx);
  if (!statusEl) return;

  var status     = statusEl.value;
  var notes      = notesEl  ? notesEl.value.trim()  : '';
  var resolution = resEl    ? resEl.value.trim()     : '';

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) {
        showToast((res && res.message) || 'Update failed.', true);
        return;
      }
      showToast('Complaint updated.');
      AdminPanel._loadComplaints();
    })
    .withFailureHandler(function() { showToast('Connection error.', true); })
    .updateComplaintStatus(App.token, complaintId, status, notes, resolution, getTEMAuthId());
},

_renderObserverDashboard: function(res) {

  if (!res || !res.success) {
    return '<div style="padding:20px;color:#c0392b;font-size:.9rem;">' +
      escHtml((res && res.message) || 'Failed to load dashboard.') + '</div>';
