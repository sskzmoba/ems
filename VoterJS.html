<script>
function fmtIST(isoStr) {
    if (!isoStr) return '';
    var ms = new Date(isoStr).getTime();
    if (isNaN(ms)) return isoStr.toString();
    var d = new Date(ms + 330 * 60 * 1000);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var h = d.getUTCHours(), m = d.getUTCMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    var mm = m < 10 ? '0' + m : '' + m;
    return d.getUTCDate() + ' ' + months[d.getUTCMonth()] + ' ' + d.getUTCFullYear() +
           ', ' + h + ':' + mm + ' ' + ampm + ' IST';
  }
// ============================================================
// VOTER PANEL — Session 25 full build
// Role: VOTER
// Tabs: My Ballot, Nominations Board, My Receipts, Help
// Mobile-first: all targets min-height 44px, min-font 15px
// ============================================================
var VoterPanel = (function() {

  var _currentTab  = '';
  var _election    = null;
  // Session-scoped choice when more than one election is voter-visible at
  // once (Session 51 amendment). Null until the voter picks, or until only
  // one election is visible (auto-resolved, no picker shown).
  var _selectedElectionId = null;
  var _allElections = [];
  var _candidatesByPost = [];
  var _votedPosts  = [];
  var _receipts    = [];
  var _newReceipts = [];
  var _voterBatch        = '';
  var _orgSecyBatch      = '';
  var _orgSecyRestricted = false;

  function _getBatchBracket(batchYear) {
    var yr = parseInt(batchYear);
    if (isNaN(yr)) return '';
    var brackets = [
      { from:1965, to:1970, label:'1965-70' },
      { from:1971, to:1975, label:'1971-75' },
      { from:1976, to:1980, label:'1976-80' },
      { from:1981, to:1985, label:'1981-85' },
      { from:1986, to:1990, label:'1986-90' },
      { from:1991, to:1995, label:'1991-95' },
      { from:1996, to:2000, label:'1996-00' },
      { from:2001, to:2005, label:'2001-05' },
      { from:2006, to:2010, label:'2006-10' },
      { from:2011, to:2015, label:'2011-15' },
      { from:2016, to:2020, label:'2016-20' },
      { from:2021, to:2025, label:'2021-25' },
      { from:2026, to:2030, label:'2026-30' }
    ];
    for (var i = 0; i < brackets.length; i++) {
      if (yr >= brackets[i].from && yr <= brackets[i].to) return brackets[i].label;
    }
    return '';
  }

  var TABS = [
    { id: 'ballot',      label: 'My Ballot'   },
    { id: 'nominations', label: 'Nominations' },
    { id: 'receipts',    label: 'My Receipts' },
    { id: 'complaints',  label: 'Complaints'  },
    { id: 'help',        label: 'Help'        }
  ];

  function init() {
    NavMenu.build(TABS, TABS[0].id, function(tabId) {
      _currentTab = tabId;
      var c = document.getElementById('voter-content');
      if (!c) return;
      var html = _renderTab(tabId);
      c.innerHTML = html;
    });
    setMain('<div id="voter-content"></div>' + _eligibilityModalHtml());
    _currentTab = TABS[0].id;
    var c = document.getElementById('voter-content');
    if (c) c.innerHTML = _renderTab(TABS[0].id);
  }

  function _renderTab(tabId) {
    if (tabId === 'ballot') {
      setTimeout(function() { _loadBallot(); }, 0);
      return _spinner('Loading election status\u2026');
    }
    if (tabId === 'nominations') {
      setTimeout(function() { _loadNominationsBoard(); }, 0);
      return _spinner('Loading nominations board\u2026');
    }
    if (tabId === 'receipts') {
      setTimeout(function() { _loadReceipts(); }, 0);
      return _spinner('Loading your receipts\u2026');
    }
    if (tabId === 'complaints') {
      setTimeout(function() { _loadComplaints(); }, 0);
      return _spinner('Loading complaints\u2026');
    }
    if (tabId === 'help') {
      return _renderHelp();
    }
    return _spinner('Loading\u2026');
  }

  function _loadBallot() {
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c || _currentTab !== 'ballot') return;
        if (!res || !res.success) {
          if (res && res.wrongRole) {
            c.innerHTML = '<div style="text-align:center;padding:40px 20px;">' +
              '<div style="font-size:2rem;margin-bottom:12px;">[NO]</div>' +
              '<div style="font-size:1rem;font-weight:700;color:#991b1b;margin-bottom:8px;">Wrong Portal</div>' +
              '<div style="font-size:.9rem;color:#374151;margin-bottom:20px;">' +
                escHtml(res.message) + '</div>' +
              '<button onclick="App.logout()" style="padding:12px 28px;background:#1a3a5c;' +
                'color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer;">' +
                'Return to Login</button></div>';
            return;
          }
          c.innerHTML = _errorCard(res && res.message ? res.message : 'Could not load election status.');
          return;
        }
        _allElections = res.elections || [];
        // More than one election is currently visible and the voter hasn't
        // chosen yet — show the picker instead of guessing which one they
        // want. Once chosen, _selectedElectionId sticks for the rest of the
        // session (My Ballot, Nominations, Receipts, Complaints all follow it).
        if (res.multiple && !_selectedElectionId) {
          c.innerHTML = _electionPickerCard(_allElections);
          return;
        }
        _election = res.election;
        _voterBatch        = res.voterBatch || '';
        _orgSecyBatch      = res.election ? (res.election.orgSecyBatch      || '') : '';
        _orgSecyRestricted = res.election ? (res.election.orgSecyRestricted || false) : false;
        if (!_election) { c.innerHTML = _noElectionCard(); return; }
        _renderBallotForStatus(c, _election.status);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error. Please try again.');
      })
      .getElectionsForVoter(App.token, _selectedElectionId);
  }

  function _selectElection(id) {
    _selectedElectionId = id;
    var c = document.getElementById('voter-content');
    if (c) c.innerHTML = _spinner('Loading election status\u2026');
    _loadBallot();
  }

  function _electionPickerCard(elections) {
    var statusLabel = {
      nominations_open: 'Nominations Open', nominations_open_phase2: 'Nominations Open \u2014 Phase 2',
      scrutiny: 'Under Scrutiny', candidates_published: 'Final Candidate List',
      active: 'Voting in Progress', paused: 'Voting Paused',
      closed: 'Voting Closed', declared: 'Results Declared'
    };
    var cards = elections.map(function(el) {
      var label = statusLabel[el.status] || el.status;
      var trialTag = el.isTrial
        ? '<span style="font-size:.7rem;background:#fff3cd;color:#856404;padding:2px 8px;' +
          'border-radius:10px;margin-left:6px;">TRIAL</span>' : '';
      return (
        '<button onclick="VoterPanel._selectElection(\'' + escHtml(el.id) + '\')" ' +
        'style="width:100%;text-align:left;background:#fff;border:1px solid #e5e7eb;' +
        'border-radius:8px;padding:14px 16px;margin-bottom:10px;cursor:pointer;min-height:44px;">' +
          '<div style="font-weight:700;color:#1a3a5c;font-size:.95rem;margin-bottom:4px;">' +
            escHtml(el.title) + trialTag +
          '</div>' +
          '<div style="font-size:.8rem;color:#6b7280;">' + escHtml(label) + '</div>' +
        '</button>'
      );
    }).join('');
    return (
      '<div style="padding:8px 4px;">' +
        '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;margin-bottom:4px;">More Than One Election</div>' +
        '<div style="font-size:.82rem;color:#6b7280;margin-bottom:16px;">' +
          'There is more than one election currently open. Please choose which one you want to view.' +
        '</div>' +
        cards +
      '</div>'
    );
  }

  function _renderBallotForStatus(c, status) {
    if (status === 'active') {
      google.script.run
        .withSuccessHandler(function(cRes) {
          if (!cRes || !cRes.success) {
            c.innerHTML = _errorCard(cRes && cRes.message ? cRes.message : 'Could not load ballot.');
            return;
          }
          _candidatesByPost = cRes.posts || [];
          google.script.run
            .withSuccessHandler(function(bRes) {
              if (!bRes || !bRes.success) { c.innerHTML = _errorCard('Could not load ballot status.'); return; }
              _votedPosts = bRes.votedPosts || [];
              c.innerHTML = _renderActiveBallot();
            })
            .withFailureHandler(function() { c.innerHTML = _errorCard('Connection error.'); })
            .getBallotStatus(App.token, _election.id);
        })
        .withFailureHandler(function() { c.innerHTML = _errorCard('Connection error.'); })
        .getCandidatesForVoter(App.token, _election.id);
      return;
    }
    if (status === 'paused') {
      c.innerHTML = _statusCard('[PAUSED]', 'Voting Temporarily Paused',
        'The Returning Officer has paused voting. Please check back later.' +
        (_election.ecContact ? '<br><br>Contact: <strong>' + escHtml(_election.ecContact) + '</strong>' : ''),
        _election.isTrial ? 'trial' : '');
      return;
    }
    if (status === 'nominations_open' || status === 'nominations_open_phase2') {
      c.innerHTML = _nomOpenCard(status === 'nominations_open_phase2' ? 2 : 1);
      return;
    }
    if (status === 'scrutiny') {
      c.innerHTML = _statusCard('[SEARCH]', 'Nominations Under Scrutiny',
        'The Returning Officer is reviewing nominations. No action required from you at this stage.',
        _election.isTrial ? 'trial' : '');
      return;
    }
    if (status === 'candidates_published') {
      c.innerHTML = _candidatesPublishedCard(); return;
    }
    if (status === 'closed') {
      c.innerHTML = _statusCard('🔒', 'Voting Has Closed',
        'The voting window has closed. Results will be declared at the Special General Meeting.',
        _election.isTrial ? 'trial' : '');
      return;
    }
    if (status === 'declared') { _declaredCard(); return; }
    if (status === 'draft') {
      c.innerHTML = _statusCard('☰', 'Election Pending',
        'An election has been created but has not been opened yet. Watch for announcements.',
        _election.isTrial ? 'trial' : '');
      return;
    }
    c.innerHTML = _noElectionCard();
  }

  function _renderActiveBallot() {
    if (_candidatesByPost.length === 0) {
      return _statusCard('☰', 'No Candidates Yet', 'The candidate list is not yet available.', '');
    }
    var totalPosts = _candidatesByPost.length;
    var doneCount  = _votedPosts.length;
    if (doneCount >= totalPosts) return _ballotCompleteCard(totalPosts);

    var trialBanner = _election.isTrial
      ? '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;' +
        'padding:10px 14px;font-size:.82rem;color:#856404;margin-bottom:14px;">' +
        '⚠ <strong>Trial Election</strong> \u2014 This is a test. Your votes will not count.</div>'
      : '';

    var progressPct = Math.round((doneCount / totalPosts) * 100);
    var progressBar =
      '<div style="margin-bottom:18px;">' +
        '<div style="font-size:.82rem;color:#6b7280;margin-bottom:6px;">Progress: <strong style="color:#1a3a5c;">' +
          doneCount + ' of ' + totalPosts + '</strong> posts voted</div>' +
        '<div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">' +
          '<div style="height:100%;width:' + progressPct + '%;background:#1a3a5c;border-radius:4px;"></div>' +
        '</div>' +
      '</div>';

    var newReceiptsBanner = '';
    if (_newReceipts.length > 0) {
      newReceiptsBanner =
        '<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:6px;' +
        'padding:12px 14px;margin-bottom:16px;font-size:.83rem;color:#065f46;">' +
        '<strong>🔒 Vote receipts this session:</strong><br>' +
        _newReceipts.map(function(r) {
          return escHtml(r.post) + ': <code style="font-size:.8rem;background:#f0fdf4;' +
            'padding:2px 6px;border-radius:3px;">' + escHtml(r.token) + '</code>';
        }).join('<br>') +
        '<br><span style="font-size:.78rem;opacity:.8;">Keep these tokens for your records.</span></div>';
    }

    var postCards = '';
    for (var i = 0; i < _candidatesByPost.length; i++) {
      postCards += _renderPostCard(_candidatesByPost[i],
        _votedPosts.indexOf(_candidatesByPost[i].post) !== -1,
        _getNewReceiptToken(_candidatesByPost[i].post));
    }
    return trialBanner + progressBar + newReceiptsBanner + postCards;
  }

  function _getNewReceiptToken(postName) {
    for (var i = 0; i < _newReceipts.length; i++) {
      if (_newReceipts[i].post === postName) return _newReceipts[i].token;
    }
    return null;
  }

  function _renderPostCard(pg, voted, receiptToken) {
    var seatLine = pg.seatCount > 1
      ? '<div style="font-size:.8rem;color:#1a3a5c;background:#eff6ff;padding:4px 10px;' +
        'border-radius:4px;margin-bottom:10px;display:inline-block;">[PIN] Elect <strong>' +
        pg.seatCount + '</strong> candidates for this post</div><br>'
      : '';
    var dis = voted ? 'disabled ' : '';
    var cur = voted ? 'default' : 'pointer';
    var opa = voted ? '.7' : '1';

    var candidateRows = '';
    for (var i = 0; i < pg.candidates.length; i++) {
      var cd = pg.candidates[i];
      candidateRows +=
        '<label style=\"display:flex;align-items:flex-start;gap:12px;padding:12px;' +
        'background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:8px;' +
        'cursor:' + cur + ';opacity:' + opa + ';\">' +
          '<input type=\"radio\" name=\"vote_' + escHtml(pg.post) + '\" value=\"' + escHtml(cd.id) + '\" ' + dis +
          'style=\"margin-top:4px;width:18px;height:18px;flex-shrink:0;\">' +
          (cd.photo ? '<img src=\"' + escHtml(cd.photo) + '\" style=\"width:48px;height:48px;object-fit:cover;border-radius:50%;border:2px solid #d1d5db;flex-shrink:0;margin-top:2px;\">' : '') +
          '<div style=\"flex:1;\">' +
            '<div style=\"font-size:.95rem;font-weight:600;color:#1f2937;\">' + escHtml(cd.name) + '</div>' +
            '<div style=\"font-size:.8rem;color:#6b7280;\">Roll No: ' + escHtml(cd.roll) + ' | Batch: ' + escHtml(cd.batch) + '</div>' +
            (cd.bio ? '<div style=\"font-size:.82rem;color:#374151;margin-top:4px;line-height:1.4;\">' + escHtml(cd.bio) + '</div>' : '') +
          '</div>' +
        '</label>';
    }

    var specialOpts =
      '<label style="display:flex;align-items:center;gap:12px;padding:12px;background:#fefce8;' +
      'border:1px solid #fde68a;border-radius:6px;margin-bottom:8px;cursor:' + cur + ';opacity:' + opa + ';">' +
        '<input type="radio" name="vote_' + escHtml(pg.post) + '" value="NOTA" ' + dis +
        'style="width:18px;height:18px;flex-shrink:0;">' +
        '<div><div style="font-size:.9rem;font-weight:600;color:#92400e;">None of the Above (NOTA)</div>' +
        '<div style="font-size:.78rem;color:#78350f;">Your preference is recorded but no candidate selected</div></div>' +
      '</label>' +
      '<label style="display:flex;align-items:center;gap:12px;padding:12px;background:#f5f3ff;' +
      'border:1px solid #ddd6fe;border-radius:6px;margin-bottom:8px;cursor:' + cur + ';opacity:' + opa + ';">' +
        '<input type="radio" name="vote_' + escHtml(pg.post) + '" value="ABSTAIN" ' + dis +
        'style="width:18px;height:18px;flex-shrink:0;">' +
        '<div><div style="font-size:.9rem;font-weight:600;color:#5b21b6;">Abstain</div>' +
        '<div style="font-size:.78rem;color:#4c1d95;">You choose not to vote for this post</div></div>' +
      '</label>';

    var voteBtn = voted
      ? '<div style="display:flex;align-items:center;gap:8px;padding:12px;background:#d1fae5;' +
        'border-radius:6px;font-size:.9rem;color:#065f46;">✅ Voted' +
        (receiptToken ? ' \u2014 Receipt: <code style="font-size:.78rem;background:#f0fdf4;' +
          'padding:2px 6px;border-radius:3px;">' + escHtml(receiptToken) + '</code>' : '') + '</div>'
      : '<button onclick="VoterPanel.submitVote(\'' + escHtml(pg.post).replace(/'/g,"\\'") + '\')" ' +
        'style="width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;' +
        'font-size:.95rem;font-weight:600;cursor:pointer;margin-top:4px;min-height:48px;">Cast Vote for this Post</button>';

    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin-bottom:16px;">' +
      '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;padding-bottom:8px;' +
      'border-bottom:1px solid #f3f4f6;">' + escHtml(pg.post) + '</div>' +
      seatLine + candidateRows + specialOpts + voteBtn + '</div>';
  }

  function submitVote(postName) {
    var radios = document.querySelectorAll('input[name="vote_' + postName + '"]');
    var selected = null;
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked) { selected = radios[i].value; break; }
    }
    if (!selected) {
      showToast('Please select a candidate, NOTA, or Abstain before submitting.');
      return;
    }
    var label = selected === 'NOTA' ? 'None of the Above' :
                selected === 'ABSTAIN' ? 'Abstain' :
                _getCandidateName(postName, selected);
    _showConfirmModal(
      'Confirm your vote for "' + postName + '":\n\n' + label + '\n\nThis cannot be changed after submission.',
      function() { _doSubmitVote(postName, selected); },
      'Confirm Vote'
    );
  }

  function _doSubmitVote(postName, selected) {
    var btns = document.querySelectorAll('button');
    var btn = null;
    for (var b = 0; b < btns.length; b++) {
      if (btns[b].textContent === 'Cast Vote for this Post' &&
          btns[b].getAttribute('onclick') && btns[b].getAttribute('onclick').indexOf(postName) !== -1) {
        btn = btns[b]; break;
      }
    }
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting\u2026'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) ? res.message : 'Vote submission failed. Please try again.');
          if (btn) { btn.disabled = false; btn.textContent = 'Cast Vote for this Post'; }
          return;
        }
        _votedPosts.push(postName);
        if (res.receiptToken) _newReceipts.push({ post: postName, token: res.receiptToken });
        var c = document.getElementById('voter-content');
        if (c && _currentTab === 'ballot') c.innerHTML = _renderActiveBallot();
        showToast('Vote recorded for ' + postName + ' ✅');
      })
      .withFailureHandler(function() {
        showToast('Connection error \u2014 please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Cast Vote for this Post'; }
      })
      .castVote(App.token, _election.id, postName, selected);
  }

  function _getCandidateName(postName, candidateId) {
    for (var i = 0; i < _candidatesByPost.length; i++) {
      if (_candidatesByPost[i].post === postName) {
        for (var j = 0; j < _candidatesByPost[i].candidates.length; j++) {
          if (_candidatesByPost[i].candidates[j].id === candidateId)
            return _candidatesByPost[i].candidates[j].name;
        }
      }
    }
    return candidateId;
  }

  function _noElectionCard() {
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2.5rem;margin-bottom:12px;">[VOTE]</div>' +
      '<div style="font-size:1.1rem;font-weight:700;color:#374151;margin-bottom:8px;">No Election Scheduled</div>' +
      '<div style="font-size:.9rem;">No upcoming election is currently scheduled.</div></div>';
  }

  function _statusCard(icon, title, body, type) {
    var trialBadge = type === 'trial'
      ? '<span style="font-size:.75rem;background:#fef3c7;color:#92400e;padding:2px 8px;' +
        'border-radius:10px;font-weight:600;margin-left:8px;">TRIAL</span>' : '';
    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:24px 16px;text-align:center;">' +
      '<div style="font-size:2.5rem;margin-bottom:12px;">' + icon + '</div>' +
      '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;">' + escHtml(title) + trialBadge + '</div>' +
      '<div style="font-size:.9rem;color:#374151;line-height:1.6;">' + body + '</div></div>';
  }

  function _nomOpenCard(phase) {
    var title = phase === 2 ? 'Nominations Open \u2014 Phase 2' : 'Nominations Open';
    var body  = phase === 2
      ? 'Phase 2 nominations are open. Any member may nominate a fellow member.'
      : 'Nominations are open. You may nominate yourself for a position on the Executive Committee.';
    var deadline = _election.nomDeadline
      ? '<br><br>Nomination deadline: <strong>' + fmtIST(_election.nomDeadline) + '</strong>' : '';
    var trialBadge = _election.isTrial
      ? '<span style="font-size:.75rem;background:#fef3c7;color:#92400e;padding:2px 8px;' +
        'border-radius:10px;font-weight:600;margin-left:8px;">TRIAL</span>' : '';
    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:24px 16px;">' +
      '<div style="text-align:center;margin-bottom:16px;">' +
        '<div style="font-size:2rem;margin-bottom:8px;">📋</div>' +
        '<div style="font-size:1.05rem;font-weight:700;color:#1a3a5c;">' + escHtml(title) + trialBadge + '</div>' +
      '</div>' +
      '<div style="font-size:.9rem;color:#374151;margin-bottom:16px;line-height:1.6;">' + body + deadline + '</div>' +
      '<button onclick="VoterPanel._showEligibilityModal()" ' +
      'style="width:100%;padding:12px;background:#eff6ff;color:#1d4ed8;border:1.5px solid #93c5fd;' +
      'border-radius:6px;font-size:.87rem;font-weight:600;cursor:pointer;margin-bottom:10px;">' +
      '\u2705 Check Eligibility Conditions</button>' +
      '<button onclick="VoterPanel.showNominationForm()" style="width:100%;padding:14px;background:#1a3a5c;' +
      'color:#fff;border:none;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;margin-bottom:10px;">' +
      '✍️ Nominate Myself</button>' +
      '<button onclick="VoterPanel.showMyNominations()" style="width:100%;padding:14px;background:#fff;' +
      'color:#1a3a5c;border:2px solid #1a3a5c;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;margin-bottom:10px;">' +
      '📄 My Nominations</button>' +
      (phase === 2 ?
      '<button onclick="VoterPanel.showNominationForm_Phase2()" style="width:100%;padding:14px;background:#fff;' +
      'color:#1a3a5c;border:2px solid #1a3a5c;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;margin-bottom:10px;">' +
      '[AGREE] Nominate Another Member</button>' : '') +
      '<button onclick="VoterPanel.showNominationsBoard()" style="width:100%;padding:14px;background:#fff;' +

  function _renderNominationsBoard(res) {
    var posts = res.posts || [];
    if (posts.length === 0) {
      return _statusCard('☰', 'No Nominations Yet', 'No nominations have been confirmed yet.', '');
    }
    var statusLabel = {
      nominations_open: 'Nominations Open', nominations_open_phase2: 'Nominations Open \u2014 Phase 2',
      scrutiny: 'Under Scrutiny', candidates_published: 'Final Candidate List',
      active: 'Voting in Progress', paused: 'Voting Paused',
      closed: 'Voting Closed', declared: 'Results Declared'
    }[res.electionStatus] || res.electionStatus;

    var candPubAt = res.candPubAt || null;
    var objWindowOpen = false;
    if (res.electionStatus === 'candidates_published' && candPubAt) {
      var deadlineMs = new Date(candPubAt).getTime() + (48 * 60 * 60 * 1000);
      objWindowOpen = Date.now() < deadlineMs;
    }

    var html = '<div style="margin-bottom:14px;">' +
      '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;margin-bottom:4px;">' + escHtml(res.electionTitle) + '</div>' +
      '<div style="font-size:.8rem;color:#6b7280;">' + escHtml(statusLabel) + '</div></div>';

    if (objWindowOpen) {
      html +=
        '<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:6px;' +
        'padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:#92400e;">' +
        '⚠ <strong>Objection window is open.</strong> If you believe any accepted candidate is constitutionally ineligible, ' +
        'you may file a formal objection. Objections must cite specific eligibility grounds and be filed within 48 hours of candidate list publication.' +
        '</div>';
    }

    for (var i = 0; i < posts.length; i++) {
      var pg = posts[i];
      var noms = pg.nominations || [];
      html += '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin-bottom:14px;">' +
        '<div style="font-size:.95rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f3f4f6;">' +
          escHtml(pg.post) +
          ' <span style="font-size:.78rem;font-weight:400;color:#9ca3af;">(' + noms.length + ' nomination' + (noms.length !== 1 ? 's' : '') + ')</span></div>';
      if (noms.length === 0) {
        html += '<div style="font-size:.85rem;color:#9ca3af;padding:4px 0;">No nominations confirmed yet.</div>';
      }
      for (var j = 0; j < noms.length; j++) {
        var nom = noms[j];
        var badge = nom.status === 'accepted'
          ? '<span style="font-size:.72rem;background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:10px;font-weight:600;">\u2713 Confirmed Candidate</span>'
          : '';
        var objBtn = (objWindowOpen && nom.status === 'accepted' && nom.id)
          ? '<button onclick="VoterPanel._showObjModal(\'' + escHtml(nom.id) + '\',\'' + escHtml(nom.name) + '\',\'' + escHtml(pg.post) + '\')" ' +
            'style="margin-top:8px;width:100%;padding:9px;background:#fff;color:#b45309;' +
            'border:1.5px solid #b45309;border-radius:4px;font-size:.8rem;cursor:pointer;min-height:40px;">' +
            '⚠ File Objection Against This Nomination' +
            '</button>'
          : '';
        html += '<div style="padding:10px 0;border-bottom:1px solid #f9fafb;">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">' +
            '<div style="font-size:.9rem;font-weight:600;color:#1f2937;">' + escHtml(nom.name) + '</div>' + badge +
          '</div>' +
          '<div style="font-size:.78rem;color:#6b7280;margin-top:2px;">Batch: ' + escHtml(nom.batch) + '</div>' +
          (nom.bio ? '<div style="font-size:.82rem;color:#374151;margin-top:6px;line-height:1.5;">' + escHtml(nom.bio) + '</div>' : '') +
          objBtn +
          '</div>';
      }
      html += '</div>';
    }

    // ── Objection modal (hidden, shown per nomination) ──────────
    html +=
      '<div id="obj-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9000;' +
      'overflow-y:auto;padding:20px 12px;">' +
        '<div style="background:#fff;border-radius:8px;max-width:480px;margin:0 auto;padding:20px 16px;">' +
          '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;margin-bottom:4px;">File a Formal Objection</div>' +
          '<div id="obj-modal-subhead" style="font-size:.82rem;color:#6b7280;margin-bottom:14px;"></div>' +

          '<div style="font-size:.82rem;font-weight:600;color:#374151;margin-bottom:6px;">Grounds for Objection <span style="color:#dc2626;">*</span></div>' +
          '<select id="obj-grounds" style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;' +
          'border-radius:4px;margin-bottom:12px;box-sizing:border-box;">' +
            '<option value="">— Select grounds —</option>' +
            '<option value="Tenure bar — T1 consecutive term limit">Tenure bar — T1 consecutive term limit</option>' +
            '<option value="Tenure bar — T2 total term limit">Tenure bar — T2 total term limit</option>' +
            '<option value="Not a Life Member of SSKZM OBA">Not a Life Member of SSKZM OBA</option>' +
            '<option value="Holding a disqualifying office or position">Holding a disqualifying office or position</option>' +
            '<option value="Presidential eligibility rule not satisfied">Presidential eligibility rule not satisfied</option>' +
            '<option value="Other constitutional ground — specify below">Other constitutional ground — specify below</option>' +
          '</select>' +

          '<div style="font-size:.82rem;font-weight:600;color:#374151;margin-bottom:6px;">Supporting Details <span style="color:#dc2626;">*</span></div>' +
          '<textarea id="obj-text" placeholder="State the specific facts you rely on in support of this objection…" ' +
          'style="width:100%;padding:10px;font-size:.88rem;border:1px solid #d1d5db;border-radius:4px;' +
          'margin-bottom:12px;box-sizing:border-box;min-height:100px;font-family:Arial,sans-serif;resize:vertical;"></textarea>' +

          '<div style="background:#fef3c7;border-radius:4px;padding:10px 12px;font-size:.78rem;' +
          'color:#92400e;margin-bottom:14px;line-height:1.5;">' +
          '<strong>Important:</strong> A formal objection is a serious constitutional act. Only file if you have specific, ' +
          'factual grounds to believe the candidate is constitutionally ineligible. Frivolous objections may be summarily ' +
          'dismissed by the Appeals Panel. Your identity as objector will be known to the Appeals Panel and the Returning Officer.' +
          '</div>' +

          '<div id="obj-error" style="display:none;color:#dc2626;font-size:.82rem;margin-bottom:10px;"></div>' +

          '<button onclick="VoterPanel._submitObjection()" ' +
          'style="width:100%;padding:12px;background:#b45309;color:#fff;border:none;border-radius:4px;' +
          'font-size:.9rem;cursor:pointer;min-height:44px;margin-bottom:10px;">Submit Objection</button>' +
          '<button onclick="VoterPanel._closeObjModal()" ' +
          'style="width:100%;padding:11px;background:#fff;color:#374151;border:1.5px solid #d1d5db;' +
          'border-radius:4px;font-size:.88rem;cursor:pointer;min-height:44px;">Cancel</button>' +
        '</div>' +
      '</div>';

    return html;
  }

  var _objNomId = null;

  function _showObjModal(nomId, candName, post) {
    _objNomId = nomId;
    var sub = document.getElementById('obj-modal-subhead');
    if (sub) sub.textContent = candName + ' \u2014 ' + post;
    var sel = document.getElementById('obj-grounds');
    if (sel) sel.value = '';
    var ta = document.getElementById('obj-text');
    if (ta) ta.value = '';
    var err = document.getElementById('obj-error');
    if (err) { err.style.display = 'none'; err.textContent = ''; }
    var m = document.getElementById('obj-modal');
    if (m) m.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function _closeObjModal() {
    var m = document.getElementById('obj-modal');
    if (m) m.style.display = 'none';
    document.body.style.overflow = '';
    _objNomId = null;
  }

  function _submitObjection() {
    var grounds = (document.getElementById('obj-grounds') || {}).value || '';
    var text    = (document.getElementById('obj-text')    || {}).value || '';
    var errEl   = document.getElementById('obj-error');
    if (!grounds) {
      if (errEl) { errEl.textContent = 'Please select grounds for your objection.'; errEl.style.display = 'block'; }
      return;
    }
    if (!text.trim()) {
      if (errEl) { errEl.textContent = 'Please provide supporting details.'; errEl.style.display = 'block'; }
      return;
    }
    if (!_objNomId) { return; }

    var btn = document.querySelector('#obj-modal button');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting\u2026'; }
    if (errEl) { errEl.style.display = 'none'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          if (errEl) { errEl.textContent = (res && res.message) || 'Submission failed.'; errEl.style.display = 'block'; }
          if (btn) { btn.disabled = false; btn.textContent = 'Submit Objection'; }
          return;
        }
        _closeObjModal();
        showToast('Objection filed. Reference: ' + res.objectionId);
      })
      .withFailureHandler(function(e) {
        // The write may have succeeded server-side even though the response
        // failed to reach the browser. Verify before alarming the voter.
        var nomIdAtFailure = _objNomId;
        google.script.run
          .withSuccessHandler(function(checkRes) {
            if (checkRes && checkRes.success && checkRes.filed) {
              _closeObjModal();
              showToast('Objection filed. Reference: ' + checkRes.objectionId);
            } else {
              if (errEl) { errEl.textContent = 'Connection error. Please try again.'; errEl.style.display = 'block'; }
              if (btn) { btn.disabled = false; btn.textContent = 'Submit Objection'; }
            }
          })
          .withFailureHandler(function() {
            if (errEl) { errEl.textContent = 'Connection error. Please try again.'; errEl.style.display = 'block'; }
            if (btn) { btn.disabled = false; btn.textContent = 'Submit Objection'; }
          })
          .checkObjectionFiled(App.token, nomIdAtFailure);
      })
      .fileObjection(App.token, _objNomId, grounds, text.trim());
  }

  function _renderReceipts() {
    var all = _receipts.slice();
    for (var i = 0; i < _newReceipts.length; i++) {
      var found = false;
      for (var j = 0; j < all.length; j++) {
        if (all[j].post === _newReceipts[i].post) { all[j]._token = _newReceipts[i].token; found = true; break; }
      }
      if (!found) all.push({ post: _newReceipts[i].post, votedAt: 'This session', _token: _newReceipts[i].token });
    }
    if (all.length === 0) {
      return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
        '<div style="font-size:2rem;margin-bottom:12px;">🧾</div>' +
        '<div style="font-size:1rem;font-weight:600;color:#374151;margin-bottom:6px;">No Receipts Yet</div>' +
        '<div style="font-size:.85rem;">Your vote receipts will appear here after you vote.</div></div>';
    }
    var baseUrl = App.deployUrl || window.location.href.split('?')[0];
    var html = '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;' +
      'padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:#1d4ed8;">' +
      '🔒 Your votes are anonymous. These receipts confirm <em>that</em> you voted, not <em>how</em> you voted. ' +
      'After results are declared, use the Verify button to confirm your vote is on record.</div>';
    if (_election && _election.status === 'declared') {
      html += '<a href="' + escHtml(baseUrl + '?action=results&electionId=' + encodeURIComponent(_election.id)) + '" ' +
        'target="_blank" rel="noopener" style="display:inline-block;margin-bottom:14px;padding:6px 14px;' +
        'background:#f0fdf4;color:#065f46;border:1.5px solid #86efac;border-radius:4px;font-size:.78rem;' +
        'font-weight:600;text-decoration:none;">✅ View Full Results</a>';
    }
    for (var k = 0; k < all.length; k++) {
      var r = all[k];
      var verifyUrl = r._token ? (baseUrl + '?action=verifyToken&voteId=' + encodeURIComponent(r._token)) : '';
      html += '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin-bottom:10px;">' +
        '<div style="font-size:.9rem;font-weight:600;color:#1a3a5c;margin-bottom:4px;">' + escHtml(r.post) + '</div>' +
        '<div style="font-size:.78rem;color:#6b7280;">Voted: ' + fmtIST(r.votedAt) + '</div>' +
        (r._token
          ? '<div style="font-size:.78rem;color:#374151;margin-top:6px;">Receipt token: ' +
            '<code style="background:#f0fdf4;padding:2px 6px;border-radius:3px;font-size:.75rem;color:#065f46;">' +
            escHtml(r._token) + '</code></div>' +
            '<a href="' + escHtml(verifyUrl) + '" target="_blank" rel="noopener" ' +
            'style="display:inline-block;margin-top:8px;padding:6px 14px;background:#f0fdf4;' +
            'color:#065f46;border:1.5px solid #86efac;border-radius:4px;font-size:.78rem;' +
            'font-weight:600;text-decoration:none;">\u2713 Verify this vote</a>'
          : '') +
        '</div>';

  function _lookupRollP2(role) {
    var rollEl = document.getElementById('p2-' + role + '-roll');
    var nameEl = document.getElementById('p2-' + role + '-name');
    if (!rollEl || !nameEl) return;
    var roll = rollEl.value.trim();
    if (!roll) { nameEl.innerHTML = ''; return; }
    nameEl.style.color = '#9ca3af';
    nameEl.innerHTML = 'Looking up\u2026';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          nameEl.style.color = '#059669';
          nameEl.innerHTML = '\u2713 ' + escHtml(res.name) + (res.batch ? ' (Batch ' + escHtml(res.batch) + ')' : '');
        } else {
          nameEl.style.color = '#dc2626';
          nameEl.innerHTML = '\u2717 ' + escHtml((res && res.message) || 'Not found');
        }
      })
      .withFailureHandler(function() {
        nameEl.style.color = '#dc2626';
        nameEl.innerHTML = '\u2717 Connection error';
      })
      .lookupVoterName(App.token, roll);
  }

  function _submitPhase2() {
    var postEl    = document.getElementById('p2-post');
    var candRollEl= document.getElementById('p2-cand-roll');
    var secRollEl = document.getElementById('p2-sec-roll');
    var bioEl     = document.getElementById('p2-bio');
    var errEl     = document.getElementById('p2-error');

    var post    = postEl    ? postEl.value.trim()     : '';
    var candRoll= candRollEl? candRollEl.value.trim()  : '';
    var secRoll = secRollEl ? secRollEl.value.trim()   : '';
    var bio     = bioEl     ? bioEl.value.trim()       : '';

    if (errEl) errEl.style.display = 'none';

    if (!post)     { _p2Error('Please select a post.'); return; }
    if (!candRoll) { _p2Error('Please enter the candidate\'s roll number.'); return; }
    if (bio.length < 30) { _p2Error('A candidate biography is required, with a minimum of 30 characters.'); return; }

    if (!_election || !_election.id) { _p2Error('Election data missing. Please reload.'); return; }

    var btn = document.querySelector('[onclick="VoterPanel._submitPhase2()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting\u2026'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.textContent = '[AGREE] Submit Nomination'; }
        if (!res || !res.success) {
          _p2Error((res && res.message) || 'Submission failed. Please try again.');
          return;
        }
        var c = document.getElementById('voter-content');
        if (c) {
          c.innerHTML =
            '<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:24px 16px;text-align:center;margin-bottom:16px;">' +
              '<div style="font-size:2rem;margin-bottom:8px;">✅</div>' +

              '<div style="font-size:.88rem;color:#374151;line-height:1.6;">' + escHtml(res.message) + '</div>' +
            '</div>' +
            '<button onclick="VoterPanel.showMyNominations()" ' +
            'style="width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;' +
            'font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">' +
            '📄 View My Nominations</button>';
        }
      })
      .withFailureHandler(function() {
        if (btn) { btn.disabled = false; btn.textContent = '[AGREE] Submit Nomination'; }
        _p2Error('Connection error. Please try again.');
      })
      .submitNomination_Phase2(App.token, _election.id, post, candRoll, secRoll, bio);
  }

  // ── Generic in-page confirm modal — replaces native confirm() ──────
  // Native confirm()/alert() dialogs render with browser-added chrome
  // (e.g. "script.google.com says") that can look technical or alarming,
  // and behave inconsistently inside the Apps Script sandboxed iframe.
  // This gives full control over appearance and reads as a normal part
  // of the app instead. onConfirm fires only if the person taps Confirm;
  // closing any other way (Cancel, backdrop tap) does nothing further.
  function _showConfirmModal(message, onConfirm, confirmLabel, isDanger, onCancel) {
    var existing = document.getElementById('confirm-modal-overlay');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.id = 'confirm-modal-overlay';
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);' +
      'z-index:9500;display:flex;align-items:center;justify-content:center;padding:16px;';

    var btnColor = isDanger ? '#dc2626' : '#1a3a5c';

    overlay.innerHTML =
      '<div style="background:#fff;border-radius:8px;max-width:400px;width:100%;padding:20px;' +
      'box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:80vh;overflow-y:auto;">' +
        '<div style="font-size:.92rem;color:#111;margin-bottom:20px;white-space:pre-line;line-height:1.5;">' +
          escHtml(message) +
        '</div>' +
        '<div style="display:flex;gap:10px;">' +
          '<button id="confirm-modal-cancel" style="flex:1;padding:12px;background:#e5e7eb;color:#374151;' +
            'border:none;border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">Cancel</button>' +
          '<button id="confirm-modal-ok" style="flex:1;padding:12px;background:' + btnColor + ';color:#fff;' +
            'border:none;border-radius:4px;font-size:.9rem;font-weight:600;cursor:pointer;min-height:44px;">' +
            escHtml(confirmLabel || 'Confirm') +
          '</button>' +
        '</div>' +
      '</div>';

    var cancel = function() { overlay.remove(); if (onCancel) onCancel(); };
    overlay.onclick = function(e) { if (e.target === overlay) cancel(); };
    document.body.appendChild(overlay);

    document.getElementById('confirm-modal-cancel').onclick = cancel;
    document.getElementById('confirm-modal-ok').onclick = function() { overlay.remove(); onConfirm(); };
  }

  function _lookupRoll(role) {
    var rollEl = document.getElementById('nom-' + role + '-roll');
    var nameEl = document.getElementById('nom-' + role + '-name');
    if (!rollEl || !nameEl) return;
    var roll = rollEl.value.trim();
    if (!roll) { nameEl.textContent = ''; return; }
    nameEl.style.color = '#6b7280';
    nameEl.textContent = 'Looking up\u2026';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!nameEl) return;
        if (res && res.success) {
          nameEl.style.color = '#059669';
          nameEl.textContent = '\u2713 ' + res.name + ' (Batch ' + res.batch + ')';
        } else {
          nameEl.style.color = '#dc2626';
          nameEl.textContent = '\u2717 ' + ((res && res.message) || 'Not found');
        }
      })
      .withFailureHandler(function() {
        if (nameEl) { nameEl.style.color = '#dc2626'; nameEl.textContent = '\u2717 Connection error'; }
      })
      .lookupVoterName(App.token, roll);
  }

  function _submitNomination() {
    var postEl    = document.getElementById('nom-post');
    var propEl    = document.getElementById('nom-prop-roll');
    var secEl     = document.getElementById('nom-sec-roll');
    var bioEl     = document.getElementById('nom-bio');
    var declEl    = document.getElementById('nom-declaration');
    var errEl     = document.getElementById('nom-error');

    if (!postEl || !propEl || !secEl || !declEl) return;

    var post = postEl.value;
    var prop = propEl.value.trim();
    var sec  = secEl.value.trim();
    var bio  = bioEl ? bioEl.value.trim() : '';
    var photoEl   = document.getElementById('nom-photo');
    var photoFile = photoEl && photoEl.files && photoEl.files[0] ? photoEl.files[0] : null;
    if (photoFile && photoFile.size > 2097152) {
      _showNomError('Photo is too large. Maximum size is 2MB.');
      return;
    }
    if (!post) { _showNomError('Please select a post.'); return; }
    if (!prop) { _showNomError('Please enter the proposer\'s roll number.'); return; }
    if (!sec)  { _showNomError('Please enter the seconder\'s roll number.'); return; }
    if (bio.length < 30) { _showNomError('A candidate biography is required, with a minimum of 30 characters.'); return; }
    if (!declEl.checked) { _showNomError('Please tick the declaration checkbox before submitting.'); return; }

    if (errEl) errEl.style.display = 'none';

    var btn = document.querySelector('button[onclick="VoterPanel._submitNomination()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting\u2026'; }

    function _doSubmit() {
      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success) {
            _showNomError((res && res.message) || 'Submission failed. Please try again.');
            if (btn) { btn.disabled = false; btn.textContent = 'Submit Nomination'; }
            return;
          }
          function _showSuccess() {
            var c = document.getElementById('voter-content');
            if (c) c.innerHTML =
              '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;' +
              'padding:32px 16px;text-align:center;">' +
                '<div style="font-size:3rem;margin-bottom:12px;">✅</div>' +
                '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;">Nomination Submitted!</div>' +
                '<div style="font-size:.9rem;color:#374151;margin-bottom:16px;line-height:1.6;">' +
                  'Your nomination for <strong>' + escHtml(post) + '</strong> has been submitted.<br><br>' +
                  'Confirmation emails have been sent to your proposer and seconder. ' +
                  'Your nomination will be confirmed once both have clicked their links.' +
                '</div>' +
                '<button onclick="VoterPanel.showMyNominations()" ' +
                'style="width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;' +
                'border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">' +
                '📄 View My Nominations</button>' +
              '</div>';
          }
          if (photoFile) {
            var reader = new FileReader();
            reader.onload = function(e) {
              var b64 = e.target.result.substring(e.target.result.indexOf(',') + 1);
              google.script.run
                .withSuccessHandler(function(pRes) {
                  if (!pRes || !pRes.success) {
                    var pe = document.getElementById('nom-photo-error');
                    if (pe) { pe.textContent = (pRes && pRes.message) || 'Photo upload failed.'; pe.style.display = 'block'; }
                  }
                  _showSuccess();
                })
                .withFailureHandler(function() {
                  var pe = document.getElementById('nom-photo-error');
                  if (pe) { pe.textContent = 'Photo upload failed — please contact the RO.'; pe.style.display = 'block'; }
                  _showSuccess();
                })
                .uploadNominationPhoto(App.token, _election.id, b64, photoFile.type, photoFile.name);
            };
            reader.readAsDataURL(photoFile);
          } else {
            _showSuccess();
          }
        })
        .withFailureHandler(function() {
          _showNomError('Connection error \u2014 please try again.');
          if (btn) { btn.disabled = false; btn.textContent = 'Submit Nomination'; }
        })
        .submitNomination(App.token, _election.id, post, prop, sec, bio);
    }

    // Advisory eligibility check — based on available EC service records.
    // This NEVER blocks submission; it only warns and asks for confirmation.
    // Final eligibility is always determined by the RO at scrutiny.
    google.script.run
      .withSuccessHandler(function(eligRes) {
        if (eligRes && eligRes.success && eligRes.eligible === false) {
          var reasonsText = (eligRes.reasons || []).join('\n\n');
          var warnMsg =
            'Based on records available, you may not currently meet the eligibility ' +
            'criteria for "' + post + '":\n\n' + reasonsText +
            '\n\nThis is an advisory check only \u2014 it does not decide the outcome. ' +
            'The Returning Officer will make the final determination at scrutiny. ' +
            'Do you still want to proceed with this nomination? You may be rejected at the scrutiny stage.';
          _showConfirmModal(
            warnMsg,
            function() { _doSubmit(); },
            'Proceed Anyway',
            false,
            function() { if (btn) { btn.disabled = false; btn.textContent = 'Submit Nomination'; } }
          );
          return;
        }
        _doSubmit();
      })
      .withFailureHandler(function() {
        // Advisory check itself failed to run — do not block submission on that basis
        _doSubmit();
      })
      .checkEligibilityAutomatic(App.token, App.identity, post, _election.id);
  }

  function _showNomError(msg) {
    var errEl = document.getElementById('nom-error');
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  }

  function _backToBallot() {
    var c = document.getElementById('voter-content');
    if (c) c.innerHTML = _renderTab('ballot');
    _loadBallot();
  }

  // ── MY NOMINATIONS DASHBOARD ──────────────────────────────

  function showMyNominations() {
    var c = document.getElementById('voter-content');
    if (!c) return;
    c.innerHTML = _spinner('Loading your nominations\u2026');

    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success && res.election) {
          _election = res.election;
          _voterBatch        = res.voterBatch || '';
          _orgSecyBatch      = res.election.orgSecyBatch      || '';
          _orgSecyRestricted = res.election.orgSecyRestricted || false;
          _loadMyNominations();
        } else {
          var c2 = document.getElementById('voter-content');
          if (c2) c2.innerHTML = _errorCard('No active election found.');
        }
      })
      .withFailureHandler(function() {
        var c2 = document.getElementById('voter-content');
        if (c2) c2.innerHTML = _errorCard('Connection error.');
      })
      .getElectionsForVoter(App.token, _selectedElectionId);
  }

  function _loadMyNominations() {
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c) return;
        if (!res || !res.success) {
          c.innerHTML = _errorCard((res && res.message) || 'Could not load nominations.');
          return;
        }
        c.innerHTML = _renderMyNominations(res.nominations || []);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error.');
      })
      .getMyNominations(App.token, _election.id);
  }

      consent_pending:     '#fef3c7',

      pending_scrutiny:    '#eff6ff',

      rejected:            '#fef2f2',

  }

  function _showAppealForm(nomId) {
    var form = document.getElementById('appeal-form-' + nomId);
    if (form) form.style.display = 'block';
  }

  function _hideAppealForm(nomId) {
    var form = document.getElementById('appeal-form-' + nomId);
    if (form) form.style.display = 'none';
  }

  function _submitAppeal(nomId) {
    var textEl = document.getElementById('appeal-text-' + nomId);
    if (!textEl) return;
    var text = textEl.value.trim();
    if (!text) { showToast('Please enter the grounds for your appeal.', true); return; }

    var docEl   = document.getElementById('appeal-doc-' + nomId);
    var docFile = docEl && docEl.files && docEl.files[0] ? docEl.files[0] : null;
    if (docFile && docFile.size > 5242880) {
      showToast('Document too large. Maximum size is 5MB.', true); return;
    }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Appeal submission failed.', true);
          return;
        }
        var appealId = res.appealId;
        // Upload supporting document if provided
        if (docFile) {
          var reader = new FileReader();
          reader.onload = function(e) {
            var b64 = e.target.result.substring(e.target.result.indexOf(',') + 1);
            google.script.run
              .withSuccessHandler(function(dRes) {
                if (!dRes || !dRes.success) {
                  showToast('Appeal filed (Ref: ' + appealId + ') but document upload failed: ' +
                    ((dRes && dRes.message) || 'Unknown error'), true);
                } else {
                  showToast('Appeal filed with supporting document. Reference: ' + appealId);
                }
                _loadMyNominations();
              })
              .withFailureHandler(function() {
                showToast('Appeal filed (Ref: ' + appealId + ') but document upload failed.', true);
                _loadMyNominations();
              })
              .storeAppealDocument(App.token, _election.id, appealId,
                docFile.name, b64, docFile.type);
          };
          reader.readAsDataURL(docFile);
        } else {
          showToast('Appeal filed. Reference: ' + appealId);
          _loadMyNominations();
        }
      })
      .withFailureHandler(function() { showToast('Connection error.', true); })
      .fileAppeal(App.token, nomId, text);
  }

  function _confirmWithdraw(nomId, postName) {
    _showConfirmModal(
      'Withdraw your nomination for "' + postName + '"?\n\nThis cannot be undone.',
      function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.success) {
              showToast((res && res.message) || 'Withdrawal failed.', true);
              return;
            }
            showToast('Nomination withdrawn.');
            _loadMyNominations();
          })
          .withFailureHandler(function() { showToast('Connection error.', true); })
          .withdrawNomination(App.token, nomId);
      },
      'Withdraw Nomination',
      true
    );
  }
  function _lookupRollAddSec(nomId) {
    var rollEl = document.getElementById('sec-roll-' + nomId);
    var nameEl = document.getElementById('sec-name-' + nomId);
    if (!rollEl || !nameEl) return;
    var roll = rollEl.value.trim();
    if (!roll) { nameEl.innerHTML = ''; return; }
    nameEl.style.color = '#9ca3af';
    nameEl.innerHTML = 'Looking up\u2026';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          nameEl.style.color = '#059669';
          nameEl.innerHTML = '\u2713 ' + escHtml(res.name) + (res.batch ? ' (Batch ' + escHtml(res.batch) + ')' : '');
        } else {
          nameEl.style.color = '#dc2626';
          nameEl.innerHTML = '\u2717 ' + escHtml((res && res.message) || 'Not found');
        }
      })
      .withFailureHandler(function() {
        nameEl.style.color = '#dc2626';
        nameEl.innerHTML = '\u2717 Connection error';
      })
      .lookupVoterName(App.token, roll);
  }

  function _submitAddSeconder(nomId, role) {
    var rollEl = document.getElementById('sec-roll-' + nomId);
    if (!rollEl) return;
    var secRoll = rollEl.value.trim();
    if (!secRoll) { showToast('Please enter a seconder roll number.', true); return; }
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Failed to add seconder.', true);
          return;
        }
        showToast(res.message || 'Seconder added.');
        showMyNominations();
      })
      .withFailureHandler(function() { showToast('Connection error.', true); })
      [role === 'candidate' ? 'candidateAddSeconder' : 'addSeconder'](App.token, nomId, secRoll);
  }

  // ── COMPLAINTS TAB ────────────────────────────────────────

  function _loadComplaints() {
    var c = document.getElementById('voter-content');
    if (!c || _currentTab !== 'complaints') return;
    var elecId = _election ? _election.id : null;
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c || _currentTab !== 'complaints') return;
        if (!res || !res.success) {
          c.innerHTML = _errorCard(res && res.message ? res.message : 'Could not load complaints.');
          return;
        }
        c.innerHTML = _renderComplaintsTab(res.complaints || []);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error.');
      })
      .getMyComplaints(App.token, elecId);
  }

  function _renderComplaintsTab(complaints) {
    var statusLabels = {
      filed:               'Filed \u2014 Awaiting Review',
      under_review:        'Under Review',
      resolved_upheld:     'Resolved \u2014 Upheld',
      resolved_dismissed:  'Resolved \u2014 Dismissed',
      referred_to_ec:      'Referred to Executive Committee'
    };
    var statusColors = {
      filed:               '#fef3c7',
      under_review:        '#eff6ff',
      resolved_upheld:     '#d1fae5',
      resolved_dismissed:  '#f3f4f6',
      referred_to_ec:      '#fce7f3'
    };
    var statusTextColors = {
      filed:               '#92400e',
      under_review:        '#1d4ed8',
      resolved_upheld:     '#065f46',
      resolved_dismissed:  '#374151',
      referred_to_ec:      '#9d174d'
    };

    var html =
      '<div style="padding:4px 0 14px;">' +
        '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;margin-bottom:4px;">Code of Conduct Complaints</div>' +
        '<div style="font-size:.82rem;color:#6b7280;line-height:1.5;">Use this form to report violations of the election Code of Conduct. ' +
        'All complaints are reviewed by the Returning Officer.</div>' +
      '</div>';

    // ── File new complaint form ──
    html +=
      '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin-bottom:18px;">' +
        '<div style="font-size:.9rem;font-weight:600;color:#1a3a5c;margin-bottom:12px;">📋 File a New Complaint</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Against \u2014 Roll No. (optional)</label>' +
          '<input type="text" id="cmp-against-roll" placeholder="e.g. 1234" inputmode="text" maxlength="20" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Against \u2014 Name (optional)</label>' +
          '<input type="text" id="cmp-against" placeholder="Full name of member" maxlength="100" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Against \u2014 Batch (optional)</label>' +
          '<input type="text" id="cmp-against-batch" placeholder="e.g. 1995" inputmode="numeric" maxlength="4" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Channel / Platform where violation occurred</label>' +
          '<input type="text" id="cmp-channel" placeholder="e.g. WhatsApp group, Facebook, email" maxlength="100" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:14px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Complaint details <span style="color:#b91c1c;">*</span></label>' +
          '<textarea id="cmp-text" rows="4" placeholder="Describe the violation in detail. Include dates, times, and any other relevant information." maxlength="1000" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;resize:vertical;"></textarea>' +
        '</div>' +
        '<button onclick="VoterPanel._submitComplaint()" ' +
          'style="width:100%;padding:13px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;' +
          'font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">Submit Complaint</button>' +
      '</div>';

    // ── My complaints list ──
    if (complaints.length === 0) {
      html +=
        '<div style="text-align:center;padding:24px 16px;color:#6b7280;">' +
          '<div style="font-size:1.5rem;margin-bottom:8px;">[EMPTY]</div>' +
          '<div style="font-size:.9rem;">You have not filed any complaints for this election.</div>' +
        '</div>';
    } else {
      html += '<div style="font-size:.85rem;font-weight:600;color:#374151;margin-bottom:10px;">' +
        'Your Complaints (' + complaints.length + ')</div>';
      for (var i = 0; i < complaints.length; i++) {
        var cmp = complaints[i];
        var st  = cmp.status || 'filed';
        var stLabel = statusLabels[st] || st;
        var stBg    = statusColors[st]     || '#f3f4f6';
        var stColor = statusTextColors[st] || '#374151';
        var dateStr = cmp.filedAt ? cmp.filedAt.toString().split('T')[0] : '';
        html +=
          '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin-bottom:10px;">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;">' +
              '<div style="font-size:.78rem;color:#6b7280;">' + escHtml(cmp.id) + '<br>' + escHtml(dateStr) + '</div>' +
              '<span style="font-size:.75rem;background:' + stBg + ';color:' + stColor + ';padding:3px 9px;' +
                'border-radius:10px;font-weight:600;white-space:nowrap;">' + escHtml(stLabel) + '</span>' +
            '</div>' +
            (cmp.againstName ? '<div style="font-size:.82rem;color:#374151;margin-bottom:6px;">Against: <strong>' + escHtml(cmp.againstName) + '</strong></div>' : '') +
            '<div style="font-size:.85rem;color:#374151;line-height:1.5;margin-bottom:6px;">' + escHtml(cmp.complaintText) + '</div>' +
            (cmp.resolution ? ('<div style="background:#f9fafb;border-radius:4px;padding:8px 10px;font-size:.8rem;color:#374151;margin-top:6px;"><strong>RO Resolution:</strong> ' + escHtml(cmp.resolution) + '</div>') : '') +
          '</div>';
      }
    }

    return html;
  }

  function _submitComplaint() {
    var againstRollEl  = document.getElementById('cmp-against-roll');
    var againstEl      = document.getElementById('cmp-against');
    var againstBatchEl = document.getElementById('cmp-against-batch');
    var channelEl      = document.getElementById('cmp-channel');
    var textEl         = document.getElementById('cmp-text');
    if (!textEl) return;
    var text = textEl.value.trim();
    if (!text) { showToast('Please enter complaint details.', true); return; }
    var againstRoll  = againstRollEl  ? againstRollEl.value.trim().toUpperCase()  : '';
    var againstName  = againstEl      ? againstEl.value.trim()                    : '';
    var againstBatch = againstBatchEl ? againstBatchEl.value.trim()               : '';
    var against      = againstName + (againstBatch ? ' (Batch ' + againstBatch + ')' : '');
    var channel = channelEl ? channelEl.value.trim() : '';
    var elecId  = _election ? _election.id : null;

    var btn = document.querySelector('button[onclick="VoterPanel._submitComplaint()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting\u2026'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Complaint'; }
        if (!res || !res.success) {
          showToast((res && res.message) || 'Submission failed.', true);
          return;
        }
        showToast('Complaint filed. Reference: ' + res.complaintId);
        if (textEl)         textEl.value         = '';
        if (againstRollEl)  againstRollEl.value  = '';
        if (againstEl)      againstEl.value      = '';
        if (againstBatchEl) againstBatchEl.value = '';
        if (channelEl)      channelEl.value      = '';
        _loadComplaints();
      })
      .withFailureHandler(function() {
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Complaint'; }
        showToast('Connection error.', true);
      })
      .fileComplaint(App.token, elecId, text, against, againstRoll, channel);
  }

  return {
    init: init,
    submitVote: submitVote,
    showNominationsBoard: showNominationsBoard,
    switchToReceipts: switchToReceipts,
    switchToNominations: switchToNominations,
    showNominationForm: showNominationForm,
    showNominationForm_Phase2: showNominationForm_Phase2,
    showMyNominations: showMyNominations,
    _lookupRollP2: _lookupRollP2,
    _submitPhase2: _submitPhase2,
    _p2Error: _p2Error,
    _lookupRollAddSec: _lookupRollAddSec,
    _submitAddSeconder: _submitAddSeconder,
    _lookupRoll: _lookupRoll,
    _submitNomination: _submitNomination,
    _backToBallot: _backToBallot,
    _confirmWithdraw: _confirmWithdraw,
    _showAppealForm: _showAppealForm,
    _hideAppealForm: _hideAppealForm,
    _submitAppeal: _submitAppeal,
    _submitComplaint: _submitComplaint,
    _showObjModal: _showObjModal,
    _closeObjModal: _closeObjModal,
    _submitObjection: _submitObjection,
    _showEligibilityModal: _showEligibilityModal,
    _closeEligibilityModal: _closeEligibilityModal,
    _selectElection: _selectElection
  };

})();
</script>
