<script>
// ============================================================
// VOTER PANEL — Session 25 full build
// Role: VOTER
// Tabs: My Ballot, Nominations Board, My Receipts, Help
// Mobile-first: all targets min-height 44px, min-font 15px
// ============================================================
var VoterPanel = (function() {

  var _currentTab  = '';
  var _election    = null;
  var _candidatesByPost = [];
  var _votedPosts  = [];
  var _receipts    = [];
  var _newReceipts = [];
  var _voterBatch        = '';
  var _orgSecyBatch      = '';
  var _orgSecyRestricted = false;

  function _getBatchBracket(batchYear) {
    var yr = parseInt(batchYear);
    if (isNaN(yr)) return '';
    var brackets = [
      { from:1965, to:1970, label:'1965-70' },
      { from:1971, to:1975, label:'1971-75' },
      { from:1976, to:1980, label:'1976-80' },
      { from:1981, to:1985, label:'1981-85' },
      { from:1986, to:1990, label:'1986-90' },
      { from:1991, to:1995, label:'1991-95' },
      { from:1996, to:2000, label:'1996-00' },
      { from:2001, to:2005, label:'2001-05' },
      { from:2006, to:2010, label:'2006-10' },
      { from:2011, to:2015, label:'2011-15' },
      { from:2016, to:2020, label:'2016-20' },
      { from:2021, to:2025, label:'2021-25' },
      { from:2026, to:2030, label:'2026-30' }
    ];
    for (var i = 0; i < brackets.length; i++) {
      if (yr >= brackets[i].from && yr <= brackets[i].to) return brackets[i].label;
    }
    return '';
  }

  var TABS = [
    { id: 'ballot',      label: 'My Ballot'   },
    { id: 'nominations', label: 'Nominations' },
    { id: 'receipts',    label: 'My Receipts' },
    { id: 'complaints',  label: 'Complaints'  },
    { id: 'help',        label: 'Help'        }
  ];

  function init() {
    NavMenu.build(TABS, TABS[0].id, function(tabId) {
      _currentTab = tabId;
      var c = document.getElementById('voter-content');
      if (!c) return;
      var html = _renderTab(tabId);
      c.innerHTML = html;
    });
    setMain('<div id="voter-content"></div>');
    _currentTab = TABS[0].id;
    var c = document.getElementById('voter-content');
    if (c) c.innerHTML = _renderTab(TABS[0].id);
  }

  function _renderTab(tabId) {
    if (tabId === 'ballot') {
      setTimeout(function() { _loadBallot(); }, 0);
      return _spinner('Loading election status…');
    }
    if (tabId === 'nominations') {
      setTimeout(function() { _loadNominationsBoard(); }, 0);
      return _spinner('Loading nominations board…');
    }
    if (tabId === 'receipts') {
      setTimeout(function() { _loadReceipts(); }, 0);
      return _spinner('Loading your receipts…');
    }
    if (tabId === 'complaints') {
      setTimeout(function() { _loadComplaints(); }, 0);
      return _spinner('Loading complaints…');
    }
    if (tabId === 'help') {
      return _renderHelp();
    }
    return _spinner('Loading…');
  }

  function _loadBallot() {
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c || _currentTab !== 'ballot') return;
        if (!res || !res.success) {
          c.innerHTML = _errorCard(res && res.message ? res.message : 'Could not load election status.');
          return;
        }
        _election = res.election;
        _voterBatch        = res.voterBatch || '';
        _orgSecyBatch      = res.election ? (res.election.orgSecyBatch      || '') : '';
        _orgSecyRestricted = res.election ? (res.election.orgSecyRestricted || false) : false;
        if (!_election) { c.innerHTML = _noElectionCard(); return; }
        _renderBallotForStatus(c, _election.status);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error. Please try again.');
      })
      .getElectionsForVoter(App.token);
  }

  function _renderBallotForStatus(c, status) {
    if (status === 'active') {
      google.script.run
        .withSuccessHandler(function(cRes) {
          if (!cRes || !cRes.success) {
            c.innerHTML = _errorCard(cRes && cRes.message ? cRes.message : 'Could not load ballot.');
            return;
          }
          _candidatesByPost = cRes.posts || [];
          google.script.run
            .withSuccessHandler(function(bRes) {
              if (!bRes || !bRes.success) { c.innerHTML = _errorCard('Could not load ballot status.'); return; }
              _votedPosts = bRes.votedPosts || [];
              c.innerHTML = _renderActiveBallot();
            })
            .withFailureHandler(function() { c.innerHTML = _errorCard('Connection error.'); })
            .getBallotStatus(App.token, _election.id);
        })
        .withFailureHandler(function() { c.innerHTML = _errorCard('Connection error.'); })
        .getCandidatesForVoter(App.token, _election.id);
      return;
    }
    if (status === 'paused') {
      c.innerHTML = _statusCard('⏸️', 'Voting Temporarily Paused',
        'The Returning Officer has paused voting. Please check back later.' +
        (_election.ecContact ? '<br><br>Contact: <strong>' + escHtml(_election.ecContact) + '</strong>' : ''),
        _election.isTrial ? 'trial' : '');
      return;
    }
    if (status === 'nominations_open' || status === 'nominations_open_phase2') {
      c.innerHTML = _nomOpenCard(status === 'nominations_open_phase2' ? 2 : 1);
      return;
    }
    if (status === 'scrutiny') {
      c.innerHTML = _statusCard('🔍', 'Nominations Under Scrutiny',
        'The Returning Officer is reviewing nominations. No action required from you at this stage.',
        _election.isTrial ? 'trial' : '');
      return;
    }
    if (status === 'candidates_published') {
      c.innerHTML = _candidatesPublishedCard(); return;
    }
    if (status === 'closed') {
      c.innerHTML = _statusCard('🔒', 'Voting Has Closed',
        'The voting window has closed. Results will be declared at the Special General Meeting.',
        _election.isTrial ? 'trial' : '');
      return;
    }
    if (status === 'declared') { _declaredCard(); return; }
    if (status === 'draft') {
      c.innerHTML = _statusCard('📋', 'Election Pending',
        'An election has been created but has not been opened yet. Watch for announcements.',
        _election.isTrial ? 'trial' : '');
      return;
    }
    c.innerHTML = _noElectionCard();
  }

  function _renderActiveBallot() {
    if (_candidatesByPost.length === 0) {
      return _statusCard('📋', 'No Candidates Yet', 'The candidate list is not yet available.', '');
    }
    var totalPosts = _candidatesByPost.length;
    var doneCount  = _votedPosts.length;
    if (doneCount >= totalPosts) return _ballotCompleteCard(totalPosts);

    var trialBanner = _election.isTrial
      ? '<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;' +
        'padding:10px 14px;font-size:.82rem;color:#856404;margin-bottom:14px;">' +
        '⚠️ <strong>Trial Election</strong> — This is a test. Your votes will not count.</div>'
      : '';

    var progressPct = Math.round((doneCount / totalPosts) * 100);
    var progressBar =
      '<div style="margin-bottom:18px;">' +
        '<div style="font-size:.82rem;color:#6b7280;margin-bottom:6px;">Progress: <strong style="color:#1a3a5c;">' +
          doneCount + ' of ' + totalPosts + '</strong> posts voted</div>' +
        '<div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;">' +
          '<div style="height:100%;width:' + progressPct + '%;background:#1a3a5c;border-radius:4px;"></div>' +
        '</div>' +
      '</div>';

    var newReceiptsBanner = '';
    if (_newReceipts.length > 0) {
      newReceiptsBanner =
        '<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:6px;' +
        'padding:12px 14px;margin-bottom:16px;font-size:.83rem;color:#065f46;">' +
        '<strong>🔒 Vote receipts this session:</strong><br>' +
        _newReceipts.map(function(r) {
          return escHtml(r.post) + ': <code style="font-size:.8rem;background:#f0fdf4;' +
            'padding:2px 6px;border-radius:3px;">' + escHtml(r.token) + '</code>';
        }).join('<br>') +
        '<br><span style="font-size:.78rem;opacity:.8;">Keep these tokens for your records.</span></div>';
    }

    var postCards = '';
    for (var i = 0; i < _candidatesByPost.length; i++) {
      postCards += _renderPostCard(_candidatesByPost[i],
        _votedPosts.indexOf(_candidatesByPost[i].post) !== -1,
        _getNewReceiptToken(_candidatesByPost[i].post));
    }
    return trialBanner + progressBar + newReceiptsBanner + postCards;
  }

  function _getNewReceiptToken(postName) {
    for (var i = 0; i < _newReceipts.length; i++) {
      if (_newReceipts[i].post === postName) return _newReceipts[i].token;
    }
    return null;
  }

  function _renderPostCard(pg, voted, receiptToken) {
    var seatLine = pg.seatCount > 1
      ? '<div style="font-size:.8rem;color:#1a3a5c;background:#eff6ff;padding:4px 10px;' +
        'border-radius:4px;margin-bottom:10px;display:inline-block;">📌 Elect <strong>' +
        pg.seatCount + '</strong> candidates for this post</div><br>'
      : '';
    var dis = voted ? 'disabled ' : '';
    var cur = voted ? 'default' : 'pointer';
    var opa = voted ? '.7' : '1';

    var candidateRows = '';
    for (var i = 0; i < pg.candidates.length; i++) {
      var cd = pg.candidates[i];
      candidateRows +=
        '<label style="display:flex;align-items:flex-start;gap:12px;padding:12px;' +
        'background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:8px;' +
        'cursor:' + cur + ';opacity:' + opa + ';">' +
          '<input type="radio" name="vote_' + escHtml(pg.post) + '" value="' + escHtml(cd.id) + '" ' + dis +
          'style="margin-top:4px;width:18px;height:18px;flex-shrink:0;">' +
          '<div style="flex:1;">' +
            '<div style="font-size:.95rem;font-weight:600;color:#1f2937;">' + escHtml(cd.name) + '</div>' +
            '<div style="font-size:.8rem;color:#6b7280;">Batch: ' + escHtml(cd.batch) + '</div>' +
            (cd.bio ? '<div style="font-size:.82rem;color:#374151;margin-top:4px;line-height:1.4;">' + escHtml(cd.bio) + '</div>' : '') +
          '</div>' +
        '</label>';
    }

    var specialOpts =
      '<label style="display:flex;align-items:center;gap:12px;padding:12px;background:#fefce8;' +
      'border:1px solid #fde68a;border-radius:6px;margin-bottom:8px;cursor:' + cur + ';opacity:' + opa + ';">' +
        '<input type="radio" name="vote_' + escHtml(pg.post) + '" value="NOTA" ' + dis +
        'style="width:18px;height:18px;flex-shrink:0;">' +
        '<div><div style="font-size:.9rem;font-weight:600;color:#92400e;">None of the Above (NOTA)</div>' +
        '<div style="font-size:.78rem;color:#78350f;">Your preference is recorded but no candidate selected</div></div>' +
      '</label>' +
      '<label style="display:flex;align-items:center;gap:12px;padding:12px;background:#f5f3ff;' +
      'border:1px solid #ddd6fe;border-radius:6px;margin-bottom:8px;cursor:' + cur + ';opacity:' + opa + ';">' +
        '<input type="radio" name="vote_' + escHtml(pg.post) + '" value="ABSTAIN" ' + dis +
        'style="width:18px;height:18px;flex-shrink:0;">' +
        '<div><div style="font-size:.9rem;font-weight:600;color:#5b21b6;">Abstain</div>' +
        '<div style="font-size:.78rem;color:#4c1d95;">You choose not to vote for this post</div></div>' +
      '</label>';

    var voteBtn = voted
      ? '<div style="display:flex;align-items:center;gap:8px;padding:12px;background:#d1fae5;' +
        'border-radius:6px;font-size:.9rem;color:#065f46;">✅ Voted' +
        (receiptToken ? ' — Receipt: <code style="font-size:.78rem;background:#f0fdf4;' +
          'padding:2px 6px;border-radius:3px;">' + escHtml(receiptToken) + '</code>' : '') + '</div>'
      : '<button onclick="VoterPanel.submitVote(\'' + escHtml(pg.post).replace(/'/g,"\\'") + '\')" ' +
        'style="width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;' +
        'font-size:.95rem;font-weight:600;cursor:pointer;margin-top:4px;min-height:48px;">Cast Vote for this Post</button>';

    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin-bottom:16px;">' +
      '<div style="font-size:1rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;padding-bottom:8px;' +
      'border-bottom:1px solid #f3f4f6;">' + escHtml(pg.post) + '</div>' +
      seatLine + candidateRows + specialOpts + voteBtn + '</div>';
  }

  function submitVote(postName) {
    var radios = document.querySelectorAll('input[name="vote_' + postName + '"]');
    var selected = null;
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked) { selected = radios[i].value; break; }
    }
    if (!selected) {
      showToast('Please select a candidate, NOTA, or Abstain before submitting.');
      return;
    }
    var label = selected === 'NOTA' ? 'None of the Above' :
                selected === 'ABSTAIN' ? 'Abstain' :
                _getCandidateName(postName, selected);
    if (!confirm('Confirm your vote for "' + postName + '":\n\n' + label + '\n\nThis cannot be changed after submission.')) return;

    var btns = document.querySelectorAll('button');
    var btn = null;
    for (var b = 0; b < btns.length; b++) {
      if (btns[b].textContent === 'Cast Vote for this Post' &&
          btns[b].getAttribute('onclick') && btns[b].getAttribute('onclick').indexOf(postName) !== -1) {
        btn = btns[b]; break;
      }
    }
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) ? res.message : 'Vote submission failed. Please try again.');
          if (btn) { btn.disabled = false; btn.textContent = 'Cast Vote for this Post'; }
          return;
        }
        _votedPosts.push(postName);
        if (res.receiptToken) _newReceipts.push({ post: postName, token: res.receiptToken });
        var c = document.getElementById('voter-content');
        if (c && _currentTab === 'ballot') c.innerHTML = _renderActiveBallot();
        showToast('Vote recorded for ' + postName + ' ✅');
      })
      .withFailureHandler(function() {
        showToast('Connection error — please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Cast Vote for this Post'; }
      })
      .castVote(App.token, _election.id, postName, selected);
  }

  function _getCandidateName(postName, candidateId) {
    for (var i = 0; i < _candidatesByPost.length; i++) {
      if (_candidatesByPost[i].post === postName) {
        for (var j = 0; j < _candidatesByPost[i].candidates.length; j++) {
          if (_candidatesByPost[i].candidates[j].id === candidateId)
            return _candidatesByPost[i].candidates[j].name;
        }
      }
    }
    return candidateId;
  }

  function _noElectionCard() {
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2.5rem;margin-bottom:12px;">🗳️</div>' +
      '<div style="font-size:1.1rem;font-weight:700;color:#374151;margin-bottom:8px;">No Election Scheduled</div>' +
      '<div style="font-size:.9rem;">No upcoming election is currently scheduled.</div></div>';
  }

  function _statusCard(icon, title, body, type) {
    var trialBadge = type === 'trial'
      ? '<span style="font-size:.75rem;background:#fef3c7;color:#92400e;padding:2px 8px;' +
        'border-radius:10px;font-weight:600;margin-left:8px;">TRIAL</span>' : '';
    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:24px 16px;text-align:center;">' +
      '<div style="font-size:2.5rem;margin-bottom:12px;">' + icon + '</div>' +
      '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;">' + escHtml(title) + trialBadge + '</div>' +
      '<div style="font-size:.9rem;color:#374151;line-height:1.6;">' + body + '</div></div>';
  }

  function _nomOpenCard(phase) {
    var title = phase === 2 ? 'Nominations Open — Phase 2' : 'Nominations Open';
    var body  = phase === 2
      ? 'Phase 2 nominations are open. Any member may nominate a fellow member.'
      : 'Nominations are open. You may nominate yourself for a position on the Executive Committee.';
    var deadline = _election.nomDeadline
      ? '<br><br>Nomination deadline: <strong>' + escHtml(_election.nomDeadline) + '</strong>' : '';
    var trialBadge = _election.isTrial
      ? '<span style="font-size:.75rem;background:#fef3c7;color:#92400e;padding:2px 8px;' +
        'border-radius:10px;font-weight:600;margin-left:8px;">TRIAL</span>' : '';
    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:24px 16px;">' +
      '<div style="text-align:center;margin-bottom:16px;">' +
        '<div style="font-size:2rem;margin-bottom:8px;">📝</div>' +
        '<div style="font-size:1.05rem;font-weight:700;color:#1a3a5c;">' + escHtml(title) + trialBadge + '</div>' +
      '</div>' +
      '<div style="font-size:.9rem;color:#374151;margin-bottom:16px;line-height:1.6;">' + body + deadline + '</div>' +
      '<button onclick="VoterPanel.showNominationForm()" style="width:100%;padding:14px;background:#1a3a5c;' +
      'color:#fff;border:none;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;margin-bottom:10px;">' +
      '✍️ Nominate Myself</button>' +
      '<button onclick="VoterPanel.showMyNominations()" style="width:100%;padding:14px;background:#fff;' +
      'color:#1a3a5c;border:2px solid #1a3a5c;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;margin-bottom:10px;">' +
      '📄 My Nominations</button>' +
      (phase === 2 ?
      '<button onclick="VoterPanel.showNominationForm_Phase2()" style="width:100%;padding:14px;background:#fff;' +
      'color:#1a3a5c;border:2px solid #1a3a5c;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;margin-bottom:10px;">' +
      '🤝 Nominate Another Member</button>' : '') +
      '<button onclick="VoterPanel.showNominationsBoard()" style="width:100%;padding:14px;background:#fff;' +
      'color:#1a3a5c;border:2px solid #1a3a5c;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">' +
      '📋 View Nominations Board</button></div>';
  }

  function _candidatesPublishedCard() {
    var vDay = _election.vDay
      ? '<br><br>Voting opens: <strong>' + escHtml(_election.vDay) + '</strong>' : '';
    var trialBadge = _election.isTrial
      ? '<span style="font-size:.75rem;background:#fef3c7;color:#92400e;padding:2px 8px;' +
        'border-radius:10px;font-weight:600;margin-left:8px;">TRIAL</span>' : '';
    return '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:24px 16px;">' +
      '<div style="text-align:center;margin-bottom:16px;">' +
        '<div style="font-size:2rem;margin-bottom:8px;">📣</div>' +
        '<div style="font-size:1.05rem;font-weight:700;color:#1a3a5c;">Candidates Published' + trialBadge + '</div>' +
      '</div>' +
      '<div style="font-size:.9rem;color:#374151;margin-bottom:16px;line-height:1.6;">' +
        'The final list of candidates has been published. Voting will open shortly.' + vDay + '</div>' +
      '<button onclick="VoterPanel.showNominationsBoard()" style="width:100%;padding:14px;background:#1a3a5c;' +
      'color:#fff;border:none;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">' +
      '📋 View Candidate List</button></div>';
  }

  function _declaredCard() {
    var c = document.getElementById('voter-content');
    if (c) c.innerHTML = _spinner('Loading results…');
    var elecId = _election ? _election.id : null;
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c) return;
        if (!res || !res.success) {
          c.innerHTML = _errorCard(res && res.message ? res.message : 'Could not load results.');
          return;
        }
        c.innerHTML = _renderDeclaredResults(res);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error loading results.');
      })
      .getDeclaredResults(App.token, elecId);
  }

  function _renderDeclaredResults(res) {
    var html =
      '<div style="text-align:center;padding:16px 0 20px;">' +
        '<div style="font-size:2.5rem;margin-bottom:8px;">🏆</div>' +
        '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;">' + escHtml(res.electionTitle) + '</div>' +
        '<div style="font-size:.82rem;color:#059669;font-weight:600;margin-top:4px;">Results Declared</div>' +
      '</div>';

    var posts = res.posts || [];
    if (posts.length === 0) {
      html += '<div style="text-align:center;padding:24px;color:#6b7280;font-size:.9rem;">No results data available.</div>';
      return html;
    }

    for (var i = 0; i < posts.length; i++) {
      var post = posts[i];
      var seats = post.seatCount || 1;
      var seatLabel = seats > 1 ? ' (' + seats + ' seats)' : '';

      html +=
        '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;' +
        'padding:14px 16px;margin-bottom:14px;">' +

          '<div style="display:flex;justify-content:space-between;align-items:baseline;' +
          'margin-bottom:10px;gap:8px;">' +
            '<div style="font-size:.95rem;font-weight:700;color:#1a3a5c;">' +
              escHtml(post.post) + seatLabel +
            '</div>' +
            (post.turnout ? '<div style="font-size:.75rem;color:#6b7280;white-space:nowrap;">' +
              post.turnout + ' voted</div>' : '') +
          '</div>';

      var cands = post.candidates || [];
      for (var j = 0; j < cands.length; j++) {
        var cand = cands[j];
        var isElected = cand.elected;
        html +=
          '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;' +
          (j < cands.length - 1 ? 'border-bottom:1px solid #f3f4f6;' : '') + '">' +
            '<div style="width:26px;text-align:center;font-size:1rem;flex-shrink:0;">' +
              (isElected ? '✅' : '<span style="color:#d1d5db;">○</span>') +
            '</div>' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-size:.9rem;font-weight:' + (isElected ? '700' : '400') + ';' +
              'color:' + (isElected ? '#065f46' : '#374151') + ';">' +
                escHtml(cand.name) +
                (isElected ? ' <span style="font-size:.75rem;background:#d1fae5;color:#065f46;' +

  function _lookupRollP2(role) {
    var rollEl = document.getElementById('p2-' + role + '-roll');
    var nameEl = document.getElementById('p2-' + role + '-name');
    if (!rollEl || !nameEl) return;
    var roll = rollEl.value.trim();
    if (!roll) { nameEl.innerHTML = ''; return; }
    nameEl.style.color = '#9ca3af';
    nameEl.innerHTML = 'Looking up…';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          nameEl.style.color = '#059669';
          nameEl.innerHTML = '✓ ' + escHtml(res.name) + (res.batch ? ' (Batch ' + escHtml(res.batch) + ')' : '');
        } else {
          nameEl.style.color = '#dc2626';
          nameEl.innerHTML = '✗ ' + escHtml((res && res.message) || 'Not found');
        }
      })
      .withFailureHandler(function() {
        nameEl.style.color = '#dc2626';
        nameEl.innerHTML = '✗ Connection error';
      })
      .lookupVoterName(App.token, roll);
  }

  function _submitPhase2() {
    var postEl    = document.getElementById('p2-post');
    var candRollEl= document.getElementById('p2-cand-roll');
    var secRollEl = document.getElementById('p2-sec-roll');
    var bioEl     = document.getElementById('p2-bio');
    var errEl     = document.getElementById('p2-error');

    var post    = postEl    ? postEl.value.trim()     : '';
    var candRoll= candRollEl? candRollEl.value.trim()  : '';
    var secRoll = secRollEl ? secRollEl.value.trim()   : '';
    var bio     = bioEl     ? bioEl.value.trim()       : '';

    if (errEl) errEl.style.display = 'none';

    if (!post)     { _p2Error('Please select a post.'); return; }
    if (!candRoll) { _p2Error('Please enter the candidate\'s roll number.'); return; }

    if (!_election || !_election.id) { _p2Error('Election data missing. Please reload.'); return; }

    var btn = document.querySelector('[onclick="VoterPanel._submitPhase2()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

      .withSuccessHandler(function(res) {

        if (!res || !res.success) {

      .submitNomination_Phase2(App.token, _election.id, post, candRoll, secRoll, bio);

            '<button onclick="VoterPanel._lookupRoll(\'sec\')" ' +

  function _lookupRoll(role) {
    var rollEl = document.getElementById('nom-' + role + '-roll');
    var nameEl = document.getElementById('nom-' + role + '-name');
    if (!rollEl || !nameEl) return;
    var roll = rollEl.value.trim();
    if (!roll) { nameEl.textContent = ''; return; }
    nameEl.style.color = '#6b7280';
    nameEl.textContent = 'Looking up…';
    google.script.run
      .withSuccessHandler(function(res) {
        if (!nameEl) return;
        if (res && res.success) {
          nameEl.style.color = '#059669';
          nameEl.textContent = '✓ ' + res.name + ' (Batch ' + res.batch + ')';
        } else {
          nameEl.style.color = '#dc2626';
          nameEl.textContent = '✗ ' + ((res && res.message) || 'Not found');
        }
      })
      .withFailureHandler(function() {
        if (nameEl) { nameEl.style.color = '#dc2626'; nameEl.textContent = '✗ Connection error'; }
      })
      .lookupVoterName(App.token, roll);
  }

  function _submitNomination() {
    var postEl    = document.getElementById('nom-post');
    var propEl    = document.getElementById('nom-prop-roll');
    var secEl     = document.getElementById('nom-sec-roll');
    var bioEl     = document.getElementById('nom-bio');
    var declEl    = document.getElementById('nom-declaration');
    var errEl     = document.getElementById('nom-error');

    if (!postEl || !propEl || !secEl || !declEl) return;

    var post = postEl.value;
    var prop = propEl.value.trim();
    var sec  = secEl.value.trim();
    var bio  = bioEl ? bioEl.value.trim() : '';

    if (!post) { _showNomError('Please select a post.'); return; }
    if (!prop) { _showNomError('Please enter the proposer\'s roll number.'); return; }
    if (!sec)  { _showNomError('Please enter the seconder\'s roll number.'); return; }
    if (!declEl.checked) { _showNomError('Please tick the declaration checkbox before submitting.'); return; }

    if (errEl) errEl.style.display = 'none';

    var btn = document.querySelector('button[onclick="VoterPanel._submitNomination()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          _showNomError((res && res.message) || 'Submission failed. Please try again.');
          if (btn) { btn.disabled = false; btn.textContent = 'Submit Nomination'; }
          return;
        }
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML =
          '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;' +
          'padding:32px 16px;text-align:center;">' +
            '<div style="font-size:3rem;margin-bottom:12px;">✅</div>' +
            '<div style="font-size:1.1rem;font-weight:700;color:#1a3a5c;margin-bottom:10px;">Nomination Submitted!</div>' +
            '<div style="font-size:.9rem;color:#374151;margin-bottom:16px;line-height:1.6;">' +
              'Your nomination for <strong>' + escHtml(post) + '</strong> has been submitted.<br><br>' +
              'Confirmation emails have been sent to your proposer and seconder. ' +
              'Your nomination will be confirmed once both have clicked their links.' +
            '</div>' +
            '<button onclick="VoterPanel.showMyNominations()" ' +
            'style="width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;' +
            'border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">' +
            '📄 View My Nominations</button>' +
          '</div>';
      })
      .withFailureHandler(function() {
        _showNomError('Connection error — please try again.');
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Nomination'; }
      })
      .submitNomination(App.token, _election.id, post, prop, sec, bio);
  }

  function _showNomError(msg) {
    var errEl = document.getElementById('nom-error');
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  }

  function _backToBallot() {
    var c = document.getElementById('voter-content');
    if (c) c.innerHTML = _renderTab('ballot');
    _loadBallot();
  }

  // ── MY NOMINATIONS DASHBOARD ──────────────────────────────

  function showMyNominations() {
    var c = document.getElementById('voter-content');
    if (!c) return;
    c.innerHTML = _spinner('Loading your nominations…');

    var elecId = _election ? _election.id : null;
    if (!elecId) {
      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success && res.election) {
            _election = res.election;
            _loadMyNominations();
          } else {
            var c2 = document.getElementById('voter-content');
            if (c2) c2.innerHTML = _errorCard('No active election found.');
          }
        })
        .withFailureHandler(function() {
          var c2 = document.getElementById('voter-content');
          if (c2) c2.innerHTML = _errorCard('Connection error.');
        })
        .getElectionsForVoter(App.token);
      return;
    }
    _loadMyNominations();
  }

  function _loadMyNominations() {
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c) return;
        if (!res || !res.success) {
          c.innerHTML = _errorCard((res && res.message) || 'Could not load nominations.');
          return;
        }
        c.innerHTML = _renderMyNominations(res.nominations || []);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error.');
      })
      .getMyNominations(App.token, _election.id);
  }

            '<span style="font-size:.72rem;padding:3px 10px;border-radius:10px;font-weight:600;' +
              'background:' + bgColor + ';white-space:nowrap;">' + escHtml(statusLabel) + '</span>' +
          '</div>' +
          '<div style="font-size:.8rem;color:#6b7280;margin-bottom:8px;">' +

            ' · Role: ' + escHtml(nom.role) +
          '</div>' +
          '<div style="display:flex;gap:12px;font-size:.82rem;margin-bottom:8px;">' +
            '<span style="color:' + (nom.propConfirmed ? '#059669' : '#9ca3af') + ';">' +
              (nom.propConfirmed ? '✓' : '○') + ' Proposer confirmed</span>' +
            '<span style="color:' + (nom.secConfirmed ? '#059669' : '#9ca3af') + ';">' +
              (nom.secConfirmed ? '✓' : '○') + ' Seconder confirmed</span>' +
          '</div>' +
          (nom.rejectionReason ?
            '<div style="font-size:.82rem;color:#991b1b;background:#fef2f2;' +
            'padding:8px 10px;border-radius:4px;margin-bottom:8px;">' +
            '<strong>Rejection reason:</strong> ' + escHtml(nom.rejectionReason) + '</div>' : '') +
          (nom.status === 'rejected' && nom.role === 'candidate' &&

            '<button onclick="VoterPanel._showAppealForm(\'' + escHtml(nom.id) + '\',\'' + escHtml(nom.post) + '\')" ' +
            'style="width:100%;padding:12px;background:#fff;color:#b45309;border:1.5px solid #b45309;' +

              (nom.status === 'pending_confirmation' || nom.status === 'confirmed')) ?

            escHtml(nom.post) + '\')" ' +
            'style="width:100%;padding:12px;background:#fff;color:#dc2626;border:1.5px solid #dc2626;' +
            'border-radius:4px;font-size:.88rem;cursor:pointer;min-height:44px;">Withdraw Nomination</button>'

  function _showAppealForm(nomId) {
    var form = document.getElementById('appeal-form-' + nomId);
    if (form) form.style.display = 'block';
  }

  function _hideAppealForm(nomId) {
    var form = document.getElementById('appeal-form-' + nomId);
    if (form) form.style.display = 'none';
  }

  function _submitAppeal(nomId) {
    var textEl = document.getElementById('appeal-text-' + nomId);
    if (!textEl) return;
    var text = textEl.value.trim();
    if (!text) { showToast('Please enter the grounds for your appeal.', true); return; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Appeal submission failed.', true);
          return;
        }
        showToast('Appeal filed. Reference: ' + res.appealId);
        _loadMyNominations();
      })
      .withFailureHandler(function() { showToast('Connection error.', true); })
      .fileAppeal(App.token, nomId, text);
  }

  function _confirmWithdraw(nomId, postName) {
    if (!confirm('Withdraw your nomination for "' + postName + '"?\n\nThis cannot be undone.')) return;
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Withdrawal failed.', true);
          return;
        }
        showToast('Nomination withdrawn.');
        _loadMyNominations();
      })
      .withFailureHandler(function() { showToast('Connection error.', true); })
      .withdrawNomination(App.token, nomId);
  }
  function _lookupRollAddSec(nomId) {
    var rollEl = document.getElementById('sec-roll-' + nomId);
    var nameEl = document.getElementById('sec-name-' + nomId);
    if (!rollEl || !nameEl) return;
    var roll = rollEl.value.trim();
    if (!roll) { nameEl.innerHTML = ''; return; }
    nameEl.style.color = '#9ca3af';
    nameEl.innerHTML = 'Looking up…';
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.success) {
          nameEl.style.color = '#059669';
          nameEl.innerHTML = '✓ ' + escHtml(res.name) + (res.batch ? ' (Batch ' + escHtml(res.batch) + ')' : '');
        } else {
          nameEl.style.color = '#dc2626';
          nameEl.innerHTML = '✗ ' + escHtml((res && res.message) || 'Not found');
        }
      })
      .withFailureHandler(function() {
        nameEl.style.color = '#dc2626';
        nameEl.innerHTML = '✗ Connection error';
      })
      .lookupVoterName(App.token, roll);
  }

  function _submitAddSeconder(nomId, role) {
    var rollEl = document.getElementById('sec-roll-' + nomId);
    if (!rollEl) return;
    var secRoll = rollEl.value.trim();
    if (!secRoll) { showToast('Please enter a seconder roll number.', true); return; }
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) {
          showToast((res && res.message) || 'Failed to add seconder.', true);
          return;
        }
        showToast(res.message || 'Seconder added.');
        showMyNominations();
      })
      .withFailureHandler(function() { showToast('Connection error.', true); })
      [role === 'candidate' ? 'candidateAddSeconder' : 'addSeconder'](App.token, nomId, secRoll);
  }

  // ── COMPLAINTS TAB ────────────────────────────────────────

  function _loadComplaints() {
    var c = document.getElementById('voter-content');
    if (!c || _currentTab !== 'complaints') return;
    var elecId = _election ? _election.id : null;
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('voter-content');
        if (!c || _currentTab !== 'complaints') return;
        if (!res || !res.success) {
          c.innerHTML = _errorCard(res && res.message ? res.message : 'Could not load complaints.');
          return;
        }
        c.innerHTML = _renderComplaintsTab(res.complaints || []);
      })
      .withFailureHandler(function() {
        var c = document.getElementById('voter-content');
        if (c) c.innerHTML = _errorCard('Connection error.');
      })
      .getMyComplaints(App.token, elecId);
  }

        '<div style="font-size:.9rem;font-weight:600;color:#1a3a5c;margin-bottom:12px;">📝 File a New Complaint</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Against — Roll No. (optional)</label>' +
          '<input type="text" id="cmp-against-roll" placeholder="e.g. SSK001" inputmode="text" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Against — Name (optional)</label>' +
          '<input type="text" id="cmp-against" placeholder="Full name of member" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Against — Batch (optional)</label>' +
          '<input type="text" id="cmp-against-batch" placeholder="e.g. 1995" inputmode="numeric" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:10px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Channel / Platform where violation occurred</label>' +
          '<input type="text" id="cmp-channel" placeholder="e.g. WhatsApp group, Facebook, email" ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
        '</div>' +
        '<div style="margin-bottom:14px;">' +
          '<label style="display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:4px;">Complaint details <span style="color:#b91c1c;">*</span></label>' +
          '<textarea id="cmp-text" rows="4" placeholder="Describe the violation in detail. Include dates, times, and any other relevant information." ' +
            'style="width:100%;padding:10px;font-size:.9rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;resize:vertical;"></textarea>' +
        '</div>' +
        '<button onclick="VoterPanel._submitComplaint()" ' +
          'style="width:100%;padding:13px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;' +
          'font-size:.95rem;font-weight:600;cursor:pointer;min-height:48px;">Submit Complaint</button>' +
      '</div>';

    // ── My complaints list ──
    if (complaints.length === 0) {
      html +=
        '<div style="text-align:center;padding:24px 16px;color:#6b7280;">' +
          '<div style="font-size:1.5rem;margin-bottom:8px;">📭</div>' +
          '<div style="font-size:.9rem;">You have not filed any complaints for this election.</div>' +
        '</div>';
    } else {
      html += '<div style="font-size:.85rem;font-weight:600;color:#374151;margin-bottom:10px;">' +
        'Your Complaints (' + complaints.length + ')</div>';
      for (var i = 0; i < complaints.length; i++) {
        var cmp = complaints[i];
        var st  = cmp.status || 'filed';
        var stLabel = statusLabels[st] || st;
        var stBg    = statusColors[st]     || '#f3f4f6';
        var stColor = statusTextColors[st] || '#374151';
        var dateStr = cmp.filedAt ? cmp.filedAt.toString().split('T')[0] : '';
        html +=
          '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin-bottom:10px;">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;">' +
              '<div style="font-size:.78rem;color:#6b7280;">' + escHtml(cmp.id) + '<br>' + escHtml(dateStr) + '</div>' +
              '<span style="font-size:.75rem;background:' + stBg + ';color:' + stColor + ';padding:3px 9px;' +
                'border-radius:10px;font-weight:600;white-space:nowrap;">' + escHtml(stLabel) + '</span>' +
            '</div>' +
            (cmp.againstName ? '<div style="font-size:.82rem;color:#374151;margin-bottom:6px;">Against: <strong>' + escHtml(cmp.againstName) + '</strong></div>' : '') +
            '<div style="font-size:.85rem;color:#374151;line-height:1.5;margin-bottom:6px;">' + escHtml(cmp.complaintText) + '</div>' +
            (cmp.resolution ? ('<div style="background:#f9fafb;border-radius:4px;padding:8px 10px;font-size:.8rem;color:#374151;margin-top:6px;"><strong>RO Resolution:</strong> ' + escHtml(cmp.resolution) + '</div>') : '') +
          '</div>';
      }
    }

    return html;
  }

  function _submitComplaint() {
    var againstRollEl  = document.getElementById('cmp-against-roll');
    var againstEl      = document.getElementById('cmp-against');
    var againstBatchEl = document.getElementById('cmp-against-batch');
    var channelEl      = document.getElementById('cmp-channel');
    var textEl         = document.getElementById('cmp-text');
    if (!textEl) return;
    var text = textEl.value.trim();
    if (!text) { showToast('Please enter complaint details.', true); return; }
    var againstRoll  = againstRollEl  ? againstRollEl.value.trim().toUpperCase()  : '';
    var againstName  = againstEl      ? againstEl.value.trim()                    : '';
    var againstBatch = againstBatchEl ? againstBatchEl.value.trim()               : '';
    var against      = againstName + (againstBatch ? ' (Batch ' + againstBatch + ')' : '');
    var channel = channelEl ? channelEl.value.trim() : '';
    var elecId  = _election ? _election.id : null;

    var btn = document.querySelector('button[onclick="VoterPanel._submitComplaint()"]');
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

    google.script.run
      .withSuccessHandler(function(res) {
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Complaint'; }
        if (!res || !res.success) {
          showToast((res && res.message) || 'Submission failed.', true);
          return;
        }
        showToast('Complaint filed. Reference: ' + res.complaintId);
        if (textEl)         textEl.value         = '';
        if (againstRollEl)  againstRollEl.value  = '';
        if (againstEl)      againstEl.value      = '';
        if (againstBatchEl) againstBatchEl.value = '';
        if (channelEl)      channelEl.value      = '';
        _loadComplaints();
      })
      .withFailureHandler(function() {
        if (btn) { btn.disabled = false; btn.textContent = 'Submit Complaint'; }
        showToast('Connection error.', true);
      })
      .fileComplaint(App.token, elecId, text, against, againstRoll, channel);
  }

  return {
    init: init,
    submitVote: submitVote,
    showNominationsBoard: showNominationsBoard,
    switchToReceipts: switchToReceipts,
    switchToNominations: switchToNominations,
    showNominationForm: showNominationForm,
    showNominationForm_Phase2: showNominationForm_Phase2,
    showMyNominations: showMyNominations,
    _lookupRollP2: _lookupRollP2,
    _submitPhase2: _submitPhase2,
    _p2Error: _p2Error,
    _lookupRollAddSec: _lookupRollAddSec,
    _submitAddSeconder: _submitAddSeconder,
    _lookupRoll: _lookupRoll,
    _submitNomination: _submitNomination,
    _backToBallot: _backToBallot,
    _confirmWithdraw: _confirmWithdraw,
    _showAppealForm: _showAppealForm,
    _hideAppealForm: _hideAppealForm,
    _submitAppeal: _submitAppeal,
    _submitComplaint: _submitComplaint
  };

})();
</script>
