<script>
// ============================================================
// VOTER PANEL — Pass 2B stub
// Role: voter
// ============================================================
var VoterPanel = (function() {

  var _currentTab = '';

  var TABS = [
    { id:'ballot',      label:'My Ballot' },
    { id:'nominations', label:'Nominations' },
    { id:'receipts',    label:'My Receipts' },
    { id:'help',        label:'Help' }
  ];

  function init() {
    // DO NOT touch #app or #topbar — Index.html owns those.
    // App.showPanel() has already populated topbar elements.

    setMain(
      '<div class="tab-bar" id="voter-tab-bar" ' +
        'style="overflow-x:auto;-webkit-overflow-scrolling:touch;' +
        'white-space:nowrap;flex-wrap:nowrap;max-width:100%;"></div>' +
      '<div id="voter-content" style="overflow-x:hidden;"></div>'
    );

    var tabBar = document.getElementById('voter-tab-bar');
    TABS.forEach(function(t) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.id = 'tab-btn-' + t.id;
      btn.textContent = t.label;
      btn.onclick = function() { VoterPanel.switchTab(t.id); };
      tabBar.appendChild(btn);
    });

    VoterPanel.switchTab(TABS[0].id);
  }

  function switchTab(tabId) {
    _currentTab = tabId;
    TABS.forEach(function(t) {
      var btn = document.getElementById('tab-btn-' + t.id);
      if (btn) btn.className = 'tab-btn' + (t.id === tabId ? ' active' : '');
    });
    document.getElementById('voter-content').innerHTML = _renderTab(tabId);
  }

  function _renderTab(tabId) {
    var labels = {
      ballot:      'My Ballot',
      nominations: 'Nominations Board',
      receipts:    'My Receipts',
      help:        'Help'
    };
    var label = labels[tabId] || tabId;
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2rem;margin-bottom:12px;">🏗️</div>' +
      '<div style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
        escHtml(label) + '</div>' +
      '<div style="font-size:0.85rem;">This tab is being built. Check back soon.</div>' +
      '</div>';
  }

  function logout() {
    App.logout();
  }

  return { init: init, switchTab: switchTab };

})();
</script>
