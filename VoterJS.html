<script>
// ============================================================
// VOTER PANEL — Pass 2B stub
// Role: voter
// ============================================================
var VoterPanel = (function() {

  var _currentTab = '';

  var TABS = [
    { id:'ballot',      label:'My Ballot' },
    { id:'nominations', label:'Nominations' },
    { id:'receipts',    label:'My Receipts' },
    { id:'help',        label:'Help' }
  ];

  function init() {
    NavMenu.build(TABS, TABS[0].id, function(tabId) {
      _currentTab = tabId;
      var content = document.getElementById('voter-content');
      if (content) content.innerHTML = _renderTab(tabId);
    });

    setMain('<div id="voter-content"></div>');

    _currentTab = TABS[0].id;
    document.getElementById('voter-content').innerHTML = _renderTab(TABS[0].id);
  }

  function _renderTab(tabId) {
    var labels = {
      ballot:      'My Ballot',
      nominations: 'Nominations Board',
      receipts:    'My Receipts',
      help:        'Help'
    };
    var label = labels[tabId] || tabId;
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2rem;margin-bottom:12px;">🏗️</div>' +
      '<div style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
        escHtml(label) + '</div>' +
      '<div style="font-size:0.85rem;">This tab is being built. Check back soon.</div>' +
      '</div>';
  }

  function logout() {
    App.logout();
  }

  return { init: init };

})();
</script>
