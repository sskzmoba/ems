<script>
// ============================================================
// EC OFFICER PANEL — ECOfficerJS.html
// Role: EC_OFFICER (sub-roles: GS | PRESIDENT | VP)
// Tabs: Overview | Voter Roll | Messages | Landing Page
// ============================================================
var ECOfficerPanel = (function() {

  var _currentTab = '';

  var TABS = [
    { id: 'overview',     label: 'Overview' },
    { id: 'voterroll',    label: 'Voter Roll' },
    { id: 'messages',     label: 'Messages' },
    { id: 'landingpage',  label: 'Landing Page' }
  ];

  // GS sees all tabs; PRESIDENT and VP see Overview + Messages only
  function _getTabsForType(type) {
    if (type === 'GS') return TABS;
    return TABS.filter(function(t) {
      return t.id === 'overview' || t.id === 'messages';
    });
  }

  function init() {
    var type = (App.type || 'GS').toUpperCase();
    var tabs = _getTabsForType(type);

    NavMenu.build(tabs, tabs[0].id, function(tabId) {
      _currentTab = tabId;
      var content = document.getElementById('ec-content');
      if (content) content.innerHTML = _renderTab(tabId);
    });

    setMain('<div id="ec-content"></div>');

    _currentTab = tabs[0].id;
    document.getElementById('ec-content').innerHTML = _renderTab(tabs[0].id);
  }

  function _renderTab(tabId) {
    if (tabId === 'overview')    { _loadOverview();    return _spinner(); }
    if (tabId === 'voterroll')   return _renderVoterRoll();
    if (tabId === 'messages')    { _loadMessages();    return _spinner(); }
    if (tabId === 'landingpage') { _loadLandingPage(); return _spinner(); }
    return _comingSoon(tabId);
  }

  function _spinner() {
    return '<div style="text-align:center;padding:32px 16px;color:#6b7280;">' +
      '<div class="spinner"></div>' +
      '<div style="font-size:.85rem;margin-top:12px;">Loading…</div>' +
      '</div>';
  }

  function _comingSoon(label) {
    return '<div style="text-align:center;padding:48px 16px;color:#6b7280;">' +
      '<div style="font-size:2rem;margin-bottom:12px;">🏗</div>' +
      '<div style="font-size:1rem;font-weight:600;color:#374151;margin-bottom:6px;">' +
        escHtml(label) + '</div>' +
      '<div style="font-size:0.85rem;">This tab is being built.</div>' +
      '</div>';
  }

  // ── OVERVIEW ─────────────────────────────────────────────────

  function _loadOverview() {
    google.script.run
      .withSuccessHandler(function(res) {
        var content = document.getElementById('ec-content');
        if (!content) return;

        if (!res || !res.success) {
          content.innerHTML = '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
            escHtml((res && res.message) || 'Failed to load overview.') + '</div>';
          return;
        }

        var el = res.election;
        var checklist = res.checklist || [];

        var html = '';

        // Election status card
        if (el) {
          var statusBadgeMap = {
            draft: 'badge-draft',
            nominations_open: 'badge-noms-open',
            nominations_open_phase2: 'badge-noms-open',
            scrutiny: 'badge-scrutiny',
            candidates_published: 'badge-scrutiny',
            active: 'badge-active',
            closed: 'badge-closed',
            declared: 'badge-declared'
          };
          var badge = statusBadgeMap[el.status] || 'badge-draft';
          html +=
            '<div class="panel-card" style="margin-bottom:12px;">' +
              '<div class="panel-card-header">Current Election</div>' +
              '<div class="panel-card-body" style="padding:14px 16px;">' +
                '<div style="font-weight:600;color:#1a3a5c;margin-bottom:8px;">' +
                  escHtml(el.title) +
                  (el.isTrial ? '<span class="status-badge badge-trial" style="margin-left:6px;">Trial</span>' : '') +
                '</div>' +
                '<span class="status-badge ' + badge + '">' +
                  escHtml(el.status.replace(/_/g, ' ')) +
                '</span>' +
              '</div>' +
            '</div>';
        } else {
          html +=
            '<div class="panel-card" style="margin-bottom:12px;">' +
              '<div class="panel-card-body" style="padding:16px;text-align:center;color:#6b7280;">' +
                'No election is currently active.' +
              '</div>' +
            '</div>';
        }

        // Handover checklist card
        html +=
          '<div class="panel-card" style="margin-bottom:12px;">' +
            '<div class="panel-card-header">Handover Checklist</div>' +
            '<div class="panel-card-body" style="padding:14px 16px;">';

        if (checklist.length === 0) {
          html += '<div style="color:#6b7280;font-size:.85rem;">No checklist items loaded.</div>';
        } else {
          checklist.forEach(function(item) {
            var done = item.done === true || item.done === 'true';
            html +=
              '<div style="display:flex;align-items:flex-start;gap:10px;' +
                'padding:10px 0;border-bottom:1px solid #f3f4f6;">' +
                '<span style="font-size:1.1rem;margin-top:1px;">' +
                  (done ? '✅' : '⬜') +
                '</span>' +
                '<div>' +
                  '<div style="font-size:.9rem;color:#374151;">' +
                    escHtml(item.label) +
                  '</div>' +
                  (item.note ?
                    '<div style="font-size:.78rem;color:#6b7280;margin-top:2px;">' +
                      escHtml(item.note) + '</div>'
                  : '') +
                '</div>' +
              '</div>';
          });
        }

        html += '</div></div>';

        content.innerHTML = html;
      })
      .withFailureHandler(function() {
        var content = document.getElementById('ec-content');
        if (content) content.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          'Error loading overview.</div>';
      })
      .getECOfficerPanel(App.token);
  }

  // ── VOTER ROLL ───────────────────────────────────────────────

  function _renderVoterRoll() {
  // Trigger summary load after render via setTimeout
  setTimeout(function() {
    google.script.run
      .withSuccessHandler(function(res) {
        var el = document.getElementById('vr-summary');
        if (!el) return;
        if (!res || !res.success || !res.rows || res.rows.length === 0) {
          el.innerHTML = 'No voter roll draft uploaded yet.';
          return;
        }
        var rows = res.rows;
        var total        = rows.length;
        var verified     = rows.filter(function(r) { return r[12] === 'verified'; }).length;
        var unresponsive = rows.filter(function(r) { return r[12] === 'unresponsive'; }).length;
        var undelivered  = rows.filter(function(r) { return r[12] === 'undelivered'; }).length;
        el.innerHTML =
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
            _statBox('Total Voters', total) +
            _statBox('Verified', verified) +
            _statBox('Unresponsive', unresponsive) +
            _statBox('Undelivered', undelivered) +
          '</div>';
      })
      .withFailureHandler(function() {
        var el = document.getElementById('vr-summary');
        if (el) el.innerHTML = 'Could not load draft status.';
      })
      .getVoterRollDraft(App.token, 1, '');
  }, 0);

  return '<div class="panel-card" style="margin-bottom:12px;">' +
    '<div class="panel-card-header">Voter Roll Draft</div>' +
    '<div class="panel-card-body" style="padding:14px 16px;">' +
      '<p style="font-size:.85rem;color:#374151;margin-bottom:12px;">' +
        'Upload the verified voter roll CSV. Each upload replaces the previous draft. ' +
        'Blocked once the RO objection window is open.' +
      '</p>' +

      // Format guide
      '<div style="background:#f0f4f8;border:1px solid #d1d9e0;border-radius:4px;' +
        'padding:12px 14px;margin-bottom:16px;">' +
        '<div style="font-weight:600;font-size:.85rem;color:#1a3a5c;margin-bottom:8px;">' +
          'Required CSV Format — 10 columns, no header row:' +
        '</div>' +
        '<div style="font-family:monospace;font-size:.78rem;color:#374151;' +
          'background:#fff;border:1px solid #e5e7eb;border-radius:3px;' +
          'padding:8px 10px;overflow-x:auto;white-space:nowrap;">' +
          'RollNo, Name, Surname, Batch, Email, PhoneCC, Phone, Phone2CC, Phone2, VerificationCategory' +
        '</div>' +
        '<div style="font-size:.78rem;color:#6b7280;margin-top:8px;">' +
          '<strong>VerificationCategory</strong> must be one of: ' +
          '<code>verified</code>, <code>unresponsive</code>, <code>undelivered</code>. ' +
          'Leave blank if unknown. Do not include a header row.' +
        '</div>' +
      '</div>' +
      '<label for="vr-file" style="font-weight:600;display:block;margin-bottom:8px;">' +
        'Select CSV File' +
      '</label>' +
      '<input type="file" id="vr-file" accept=".csv" ' +
        'style="width:100%;margin-bottom:16px;font-size:.9rem;" />' +
      '<button class="btn btn-primary" id="btn-upload-vr" ' +
        'onclick="ECOfficerPanel._uploadVoterRoll()" ' +
        'style="width:100%;padding:14px;font-size:1rem;">' +
        'Upload Voter Roll Draft' +
      '</button>' +
      '<div id="vr-status" style="margin-top:12px;font-size:.85rem;display:none;"></div>' +
    '</div>' +
  '</div>' +
  '<div class="panel-card">' +
    '<div class="panel-card-header">Current Draft Status</div>' +
    '<div class="panel-card-body" style="padding:14px 16px;">' +
      '<div id="vr-summary" style="color:#6b7280;font-size:.85rem;">' +
        '<div class="spinner"></div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

  function _statBox(label, value) {
    return '<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;' +
      'padding:10px;text-align:center;">' +
      '<div style="font-size:1.3rem;font-weight:700;color:#1a3a5c;">' + value + '</div>' +
      '<div style="font-size:.75rem;color:#6b7280;margin-top:2px;">' + escHtml(label) + '</div>' +
    '</div>';
  }

  // ── MESSAGES ─────────────────────────────────────────────────

  function _loadMessages() {
    google.script.run
      .withSuccessHandler(function(res) {
        var content = document.getElementById('ec-content');
        if (!content) return;

        var messages = (res && res.success && res.messages) ? res.messages : [];

        var html =
          // Compose card
          '<div class="panel-card" style="margin-bottom:12px;">' +
            '<div class="panel-card-header">Send Message to RO</div>' +
            '<div class="panel-card-body" style="padding:14px 16px;">' +
              '<label for="msg-subject">Subject</label>' +
              '<input type="text" id="msg-subject" placeholder="e.g. Voter roll uploaded" ' +
                'style="margin-bottom:12px;" />' +
              '<label for="msg-body">Message</label>' +
              '<textarea id="msg-body" rows="4" ' +
                'style="width:100%;box-sizing:border-box;padding:10px;' +
                'border:1px solid #d1d5db;border-radius:4px;font-size:.9rem;' +
                'margin-bottom:16px;resize:vertical;"></textarea>' +
              '<button class="btn btn-primary" id="btn-send-msg" ' +
                'onclick="ECOfficerPanel._sendMessage()" ' +
                'style="width:100%;padding:14px;font-size:1rem;">' +
                'Send Message' +
              '</button>' +
              '<div id="msg-error" style="margin-top:10px;color:#c0392b;' +
                'font-size:.85rem;display:none;"></div>' +
            '</div>' +
          '</div>' +

          // Messages list
          '<div class="panel-card">' +
            '<div class="panel-card-header">Message History</div>' +
            '<div class="panel-card-body" style="padding:14px 16px;">';

        if (messages.length === 0) {
          html += '<div style="color:#6b7280;font-size:.85rem;text-align:center;padding:20px 0;">' +
            'No messages yet.</div>';
        } else {
          messages.forEach(function(m) {
            var isFromMe = m.fromAdminId === App.identity;
            html +=
              '<div style="padding:12px 0;border-bottom:1px solid #f3f4f6;">' +
                '<div style="display:flex;justify-content:space-between;' +
                  'align-items:flex-start;margin-bottom:4px;">' +
                  '<div style="font-weight:600;font-size:.9rem;color:#1a3a5c;">' +
                    escHtml(m.subject) +
                  '</div>' +
                  '<div style="font-size:.75rem;color:#9ca3af;white-space:nowrap;margin-left:8px;">' +
                    escHtml(m.sentAt || '') +
                  '</div>' +
                '</div>' +
                '<div style="font-size:.85rem;color:#374151;margin-bottom:6px;">' +
                  escHtml(m.messageText || '') +
                '</div>' +
                '<div style="font-size:.75rem;color:#6b7280;">' +
                  (m.fromAdminId === 'RO_ADMIN' ? 'From RO' :
                   m.toAdminId   === 'RO_ADMIN' ? 'To RO' : 'Message') +
                  (m.acknowledgedAt ?
                    ' · <span style="color:#16a34a;">Acknowledged</span>' : '') +
                '</div>' +
              '</div>';
          });
        }

        html += '</div></div>';
        content.innerHTML = html;
      })
      .withFailureHandler(function() {
        var content = document.getElementById('ec-content');
        if (content) content.innerHTML =
          '<div style="padding:16px;color:#c0392b;font-size:.9rem;">' +
          'Error loading messages.</div>';
      })
      .getMessages(App.token);
  }

  // ── LANDING PAGE ─────────────────────────────────────────────

  function _loadLandingPage() {
    google.script.run
      .withSuccessHandler(function(res) {
        var c = document.getElementById('ec-content');
        if (!c) return;
        // Build content map from items array
        var cm = {};
        if (res && res.success && res.items) {
          res.items.forEach(function(item) { cm[item.key] = item; });
        }
        c.innerHTML = _renderLandingPage(cm);
        // Load schedule section
        _loadLandingPageSchedule();
      })
      .withFailureHandler(function() {
        var c = document.getElementById('ec-content');
        if (c) c.innerHTML = '<div style="padding:16px;color:#c0392b;">Error loading Landing Page content.</div>';
      })
      .getLandingPageContent();
  }

  function _loadLandingPageSchedule() {
    // Find the active election and load its schedule
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success || !res.election) return;
        var elecId = res.election.id;
        // Store for save actions
        window._lpElecId = elecId;
        // Load schedule
        google.script.run
          .withSuccessHandler(function(sres) {
            if (!sres || !sres.success) return;
            var f = function(id, val) {
              var el = document.getElementById(id);
              if (el && val) el.value = val.substring(0, 10);
            };
            f('lp-sched-vday',         sres.vDay);
            f('lp-sched-nom-open',     sres.nomOpenDate);
            f('lp-sched-p1-close',     sres.phase1CloseDate);
            f('lp-sched-nom-close',    sres.nomCloseDate);
            f('lp-sched-cand-pub',     sres.candidatesPubDate);
            f('lp-sched-voting-open',  sres.votingOpenDate);
            f('lp-sched-voting-close', sres.votingCloseDate);
            f('lp-sched-declaration',  sres.declarationDate);
            if (sres.published) {
              var el = document.getElementById('lp-sched-status');
              if (el) {
                el.innerHTML = '🌐 Published to Landing Page on ' + sres.publishedAt.substring(0, 10);
                el.style.display = 'block';
              }
            }
          })
          .withFailureHandler(function() {})
          .getElectionSchedule(App.token, elecId);
      })
      .withFailureHandler(function() {})
      .getECOfficerPanel(App.token);
  }

  function _lpVal(key, cm, fallback) {
    return (cm[key] && cm[key].value) ? cm[key].value : (fallback || '');
  }

  function _lpField(id, label, key, cm, type, placeholder) {
    type = type || 'text';
    var val = _lpVal(key, cm, '');
    return '<div style="margin-bottom:14px;">' +
      '<label style="font-size:.82rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">' +
        escHtml(label) +
      '</label>' +
      (type === 'textarea' ?
        '<textarea id="' + id + '" rows="3" ' +
        'style="width:100%;box-sizing:border-box;padding:10px;font-size:.88rem;' +
        'border:1px solid #d1d5db;border-radius:4px;resize:vertical;" ' +
        'placeholder="' + escHtml(placeholder || '') + '">' + escHtml(val) + '</textarea>'
        :
        '<input type="' + type + '" id="' + id + '" value="' + escHtml(val) + '" ' +
        'placeholder="' + escHtml(placeholder || '') + '" ' +
        'style="width:100%;box-sizing:border-box;padding:10px;font-size:.88rem;' +
        'border:1px solid #d1d5db;border-radius:4px;" />'
      ) +
    '</div>';
  }

  function _schedDateRowLP(id, label, vRef) {
    return '<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;">' +
      '<div style="flex:1;">' +
        '<label style="font-size:.78rem;color:#6b7280;">' + escHtml(label) + ' <span style="color:#9ca3af;">(' + escHtml(vRef) + ')</span></label>' +
        '<input type="date" id="' + id + '" ' +
        'style="width:100%;box-sizing:border-box;padding:8px;font-size:.85rem;' +
        'border:1px solid #d1d5db;border-radius:4px;" />' +
      '</div>' +
    '</div>';
  }

  function _renderLandingPage(cm) {
    cm = cm || {};
    return (
      // ── Section A — Association Announcements ──────────────────
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">📢 Association Announcements</div>' +
        '<div class="panel-card-body">' +
          '<p style="font-size:.82rem;color:#6b7280;margin-bottom:16px;">' +
            'These items appear on the public Landing Page immediately when saved and set to visible.' +
          '</p>' +

          _lpField('lp-sgm-date',    'SGM Date',    'sgm_date',    cm, 'date', '') +
          _lpField('lp-sgm-venue',   'SGM Venue',   'sgm_venue',   cm, 'text', 'e.g. Sainik School Kazhakootam') +
          _lpField('lp-sgm-notice',  'SGM Notice',  'sgm_notice',  cm, 'textarea', 'Public notice or agenda summary for SGM…') +
          _lpField('lp-agm-date',    'AGM Date',    'agm_date',    cm, 'date', '') +
          _lpField('lp-agm-notice',  'AGM Notice',  'agm_notice',  cm, 'text', 'e.g. Date to be announced') +
          _lpField('lp-announcement','General Announcement', 'announcement', cm, 'textarea', 'Any other public notice to display on the Landing Page…') +

          '<div id="lp-ann-error" style="color:#c0392b;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<div id="lp-ann-ok"    style="color:#16a34a;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<button onclick="ECOfficerPanel._saveAnnouncements()" ' +
          'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
          'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">💾 Save Announcements</button>' +
        '</div>' +
      '</div>' +

      // ── Section B — Election Schedule ──────────────────────────
      '<div class="panel-card" style="margin-bottom:12px;">' +
        '<div class="panel-card-header">📅 Election Schedule (Draft)</div>' +
        '<div class="panel-card-body">' +
          '<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;' +
          'padding:10px 14px;font-size:.82rem;color:#1e40af;margin-bottom:14px;">' +
            'ℹ The EC publishes a <strong>draft framework schedule</strong> before handover to the RO. ' +
            'It will be labelled "Draft — subject to finalisation by the Returning Officer" on the Landing Page. ' +
            'After handover, the RO publishes the finalised schedule from the Admin Panel.' +
          '</div>' +

          '<label style="font-size:.82rem;font-weight:600;color:#374151;display:block;margin-bottom:4px;">AGM Day (V-Day)</label>' +
          '<div style="display:flex;gap:8px;margin-bottom:14px;">' +
            '<input type="date" id="lp-sched-vday" ' +
            'style="flex:1;padding:10px;font-size:.88rem;border:1px solid #d1d5db;border-radius:4px;box-sizing:border-box;" />' +
            '<button onclick="ECOfficerPanel._lpSchedAutoCalc()" ' +
            'style="padding:10px 12px;background:#1a3a5c;color:#fff;border:none;' +
            'border-radius:4px;cursor:pointer;font-size:.82rem;min-height:44px;white-space:nowrap;">' +
            '⚡ Auto-fill</button>' +
          '</div>' +

          _schedDateRowLP('lp-sched-nom-open',     'Nominations Open',    'V-38') +
          _schedDateRowLP('lp-sched-p1-close',     'Phase 1 Close',       'V-31') +
          _schedDateRowLP('lp-sched-nom-close',    'Nominations Close',   'V-24') +
          _schedDateRowLP('lp-sched-cand-pub',     'Candidates Published','V-19') +
          _schedDateRowLP('lp-sched-voting-open',  'Voting Opens',        'V-16') +
          _schedDateRowLP('lp-sched-voting-close', 'Voting Closes',       'V-9') +
          _schedDateRowLP('lp-sched-declaration',  'Results Declared',    'V-7') +

          '<div id="lp-sched-status" style="font-size:.82rem;color:#059669;margin-bottom:8px;display:none;"></div>' +
          '<div id="lp-sched-error" style="color:#c0392b;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<div id="lp-sched-ok"    style="color:#16a34a;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<div style="display:flex;gap:10px;">' +
            '<button onclick="ECOfficerPanel._saveSchedDraft()" ' +
            'style="flex:1;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
            'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">💾 Save Draft</button>' +
            '<button onclick="ECOfficerPanel._publishSchedDraft()" ' +
            'style="flex:1;padding:12px;background:#059669;color:#fff;border:none;' +
            'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">🌐 Publish Draft</button>' +
          '</div>' +
        '</div>' +
      '</div>' +

      // ── Section C — VVA Integration ────────────────────────────
      '<div class="panel-card" style="margin-bottom:24px;">' +
        '<div class="panel-card-header">🔗 Voter Verification App (VVA)</div>' +
        '<div class="panel-card-body">' +
          '<p style="font-size:.82rem;color:#6b7280;margin-bottom:14px;">' +
            'Set the VVA links so they appear on the public Landing Page. ' +
            'The public URL shows the verification portal. ' +
            'The JSON endpoint powers the live verification count widget.' +
          '</p>' +

          _lpField('lp-vva-url',  'VVA Public Portal URL',   'vva_url',  cm, 'url', 'https://script.google.com/macros/s/…/exec') +
          _lpField('lp-vva-json', 'VVA JSON Endpoint URL',   'vva_json', cm, 'url', 'https://script.google.com/macros/s/…/exec?action=public') +

          '<div id="lp-vva-error" style="color:#c0392b;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<div id="lp-vva-ok"    style="color:#16a34a;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<button onclick="ECOfficerPanel._saveVVA()" ' +
          'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
          'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">💾 Save VVA Links</button>' +
        '</div>' +
      '</div>' +

      '<div class="panel-card" style="margin-bottom:24px;">' +
        '<div class="panel-card-header">🔗 Election Documents</div>' +
        '<div class="panel-card-body">' +
          '<p style="font-size:.82rem;color:#6b7280;margin-bottom:14px;">' +
            'Set the public URLs for the SOP and Technical Specification documents. ' +
            'These will appear as links on the public Landing Page.' +
          '</p>' +
          _lpField('lp-sop-url',      'Election SOP Document URL',        'sop_url',      cm, 'url', 'https://drive.google.com/…') +
          _lpField('lp-techspec-url',  'Technical Specification URL',      'techspec_url', cm, 'url', 'https://drive.google.com/…') +
          '<div id="lp-docs-error" style="color:#c0392b;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<div id="lp-docs-ok"    style="color:#16a34a;font-size:.82rem;margin-bottom:8px;display:none;"></div>' +
          '<button onclick="ECOfficerPanel._saveDocLinks()" ' +
          'style="width:100%;padding:12px;background:#1a3a5c;color:#fff;border:none;' +
          'border-radius:4px;font-size:.9rem;cursor:pointer;min-height:44px;">💾 Save Document Links</button>' +
        '</div>' +
      '</div>'
    );
  }

  // ── ACTION HANDLERS ──────────────────────────────────────────

  return {
    init: init,

    _uploadVoterRoll: function() {
      var fileInput = document.getElementById('vr-file');
      var statusEl  = document.getElementById('vr-status');
      var btn       = document.getElementById('btn-upload-vr');

      if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
        statusEl.textContent = 'Please select a CSV file first.';
        statusEl.style.color = '#c0392b';
        statusEl.style.display = 'block';
        return;
      }

      var file = fileInput.files[0];
      if (!file.name.toLowerCase().endsWith('.csv')) {
        statusEl.textContent = 'Only CSV files are accepted.';
        statusEl.style.color = '#c0392b';
        statusEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Reading file…';
      btn.disabled = true;
      statusEl.style.display = 'none';

      var reader = new FileReader();
      reader.onload = function(e) {
        var csv = e.target.result;
        var lines = csv.split('\n').filter(function(l) { return l.trim() !== ''; });
        if (lines.length < 2) {
          statusEl.textContent = 'CSV appears empty or has no data rows.';
          statusEl.style.color = '#c0392b';
          statusEl.style.display = 'block';
          btn.textContent = 'Upload Voter Roll Draft';
          btn.disabled = false;
          return;
        }

        // Parse CSV into rows array — skip header row (row 0)
        var rows = [];
        for (var i = 1; i < lines.length; i++) {
          var cols = lines[i].split(',').map(function(c) { return c.trim(); });
          rows.push(cols);
        }

        btn.textContent = 'Uploading ' + rows.length + ' rows…';

        google.script.run
          .withSuccessHandler(function(res) {
            if (res && res.success) {
              statusEl.textContent = 'Uploaded ' + rows.length + ' rows successfully.';
              statusEl.style.color = '#16a34a';
              showToast('Voter roll draft uploaded.');
              ECOfficerPanel._reloadVRSummary();
            } else {
              statusEl.textContent = (res && res.message) || 'Upload failed.';
              statusEl.style.color = '#c0392b';
            }
            statusEl.style.display = 'block';
            btn.textContent = 'Upload Voter Roll Draft';
            btn.disabled = false;
          })
          .withFailureHandler(function() {
            statusEl.textContent = 'Error during upload. Please try again.';
            statusEl.style.color = '#c0392b';
            statusEl.style.display = 'block';
            btn.textContent = 'Upload Voter Roll Draft';
            btn.disabled = false;
          })
          .uploadVoterRollDraft(App.token, rows, '');
      };
      reader.readAsText(file);
    },

    _reloadVRSummary: function() {
      google.script.run
        .withSuccessHandler(function(res) {
          var el = document.getElementById('vr-summary');
          if (!el) return;
          if (!res || !res.success || !res.rows || res.rows.length === 0) {
            el.innerHTML = 'No voter roll draft uploaded yet.';
            return;
          }
          var rows = res.rows;
          var total = rows.length;
          var verified    = rows.filter(function(r) { return r[12] === 'verified'; }).length;
          var unresponsive = rows.filter(function(r) { return r[12] === 'unresponsive'; }).length;
          var undelivered  = rows.filter(function(r) { return r[12] === 'undelivered'; }).length;
          el.innerHTML =
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
              _statBox('Total Voters', total) +
              _statBox('Verified', verified) +
              _statBox('Unresponsive', unresponsive) +
              _statBox('Undelivered', undelivered) +
            '</div>';
        })
        .withFailureHandler(function() {})
        .getVoterRollDraft(App.token, 1, '');
    },

    _sendMessage: function() {
      var subject = document.getElementById('msg-subject').value.trim();
      var body    = document.getElementById('msg-body').value.trim();
      var errEl   = document.getElementById('msg-error');
      var btn     = document.getElementById('btn-send-msg');

      errEl.style.display = 'none';

      if (!subject) {
        errEl.textContent = 'Please enter a subject.';
        errEl.style.display = 'block';
        return;
      }
      if (!body) {
        errEl.textContent = 'Please enter a message.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Sending…';
      btn.disabled = true;

      google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.success) {
            showToast('Message sent.');
            document.getElementById('msg-subject').value = '';
            document.getElementById('msg-body').value = '';
            // Reload messages list
            ECOfficerPanel._reloadMessages();
          } else {
            errEl.textContent = (res && res.message) || 'Failed to send.';
            errEl.style.display = 'block';
          }
          btn.textContent = 'Send Message';
          btn.disabled = false;
        })
        .withFailureHandler(function() {
          errEl.textContent = 'Error — please try again.';
          errEl.style.display = 'block';
          btn.textContent = 'Send Message';
          btn.disabled = false;
        })
        .sendHandoverMessage(App.token, subject, body);
    },

    _reloadMessages: function() {
      _loadMessages();
    },

    _saveAnnouncements: function() {
      var errEl = document.getElementById('lp-ann-error');
      var okEl  = document.getElementById('lp-ann-ok');
      if (errEl) { errEl.style.display = 'none'; errEl.innerHTML = ''; }
      if (okEl)  { okEl.style.display  = 'none'; okEl.innerHTML  = ''; }

      var fields = [
        { key: 'sgm_date',     id: 'lp-sgm-date',    type: 'date',  label: 'SGM Date' },
        { key: 'sgm_venue',    id: 'lp-sgm-venue',   type: 'text',  label: 'SGM Venue' },
        { key: 'sgm_notice',   id: 'lp-sgm-notice',  type: 'text',  label: 'SGM Notice' },
        { key: 'agm_date',     id: 'lp-agm-date',    type: 'date',  label: 'AGM Date' },
        { key: 'agm_notice',   id: 'lp-agm-notice',  type: 'text',  label: 'AGM Notice' },
        { key: 'announcement', id: 'lp-announcement', type: 'text', label: 'Announcement' }
      ];

      var pending = fields.length;
      var failed  = 0;

      fields.forEach(function(f) {
        var el  = document.getElementById(f.id);
        var val = el ? el.value : '';
        google.script.run
          .withSuccessHandler(function() {
            pending--;
            if (pending === 0) {
              if (failed === 0) {
                if (okEl) { okEl.innerHTML = '✓ Announcements saved.'; okEl.style.display = 'block'; }
              } else {
                if (errEl) { errEl.innerHTML = failed + ' item(s) failed to save.'; errEl.style.display = 'block'; }
              }
            }
          })
          .withFailureHandler(function() { pending--; failed++; })
          .setLandingPageContent(App.token, f.key, val, f.type, f.label, true, '');
      });
    },

    _lpSchedAutoCalc: function() {
      var vDay = document.getElementById('lp-sched-vday').value;
      if (!vDay) { alert('Please enter V-Day (AGM date) first.'); return; }
      var anchor = new Date(vDay);
      function vMinus(days) {
        var d = new Date(anchor.getTime());
        d.setDate(d.getDate() - days);
        return d.toISOString().substring(0, 10);
      }
      document.getElementById('lp-sched-nom-open').value     = vMinus(38);
      document.getElementById('lp-sched-p1-close').value     = vMinus(31);
      document.getElementById('lp-sched-nom-close').value    = vMinus(24);
      document.getElementById('lp-sched-cand-pub').value     = vMinus(19);
      document.getElementById('lp-sched-voting-open').value  = vMinus(16);
      document.getElementById('lp-sched-voting-close').value = vMinus(9);
      document.getElementById('lp-sched-declaration').value  = vMinus(7);
    },

    _saveSchedDraft: function() {
      var errEl = document.getElementById('lp-sched-error');
      var okEl  = document.getElementById('lp-sched-ok');
      if (errEl) { errEl.style.display = 'none'; errEl.innerHTML = ''; }
      if (okEl)  { okEl.style.display  = 'none'; okEl.innerHTML  = ''; }

      var elecId = window._lpElecId;
      if (!elecId) {
        if (errEl) { errEl.innerHTML = 'No active election found. Create an election first.'; errEl.style.display = 'block'; }
        return;
      }
      function val(id) { var el = document.getElementById(id); return el ? el.value : ''; }

      var schedData = {
        scheduleMode:      'live_draft',
        vDay:              val('lp-sched-vday'),
        nomOpenDate:       val('lp-sched-nom-open'),
        phase1CloseDate:   val('lp-sched-p1-close'),
        nomCloseDate:      val('lp-sched-nom-close'),
        candidatesPubDate: val('lp-sched-cand-pub'),
        votingOpenDate:    val('lp-sched-voting-open'),
        votingCloseDate:   val('lp-sched-voting-close'),
        declarationDate:   val('lp-sched-declaration')
      };

      if (!schedData.vDay) {
        if (errEl) { errEl.innerHTML = 'V-Day is required.'; errEl.style.display = 'block'; }
        return;
      }

      google.script.run
        .withSuccessHandler(function(res) {
          if (!res || !res.success) {
            if (errEl) { errEl.innerHTML = escHtml((res && res.message) || 'Save failed.'); errEl.style.display = 'block'; }
            return;
          }
          if (okEl) { okEl.innerHTML = '✓ Draft schedule saved.'; okEl.style.display = 'block'; }
        })
        .withFailureHandler(function() {
          if (errEl) { errEl.innerHTML = 'Connection error.'; errEl.style.display = 'block'; }
        })
        .setElectionSchedule(App.token, elecId, schedData, '');
    },

    _publishSchedDraft: function() {
      var errEl = document.getElementById('lp-sched-error');
      var okEl  = document.getElementById('lp-sched-ok');
      if (!confirm('Publish this draft schedule to the Landing Page? Members will see it labelled "Draft".')) return;

      var elecId = window._lpElecId;
      if (!elecId) {
        if (errEl) { errEl.innerHTML = 'No active election found.'; errEl.style.display = 'block'; }
        return;
      }

      // Save first, then publish
      ECOfficerPanel._saveSchedDraft();
      setTimeout(function() {
        google.script.run
          .withSuccessHandler(function(res) {
            if (!res || !res.success) {
              if (errEl) { errEl.innerHTML = escHtml((res && res.message) || 'Publish failed.'); errEl.style.display = 'block'; }
              return;
            }
            if (okEl) { okEl.innerHTML = '🌐 Draft schedule published to Landing Page.'; okEl.style.display = 'block'; }
          })
          .withFailureHandler(function() {
            if (errEl) { errEl.innerHTML = 'Connection error.'; errEl.style.display = 'block'; }
          })
          .publishSchedule(App.token, elecId, '');
      }, 1500);
    },

    _saveVVA: function() {
      var errEl = document.getElementById('lp-vva-error');
      var okEl  = document.getElementById('lp-vva-ok');
      if (errEl) { errEl.style.display = 'none'; errEl.innerHTML = ''; }
      if (okEl)  { okEl.style.display  = 'none'; okEl.innerHTML  = ''; }

      var vvaUrl  = (document.getElementById('lp-vva-url')  || {}).value || '';
      var vvaJson = (document.getElementById('lp-vva-json') || {}).value || '';
      var pending = 2; var failed = 0;

      function done(success) {
        pending--;
        if (!success) failed++;
        if (pending === 0) {
          if (failed === 0) {
            if (okEl) { okEl.innerHTML = '✓ VVA links saved.'; okEl.style.display = 'block'; }
          } else {
            if (errEl) { errEl.innerHTML = 'Save failed for ' + failed + ' item(s).'; errEl.style.display = 'block'; }
          }
        }
      }

      google.script.run
        .withSuccessHandler(function() { done(true); })
        .withFailureHandler(function() { done(false); })
        .setLandingPageContent(App.token, 'vva_url', vvaUrl, 'url', 'Voter Verification Portal', true, '');

      google.script.run
        .withSuccessHandler(function() { done(true); })
        .withFailureHandler(function() { done(false); })
        .setLandingPageContent(App.token, 'vva_json', vvaJson, 'url', 'VVA JSON Endpoint', false, '');
    },

    _saveDocLinks: function() {
      var errEl = document.getElementById('lp-docs-error');
      var okEl  = document.getElementById('lp-docs-ok');
      if (errEl) { errEl.style.display = 'none'; errEl.innerHTML = ''; }
      if (okEl)  { okEl.style.display  = 'none'; okEl.innerHTML  = ''; }

      var sopUrl      = (document.getElementById('lp-sop-url')      || {}).value || '';
      var techspecUrl = (document.getElementById('lp-techspec-url')  || {}).value || '';
      var pending = 2; var failed = 0;

      function done(success) {
        pending--;
        if (!success) failed++;
        if (pending === 0) {
          if (failed === 0) {
            if (okEl) { okEl.innerHTML = '✓ Document links saved.'; okEl.style.display = 'block'; }
          } else {
            if (errEl) { errEl.innerHTML = 'Save failed for ' + failed + ' item(s).'; errEl.style.display = 'block'; }
          }
        }
      }

      google.script.run
        .withSuccessHandler(function() { done(true); })
        .withFailureHandler(function() { done(false); })
        .setLandingPageContent(App.token, 'sop_url', sopUrl, 'url', 'Election SOP', true, '');

      google.script.run
        .withSuccessHandler(function() { done(true); })
        .withFailureHandler(function() { done(false); })
        .setLandingPageContent(App.token, 'techspec_url', techspecUrl, 'url', 'Technical Specification', true, '');
    }
  };

})();
